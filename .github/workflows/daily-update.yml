name: Update arXiv Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4-14 * * 1-5'

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check New York weekday window and daily freshness
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=America/New_York date +%H)"
          local_weekday="$(TZ=America/New_York date +%u)"
          local_date="$(TZ=America/New_York date +%F)"

          if [ "$local_weekday" -gt 5 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping weekend run at $(TZ=America/New_York date)"
            exit 0
          fi

          case "$local_hour" in
            00|01|02|03|04|05|06|07|08|09)
              ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skipping scheduled run outside the 00-09 New York window at $(TZ=America/New_York date)"
              exit 0
              ;;
          esac

          if [ -f "arxiv_daily/$local_date/index.html" ] && [ -f "arxiv_daily_cornell/$local_date/index.html" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping because both archives already exist for $local_date"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate both archives
        if: steps.gate.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -u tools/generate_arxiv_portal.py
      - name: Commit updated output
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arxiv_daily arxiv_daily_cornell index.html .nojekyll
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update arXiv daily archives"
          git push

