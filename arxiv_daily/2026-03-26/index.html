缚态对碰撞扰动最弱，这关联于实空间重正化群最低层次的近藤物理表现。\n3. 此模型为在量子行走体系中探索近藤效应、多体纠缠及统计依赖动力学提供了简化的理论平台，有望推动量子模拟实验与多体物理研究的进一步结合。", "summary_source": "deepseek", "authors": [{"name": "Manami Yamagishi"}, {"name": "Naomichi Hatano"}, {"name": "Kohei Kawabata"}, {"name": "Chusei Kiumi"}, {"name": "Akinori Nishino"}, {"name": "Franco Nori"}, {"name": "Hideaki Obuse"}], "featured_authors": [{"name": "Manami Yamagishi"}, {"name": "Naomichi Hatano"}, {"name": "Kohei Kawabata"}, {"name": "Akinori Nishino"}, {"name": "Franco Nori"}, {"name": "Hideaki Obuse"}], "author_count": 7}, {"id": "2603.24467", "category": "quant-ph", "title": "Current Density Formulation of Nuclear Magnetic Shielding and Magnetizability Tensors in Paramagnetic Molecules in the Presence of Relativistic Effects", "abstract": "This work presents the computation of nuclear magnetic shielding and magnetizability tensors for paramagnetic molecules, using a magnetically induced current density framework to account for orbital and spin contributions. We demonstrate that the methodology proposed by Soncini[1] is physically equivalent to the formalisms of Pennanen and Vaara[2] and Franzke et al.[3], provided that scalar and spin-orbit relativistic effects are included within the ground-state spin density. In our model, these corrections are implemented through a Zeroth-Order Regular Approximation (ZORA) formulation of the current density. The resulting magnetizability tensor is fully consistent with the general Van Vleck formulation, recovering the temperature-dependent Curie contribution through the explicit integration of the magnetically induced spin current density. This methodology offers a straightforward computational route that bypasses the complex evaluation of g-tensors and Zero-Field Splitting (ZFS) Hamiltonians, requiring only a ground-state spin density incorporating relativistic effects. Notably, scalar relativistic effects are shown to be essential for capturing the Heavy-Atom Light-Atom (HALA) effect in 1H and 13C shieldings. To maintain efficiency, relativistic effects on the orbital contribution are neglected as they are negligible for light atoms. This approach represents an optimal compromise for paramagnetic complexes involving transition metals up to the second row, where the HALA effect is primarily driven by scalar relativistic corrections within the ground-state spin density. Neglecting spin-orbit terms in the orbital contribution significantly streamlines the calculation without loss of accuracy, providing the pNMR community with a robust tool for characterizing open-shell systems.", "url": "https://arxiv.org/abs/2603.24467", "type": "理论+数值", "summary": "1. 该工作基于磁致电流密度框架，计算了顺磁性分子的核磁屏蔽与磁化率张量，同时处理了轨道与自旋贡献。\n2. 方法学通过零阶正则近似处理电流密度，在包含相对论效应的基态自旋密度下，与已有形式物理等价，并通过显式积分自旋电流密度恢复了温度依赖的居里贡献。\n3. 此计算方案规避了g张量与零场分裂哈密顿量的复杂评估，为涉及第二行过渡金属的顺磁配合物核磁共振表征提供了高效可靠的工具。", "summary_source": "deepseek", "authors": [{"name": "Francesco Ferdinando Summa"}, {"name": "Sonia Coriani"}, {"name": "Andre Severo Pereira Gomes"}], "featured_authors": [{"name": "Francesco Ferdinando Summa"}, {"name": "Sonia Coriani"}, {"name": "Andre Severo Pereira Gomes"}], "author_count": 3}, {"id": "2603.24557", "category": "quant-ph", "title": "Geometric Curvature Governs Work in Open Quantum Steady States", "abstract": "Classical thermodynamics admits a geometric formulation in which work is associated with areas enclosed by cycles in state space. Whether an analogous structure persists in driven, dissipative quantum systems remains an open question. Here we show that quasistatic work in open quantum steady states is governed by an emergent geometric curvature in control-parameter space arising from steady-state coherence. For a driven dissipative two-level system, we construct a work one-form whose curvature determines the work produced in cyclic processes. The work vanishes under strong dephasing, identifying coherence as a necessary condition for nontrivial geometry. However, its magnitude is set not by the coherence itself but by the spatial structure of the curvature: cycles enclosing comparable areas produce different work depending on their location in parameter space. Reversing the cycle orientation reverses the sign of the work, confirming its geometric origin. These results establish a geometric framework for open quantum thermodynamics and identify curvature as the organizing principle of thermodynamic response, with direct implications for driven light--matter systems in cavity quantum electrodynamics.", "url": "https://arxiv.org/abs/2603.24557", "type": "理论", "summary": "1. 本文为开放量子稳态系统引入了热力学的几何框架，揭示了准静态功由控制参数空间中由稳态相干性涌现的几何曲率所支配。\n2. 研究的关键在于证明了相干性是非平凡几何结构的必要条件，而功的大小由曲率的空间分布决定，而非相干性本身。\n3. 该几何框架将曲率确立为热力学响应的组织原则，对腔量子电动力学中的光-物质耦合系统具有直接意义。", "summary_source": "deepseek", "authors": [{"name": "Eric R. Bittner"}], "featured_authors": [{"name": "Eric R. Bittner"}], "author_count": 1}, {"id": "2603.24573", "category": "quant-ph", "title": "Flagging the Clifford hierarchy:~Fault-tolerant logical $\\fracπ{2^l}$ rotations via measuring circuit gauge operators of non-Cliffords", "abstract": "We provide a recursively defined sequence of flag circuits which will detect logical errors induced by non-fault-tolerant $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ gates on CSS codes with a fault distance of two. As applications, we give a family of circuits with $O(l)$ gates and ancillae which implement fault-tolerant logical $R_{Z}(\\frac{\\pi}{2^l})$ or $R_{ZZ}(\\frac{\\pi}{2^l})$ gates on any $[[k + 2, k, 2]]$ iceberg code and fault-tolerant circuits of size $O(l)$ for preparing $|\\frac{\\pi}{2^l}\\rangle$ resource states in the $[[7,1,3]]$ code, which can be used to perform fault-tolerant $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ rotations via gate teleportation, allowing for implementations of these gates that bypass the high overheads of gate synthesis when $l$ is small relative to the precision required. We show how the circuits above can be generalized to $\\pi( x_0.x_{1}x_{2}\\ldots x_{l}) = \\sum_{j}^{l} \\pi \\frac{x_j}{2^j}$ rotations with identical overheads in $l$, which could be useful in quantum simulations where time is digitized in binary. Finally, we illustrate two approaches to increase the fault-distance of our construction. We show how to increase the fault distance of a Cliffordized version of the T gate circuit to $3$ in the Steane code and how to increase the fault-distance of the $\\frac{\\pi}{2}$ iceberg circuit to $4$ through concatenation in two-level iceberg codes. This yields a targeted logical $R_{\\overline{Z}}(\\frac{\\pi}{2})$ gate with fault distance $4$ on any row of logical qubits in an $[[(k_2+2)(k_1+2), k_1k_2, 4]]$ code.", "url": "https://arxiv.org/abs/2603.24573", "type": "理论+数值", "summary": "1. 本工作提出了一种基于递归定义的旗标电路序列，用于检测CSS编码中非容错逻辑旋转门引入的错误，并给出了在特定编码上实现容错逻辑门和资源态制备的具体电路族。\n2. 其技术核心在于通过递归构造实现了仅需O(l)资源和辅助量子位的容错方案，绕过了传统门综合方法在l较小时的高开销问题。\n3. 该方案可推广至二进制数字化的任意角度旋转，为量子模拟中的时间演化提供了高效实现途径，同时文中展示的提升容错距离的方法为构建更高容错能力的逻辑操作指明了方向。", "summary_source": "deepseek", "authors": [{"name": "Shival Dasu"}, {"name": "Ben Criger"}], "featured_authors": [{"name": "Shival Dasu"}, {"name": "Ben Criger"}], "author_count": 2}, {"id": "2603.24588", "category": "quant-ph", "title": "Finite-Degree Quantum LDPC Codes Reaching the Gilbert-Varshamov Bound", "abstract": "We construct nested Calderbank-Shor-Steane code pairs with non-vanishing coding rate from Hsu-Anastasopoulos codes and MacKay-Neal codes. In the fixed-degree regime, we prove relative linear distance with high probability. Moreover, for several finite degree settings, we prove Gilbert-Varshamov distance by a rigorous computer-assisted proof.", "url": "https://arxiv.org/abs/2603.24588", "type": "理论", "summary": "1. 该工作利用Hsu-Anastasopoulos码与MacKay-Neal码构造了具有非零编码率的嵌套Calderbank-Shor-Steane码对。\n2. 其在固定度数条件下以高概率证明了相对线性距离，并对若干有限度数情形通过严格的计算机辅助证明达到了Gilbert-Varshamov距离边界。\n3. 这为在有限连通性约束下逼近量子码的渐近理论极限提供了具体方案，对实用化量子纠错具有重要意义。", "summary_source": "deepseek", "authors": [{"name": "Kenta Kasai"}], "featured_authors": [{"name": "Kenta Kasai"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
