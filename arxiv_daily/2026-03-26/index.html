<head>

  <title>arXiv 2026-03-26 · Daily ArXiv Selection</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.23605", "category": "cond-mat", "title": "Dynamical magnetic breakdown and quantum oscillations from hot spot scattering", "abstract": "Quantum oscillations (QO) are a well-established probe of Fermi-surface (FS) geometry and in the presence of long-range density wave order can display new QO frequencies from reconstructed FS pockets. We show that such reconstructed frequencies can arise even in the absence of long-range density order. Considering electrons coupled to a fluctuating bosonic mode that scatters quasiparticles between sharp hot spots on the FS, we develop a semiclassical theory in which the interaction generates time-dependent tunneling processes analogous to magnetic breakdown. This dynamical magnetic breakdown produces new semiclassical orbits corresponding to reconstructed FS areas despite the absence of static order. Because tunneling probabilities depend on the thermal population of bosonic excitations, the resulting oscillation amplitudes exhibit characteristic deviations from standard Lifshitz-Kosevich behavior. Our results provide a mechanism to probe bosonic fluctuations in quantum critical metals and provide a framework for dynamical magnetic breakdown.", "url": "https://arxiv.org/abs/2603.23605", "type": "理论+数值", "summary": "1. 本工作证明了在缺乏长程密度波序的情况下，量子振荡仍可出现源于费米面重构的新频率，其机理是电子与在费米面热点间散射准粒子的玻色涨落模式耦合。\n2. 核心进展是建立了半经典理论，揭示了该相互作用如何产生类似磁击穿的随时间变化的隧穿过程，且隧穿概率依赖于玻色激发的热占据数，导致振荡幅度显著偏离标准的Lifshitz-Kosevich行为。\n3. 该结果为探测量子临界金属中的玻色涨落提供了一种新机制，并为“动力学磁击穿”这一普遍框架奠定了基础。", "summary_source": "deepseek", "authors": [{"name": "Léo Mangeolle"}, {"name": "Johannes Knolle"}], "featured_authors": [{"name": "Léo Mangeolle"}, {"name": "Johannes Knolle"}], "author_count": 2}, {"id": "2603.23615", "category": "cond-mat", "title": "Behaviour of the model antibody fluid constrained by rigid spherical obstacles: effects of the obstacle-antibody binding", "abstract": "We study a simplified model of monoclonal antibodies confined in a patchy random porous medium. Antibodies are represented as Y-shaped particles composed of seven tangential hard spheres with attractive patches on the terminal beads, while the matrix consists of randomly distributed hard-sphere obstacles bearing adhesive sites. The model captures antibody behavior in crowded biological environments with strong short-range antibody-matrix attractions. The theoretical approach combines Wertheim's multidensity thermodynamic perturbation theory, the Flory-Stockmayer theory of polymerization, and scaled particle theory for fluids in porous media. We analyze thermodynamic properties, percolation thresholds, and phase behavior, and compare the selected results with new computer simulations. The interplay between antibody-antibody and antibody-matrix interactions produces a complex phase behavior, including re-entrant phase separation with a closed-loop coexistence region at higher temperatures and conventional liquid-gas separation at lower temperatures.", "url": "https://arxiv.org/abs/2603.23615", "type": "理论+数值", "summary": "1. 该工作通过简化Y形粒子模型模拟单克隆抗体，研究了其在带粘附位点的随机硬球障碍物多孔介质中的热力学、渗透与相行为。\n2. 其卖点在于整合Wertheim多密度热力学扰动理论、Flory-Stockmayer聚合理论和缩放粒子理论，揭示了抗体-抗体与抗体-基质相互作用导致复杂相行为，包括高温闭合环重现相分离和低温液-气分离。\n3. 这为理解拥挤生物环境中抗体自组装的相变机制提供了可靠理论框架，并为相关生物物理系统的模拟与实验设计指明了方向。", "summary_source": "deepseek", "authors": [{"name": "Yu. V. Kalyuzhnyi"}, {"name": "T. Patsahan"}], "featured_authors": [{"name": "Yu. V. Kalyuzhnyi"}, {"name": "T. Patsahan"}], "author_count": 2}, {"id": "2603.23616", "category": "cond-mat", "title": "Fading ergodicity and quantum dynamics in random matrix ensembles", "abstract": "Recent work has proposed fading ergodicity as a mechanism for many-body ergodicity breaking. Here, we show that two paradigmatic random matrix ensembles -- the Rosenzweig-Porter model and the ultrametric model -- fall within the same universality class of ergodicity breaking when embedded in a many-body Hilbert space of spins-1/2. By calibrating the parameters of both models via their Thouless times, we demonstrate that the matrix elements of local observables display similar statistical properties, allowing us to identify the fractal phase of the Rosenzweig-Porter model with the fading-ergodicity regime. This correspondence is further supported through the analyses of quantum-quench dynamics of local observables, their temporal fluctuations and power spectra, and survival probabilities. Our findings reveal that local observables thermalize within the fading-ergodicity regime on timescales shorter than the Heisenberg time, thus providing a unified framework for understanding ergodicity breaking across these distinct models.", "url": "https://arxiv.org/abs/2603.23616", "type": "理论", "summary": "1. 该研究通过将Rosenzweig-Porter模型与超度量模型嵌入自旋-1/2多体希尔伯特空间，并基于Thouless时间校准参数，确立了二者属于同一遍历性破缺普适类。\n2. 核心发现是Rosenzweig-Porter模型的分形相与衰减遍历性区域相对应，这通过局域观测量矩阵元的统计特性、量子淬火动力学及存活概率的一致性分析得到证实。\n3. 这为理解不同模型中遍历性破缺提供了统一框架，并揭示在衰减遍历性区域内，局域观测量可在短于海森堡时间尺度上达到热化。", "summary_source": "deepseek", "authors": [{"name": "Rafał Świętek"}, {"name": "Maksymilian Kliczkowski"}, {"name": "Miroslav Hopjan"}, {"name": "Lev Vidmar"}], "featured_authors": [{"name": "Rafał Świętek"}, {"name": "Maksymilian Kliczkowski"}, {"name": "Miroslav Hopjan"}, {"name": "Lev Vidmar"}], "author_count": 4}, {"id": "2603.23632", "category": "cond-mat", "title": "Electronic structure of Gd-based intermetallics GdCu$_2$Ge$_2$ and GdCuAl$_3$", "abstract": "We present a temperature-dependent reflectivity study of single crystals of the ternary intermetallic compounds GdCu$_2$Ge$_2$ and GdCuAl$_3$ over a broad spectral range (100-18000 cm$^{-1}$, equivalent to 12 meV-2.23 eV) down to 13 K. Below 2000 cm$^{-1}$, the optical spectra are dominated by the response of itinerant charge carriers exhibiting two distinct scattering rates. While the response of the slow charge carriers shows negligible temperature dependence, the more mobile carriers follow the dc resistivity and are significantly suppressed in GdCuAl$_3$, consistent with the higher resistivity of this compound. We attribute this behavior to enhanced electronic correlations arising from the proximity of the Fermi level to van Hove singularities. Supported by density-functional-theory calculations, we further show that elemental substitution can be described as a rigid shift of the Fermi level, i.e., doping, whereas changes in the crystalline symmetry have only minor effects on the electronic structure.", "url": "https://arxiv.org/abs/2603.23632", "type": "理论+数值", "summary": "1. 该工作对三元金属间化合物GdCu₂Ge₂和GdCuAl₃单晶进行了宽谱域（12 meV-2.23 eV）、低至13 K的变温反射率研究。\n2. 实验揭示了低于2000 cm⁻¹谱区存在两种散射率不同的巡游载流子响应，其中高迁移率载流子的抑制与材料电阻率行为一致，这源于费米面邻近范霍夫奇点导致的电子关联增强。\n3. 密度泛函理论计算表明元素替代可等效于费米能级的刚性移动（掺杂），这为通过组分调控此类强关联体系的电子态提供了明确路径。", "summary_source": "deepseek", "authors": [{"name": "M. Pinterić"}, {"name": "M. Dressel"}, {"name": "M. Wenzel"}, {"name": "P. Puphal"}], "featured_authors": [{"name": "M. Pinterić"}, {"name": "M. Dressel"}, {"name": "M. Wenzel"}, {"name": "P. Puphal"}], "author_count": 4}, {"id": "2603.23703", "category": "cond-mat", "title": "Ordering in Confined Two-Dimensional Nematic Systems: Mesoscopic Simulations Based on Different Mean-Field Potentials", "abstract": "We use nematic Multi-particle Collision Dynamics (N-MPCD) simulations to study confined nematic liquid crystals in square domains, with three distinct mean-field potentials: the classical Maier-Saupe and Marrucci-Greco models, and a more recent model due to Ilg, Karlin, and Öttinger. These potentials incorporate diverse physical features, including spatial gradients and nonlinear dependencies on the order parameter, to describe nematic ordering at mesoscopic scales. We derive coarse-grained equations from a Fokker-Planck description with tensorial closures, and analyse the emergence of order as a function of interaction strength, $U$, in two dimensions. The critical interaction strength depends on the choice of the mean-field potential. We also analytically estimate the nematic coherence length in three dimensions, to establish a rigorous correspondence between the N-MPCD parameters (the system size $R$ and $U$) and the continuum Landau-de Gennes theoretical parameters. We systematically study equilibrium and metastable configurations, including relaxation pathways to stable equilibria, on square domains, for all three mean-field potentials. Our results confirm universal equilibrium and metastable configurations for all three mean-field potentials. Our results also suggest that the N-MPCD predictions are consistent with the continuum Landau-de Gennes predictions, regardless of the choice of the underlying mean-field potential and approximations, for large $R$ and $U$. There are differences for small $R$ and for $U$ near the critical interaction strength, that need to be further explored and quantified for new-age multiscale and multiphysics theories.", "url": "https://arxiv.org/abs/2603.23703", "type": "理论+数值", "summary": "1. 该工作采用向列相多粒子碰撞动力学模拟，在二维方形受限区域内对比研究了基于Maier-Saupe、Marrucci-Greco及Ilg-Karlin-Öttinger三种不同平均场势的向列相液晶有序化行为。\n2. 通过从福克-普朗克描述导出粗粒化方程并分析有序化临界相互作用强度，建立了N-MPCD模拟参数与连续介质Landau-de Gennes理论参数间的严格对应关系。\n3. 结果表明在较大系统尺寸和相互作用强度下三种势给出普适的平衡态与亚稳态构型，但在小尺寸或临界强度附近存在差异，这为新一代多尺度多物理场理论提供了需深入量化的研究方向。", "summary_source": "deepseek", "authors": [{"name": "Humberto Híjar"}, {"name": "Apala Majumdar"}], "featured_authors": [{"name": "Humberto Híjar"}, {"name": "Apala Majumdar"}], "author_count": 2}, {"id": "2603.23758", "category": "cond-mat", "title": "Quantum-classical dynamics of Rashba spin-orbit coupling", "abstract": "Mixed quantum-classical models are widely used to reduce the computational cost of fully quantum simulations. However, their general applicability across different classes of problems remains an open question. Here, we address this issue for systems featuring spin-orbit coupling. In particular, we study the interaction dynamics of quantum spin-1/2 and classical orbital momentum in one-dimensional models of Rashba nanowires. We tackle this problem by resorting to a new quantum-classical Hamiltonian model that, unlike conventional approaches, retains the Heisenberg principle and captures correlation effects beyond the common Ehrenfest approach. Based on Koopman wavefunctions in classical mechanics, the new model was recently implemented numerically via a particle scheme -- the koopmon method -- which is extended here to treat spin-orbit coupling. We apply the koopmon method to study the quantum-classical dynamics of nanowire models, with and without the presence of a harmonic potential and in both Rashba-dominated (strong coupling) and Zeeman-dominated (weak coupling) regimes. Considering realistic semiconductor parameters, the results are contrasted with both fully quantum and quantum-classical Ehrenfest dynamics. In the absence of external potential, the koopmon method qualitatively reproduces the features of the fully quantum evolution for all coupling regimes. While it exhibits a slight loss in spin accuracy compared to Ehrenfest simulations, the latter fail to capture the orbital dynamics. In the presence of a harmonic potential, the koopmon scheme reproduces the full quantum results with accuracy levels that are unachievable by the Ehrenfest model in both quantum and classical sectors. We conclude by presenting a test case that exhibits the formation of cat-like states.", "url": "https://arxiv.org/abs/2603.23758", "type": "理论+数值", "summary": "1. 该工作将基于Koopman波函数的量子-经典混合动力学方法（koopmon方法）扩展至Rashba自旋轨道耦合体系，研究了不同耦合机制与势场下一维纳米线的量子自旋与经典轨道动量相互作用动力学。\n2. 该方法的关键优势在于其哈密顿模型保留了海森堡原理，能捕捉超越Ehrenfest近似的关联效应，从而在无外势和谐振势下均能更准确地复现全量子演化的轨道动力学。\n3. 此研究为处理复杂自旋轨道耦合系统的非绝热动力学提供了更可靠的混合模拟框架，并为探索更广泛量子-经典混合体系中猫态等非经典态的形成奠定了基础。", "summary_source": "deepseek", "authors": [{"name": "Paul Bergold"}, {"name": "Giovanni Manfredi"}, {"name": "Cesare Tronci"}], "featured_authors": [{"name": "Paul Bergold"}, {"name": "Giovanni Manfredi"}, {"name": "Cesare Tronci"}], "author_count": 3}, {"id": "2603.23839", "category": "cond-mat", "title": "Numerical analysis of the thermal relaxation of the dense gas between two parallel plates: the free energy monotonicity for the Enskog equation", "abstract": "The thermal relaxation problem between two parallel plates with the same temperature is investigated, aiming to study the behavior of the free energy of the dense gas described by the Enskog equation. Two types of Enskog equation have been used: one is the Enskog equation with the original Enskog factor, while the other is that with a modified Enskog factor proposed recently in Takata & Takahashi, Phys. Rev. E 111, 065108 (2025). The evaluated free energy is a natural extension of the thermodynamic free energy to the non-equilibrium state. It is observed that this free energy monotonically decreases in time for the modified factor version, while it is not necessarily the case for the original version. Differences are also observed in other quantities in their time evolutions, most typically in the density profile.", "url": "https://arxiv.org/abs/2603.23839", "type": "理论+数值", "summary": "1. 该工作通过数值模拟研究了相同温度平行板间稠密气体的热弛豫过程，重点分析了Enskog方程中作为非平衡态热力学量扩展的自由能的时间演化行为。\n2. 核心发现是，对比原始与改进Enskog因子表明，仅改进版本的自由能随时间单调递减，而原始版本则否，且密度剖面等物理量的演化也存在显著差异。\n3. 这为改进因子在描述稠密气体非平衡热力学中的潜在优越性提供了证据，可能推动动理学模型的修正与更一致的数值研究。", "summary_source": "deepseek", "authors": [{"name": "Shigeru Takata"}, {"name": "Soma Sakata"}, {"name": "Aoto Takahashi"}, {"name": "Masanari Hattori"}], "featured_authors": [{"name": "Shigeru Takata"}, {"name": "Soma Sakata"}, {"name": "Aoto Takahashi"}, {"name": "Masanari Hattori"}], "author_count": 4}, {"id": "2603.23851", "category": "cond-mat", "title": "Coupling of phase transition, anharmonicity, and thermal transport in CaSnF$_6$", "abstract": "Understanding the coupling between structural phase transitions and thermal transport is essential for designing functional materials with tunable properties. Here, we investigate this interplay in CaSnF$_6$ by combining first-principles calculations with a machine-learned neuroevolution potential that enables large-scale molecular dynamics simulations across a wide temperature range. The simulations accurately capture the first-order structural phase transition and associated lattice dynamics. We show that the negative thermal expansion originates from low-energy rigid unit modes involving cooperative rotations of corner-sharing [CaF$_6$]$^{4-}$ octahedra, which induce bond-angle bending and volume contraction. At the same time, strong anharmonicity, dominated by four-phonon scattering, plays a central role in suppressing lattice thermal conductivity ($\\kappa_L$). Crucially, non-equilibrium simulations reveal a pronounced non-monotonic anomaly in $\\kappa_L$ near the phase transition, deviating from the conventional $\\sim 1/T^{\\alpha}$ behavior and providing direct transport evidence of lattice reconstruction. These results establish a unified mechanism linking lattice geometry, anharmonic vibrational dynamics, and thermal transport, and highlight the potential of machine-learned potentials for bridging atomic-scale phase transitions with macroscopic transport properties.", "url": "https://arxiv.org/abs/2603.23851", "type": "理论+数值", "summary": "1. 该工作结合第一性原理计算与机器学习神经演化势函数，对CaSnF6进行了跨温度范围的大规模分子动力学模拟，研究了结构相变与热输运的耦合。\n2. 研究揭示了负热膨胀源于涉及[CaF6]⁴⁻八面体协同旋转的低能刚性单元模式，并通过非平衡模拟发现相变附近晶格热导率存在显著非单调异常，直接反映了晶格重构的输运证据。\n3. 这为理解晶格几何、非谐振动动力学与热输运之间的统一机制建立了范例，并展示了机器学习势函数在连接原子尺度相变与宏观物性研究方面的潜力。", "summary_source": "deepseek", "authors": [{"name": "Daxue Hao"}, {"name": "Hao Huang"}, {"name": "Geng Li"}, {"name": "Yu Wu"}, {"name": "Shuming Zeng"}], "featured_authors": [{"name": "Daxue Hao"}, {"name": "Hao Huang"}, {"name": "Geng Li"}, {"name": "Yu Wu"}, {"name": "Shuming Zeng"}], "author_count": 5}, {"id": "2603.23856", "category": "cond-mat", "title": "A simple model for conserved intracellular dynamics exhibits multiscale pattern formation, traveling protein domains and arrested coarsening of lipids in the membrane", "abstract": "We model the spatiotemporal dynamics of cellular protein concentrations near membranes composed of different lipids using a three-variable continuum model for membrane-bound protein, cytosolic protein, and the local composition of a binary lipid membrane. The model contains two globally conserved quantities: the total protein content and the average fractions of the two lipid species. It combines a conserved reaction-diffusion model for protein dynamics with a Cahn-Hilliard equation for lipid demixing. Linear stability analysis of the homogeneous steady state and direct numerical simulations show that the lipid dynamics undergoes classical phase separation, whereas the protein dynamics exhibits oscillatory phase separation for intermediate total protein contents, associated with a long-wavelength instability and traveling domains. In parameter regions where both instabilities are present, we find multiscale patterns with larger-scale traveling and rotating protein domains coexisting with smaller-scale stationary lipid domains. In this regime, traveling protein domains coexist with arrested coarsening of stationary lipid domains above a critical coupling. We further show that the main instabilities and phase diagram are well captured by an extension of a recently proposed conserved FitzHugh-Nagumo model for non-reciprocal pattern formation. The extended model consists of two non-reciprocally coupled Cahn-Hilliard equations with different interface tensions, reflecting the distinct physical properties of lipids and proteins. This also explains the observed asymmetry between static lipid patterns and traveling protein patterns.", "url": "https://arxiv.org/abs/2603.23856", "type": "理论+数值", "summary": "1. 该工作发展了一个用于研究细胞内守恒动力学的简单模型，通过三变量连续系统描述膜结合蛋白、胞质蛋白和二元脂质组成，展示了多尺度模式形成、行进蛋白域及脂质域中止粗化现象。\n2. 模型的核心在于整合守恒反应-扩散模型与Cahn-Hilliard方程，基于线性稳定性分析与数值模拟，揭示了中间总蛋白含量下蛋白质的振荡相分离，并由非互易耦合Cahn-Hilliard扩展模型捕获了静态脂质模式与行进蛋白质模式的不对称性。\n3. 这为生物膜中蛋白质-脂质相互作用的守恒多尺度动力学提供了统一理论框架，并可能推动基于非互易相分离模型的细胞内模式调控实验与理论研究。", "summary_source": "deepseek", "authors": [{"name": "Benjamin Winkler"}, {"name": "Sergio Alonso"}, {"name": "Markus Bär"}], "featured_authors": [{"name": "Benjamin Winkler"}, {"name": "Sergio Alonso"}, {"name": "Markus Bär"}], "author_count": 3}, {"id": "2603.23881", "category": "cond-mat", "title": "Rethinking failure in polymer networks: a probabilistic view on progressive damage", "abstract": "The mechanics of single-chain stretching and rupture are central to understanding the resilience of biological polymers and designing strong and tough soft materials such as double-network gels and multi-network elastomers. In this work, we develop a statistical mechanics based model that enables one to determine the distribution of forces along the chain segments. By combining the force distribution with a tilted bond potential that captures the stretch energy stored in these bonds, we calculate the corresponding activation energy required for bond dissociation. This allows us to determine the probability of bond (and consequently chain) failure. The proposed approach is simple, direct, and readily adaptable for constructing higher-level coarse-grained descriptions of damage and fracture in polymer networks. We demonstrated this by applying the theory to three problems of practical interest: (1) toughening via sacrificial bond rupture in polymer chains, (2) toughening of double network hydrogels, and (3) incorporation of the local chain model into a 3-dimensional constitutive relation that captures damage in elastomers. The latter was implemented through the micro-sphere framework, which accounts for different chain orientations, as well as the computationally inexpensive eight chain model. The findings from this work provide a physically-based model to quantify the stretching and failure of a single chain and pave the way to the integration of local damage models into 3-dimensional networks.", "url": "https://arxiv.org/abs/2603.23881", "type": "理论", "summary": "1. 该工作建立了一个基于统计力学的概率模型，用以分析聚合物网络中单链拉伸与断裂的力学行为，并应用于评估双网络水凝胶和弹性体等材料的损伤过程。\n2. 核心创新在于将链段上的力分布与描述键存储拉伸能的倾斜势结合，计算出键解离的活化能，从而首次实现了对键（及链）失效概率的物理预测。\n3. 该模型为将局部链损伤机制整合至三维网络本构关系提供了物理基础，推动了强韧软材料多尺度损伤与断裂建模的发展。", "summary_source": "deepseek", "authors": [{"name": "Noy Cohen"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "featured_authors": [{"name": "Noy Cohen"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "author_count": 3}, {"id": "2603.23887", "category": "cond-mat", "title": "Predicting quantum ground-state energy by data-driven Koopman analysis of variational parameter nonlinear dynamics", "abstract": "In recent years, the application of machine learning to physics has been actively explored. In this paper, we study a method for estimating the ground-state energy of quantum Hamiltonians by applying data-driven Koopman analysis within the framework of variational wave functions. Koopman theory is a framework for analyzing the nonlinear dynamics of vectors, in which the dynamics are linearized by lifting the vectors to functions defined over the original vector space. We focus on the fact that the imaginary-time Schrödinger equation, when restricted to a variational wave function, is described by a nonlinear time evolution of the variational parameter vector. We collect sample points of this nonlinear dynamics at parameter configurations where the discrepancy between the true imaginary-time dynamics and the dynamics on the variational manifold is small, and perform data-driven continuous Koopman analysis. Within our formulation, the ground-state energy is reduced to the leading eigenvalue of a differential operator known as the Koopman generator. As a concrete example, we generate samples for the four-site transverse-field Ising model and estimate the ground-state energy using extended dynamic mode decomposition (EDMD). Furthermore, as an extension of this framework, we formulate the method for the case where the variational wave function is given by a uniform matrix product state on an infinite chain. By employing computational techniques developed within the framework of the time-dependent variational principle, all the quantities required for our analysis, including error estimation, can be computed efficiently in such systems. Since our approach provides predictions for the ground-state energy even when the true ground state lies outside the variational manifold, it is expected to complement conventional variational methods.", "url": "https://arxiv.org/abs/2603.23887", "type": "理论+数值", "summary": "1. 该工作将数据驱动的Koopman分析应用于变分波函数框架，以预估量子哈密顿量的基态能量。\n2. 其技术核心在于通过构造Koopman生成子，将基态能量提取为该生成子的主导本征值。\n3. 该方法可在真实基态位于变分流形之外时提供能量预测，从而对传统变分方法形成补充。", "summary_source": "deepseek", "authors": [{"name": "Nobuyuki Okuma"}], "featured_authors": [{"name": "Nobuyuki Okuma"}], "author_count": 1}, {"id": "2603.23941", "category": "cond-mat", "title": "An Efficient High-Degree, High-Order Equivariant Graph Neural Network for Direct Crystal Structure Optimization", "abstract": "Crystal structure optimization is fundamental to materials modeling but remains computationally expensive when performed with density-functional theory (DFT). Machine-learning (ML) approaches offer substantial acceleration, yet existing methods face three key limitations: (i) most models operate solely on atoms and treat lattice vectors implicitly, despite their central role in structural optimization; (ii) they lack efficient mechanisms to capture high-degree angular information and higher-order geometric correlations simultaneously, which are essential for distinguishing subtle structural differences; and (iii) many pipelines are multi-stage or iterative rather than truly end-to-end, making them prone to error accumulation and limiting scalability. Here we present E$^{3}$Relax-H$^{2}$, an end-to-end high-degree, high-order equivariant graph neural network that maps an initial crystal directly to its relaxed structure. The key idea is to promote both atoms and lattice vectors to graph nodes, enabling a unified and symmetry-consistent representation of structural degrees of freedom. Building on this formulation, E$^{3}$Relax-H$^{2}$ introduces two message-passing mechanisms: (i) a high-degree, high-order message-passing module that efficiently captures high-degree angular representations and high-order many-body correlations; and (ii) a lattice-atom message-passing module that explicitly models the bidirectional coupling between lattice deformation and atomic displacement. In addition, we propose a differentiable periodicity-aware Cartesian displacement loss tailored for one-shot structure prediction under periodic boundary conditions.", "url": "https://arxiv.org/abs/2603.23941", "type": "理论+数值", "summary": "1. 该工作提出了一个名为E³Relax-H²的端到端、高次等变图神经网络，用于将初始晶体结构直接映射至其弛豫构型。\n2. 其核心创新在于将晶格矢量与原子共同提升为图节点，并设计了高效的高阶消息传递模块以及晶格-原子耦合模块，以统一且保持对称性的方式捕捉结构自由度。\n3. 该方法为高通量材料发现中的单步、高精度晶体结构优化提供了高效方案，显著提升了相对于传统密度泛函理论和现有机器学习流程的计算效率与可扩展性。", "summary_source": "deepseek", "authors": [{"name": "Ziduo Yang"}, {"name": "Wei Zhuo"}, {"name": "Huiqiang Xie"}, {"name": "Xiaoqing Liu"}, {"name": "Lei Shen"}], "featured_authors": [{"name": "Ziduo Yang"}, {"name": "Wei Zhuo"}, {"name": "Huiqiang Xie"}, {"name": "Xiaoqing Liu"}, {"name": "Lei Shen"}], "author_count": 5}, {"id": "2603.23943", "category": "cond-mat", "title": "ChargeFlow: Flow-Matching Refinement of Charge-Conditioned Electron Densities", "abstract": "Accurate charge densities are central to electronic-structure theory, but computing charge-state-dependent densities with density functional theory remains too expensive for large-scale screening and defect workflows. We present ChargeFlow, a flow-matching refinement model that transforms a charge-conditioned superposition of atomic densities into the corresponding DFT electron density on the native periodic real-space grid using a 3D U-Net velocity field. Trained on 9,502 charged Materials Project-derived calculations and evaluated on an external 1,671-structure benchmark spanning perovskites, charged defects, diamond defects, metal-organic frameworks, and organic crystals, ChargeFlow is not uniformly best on every in-distribution class but is strongest on problems dominated by nonlocal charge redistribution and charge-state extrapolation, improving deformation-density error from 3.62% to 3.21% and charge- response cosine similarity from 0.571 to 0.655 relative to a ResNet baseline. The predicted densities remain chemically useful under downstream analysis, yielding successful Bader partitioning on all 1,671 benchmark structures and high-fidelity electrostatic potentials, which positions flow matching as a practical density-refinement strategy for charged materials.", "url": "https://arxiv.org/abs/2603.23943", "type": "理论+数值", "summary": "1. 本研究提出了ChargeFlow模型，利用流匹配技术将电荷条件下的原子密度叠加精炼为周期性实空间网格上的DFT电子密度。\n2. 其核心是通过3D U-Net速度场处理非局域电荷重分布和电荷态外推问题，在涵盖钙钛矿、带电缺陷等1,671个结构的测试集上，将变形密度误差从3.62%改善至3.21%，电荷响应余弦相似度从0.571提升至0.655。\n3. 预测密度在下游化学分析中保持实用性，成功实现所有测试结构的Bader分区和高保真静电势计算，为带电材料的大规模筛选与模拟提供了高效的密度细化策略。", "summary_source": "deepseek", "authors": [{"name": "Tri Minh Nguyen"}, {"name": "Sherif Abdulkader Tawfik"}, {"name": "Truyen Tran"}, {"name": "Svetha Venkatesh"}], "featured_authors": [{"name": "Tri Minh Nguyen"}, {"name": "Sherif Abdulkader Tawfik"}, {"name": "Truyen Tran"}, {"name": "Svetha Venkatesh"}], "author_count": 4}, {"id": "2603.24029", "category": "cond-mat", "title": "Identifying the origin of out-of-plane spin polarization in the noncollinear antiferromagnet Mn$_3$Ge", "abstract": "The noncollinear antiferromagnets Mn$_3$Sn/Ge emerge as promising spin-current sources with both in-plane and out-of-plane spin polarizations, thereby enabling field-free magnetization switching. However, the microscopic origin of the out-of-plane spin polarization remains under debate, specifically whether it arises from the magnetic spin Hall effect (MSHE) or the spin swapping (SSW). Here, we comparatively evaluate the spin torques in single-crystal Mn$_3$Ge/Py bilayers with different crystallographic orientations using the ferromagnetic resonance technique. The distinct angular dependences of the measured spin-torque signals provide clear evidence for the bulk MSHE, which depends on antiferromagnetic order. In addition, we identify the antiferromagnetic-order independent component originating from the interfacial SSW. The coexisting MSHE and SSW, with comparable magnitudes, give rise to the out-of-plane spin polarization. Our study disentangles the origins of spin-torque generation in noncollinear antiferromagnets, providing valuable insights for their spintronic applications.", "url": "https://arxiv.org/abs/2603.24029", "type": "数值", "summary": "1. 该工作通过测量不同晶向单晶Mn$_3$Ge/Py双层膜中的自旋转矩，实验解耦了非共线反铁磁体中面外自旋极化的起源。\n2. 关键发现在于，测得的自旋转矩信号的独特角度依赖性为依赖反铁磁序的体磁自旋霍尔效应提供了明确证据，并同时识别出源自界面自旋交换效应的序无关分量。\n3. 这一结果为基于非共线反铁磁体的自旋电子器件设计提供了清晰的物理图景，即需要同时考虑体磁自旋霍尔效应与界面自旋交换效应的共存与协同作用。", "summary_source": "deepseek", "authors": [{"name": "Mingxing Wu"}, {"name": "Kouta Kondou"}, {"name": "Taishi Chen"}, {"name": "Satoru Nakatsuji"}, {"name": "YoshiChika Otani"}], "featured_authors": [{"name": "Mingxing Wu"}, {"name": "Kouta Kondou"}, {"name": "Taishi Chen"}, {"name": "Satoru Nakatsuji"}, {"name": "YoshiChika Otani"}], "author_count": 5}, {"id": "2603.24031", "category": "cond-mat", "title": "Mixed-State Topological Phase: Quantized Topological Order Parameter and Lieb-Schultz-Mattis Theorem", "abstract": "We investigate the extension of pure-state symmetry protected topological phases to mixed-state regime with a strong U(1) and a weak $\\mathbb{Z}_2$ symmetries in one-dimensional spin systems by the concept of quantum channels. We propose a corresponding topological phase order parameter for short-range entangled mixed states by showing that it is quantized and its distinct values can be realized by concrete spin systems with disorders, sharply signaling phase transitions among them. We also give a model-independent way to generate two distinct phases by various types of translation and reflection transformations. These results on the short-range entangled mixed states further enable us to generalize the conventional Lieb-Schultz-Mattis theorem to mixed states, even without the concept of spectral gaps and lattice Hamiltonians.", "url": "https://arxiv.org/abs/2603.24031", "type": "理论", "summary": "1. 该工作将一维自旋系统中纯态的对称保护拓扑相扩展至混合态范畴，并提出了适用于短程纠缠混合态的拓扑序参数，进而将Lieb-Schultz-Mattis定理推广至混合态。\n2. 核心创新在于证明了该拓扑序参数的量子化特性，其不同取值可通过无序自旋系统实现，并利用平移与反射变换以模型无关的方式构造了不同拓扑相。\n3. 这一框架使得在无需依赖谱隙与晶格哈密顿量的情况下建立混合态的拓扑约束成为可能，为开放量子系统中的拓扑物态研究奠定了基础。", "summary_source": "deepseek", "authors": [{"name": "Linhao Li"}, {"name": "Yuan Yao"}], "featured_authors": [{"name": "Linhao Li"}, {"name": "Yuan Yao"}], "author_count": 2}, {"id": "2603.24053", "category": "cond-mat", "title": "Multi-filament coordination rescues active transport from inertia-induced spinning arrest", "abstract": "Active filaments driven by tangential forces can become trapped in a spinning state when attached to a heavy head, where activity and inertia drive persistent rotation rather than directed transport. Using three-dimensional Langevin dynamics of tangentially driven bead-spring chains anchored to a common heavy head, we demonstrate that increasing the filament number $\\Nf$ systematically \\emph{rescues} directed transport by sterically preventing the coiled conformations that underlie spinning. The rescue is established through three independent diagnostics: (i)~the mean-square displacement recovers monotonic growth (transport rescue), (ii)~the spatial tangent autocorrelation loses its negative dip signaling helical coiling (conformational rescue), and (iii)~the tangent time autocorrelation ceases crossing zero (orientational rescue). At high bending stiffness ($\\kb = 1000$), coiling is fully eliminated at a critical filament number $\\Nf^* \\approx 3$. At moderate stiffness ($\\kb = 100$), residual coiling persists ($\\min C_s \\approx -0.13$) yet transport is still rescued -- demonstrating that the destruction of spinning \\emph{coherence}, not coiling elimination, is the essential mechanism. The multi-filament architecture achieves up to five orders of magnitude transport enhancement. Two physically distinct rescue pathways emerge: at high stiffness, steric constraints force filaments into a coordinated bundle sustaining directed propulsion; at low stiffness, steric interactions destroy orientational coherence, producing enhanced active diffusion. These results demonstrate a purely mechanical, density-independent route to overcome inertia-induced motility arrest, with implications for synthetic microswimmer design, motor-driven filament assays, and multi-filament organization in biological systems.", "url": "https://arxiv.org/abs/2603.24053", "type": "理论", "summary": "1. 该工作通过三维朗之万动力学模拟，研究了多个切向驱动活性细丝锚定于同一重头时的集体运动，发现增加细丝数目（\\(\\Nf\\)）可通过空间位阻抑制螺旋盘绕，从而系统性地挽救因惯性导致的旋转停滞、恢复定向输运。\n2. 其核心物理机制在于破坏旋转相干性而非完全消除盘绕，并通过均方位移恢复增长、空间切向自相关负峰消失及时间自相关不跨零三个独立诊断予以验证，揭示了高刚度下的协调束状推进与低刚度下增强活性扩散两种不同救援路径。\n3. 这为克服惯性诱导的运动停滞提供了一种不依赖密度的纯力学方案，对合成微游泳体设计、驱动细丝实验以及生物系统中多细丝组织的研究具有明确启示。", "summary_source": "deepseek", "authors": [{"name": "Anuradha Rajput"}, {"name": "Arnab Bhattacharjee"}, {"name": "Annwesha Dutta"}], "featured_authors": [{"name": "Anuradha Rajput"}, {"name": "Arnab Bhattacharjee"}, {"name": "Annwesha Dutta"}], "author_count": 3}, {"id": "2603.24090", "category": "cond-mat", "title": "Predicting Grain Growth Evolution Under Complex Thermal Profiles with Deep Learning through Thermal Descriptor Modulation", "abstract": "Predicting microstructure evolution during thermomechanical treatment is essential for determining the final mechanical properties of a material, yet conventional simulations based on Partial Differential Equations (PDEs) remain computationally expensive. Our prior Deep Learning (DL) framework using Convolutional Long Short-Term Memory (ConvLSTM) has proven effective in accelerating grain growth prediction, though its applicability was limited to constant-temperature or single-rate thermal profiles. As the model was trained exclusively under constant thermal conditions, it cannot account for the thermal history dependence of grain boundary kinetics, fundamentally limiting its applicability to the time-varying thermal profiles characteristic of industrial heat treatment processes. This study extends the previous framework by incorporating Feature-wise Linear Modulation (FiLM) for thermal conditioning to predict grain growth under complex, time-varying thermal profiles. The model was trained on a large dataset of grain growth evolution under thermal profiles with heating and cooling rates ranging from 0.01 kelvin per second to 10 kelvin per second. The results demonstrate that the proposed thermal conditioning mechanism enables the model to capture the influence of variable thermal profiles on grain boundary migration kinetics. Across the three test scenarios of increasing complexity, the model achieved a Structural Similarity Index Measure (SSIM) of up to 0.93 and mean grain size error below 3.2%. Despite the architectural extensions, inference time remains on the order of seconds per prediction sequence, preserving the computational advantage over PDE-based simulations.", "url": "https://arxiv.org/abs/2603.24090", "type": "理论+数值", "summary": "1. 该工作将特征线性调制（FiLM）整合到卷积长短期记忆网络中，构建了能预测复杂时变热历程下晶粒生长演化的深度学习模型。\n2. 其技术核心在于通过热条件调制使模型学习晶界迁移动力学对热历史的依赖，在加热与冷却速率0.01-10 K/s的测试中结构相似性指数达0.93且平均晶粒尺寸误差低于3.2%。\n3. 这为工业热处理过程的微观结构快速预测提供了秒级推理的高效计算工具，保持了相对于偏微分方程模拟的优势，推动了材料性能优化研究。", "summary_source": "deepseek", "authors": [{"name": "Pungponhavoan Tep"}, {"name": "Marc Bernacki"}], "featured_authors": [{"name": "Pungponhavoan Tep"}, {"name": "Marc Bernacki"}], "author_count": 2}, {"id": "2603.24148", "category": "cond-mat", "title": "Mpemba effect in a two-dimensional bistable potential", "abstract": "We present an exactly solvable model of the Mpemba effect in an overdamped Langevin system confined in a two-dimensional radially symmetric bistable potential. The potential is constructed as a piecewise quadratic-logarithmic function that is continuous and differentiable at the matching radii, enabling an exact mapping of the corresponding Fokker-Planck operator to a Schroedinger-type eigenvalue problem. The relaxation spectrum and eigenmodes are obtained analytically in each region in terms of confluent hypergeometric functions, with eigenvalues determined from matching conditions. Focusing on isotropic equilibrium initial states at inverse temperature $\\beta_{\\rm ini}$ quenched to a bath at inverse temperature $\\beta$, we derive explicit expressions for the mode amplitudes governing long-time relaxation. We demonstrate that the coefficient of the slowest mode exhibits non-monotonic dependence on $\\beta_{\\rm ini}$ and identify a sufficient crossing condition for the Kullback-Leibler divergence in terms of the two slowest modes, if the global minimum of the potential is located far away from the origin and the second minimum exists near the origin. For corresponding parameters, we demonstrate that the Mpemba effect can be realized. Our results provide a rare example of an analytically tractable two-dimensional model exhibiting anomalous relaxation without any confining walls, extending previous one-dimensional constructions with a hard wall and clarifying the role of radial geometry in nonequilibrium relaxation phenomena.", "url": "https://arxiv.org/abs/2603.24148", "type": "理论", "summary": "1. 该工作构建了二维径向对称双稳势中过阻尼朗之万系统姆潘巴效应的精确可解模型。\n2. 其核心在于通过分段二次-对数势将福克-普朗克算子映射为薛定谔型本征值问题，解析得到弛豫模态及姆潘巴效应实现条件。\n3. 这扩展了一维硬壁模型，为无约束二维非平衡弛豫中径向几何的作用提供了明确阐释。", "summary_source": "deepseek", "authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "featured_authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "author_count": 2}, {"id": "2603.24151", "category": "cond-mat", "title": "Universality of order statistics for Brownian reshuffling", "abstract": "We discuss the order statistics of the particle positions of a gas of $N$ identical independent particles performing Brownian motion in one dimension in a potential that asymptotically behaves like $V(x) \\sim x^\\gamma$ for $x\\rightarrow+\\infty$, with a positive power $\\gamma>0$. We show that in the stationary state, the order statistics that describe how the leaders are reshuffled are universal and independent of $\\gamma$. What depends on $\\gamma$ is the timescale of the leaders' reshuffling, which scales as a power of the logarithm of the population size: $t \\sim (\\ln N)^\\frac{2(1-\\gamma)}{\\gamma} \\tau$, where $\\tau$ is of order one. We derive the probability that the particle which has the $k$th largest value of $x$ at some time $t_1$ will have the $j$th largest value at time $t_2=t_1+t$ in the form of an explicit expression for the generating function for the reshuffling probabilities for all $k\\ge 1$ and $j\\ge 1$. The generating function, expressed in scaled time $\\tau$, is independent of $\\gamma$. In particular, we show that the average percentage overlap coefficient of leader lists takes the universal, $\\gamma$-independent form ${\\rm erfc}(\\sqrt{\\tau})$ for long lists.", "url": "https://arxiv.org/abs/2603.24151", "type": "理论", "summary": "1. 该工作研究了一维幂律势场中独立布朗运动粒子群序统计的稳态行为，推导了领先粒子排序随时间演化的重排概率生成函数。\n2. 核心发现是重排事件的序统计分布具有普适性，与势场指数γ无关；γ仅影响重排的特征时间尺度，后者随粒子数N呈对数幂律标度。\n3. 这一普适框架为极端值统计动力学研究提供了定量基准，并可拓展至其他非平衡系统中领导者竞争与重排现象的分析。", "summary_source": "deepseek", "authors": [{"name": "Zdzislaw Burda"}, {"name": "Mario Kieburg"}, {"name": "Tomasz Maciocha"}], "featured_authors": [{"name": "Zdzislaw Burda"}, {"name": "Mario Kieburg"}, {"name": "Tomasz Maciocha"}], "author_count": 3}, {"id": "2603.24171", "category": "cond-mat", "title": "Algorithms for generating planar networks simulating hierarchical patterns of cracks formed during film drying", "abstract": "Hierarchical crack patterns that arise during the drying of thin films of colloidal dispersions or polymer solutions on a solid substrate are of interest both from a fundamental standpoint and in the context of the creation of transparent electrodes for optoelectronics. This paper analyzes the morphology of such patterns based on image processing of real-world samples. Graph theory is used to extract chains of edges and analyze the network topology. A method based on the hierarchy of connections is applied to classify cracks by generation. The limitations of existing classification approaches related to the discreteness of the time scale and the use of only a part of the entire pattern are discussed. Three approaches are used to generate artificial hierarchical networks: random uniform partitioning, recursive Voronoi partitioning, and a crack growth simulation model, each modified to reproduce the hierarchical structure. A comparison was made of the geometric characteristics (distribution of crack angles, edge lengths, cell areas, and circularity coefficient) and topological properties (distribution of the number of cell sides) of real and simulated networks. It was shown that the simulation model best reproduces the key features of real cracks, including the characteristic right angles of their connections.", "url": "https://arxiv.org/abs/2603.24171", "type": "理论+数值", "summary": "1. 本文基于薄膜干燥过程中产生的真实分级裂纹图案，通过图像处理和图形理论分析其形态与网络拓扑，并采用三种改进算法生成人工网络进行系统性比较。\n2. 研究的关键在于裂纹生长模拟模型在复现真实裂纹的几何特征（如角度分布、边缘长度）和拓扑性质（如单元边数分布）上优于随机均匀分割与递归Voronoi分割，尤其能捕捉连接的直角结构。\n3. 这一模拟方法为光电子透明电极的裂纹图案可控设计提供了实用工具，并为薄膜干燥中分级图案形成的基础物理机制研究奠定了定量建模基础。", "summary_source": "deepseek", "authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei V. Eserkepov"}, {"name": "Andrei S. Burmistrov"}], "featured_authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei V. Eserkepov"}, {"name": "Andrei S. Burmistrov"}], "author_count": 3}, {"id": "2603.24183", "category": "cond-mat", "title": "Digitally Optimized Initializations for Fast Thermodynamic Computing", "abstract": "Thermodynamic computing harnesses the relaxation dynamics of physical systems to perform matrix operations. A key limitation of such approaches is the often long thermalization time required for the system to approach equilibrium with sufficient accuracy. Here, we introduce a hybrid digital-thermodynamic algorithm that substantially accelerates relaxation through optimized initializations inspired by the Mpemba effect. In the proposed scheme, a classical digital processor efficiently computes an initialization that suppresses slow relaxation modes, after which the physical system performs the remaining computation through its intrinsic relaxation dynamics. We focus on overdamped Langevin dynamics for quadratic energy landscapes, analyzing the spectral structure of the associated Fokker-Planck operator and identifying the corresponding optimal initial covariances. This yields a predictable reduction in thermalization time, determined by the spectrum of the encoded matrix. We derive analytic expressions for the resulting speedups and numerically analyze thermodynamic implementations of matrix inversion and determinant computation as concrete examples. Our results show that optimized initialization protocols provide a simple and broadly applicable route to accelerating thermodynamic computations.", "url": "https://arxiv.org/abs/2603.24183", "type": "理论+数值", "summary": "1. 该工作提出了一种混合数字-热力学计算算法，通过数字优化的初始化来加速基于弛豫动力学的热力学计算。\n2. 其核心在于借鉴Mpemba效应，通过抑制福克-普朗克算符的慢弛豫模式，为过阻尼朗之万动力学在二次能量景观中的热化过程提供了可预测的加速。\n3. 这为矩阵求逆和行列式计算等具体热力学计算任务提供了一条普适的加速路径，其加速效果由编码矩阵的谱结构决定。", "summary_source": "deepseek", "authors": [{"name": "Mattia Moroder"}, {"name": "Felix C. Binder"}, {"name": "John Goold"}], "featured_authors": [{"name": "Mattia Moroder"}, {"name": "Felix C. Binder"}, {"name": "John Goold"}], "author_count": 3}, {"id": "2603.24185", "category": "cond-mat", "title": "Tunable intersublattice exchange coupling drives magnetic evolution in Mn$_{3+x}$Ga$_{1-x}$C ($0 \\le x \\le 0.60$)", "abstract": "We investigate the magnetic and transport evolution in Mn$_{3+x}$Ga$_{1-x}$C ($0 \\le x \\le 0.60$), where Mn substitution at corner Ga sites induces lattice contraction and suppresses the antiferromagnetic order of Mn$_3$GaC. As $x$ increases, the magnetic ground state of the system undergoes a sequential transition from an antiferromagnetic state, via a canted ferrimagnetic state, to a robust ferrimagnetic state, accompanied by a surge in the magnetic ordering temperature. Saturation magnetic moments reaches a maximum of 3.63~$\\mu_{\\mathrm{B}}$/f.u. at $x = 0.10$, whereas the topological Hall resistivity peaks at 1.47~$\\mu\\Omega\\cdot$cm for $x = 0.20$ before decreasing with further doping. First-principles calculations demonstrate a $\\sim\\!40^{\\circ}$ canting of face-centered Mn moments at $x = 0.20$, signifying spin frustration, and an eventual antiparallel alignment of face-centered and corner-site Mn moments at higher $x$. These results reveal that intersublattice antiferromagnetic coupling governs the magnetic transformation and emergent transport phenomena, thus providing a microscopic foundation for designing high-ordering-temperature antiperovskites.", "url": "https://arxiv.org/abs/2603.24185", "type": "理论+数值", "summary": "1. 本文通过实验与第一性原理计算，系统研究了Mn_{3+x}Ga_{1-x}C（0≤x≤0.60）中Mn替代Ga引起的晶格收缩对反铁磁序的抑制及磁基态从反铁磁经倾斜铁磁到铁磁的序列演变。\n2. 关键发现在于可调晶格间反铁磁耦合主导了上述相变，第一性原理计算揭示x=0.20时面心Mn磁矩约40度倾斜体现自旋阻挫，高x下与角位Mn磁矩反平行排列，从而调控拓扑霍尔电阻率峰值。\n3. 这为理解反钙钛矿中磁有序温度激增机制及通过设计晶格间耦合制备高Tc反钙钛矿材料提供了微观物理基础。", "summary_source": "deepseek", "authors": [{"name": "Dong-Hui Xu"}, {"name": "Cong-Mian Zhen"}, {"name": "Deng-Lu Hou"}, {"name": "Li Ma"}, {"name": "De-Wei Zhao"}, {"name": "Guo-ke Li"}], "featured_authors": [{"name": "Dong-Hui Xu"}, {"name": "Cong-Mian Zhen"}, {"name": "Deng-Lu Hou"}, {"name": "Li Ma"}, {"name": "De-Wei Zhao"}, {"name": "Guo-ke Li"}], "author_count": 6}, {"id": "2603.24187", "category": "cond-mat", "title": "Dipole-exchange spin waves and mode hybridization in magnetic nanoparticles", "abstract": "We investigate spin-wave modes in confined ferromagnetic resonators with spherical and cylindrical geometries across the exchange-dominated, dipole-exchange, and dipolar interaction regimes. Starting from the linearized Landau-Lifshitz-Gilbert equation, we show that the projection of the total angular momentum and mirror parity are conserved quantities in the problem of axially symmetric resonators. These symmetries provide a natural classification of spin-wave modes and explain the degeneracy of exchange modes, as well as its lifting by dipolar interactions. Numerical analysis shows that the nonlocal dipolar interaction removes the exchange degeneracy and hybridizes modes, leading to avoided crossings between modes that belong to the same symmetry sector. To describe this behavior, we develop a coupled-mode theory formulated directly in terms of dynamical magnetization, which reduces the dipole-exchange problem to a finite system of interacting modes. The resulting framework provides a unified description of spin-wave spectra in confined magnetic particles from the exchange limit to the dipolar regime.", "url": "https://arxiv.org/abs/2603.24187", "type": "理论+数值", "summary": "1. 该工作系统研究了球形与柱形受限铁磁共振器中交换主导、偶极-交换及偶极相互作用区域的自旋波模式，并发展了一套基于动力学磁化强度的耦合模式理论。\n2. 理论揭示了轴对称共振器中总角动量投影与镜像宇称的守恒性，这自然分类了自旋波模式，并阐明了交换简并及其被非局域偶极相互作用消除并引发模式杂化的物理机制。\n3. 此框架为受限磁性粒子从交换极限到偶极区域的自旋波谱提供了统一描述，为定量预测光谱及探索非线性区域奠定了基础。", "summary_source": "deepseek", "authors": [{"name": "Fedor Shuklin"}, {"name": "Khristina Albitskaya"}, {"name": "Sergei Solovyov"}, {"name": "Alexander Chernov"}, {"name": "Mihail Petrov"}], "featured_authors": [{"name": "Fedor Shuklin"}, {"name": "Khristina Albitskaya"}, {"name": "Sergei Solovyov"}, {"name": "Alexander Chernov"}, {"name": "Mihail Petrov"}], "author_count": 5}, {"id": "2603.24190", "category": "cond-mat", "title": "Dynamical thermalization and turbulence in social stratification models", "abstract": "We study the nonlinear chaotic dynamics in a system of linear oscillators coupled by social network links with an additional stratification of oscillator energies, or frequencies, and supplementary nonlinear interactions. It is argued that this system can be viewed as a model of social stratification in a society with nonlinear interacting agents with energies playing a role of wealth states of society. The Hamiltonian evolution is characterized by two integrals of motion being energy and probability norm. Above a certain chaos border the chaotic dynamics leads to dynamical thermalization with the Rayleigh-Jeans (RJ) distribution over states with given energy or wealth. At low energies, this distribution has RJ condensation of norm at low energy modes. We point out a similarity of this condensation with the wealth inequality in the world countries where about a half of population owns only a couple of percent of the total wealth. In the presence of energy pumping and absorption, the system reveals features of the Kolmogorov-Zakharov turbulence of nonlinear waves.", "url": "https://arxiv.org/abs/2603.24190", "type": "理论", "summary": "1. 该工作研究了基于社会网络耦合且具有能量分层和非线性相互作用的线性振子系统中的非线性混沌动力学。\n2. 其核心物理在于揭示了系统超越混沌边界后出现的动态热化现象，表现为遵循Rayleigh-Jeans分布的能量/财富态占据，并在低能态出现类似财富不均的凝聚现象。\n3. 这不仅为理解社会分层中的财富分配动力学提供了物理类比，其揭示的能量泵浦下的Kolmogorov-Zakharov湍流特征，也为研究非线性波的非平衡统计行为开辟了新视角。", "summary_source": "deepseek", "authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "featured_authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "author_count": 2}, {"id": "2603.24223", "category": "cond-mat", "title": "Hidden Unit Interpretability in RBM Quantum States:Encoding Antiferromagnetic Order in Heisenberg Spin Rings", "abstract": "We investigate how Restricted Boltzmann Machines (RBMs) encode antiferromagnetic order when trained as variational ansätze for one-dimensional Heisenberg spin rings with periodic boundary conditions. Through systematic hidden unit analysis and ablation studies on $N=4$ and $N=8$ spin systems, we show that individual hidden units spontaneously specialize to capture staggered magnetization patterns characteristic of antiferromagnetic ground states. Hidden units naturally segregate into two classes: those essential for ground-state energy and correlation structure, and supplementary units providing smaller corrections. Removing important units induces clear energy penalties and disrupts the staggered correlation pattern in $C_{zz}(r)$, whereas removing supplementary units has modest effects. Single-unit analysis confirms that no individual hidden unit reproduces the full antiferromagnetic correlations, indicating that quantum order emerges through collective encoding across the hidden layer. Extending this analysis to $N=8$ through $20$ with hidden unit densities $\\alpha = 2$ to $5$ and ten independent seeds per configuration, we find that the fraction of important hidden units decreases with system size, consistent with sublinear growth $m' \\sim N^k$ ($k \\approx 0.4$). The energy-correlation impact relationship persists for small to moderate system sizes, though it weakens for the largest systems studied. These results provide a quantitative framework for RBM interpretability in quantum many-body systems.", "url": "https://arxiv.org/abs/2603.24223", "type": "理论+数值", "summary": "1. 该工作通过系统分析受限玻尔兹曼机作为一维周期边界海森堡自旋环变分波函数时隐藏单元的角色，研究了其中反铁磁序的编码机制。\n2. 研究发现隐藏单元自发分化为对基态能量与关联结构至关重要的核心单元和仅提供微小修正的辅助单元两类，反铁磁关联通过隐藏层的集体编码涌现。\n3. 这为量子多体系统中神经网络态的可解释性提供了一个定量框架，其揭示的重要单元数量随系统尺寸的亚线性增长规律为设计更高效的变分波函数提供了指引。", "summary_source": "deepseek", "authors": [{"name": "Bharadwaj Chowdary Mummaneni"}, {"name": "Manas Sajjan"}], "featured_authors": [{"name": "Bharadwaj Chowdary Mummaneni"}, {"name": "Manas Sajjan"}], "author_count": 2}, {"id": "2603.24228", "category": "cond-mat", "title": "Diffusion coefficients of multi-principal element alloys from first principles", "abstract": "Vacancy-mediated diffusion in multi-principal element alloys (MPEAs) remains poorly understood. Existing computational methods face challenges in connecting electronic structure to macroscopic transport coefficients due to the large number of chemical elements. To address this, we introduce the embedded local cluster expansion (eLCE), which bridges first-principles calculations with kinetic Monte Carlo simulations to compute the matrix of multicomponent diffusion coefficients. Applying this approach to refractory MPEAs in the V-Cr-Nb-Mo-Ta-W system, we evaluate the complete mobility and diffusion tensors of a six-component alloy at finite temperatures. We find that local kinetic barriers, rather than thermodynamics or vacancy correlation factors, primarily control diffusion in these materials. Whether diffusion is sluggish or anti-sluggish depends on the mean vacancy migration barrier relative to the rule-of-mixtures estimate and on the availability of percolating pathways of fast-diffusing species. We use this insight to screen the senary composition space and identify compositions with anti-sluggish diffusion. This study presents a predictive, first-principles approach for computing non-dilute transport coefficients and designing MPEAs with targeted transport properties.", "url": "https://arxiv.org/abs/2603.24228", "type": "数值", "summary": "1. 该工作引入了嵌入局部簇展开方法，结合第一性原理计算与动力学蒙特卡罗模拟，计算了V-Cr-Nb-Mo-Ta-W系难熔多主元合金在有限温度下的完整迁移与扩散张量。\n2. 其物理卖点在于发现扩散主要由局域动力学势垒控制，而非热力学或空位关联因子，扩散是否缓慢取决于平均空位迁移势垒相对于混合规则估计值及快速扩散物种的渗流通路可用性。\n3. 此研究为基于第一性原理预测非稀薄传输系数、筛选六元成分空间中具有反缓慢扩散特性的合金以及设计具有目标输运性质的多主元合金提供了预测性方法。", "summary_source": "deepseek", "authors": [{"name": "Damien K. J. Lee"}, {"name": "Anirudh Raju Natarajan"}], "featured_authors": [{"name": "Damien K. J. Lee"}, {"name": "Anirudh Raju Natarajan"}], "author_count": 2}, {"id": "2603.24277", "category": "cond-mat", "title": "Run, Tumble and Paint", "abstract": "The visit probability, quantifying whether a particle has reached a given point for the first time by a specified time, provides access to various extreme value statistics and serves as a fundamental tool for characterising active matter models. However, previous studies have largely neglected how the visit probability depends on the internal degree of freedom driving the active particle. To address this, we calculate the \"state-dependent'' visit probability for a Run-and-Tumble particle, that is the probability that the particle first passes through $x$ before time $t$, keeping track of its internal state during first passage. This process may be thought of as the particle \"painting'' the positions it passes through for the time in the colour of its self-propulsion state. We perform this calculation in one dimension using Doi-Peliti field theory, by extending the tracer mechanism from previous works to incorporate such \"polar deposition'' and demonstrate that state-dependent visit probabilities can be elegantly captured within this field-theoretic framework. We further derive the total volume covered by a right- (or left-) moving Run-and-Tumble particle and compare our results with known expressions for Brownian motion.", "url": "https://arxiv.org/abs/2603.24277", "type": "理论+数值", "summary": "1. 该工作计算了一维跑动-翻滚粒子的“状态相关”访问概率，即粒子首次通过位置x时其内部自推进状态的记录概率。\n2. 其技术核心在于将Doi-Peliti场论中的示踪机制扩展至“极性沉积”过程，从而在场论框架内优雅刻画状态依赖的首次访问统计。\n3. 这为活性物质中首次通过问题的统计描述提供了场论方法，并可通过与布朗运动的比较揭示自推进动力学的独特覆盖行为。", "summary_source": "deepseek", "authors": [{"name": "Emir Sezik"}, {"name": "Callum Britton"}, {"name": "Alex Touma"}, {"name": "Gunnar Pruessner"}], "featured_authors": [{"name": "Emir Sezik"}, {"name": "Callum Britton"}, {"name": "Alex Touma"}, {"name": "Gunnar Pruessner"}], "author_count": 4}, {"id": "2603.24289", "category": "cond-mat", "title": "Classification of intrinsically mixed $1+1$D non-invertible Rep$(G) \\times G$ SPT phases", "abstract": "We classify $1+1$d bosonic SPT phases with non-invertible symmetry $\\mathrm{Rep}(G)\\times G$, equivalently the fusion-category symmetry $\\mathcal{H}=\\mathrm{Rep}(G)\\times\\mathrm{Vec}_G$. Focusing on \\emph{intrinsically mixed} phases (trivial under either factor alone), we use the correspondence between $\\mathcal{H}$-SPTs, $\\mathcal{H}$-modules over $\\mathrm{Vec}$, and fiber functors $\\mathcal{H}\\to\\mathrm{Vec}$ to obtain a complete classification: such phases are parametrized by $\\phi\\in\\operatorname{End}(G)$. For each $\\phi$ we identify the associated condensable (Lagrangian) algebra $\\mathcal{A}_\\phi$ in the bulk $\\mathcal{Z}(\\mathcal{H})\\simeq\\mathcal{D}_G^2$. We further provide an explicit lattice realization by modifying Kitaev's quantum double model with a domain wall $\\mathcal{B}_\\phi$ and smooth/rough boundaries, and then contracting to a 1D chain, yielding a (possibly twisted) group-based cluster state whose ribbon-generated symmetry operators encode the same $\\phi$.", "url": "https://arxiv.org/abs/2603.24289", "type": "理论", "summary": "1. 该工作完成了具有非可逆对称性 Rep(G)×G 的一维玻色对称保护拓扑相中本征混合相的分类。\n2. 核心在于利用对称性融合范畴到矢量空间的纤维函子，建立了此类相由群G的自同态φ参数化的完整分类，并给出了基于扭曲群簇态的显式格点实现。\n3. 这一分类框架明确了非可逆对称性SPT相与体态可凝聚代数、边界条件的对应关系，为更高维或更一般融合范畴对称性的研究提供了具体范例。", "summary_source": "deepseek", "authors": [{"name": "Youxuan Wang"}], "featured_authors": [{"name": "Youxuan Wang"}], "author_count": 1}, {"id": "2603.24347", "category": "cond-mat", "title": "Breakdown of the periodic potential ansatz in correlated electron systems", "abstract": "Our electronic structure theory for crystalline solids is commonly built on the periodic potential assumption $V(\\mathbf r)=V(\\mathbf r+\\mathbf R)$ for every lattice translation $\\mathbf R$, enabling Bloch eigenstates, crystal momentum as a good quantum number, and the standard quasiparticle-based description of the behavior of metals. Because the zero-point motion of the ions, however, in correlated electron systems the electronic environment experienced by an itinerant electron is neither static nor self-averaging at the single-particle level, even in perfectly stoichiometric crystals, leading to a distribution of local Kondo scales that spans two orders of magnitude in temperature. We discuss, through a comparison between uniform scenarios and one that breaks with perfect lattice translational symmetry, how incorporating this distribution yields a unified description for all heavy-fermion systems at the quantum critical point.", "url": "https://arxiv.org/abs/2603.24347", "type": "理论", "summary": "1. 该工作通过比较均匀情景与打破完美晶格平移对称性的模型，分析了关联电子系统中周期性势能近似的失效及其对重费米子系统描述的影响。\n2. 其物理卖点在于阐明离子零点运动导致巡游电子环境动态涨落，即使在完美化学计量晶体中也产生跨越两个温度数量级的局部近藤尺度分布，从而突破传统布洛赫理论。\n3. 通过纳入此分布，该研究为统一理解所有重费米子系统在量子临界点的行为提供了新框架，激励了超越标准准粒子图像的强关联电子结构理论发展。", "summary_source": "deepseek", "authors": [{"name": "Wouter Montfrooij"}], "featured_authors": [{"name": "Wouter Montfrooij"}], "author_count": 1}, {"id": "2603.24412", "category": "cond-mat", "title": "Fragile topology for six-fold rotation symmetry indicated by the concentric Wilson loop spectrum", "abstract": "We investigate topological phase transitions for the Haldane and Kane-Mele model in a lattice with $p6$ symmetry, which consists of triangles and hexagons arranged in a two-dimensional geometry. For the Haldane model, which breaks time-reversal symmetry, we calculate the Chern number using a multi-band non-Abelian Wilson loop formalism. By varying the hopping parameters in the triangles and hexagons independently, a large variety of topological phases emerge. In the presence of a next-next-nearest neighbor hopping, the phase diagram becomes even richer, with regions exhibiting high Chern numbers. Then, we consider the Kane-Mele model, for which time-reversal symmetry is preserved, and calculate the number of $\\pi$-crossings in the Concentric Wilson Loop Spectrum (CWLS). This method is appropriate to determine the topological invariant for systems hosting time-reversal and rotational symmetry, but lacking all other symmetries. According to a classification based on $K$-theory, the CWLS invariant reveals topological properties even when more conventional invariants fail to detect them. The formalism was previously successfully applied to systems with 3- and 4-fold symmetry. Here, we surprisingly find that for the 6-fold-symmetry model investigated, the topology identified by this invariant is fragile, therefore questioning the claim that this should be the strong invariant missing in a complete classification of topological insulators.", "url": "https://arxiv.org/abs/2603.24412", "type": "理论+数值", "summary": "1. 该工作研究了六重旋转对称晶格中Haldane和Kane-Mele模型的拓扑相变，采用同心Wilson环谱方法。\n2. 其技术核心在于发现CWLS不变量在六重对称下指示的拓扑是脆弱的，挑战了其作为强不变量的分类地位。\n3. 这促使重新评估CWLS在拓扑绝缘体完整分类中的角色，为脆弱拓扑和对称性保护理论提供了明确启发。", "summary_source": "deepseek", "authors": [{"name": "Xinyang Li"}, {"name": "Lumen Eek"}, {"name": "Jasper van Wezel"}, {"name": "Cristiane Morais Smith"}], "featured_authors": [{"name": "Xinyang Li"}, {"name": "Lumen Eek"}, {"name": "Jasper van Wezel"}, {"name": "Cristiane Morais Smith"}], "author_count": 4}, {"id": "2603.24438", "category": "cond-mat", "title": "Models of 3D confluent tissue as under-constrained glasses", "abstract": "The dynamics of glassy materials slows down upon cooling, typically showing either Arrhenius or super-Arrhenius behavior. However, it was recently shown that 2D cell-based models for biological tissues can be continuously tuned between Arrhenius and sub-Arrhenius dynamics. In previous work, using the 2D Voronoi model, we proposed that such atypical dynamical behavior could be a generic feature of the broad class of mechanically under-constrained materials. Our earlier study had left two important points open: (1) many 2D systems are affected by long-wavelength fluctuations and the 2D melting scenario, and (2) the 2D Voronoi model sits exactly at the isostatic point, making it a marginal case rather than a strictly under-constrained one. Both points complicate the interpretation of our 2D Voronoi model results and their generalization to other systems; to remedy this, here we use large-scale simulations to study the glassy behavior of the 3D extension of the Voronoi model. We first show that the structural relaxation time $\\tau_\\alpha$ of the 3D Voronoi model can be tuned between sub-Arrhenius and Arrhenius behavior, like the 2D Voronoi model. We then establish that the four-point susceptibility, the structure factor, and the model's mechanical properties all display trends consistent with the 2D Voronoi model. These results provide strong evidence that sub-Arrhenius glassy dynamics are a generic feature of under-constrained materials across dimensions. Our work thus broadens the class of disordered materials known to have highly unusual glassy phenomenology.", "url": "https://arxiv.org/abs/2603.24438", "type": "理论+数值", "summary": "1. 本研究通过大规模模拟研究了三维Voronoi模型的玻璃化行为，以弥补先前二维研究在长波长涨落和等静压点问题上的局限。\n2. 该模型的结构弛豫时间可在亚阿伦尼乌斯与阿伦尼乌斯行为间连续调控，且四点关联率、结构因子及力学性质均与二维模型趋势一致。\n3. 这强有力地表明亚阿伦尼乌斯玻璃动力学是跨维度欠约束材料的普遍特征，从而拓展了具有非常规玻璃现象学的无序材料体系。", "summary_source": "deepseek", "authors": [{"name": "Chengling Li"}, {"name": "Matthias Merkel"}, {"name": "Daniel M. Sussman"}], "featured_authors": [{"name": "Chengling Li"}, {"name": "Matthias Merkel"}, {"name": "Daniel M. Sussman"}], "author_count": 3}, {"id": "2603.24445", "category": "cond-mat", "title": "Electrical Transport and Quantum Oscillations in the Metallic Spin Supersolid EuCo2Al9", "abstract": "The discovery of spin supersolid and its giant magnetocaloric effect has opened a new arena in frustrated quantum magnets and cutting-edge cryogenics. The intermetallic EuCo2Al9 (ECA), for the first time, extends this intriguing phase from Mott insulators to a highly conductive metal [1]. In this work, we systematically study the electrical transport properties of ECA, where itinerant electrons serve as a sensitive probe for the spin supersolid states. We observe anomalies both in the temperature-dependent resistivity and field-dependent magnetoresistance and Hall signals, which are attributed to response of electrons to the Eu2+ spins and their fluctuations. Moreover, Shubnikov-de Haas quantum oscillations at high magnetic field reveal pronounced band splitting in the spin polarized state. Our results reveal an intimate correspondence between electrical transport and magnetic transitions in ECA, deepening the understanding of this metallic spin supersolid.", "url": "https://arxiv.org/abs/2603.24445", "type": "理论", "summary": "1. 本研究系统测量了金属性自旋超固态EuCo2Al9的电输运性质，并以巡游电子作为探针探测其自旋态。\n2. 其核心发现是电阻率、磁阻和霍尔信号中的异常源于电子与Eu²⁺自旋及其涨落的耦合，且强磁场下的Shubnikov-de Haas量子振荡揭示了自旋极化态的显著能带劈裂。\n3. 该结果确立了电输运与磁相变之间的直接关联，为利用输运性质敏感探测其他金属性阻挫磁体中的新奇相变提供了明确途径。", "summary_source": "deepseek", "authors": [{"name": "Xitong Xu"}, {"name": "Yonglai Liu"}, {"name": "Ning Xi"}, {"name": "Mingfang Shu"}, {"name": "Haitian Zhao"}, {"name": "Jiajun Xie"}, {"name": "Guoliang Wu"}, {"name": "Hao Chen"}, {"name": "Miao He"}, {"name": "Pengzhi Chen"}, {"name": "Ze Wang"}, {"name": "Zhentao Wang"}, {"name": "Chuanying Xi"}, {"name": "Mingliang Tian"}, {"name": "Haifeng Du"}, {"name": "Jie Ma"}, {"name": "Xi Chen"}, {"name": "Wei Li"}, {"name": "Zhe Qu"}], "featured_authors": [{"name": "Xitong Xu"}, {"name": "Yonglai Liu"}, {"name": "Ning Xi"}, {"name": "Xi Chen"}, {"name": "Wei Li"}, {"name": "Zhe Qu"}], "author_count": 19}, {"id": "2603.24453", "category": "cond-mat", "title": "Intertwined spin and charge dynamics in one-dimensional supersymmetric t-J model", "abstract": "Following the Bethe ansatz we determine the dynamical spectra of the one-dimensional supersymmetric t-J model. A series of fractionalized excitations are identified through two sets of Bethe numbers. Typical patterns in each set are found to yield wavefunctions containing elementary spin and charge carriers, manifested as distinct boundaries of the collective excitations in the spectra of single electron Green functions. In spin channels, gapless excitations fractionalized into two spin and a pair of postive and negative charge carriers, extending to finite energy as multiple continua. These patterns connect to the half-filling limit where only fractionalized spinons survive. In particle density channel, apart from spin-charge fractionalization, excitations involving only charge fluctuations are observed. Furthermore, nontrivial Bethe strings encoding bound state structure appear in channels of reducing or conserving magnetization, where spin and charge constituents can also be identified. These string states contribute significantly even to the low-energy sector in the limit of vanishing magnetization.", "url": "https://arxiv.org/abs/2603.24453", "type": "理论", "summary": "1. 本研究基于Bethe ansatz解析求解了一维超对称t-J模型的自旋与电荷动力学谱。\n2. 通过两组Bethe量子数识别出分数化激发，揭示了自旋通道中无能隙激发分裂为两个自旋子与正负电荷载流子对，以及在粒子密度通道中观测到纯电荷涨落激发。\n3. 这些发现为理解强关联体系中分数化激发的普适性模式及其在有限能标下的表现提供了理论基准。", "summary_source": "deepseek", "authors": [{"name": "Yunjing Gao"}, {"name": "Jianda Wu"}], "featured_authors": [{"name": "Yunjing Gao"}, {"name": "Jianda Wu"}], "author_count": 2}, {"id": "2603.24471", "category": "cond-mat", "title": "Tunable linear polarization of interface excitons at lateral heterojunctions", "abstract": "We develop a theory of polarized photoluminescence of interface excitons localized at lateral heterojunctions between transition metal dichalcogenide monolayers. We show that the circular selection rules governing interband optical transitions exactly at the band extrema are modified at finite wave vectors. The corresponding wave-vector-dependent corrections to the optical matrix elements result in a net linear polarization of excitonic photoluminescence. We identify two microscopic mechanisms responsible for linear polarization$-$trigonal warping of the electron and hole dispersions and the energy dependence of the effective masses. Their interplay controls both the magnitude and the angle of the emitted light polarization, with distinct dependences on the crystallographic orientation of the interface. Using a microscopic variational approach, we demonstrate that the degree of linear polarization can reach values exceeding 10% in realistic heterostructures. Furthermore, due to the large built-in dipole moment of interface excitons, their optical response can be tuned by an external in-plane electric field, enabling control over the strength and direction of the polarization.", "url": "https://arxiv.org/abs/2603.24471", "type": "理论+数值", "summary": "1. 本文建立了过渡金属二硫族化物横向异质结处局域界面激子的偏振光致发光理论。\n2. 理论揭示了线性偏振源于有限波矢下光学跃迁矩阵元的修正，其幅度和方向由能带三角扭曲与有效质量能量依赖性的微观机制共同调控。\n3. 该工作为通过面内电场调控激子光学响应及设计基于界面激子的可调谐偏振光源提供了明确的物理途径。", "summary_source": "deepseek", "authors": [{"name": "M. V. Durnev"}, {"name": "D. S. Smirnov"}], "featured_authors": [{"name": "M. V. Durnev"}, {"name": "D. S. Smirnov"}], "author_count": 2}, {"id": "2603.24482", "category": "cond-mat", "title": "Fine-tuning universal machine learning potentials for transition state search in surface catalysis", "abstract": "Determining transition states (TSs) of surface reactions is central to understanding and designing heterogeneous catalysts but remains computationally prohibitive with density functional theory (DFT). While machine learning potentials (MLPs) offer significant speedups, task-specific models have limited transferability across catalytic systems, and universal MLPs (uMLPs) lack the accuracy needed for reactive configurations. Here, we present a workflow based on active learning to iteratively fine-tune uMLPs for DFT-quality TS search. Using 250 TSs from the CO2 hydrogenation reaction network on metal and single-atom alloy surfaces, we first benchmark TS search algorithms, identifying the Sella algorithm as most robust, and propose a modification (Bond-Aware Sella) that substantially improves its success rate. We then explore sequential and batch active-learning strategies for fine-tuning and show that DFT-quality TS structures can be found using only 8 DFT single-point calculations on average per structure. This demonstrates the viability of fine-tuned uMLPs for high-throughput catalyst screening.", "url": "https://arxiv.org/abs/2603.24482", "type": "理论+数值", "summary": "1. 本文开发了一种基于主动学习的流程，用于对通用机器学习势函数进行迭代微调，以实现密度泛函理论精度的表面反应过渡态搜索。\n2. 其技术核心在于改进了Sella算法（提出键感知版本以提高成功率），并证明通过平均仅需8个单点计算即可获得DFT精度的过渡态结构。\n3. 这为基于微调通用势函数的高通量催化剂筛选提供了可行路径，显著降低了复杂反应网络过渡态搜索的计算成本。", "summary_source": "deepseek", "authors": [{"name": "Raffaele Cheula"}, {"name": "Mie Andersen"}, {"name": "John R. Kitchin"}], "featured_authors": [{"name": "Raffaele Cheula"}, {"name": "Mie Andersen"}, {"name": "John R. Kitchin"}], "author_count": 3}, {"id": "2603.24537", "category": "cond-mat", "title": "Radial Distribution Function in a Two Dimensional Core-Shoulder Particle System", "abstract": "An important quantity in liquid state theory is the radial distribution function $g(r)$. It can be calculated within the framework of classical density functional theory in two very distinct ways. In the test-particle route, one fixes a single fluid particle, turning it into an external potential in which the inhomogeneous structure of the fluid is calculated by minimising the functional. The second route to $g(r)$ in density functional theory employs the Ornstein-Zernike equation and the pair direct correlation function, that can be obtained from the second functional derivatives of the excess free energy functional. Since typically an approximate excess free energy functional is employed, one generally expects that the test-particle route, which requires only one functional derivative, to be more accurate than the Ornstein-Zernike route. Here we study a two dimensional core-shoulder particle system and present results that challenge this expectation. Our results show that in this system test-particle results for $g(r)$ are not always better than results obtained via the Ornstein-Zernike route.", "url": "https://arxiv.org/abs/2603.24537", "type": "理论+数值", "summary": "1. 该工作系统比较了密度泛函理论中计算径向分布函数的测试粒子路径与Ornstein-Zernike路径在二维核-肩粒子体系中的表现。\n2. 研究发现，仅需一阶泛函导数的测试粒子法所得结果并非总优于基于二阶导数的Ornstein-Zernike路径，这挑战了关于近似泛函误差阶数的传统预期。\n3. 这一反直觉结果为评估不同密度泛函近似在软物质体系中的适用性提供了新基准，并强调需结合具体相互作用形式选择最优计算路径。", "s
