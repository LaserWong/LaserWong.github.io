函数自举中进行了应用。\n2. 该工具基于递推关系实现并行化实时计算，在计算速度与中等精度需求场景下相比现有方案具有显著效率优势，并支持多关联函数及导数自举方法。\n3. 该方法为非凸优化框架下的混合关联函数自举计算提供了高效实现方案，其可扩展性为更广泛O(N)矢量模型的多关联函数研究奠定了基础。", "summary_source": "deepseek", "authors": [{"name": "James Chryssanthacopoulos"}, {"name": "Vasilis Niarchos"}, {"name": "Constantinos Papageorgakis"}, {"name": "Alexander G. Stapleton"}], "featured_authors": [{"name": "James Chryssanthacopoulos"}, {"name": "Vasilis Niarchos"}, {"name": "Constantinos Papageorgakis"}, {"name": "Alexander G. Stapleton"}], "author_count": 4}, {"id": "2603.10819", "category": "hep-th", "title": "Generalised Complex and Spinor Relations", "abstract": "Courant algebroid relations are used to define notions of relations between Dirac structures and spinors. It is shown under which circumstances a spinor relation gives a Courant algebroid relation and how it descends to a relation between Dirac structures. A converse to this result is proved: a T-duality relation induces a spinor relation that links the Dirac generating operators defining T-dual Courant algebroids, generalising the isomorphism of twisted cohomology associated with topological T-duality. We introduce the notion of relation between generalised complex structures and characterise their reduction. We also define relations between generalised Kähler structures, and rephrase them in terms of bi-Hermitian structures which induce T-duality relations between $\\mathcal{N}=(2,2)$ supersymmetric sigma-models. We prove existence results for T-dual structures, and demonstrate compatibility of T-duality relations with Type II supergravity equations.", "url": "https://arxiv.org/abs/2603.10819", "type": "理论", "summary": "库朗代数关系用于定义狄拉克结构和旋量之间的关系概念。它显示了在什么情况下旋量关系给出库朗代数关系以及它如何下降到狄拉克结构之间的关系。证明了与此结果相反的结果：T-对偶关系引入了一个旋量关系，该旋量关系将定义 T-对偶库朗代数体的狄拉克生成算子联系起来，概括了与拓扑 T-对偶相关的扭曲上同调的同构。我们引入广义复杂结构之间关系的概念并表征它们的约简。我们还定义了广义卡勒结构之间的关系，并用双埃尔米特结构重新表述它们，该结构在 $\\mathcal{N}=(2,2)$ 超对称 sigma 模型之间引入 T 对偶关系。我们证明了 T-对偶结构的存在性结果，并证明了 T-对偶关系与 II 型超重力方程的兼容性。", "summary_source": "translation", "authors": [], "featured_authors": [], "author_count": 0}, {"id": "2603.11003", "category": "hep-th", "title": "Nucleating an Inflationary Universe: Euclidean Wormholes and their No-Boundary Limit", "abstract": "No-boundary instantons and Euclidean \"wineglass\" wormholes have both been proposed as providing suitable initial conditions for the current expanding phase of our universe, and in particular for providing conditions that are favorable to an inflationary phase. These finite action solutions have generally been regarded as unrelated, and enacting different scenarios - in one case the creation of spacetime from nothing, and in the other up-tunneling from a Euclidean Anti-de Sitter vacuum. By studying explicit solutions of both axionic and magnetic wineglass wormholes, we find that in the zero-charge limit the throat of the wormholes pinches off, leaving a no-boundary instanton that disconnects from the asymptotic Anti-de Sitter region. Thus wormholes and no-boundary instantons are part of a common family of Euclidean solutions. Along the way, we resolve the long-known puzzle that the action of wineglass wormholes can become negative. Moreover, small-charge wormholes lead to a longer inflationary phase than large-charge solutions, while no-boundary instantons dominate the probability distribution overall.", "url": "https://arxiv.org/abs/2603.11003", "type": "理论", "summary": "1. 本文通过研究轴子性与磁性\"酒杯\"虫洞的显式解，发现在零电荷极限下虫洞喉部收缩，形成与渐近反德西特尔区域脱耦的无边界瞬子。\n2. 该工作的核心在于揭示了虫洞与无边界瞬子同属一个欧几里得解家族，并解决了虫洞作用量可为负的长期难题，同时表明小电荷虫洞比大电荷解产生更长的暴胀阶段。\n3. 这一统一性框架为理解宇宙暴胀起源的初始条件提供了新视角，并确立了无边界瞬子在量子宇宙学概率分布中的主导地位。", "summary_source": "deepseek", "authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "featured_authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "author_count": 2}, {"id": "2603.11012", "category": "hep-th", "title": "Bouncing singularities and thermal correlators on line defects", "abstract": "Thermal correlators in holographic conformal field theories are known to exhibit singularities in complex time, sometimes referred to as ``bouncing singularities\", which are believed to be related to bulk geodesics probing the black hole interior. These singularities correspond to exponentially suppressed contributions in the high-frequency limit of the thermal correlators. We revisit in detail the calculation of retarded two-point functions of local operators dual to bulk scalar fields in the planar AdS black hole background. We confirm that these correlators develop bouncing singularities, and highlight the agreement of two independent methods: a large frequency WKB analysis with infalling boundary conditions at the horizon; and an asymptotic OPE analysis that relies only on the near-boundary expansion, without any direct input from the black hole interior. We then extend these calculations to the case of the retarded two-point function of displacement operators on a Wilson line in the finite temperature gauge theory. This is computed holographically by solving the wave equation for the transverse fluctuations of the dual string worldsheet in the planar AdS black hole background. We find that these defect correlators also exhibit bouncing singularities, and again observe exact agreement between the WKB analysis sensitive to the black hole interior and the asymptotic OPE analysis. This agreement suggests that the bouncing singularities and the corresponding OPE data encode a universal high-frequency structure of the retarded correlators, and we propose a factorization formula that encodes the deviations from this universality.", "url": "https://arxiv.org/abs/2603.11012", "type": "理论", "summary": "1. 该工作详细计算了平面AdS黑洞背景中标量场对偶算符的推迟两点函数，并将其推广至有限温度规范理论中Wilson线上位移算符的推迟关联子。\n2. 研究的关键在于，分别采用对黑洞内部敏感的大频率WKB分析与仅依赖近边界展开的渐近OPE分析，两种独立方法在揭示关联子的“反弹奇点”上取得了精确一致的结果。\n3. 这表明反弹奇点及其对应的OPE数据编码了推迟关联子普适的高频结构，所提出的因子化公式为理解相关理论中高频行为的偏离提供了明确框架。", "summary_source": "deepseek", "authors": [{"name": "Simone Giombi"}, {"name": "Yue-Zhou Li"}, {"name": "Jieru Shan"}], "featured_authors": [{"name": "Simone Giombi"}, {"name": "Yue-Zhou Li"}, {"name": "Jieru Shan"}], "author_count": 3}, {"id": "2603.10739", "category": "math-ph", "title": "A Radon-transform-based formula for reconstructing acoustic sources from the scattered fields", "abstract": "We propose a novel indicator function for reconstructing acoustic sources from multi-frequency near-field measurements. The theoretical basis is established by a formula relating the scattered field to the source function through the Radon transform. Such a representation enables us to recover the source function directly. The efficiency and robustness of the novel indicator function are verified by several numerical examples.", "url": "https://arxiv.org/abs/2603.10739", "type": "理论", "summary": "1. 该工作提出了一种基于Radon变换的新型指示函数，用于从多频近场测量数据中重建声源。\n2. 其核心在于推导出一个将散射场与源函数通过Radon变换直接关联的理论公式，从而实现了对源函数的直接重建。\n3. 数值算例验证了该方法的效率与鲁棒性，为实际声学成像与逆散射问题提供了一种有效的计算途径。", "summary_source": "deepseek", "authors": [{"name": "Xiaodong Liu"}, {"name": "Jing Wang"}], "featured_authors": [{"name": "Xiaodong Liu"}, {"name": "Jing Wang"}], "author_count": 2}, {"id": "2603.10761", "category": "math-ph", "title": "From path integral quantization to stochastic quantization: a pedestrian's journey", "abstract": "We give two novel proofs that the path integral and stochastic quantizations of generic scalar Euclidean quantum field theories are equivalent. Our proofs rely on Taylor interpolations indexed by forests, in the fashion of constructive field theory. The first proof works at the level of individual terms in the Feynman expansion, with the forests appearing as spanning forests in Feynman graphs. The second one works at the level of the path integral and avoids the full expansion of the Feynman perturbation series.", "url": "https://arxiv.org/abs/2603.10761", "type": "理论", "summary": "1. 该工作针对一般标量欧氏量子场论，提出了两种证明路径积分量子化与随机量子化等价性的新方法。\n2. 其技术核心在于采用构造场论风格的森林索引泰勒插值，第一种证明在费曼图展开的单项层面操作，第二种则在路径积分层面避免了微扰级数的完全展开。\n3. 这一等价性的严格证明为构造场论与随机量化方法之间的交叉研究提供了新的数学工具与理论视角。", "summary_source": "deepseek", "authors": [{"name": "Dario Benedetti"}, {"name": "Ilya Chevyrev"}, {"name": "Razvan Gurau"}], "featured_authors": [{"name": "Dario Benedetti"}, {"name": "Ilya Chevyrev"}, {"name": "Razvan Gurau"}], "author_count": 3}, {"id": "2603.10946", "category": "math-ph", "title": "Hamiltonian formulation and matrix discretization for axisymmetric magnetohydrodynamics", "abstract": "Equations of ideal magnetohydrodynamics (MHD) play an important role in the studies of turbulence, astrophysics, and plasma physics. These equations possess remarkable geometric structures and symmetries. Indeed, they admit a geodesic formulation in the sense of Arnold, as a Lie--Poisson flow on the dual of an infinite-dimensional Lie algebra. Zeitlin's model, previously developed for MHD on the flat torus and the two-sphere, is a matrix approximation of MHD consistent with the underlying geometric structures. In this paper, we derive the reduced model of axially symmetric magnetohydrodynamics on the three-sphere and give its Hamiltonian formulation. We further extend finite dimensional Zeitlin's matrix model for MHD from 2D to axially symmetric 3D flows of magnetized fluids, yielding the first discrete model for 3D magnetohydrodynamics compatible with the underlying Lie--Poisson structure.", "url": "https://arxiv.org/abs/2603.10946", "type": "理论", "summary": "1. 该工作推导了三维球面上轴对称磁流体力学（MHD）的约化模型及其哈密顿表述，并将Zeitlin有限维矩阵模型从二维推广至轴对称三维磁化流体流动。\n2. 其核心在于首次构造了与底层李–泊松结构相兼容的三维磁流体力学离散模型，严格保持了连续理论的几何结构。\n3. 这为在保持关键几何约束下进行三维磁流体湍流及天体物理过程的数值模拟研究提供了首个结构相容的离散框架。", "summary_source": "deepseek", "authors": [{"name": "Michael Roop"}], "featured_authors": [{"name": "Michael Roop"}], "author_count": 1}, {"id": "2603.10191", "category": "quant-ph", "title": "Regularized Warm-Started Quantum Approximate Optimization and Conditions for Surpassing Classical Solvers on the Max-Cut Problem", "abstract": "Demonstrating quantum heuristics that outperform strong classical solvers on large-scale optimization remains an open challenge. Here we introduce Regularized Warm-Started QAOA (RWS-QAOA), which initializes qubits by minimizing expected energy with a regularizer that penalizes near-bitstring states, preventing QAOA from stalling. We further propose a protocol that yields fixed, instance-independent parameters, enabling RWS-QAOA to operate as a non-variational algorithm in which the quantum circuit parameters are fixed and only a classical warm starting step is instance-dependent. We evaluate RWS-QAOA on the Max-Cut problem for random regular graphs, where this protocol yields a constant-depth quantum circuit, across three complementary settings. First, on Quantinuum's trapped-ion processor, RWS-QAOA outperforms the classical algorithms with the best provable guarantees for Max-Cut on $3$-regular graphs, namely Goemans-Williamson and Halperin-Livnat-Zwick, on $96$-node instances. Second, tensor-network simulations on graphs with up to $N{=}10{,}000$ nodes show that depth-$6$ RWS-QAOA, achieving an average cut fraction of $0.9167$, surpasses the best classical heuristics under matched restrictions (no local-search post-processing and no iterative refinement). Third, we remove these restrictions and benchmark against the strongest unrestricted classical heuristics, including an optimized parallel Burer-Monteiro solver that improves upon the MQLib implementation. Even against this stronger baseline, we project that surface-code RWS-QAOA reaches a quantum-classical runtime crossover below $0.2$ seconds on $3{,}000$-node graphs with fewer than $1.3$ million physical qubits. Our results show that constant-depth quantum circuits combined with a classical warm start have a credible potential to surpass classical solvers on the Max-Cut problem when executed on future quantum computers.", "url": "https://arxiv.org/abs/2603.10191", "type": "理论+数值", "summary": "1. 该工作提出了正则化热启动量子近似优化算法及其固定参数协议，并在随机正则图上对Max-Cut问题进行了算法性能评估。\n2. 其核心在于通过正则化项惩罚近比特串态防止算法停滞，并采用实例无关的固定量子线路参数，实现了仅需经典热启动步骤的非变分、恒定深度量子电路。\n3. 这为未来在表面码量子计算机上，利用恒定深度量子电路结合经典预处理，在Max-Cut等组合优化问题中超越最强经典求解器提供了可行的技术路径与性能预期。", "summary_source": "deepseek", "authors": [{"name": "Zichang He"}, {"name": "Anuj Apte"}, {"name": "Brandon Augustino"}, {"name": "Arman Babakhani"}, {"name": "Abid Khan"}, {"name": "Sivaprasad Omanakuttan"}, {"name": "Ruslan Shaydulin"}], "featured_authors": [{"name": "Zichang He"}, {"name": "Anuj Apte"}, {"name": "Brandon Augustino"}, {"name": "Abid Khan"}, {"name": "Sivaprasad Omanakuttan"}, {"name": "Ruslan Shaydulin"}], "author_count": 7}, {"id": "2603.10206", "category": "quant-ph", "title": "Are quantum trajectories suitable for semiclassical approximations?", "abstract": "The quantum trajectories in the de Broglie-Bohm formulation of quantum mechanics depend on an additional quantum potential derived from the full wave solution of Schrödinger's equation. The task of supplying collectively all the correct quantum results strongly alters the characteristics of the corresponding classical trajectories, which underlie semiclassical approximations to the evolving wave function. Both classical and quantum trajectories are here considered to be conservative with no influence of an external environment, even though this is the source of eventual classicality in quantum systems, that is, decoherence. The concept of integrability, closely correspondent in classical and quantum mechanics, is not preserved by the quantum trajectories. General systems, in which classical chaotic motion participates, are much harder to treat semiclassically, but quantum trajectories can be chaotic even for integrable systems. This discrepancy between the character of classical and quantum trajectories in the de Broglie-Bohm interpretation does not clarify the singular classical-quantum transition.", "url": "https://arxiv.org/abs/2603.10206", "type": "理论", "summary": "1. 该工作基于德布罗意-玻姆量子力学诠释，研究了量子轨迹对于半经典近似的适用性，并与保守系统中的经典轨迹进行比较。\n2. 量子轨迹不保持经典系统原有的可积性，且即使对于经典可积系统，量子轨迹仍可能呈现混沌特性，这构成了半经典处理的主要障碍。\n3. 这一轨迹特性的显著差异并未澄清经典-量子转变的奇异性，暗示环境诱导退相干等机制可能对于理解该转变更为关键。", "summary_source": "deepseek", "authors": [{"name": "Alfredo M. Ozorio de Almeida"}], "featured_authors": [{"name": "Alfredo M. Ozorio de Almeida"}], "author_count": 1}, {"id": "2603.10325", "category": "quant-ph", "title": "Geo-ADAPT-VQE: Quantum Information Metric-Aware Circuit Optimization for Quantum Chemistry", "abstract": "Adaptive ansatz construction has emerged as a powerful technique for reducing circuit depth and improving optimization efficiency in variational quantum eigensolvers. However, existing adaptive methods, including ADAPT-VQE, rely solely on first-order gradients and therefore ignore the underlying geometry of the quantum state space, limiting both convergence behavior and operator-selection efficiency. We introduce Geo-ADAPT-VQE, a geometry-aware adaptive VQE algorithm that selects operators from a pool using the natural gradient rule. The geometric operator-selection rule enables the ansatz to grow along directions aligned with the underlying quantum-state geometry, thereby improving convergence and reducing the algorithm's susceptibility to shallow local minima and saddle-point regions. We further provide an asymptotic convergence result. We present numerical simulations involving five molecules, which demonstrate that Geo-ADAPT-VQE achieves faster and more stable convergence compared to existing methods, while producing significantly shorter ansatz. In particular, Geo-ADAPT achieves up to 100-fold reduction in energy error compared to existing methods.", "url": "https://arxiv.org/abs/2603.10325", "type": "理论+数值", "summary": "1. 该工作提出了Geo-ADAPT-VQE，一种利用量子自然梯度规则从算符池中选取算符的几何感知自适应变分量子本征值求解算法。\n2. 其核心优势在于算符选择规则使拟设沿着量子态空间的底层几何方向生长，从而改善了收敛稳定性，并显著减少了对浅层局域极小点和鞍点区域的敏感性。\n3. 更可靠地执行量子化学模拟提供了有前景的算法框架，并激发了将几何信息集成到更广泛变分量子算法中的研究。", "summary_source": "deepseek", "authors": [{"name": "Mohammad Aamir Sohail"}, {"name": "Toshiaki Koike-Akino"}], "featured_authors": [{"name": "Mohammad Aamir Sohail"}, {"name": "Toshiaki Koike-Akino"}], "author_count": 2}, {"id": "2603.10415", "category": "quant-ph", "title": "Tight Quantum Speed Limit for Ergotropy Charging in the N-Qubit Dicke Battery", "abstract": "We derive and analytically prove a tight quantum speed limit (QSL) for ergotropy charging in the $N$-qubit Dicke quantum battery: the first-passage time to normalised ergotropy $\\epsilon$ satisfies $\\tau^{*}(\\epsilon) \\geq \\sqrt{N\\epsilon}/(2\\lambda\\sqrt{\\bar{n}})$, where $\\lambda$ is the coupling and $\\bar{n}$ is the mean charger photon number. The bound follows from an exact perturbative identity $\\epsilon(t) = A\\lambda^2\\bar{n}t^2 + \\mathcal{O}((\\lambda t)^4)$, where $A=4/N$ is the short-time ergotropy coefficient, combined with a global upper bound proved analytically for all $N$. The composite parameter $\\Gamma_N = 2\\lambda\\sqrt{\\bar{n}/N}$ is the unique figure of merit for charging speed; all protocols collapse onto $\\Gamma_N \\tau^{*} \\geq \\sqrt{\\epsilon}$, with the bound saturated to within 1% at small $\\epsilon$.", "url": "https://arxiv.org/abs/2603.10415", "type": "理论", "summary": "1. 该工作为N量子比特Dicke量子电池中的ergotropy充电过程推导并解析证明了一个紧致的量子速度极限。\n2. 其核心在于结合了ergotropy的精确短时微扰展开恒等式与对所有N均成立的全局上界，从而唯一确定了以复合参数Γ_N = 2λ√(n̄/N)表征的充电速度标度律。\n3. 这一普适的标度关系为在不同参数和协议下评估与优化量子电池的充电性能提供了统一的理论基准和设计原则。", "summary_source": "deepseek", "authors": [{"name": "Anass Jad"}, {"name": "Abderrahim El Allati"}], "featured_authors": [{"name": "Anass Jad"}, {"name": "Abderrahim El Allati"}], "author_count": 2}, {"id": "2603.10431", "category": "quant-ph", "title": "Coherence thermometry using multipartite quantum systems", "abstract": "We investigate, how finite temperature influences quantum coherence in multipartite open systems by analyzing a tripartite spin boson model subjected to non-Markovian dephasing. Two distinct environmental configurations are considered viz. independent local reservoir and a common structured reservoir characterized by an Ohmic spectral density. In this framework, temperature enters explicitly through the time dependent dephasing rates, enabling a systematic exploration of thermal effects on coherence dynamics. Using the relative entropy of coherence, we examine representative pure states belonging to inequivalent entanglement classes along with physically relevant mixed states constructed from them. Under local non-Markovian dephasing, all states exhibit monotonic coherence decay, with temperature acting as a universal accelerator of decoherence. In contrast, the common reservoir scenario reveals a strikingly non-universal behaviour. While $GHZ$ and $Star$ type states undergo temperature enhanced degradation, $W$ class states and certain Werner type mixtures display robust stationary coherence that remains largely insensitive to thermal fluctuations. These results demonstrate that the thermal susceptibility of coherence is governed not only by environmental configuration but also by the internal architecture of multipartite quantum states. The interplay between reservoir structure and state geometry leads to qualitatively distinct dynamical regimes ranging from rapid thermal fragility to temperature resilient coherence preservation. Our findings identify coherence dynamics as a sensitive probe of structured finite temperature environments and suggest a pathway toward coherence based quantum thermometry and nanoscale calorimetry using engineered multipartite states.", "url": "https://arxiv.org/abs/2603.10431", "type": "理论", "summary": "1. 该工作通过三体自旋玻色模型分析了非马尔可夫退相干下有限温度对多体开放系统量子相干性的影响，并对比了独立局部库与共同结构库两种环境配置。\n2. 其核心物理发现是相干性的热敏感性由环境结构和量子态几何共同决定，共同库中W类态和Werner混合物展现出对温度不敏感的稳定相干性，区别于局部库的普适退相干加速。\n3. 这为利用相干性动力学作为结构化有限温度环境的敏感探针提供了理论基础，启发了基于工程化多体量子态的量子温度测量和纳米尺度量热学新途径。", "summary_source": "deepseek", "authors": [{"name": "Pranav Perumalsamy"}, {"name": "Abhijit Mandal"}, {"name": "Sovik Roy"}, {"name": "Md Manirul Ali"}], "featured_authors": [{"name": "Pranav Perumalsamy"}, {"name": "Abhijit Mandal"}, {"name": "Sovik Roy"}, {"name": "Md Manirul Ali"}], "author_count": 4}, {"id": "2603.10518", "category": "quant-ph", "title": "Airfoil shape optimization via coherent Ising machine", "abstract": "Airfoil shape optimization presents a challenge where classical solvers frequently struggle with computational efficiency and local minima. In the promising paradigm of quantum computing, the coherent Ising machine (CIM), a specialized physical solver, offers acceleration capabilities. However, its native discrete binary architecture restricts the application in aerodynamic design. To bridge this gap, we propose a comprehensive framework that translates airfoil shape optimization into hardware-compliant quadratic unconstrained binary optimization formulations. We integrate high-order response surface models via the Rosenberg order reduction, enabling the CIM to capture strong nonlinearities in the aerodynamic performance response. Furthermore, we introduce a block-diagonal scalarization strategy that compose trade-off scenarios into a single optimization. Validated on the NACA 4-digit airfoil series using CIM hardware with 615 spins, the framework successfully locates the global optimum with a computational speedup of three orders of magnitude compared to the classical simulated annealing. The parallel embedding capacity allows for the extraction of an entire optimal Pareto front in a single hardware execution. This work demonstrates a viable, quantum-enhanced paradigm for engineering optimization.", "url": "https://arxiv.org/abs/2603.10518", "type": "理论+数值", "summary": "1. 该工作提出了一个将翼型气动外形优化问题映射至相干伊辛机硬件的完整框架。\n2. 其核心在于通过Rosenberg降阶技术集成高阶响应面模型以捕获强非线性，并采用块对角标量化策略实现多目标Pareto前沿的单次求解。\n3. 这为利用专用物理处理器实现复杂工程设计的量子增强优化提供了可行范式，有望拓展至其他具有高维、非线性约束的设计问题。", "summary_source": "deepseek", "authors": [{"name": "Hao Ni"}, {"name": "Qi Gao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "featured_authors": [{"name": "Hao Ni"}, {"name": "Qi Gao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "author_count": 4}, {"id": "2603.10571", "category": "quant-ph", "title": "Entanglement distribution among distinct mechanical nodes in a quantum network", "abstract": "We propose two schemes to achieve remote entanglement distribution between two mechanical nodes with a significant frequency mismatch, based on optomechanical systems. The first scheme utilizes the physical mechanism to redistribute the quantum entanglement initially established in a dispersively-coupled optomechanical system with a megahertz mechanical resonance to a distant optomechanical system which embodies the tripleresonant interaction induced by the scattering of gigahertz mechanical phonon. We also provide a fast optical pulse protocol to realize the long-distance entanglement distribution from the optomechanical system supporting the gigahertz mechanical mode to the megahertz mechanical mode included in a distant optomechanical system. Specifically, these two schemes respectively demonstrate the megahertz-to-gigahertz and gigahertz-tomegahertz entanglement distribution in the quantum network of optical photons and phonons. This work may facilitate the application of various mechanical systems in hybrid quantum network-based quantum technologies and fundamental physical research.", "url": "https://arxiv.org/abs/2603.10571", "type": "理论", "summary": "我们提出了两种基于光机械系统的方案，以在频率严重失配的两个机械节点之间实现远程纠缠分布。第一个方案利用物理机制将最初在具有兆赫机械共振的色散耦合光机械系统中建立的量子纠缠重新分布到遥远的光机械系统，该系统体现了由千兆赫机械声子散射引起的三共振相互作用。我们还提供快速光脉冲协议，实现从支持千兆赫兹机械模式的光机系统到远距离光机系统中包含的兆赫兹机械模式的长距离纠缠分布。具体来说，这两个方案分别展示了光学光子和声子的量子网络中兆赫到千兆赫和千兆赫到兆赫的纠缠分布。这项工作可能会促进各种机械系统在基于混合量子网络的量子技术和基础物理研究中的应用。", "summary_source": "translation", "authors": [{"name": "Zhi-Yuan Fan"}, {"name": "Liu-Yong Cheng"}], "featured_authors": [{"name": "Zhi-Yuan Fan"}, {"name": "Liu-Yong Cheng"}], "author_count": 2}, {"id": "2603.10618", "category": "quant-ph", "title": "Topological robustness of orbital angular momentum entanglement in stochastic channels", "abstract": "Orbital angular momentum (OAM) entanglement gives access to multiple qubit and high dimensional Hilbert spaces, but is unfortunately susceptible to disturbance, decaying in real-world noisy channels. Here, we show there is an underlying topology arising from OAM entanglement that is robust to such channels, which we demonstrate using atmospheric turbulence -- exemplary of stochastic or chaotic media. Using a quantum channel with various turbulence strengths, we find the OAM topological observable preserved even though the OAM itself is shown to be highly sensitive to the turbulence. We show this is true for mixed states too, with the OAM topology intact even as the purity of the state decreases due to decoherence. Our work offers a new perspective on OAM entanglement preservation, and may easily be extended to other spatial bases, degrees of freedom, as well as complex channels, whether static or dynamic.", "url": "https://arxiv.org/abs/2603.10618", "type": "理论", "summary": "轨道角动量（OAM）纠缠可以访问多个量子位和高维希尔伯特空间，但不幸的是容易受到干扰，在现实世界的噪声通道中衰减。在这里，我们展示了由 OAM 纠缠产生的底层拓扑，该拓扑对此类通道具有鲁棒性，我们使用大气湍流（随机或混沌介质的示例）来演示这一点。使用具有不同湍流强度的量子通道，我们发现即使 OAM 本身对湍流高度敏感，OAM 拓扑可观测量仍得以保留。我们证明这对于混合状态也是如此，即使状态纯度由于退相干而降低，OAM 拓扑也完好无损。我们的工作为 OAM 纠缠保存提供了新的视角，并且可以轻松扩展到其他空间基础、自由度以及复杂的通道，无论是静态还是动态。", "summary_source": "translation", "authors": [{"name": "Tatjana Kleine"}, {"name": "Pedro Ornelas"}, {"name": "Cade Peters"}, {"name": "Zhenyu Guo"}, {"name": "Bereneice Sephton"}, {"name": "Isaac Nape"}, {"name": "Yijie Shen"}, {"name": "Andrew Forbes"}], "featured_authors": [{"name": "Tatjana Kleine"}, {"name": "Pedro Ornelas"}, {"name": "Cade Peters"}, {"name": "Isaac Nape"}, {"name": "Yijie Shen"}, {"name": "Andrew Forbes"}], "author_count": 8}, {"id": "2603.10654", "category": "quant-ph", "title": "Graph Symmetry Organizes Exceptional Dynamics in Open Quantum Systems", "abstract": "Exceptional points (EPs), indicative of parity-time (PT) symmetry breaking, play a central role in non-Hermitian physics, yet most studies begin from deliberately engineered effective Hamiltonians whose parameters are tuned to exhibit exceptional behavior. In realistic open quantum systems, however, dynamics are governed by Lindblad superoperators whose spectral structure is high-dimensional, symmetry-constrained, and not obviously reducible to minimal non-Hermitian models. A general framework for discovering exceptional dynamics directly from microscopic dissipative models has been lacking. Here we introduce a symmetry-resolved approach for identifying and characterizing exceptional points directly from the full Liouvillian generator. Correlated dissipation induces graph symmetries that decompose Liouville space into low-dimensional invariant sectors, within which minimal non-Hermitian blocks govern the onset of EPs and PT-breaking behavior. We further introduce a numerical diagnostic - the exceptional-point strength $\\mathcal{E}$ - based on eigenvector conditioning, which quantifies proximity to defective dynamics without requiring analytic reduction. Applied to tight-binding models with correlated dephasing and relaxation, the method reproduces analytically predicted exceptional seams and reveals universal scaling of $\\mathcal{E}$ near EP manifolds. More broadly, the framework enables systematic discovery of hidden exceptional structure in complex or high-dimensional open systems and is naturally compatible with matrix-free and tensor-network implementations for scalable many-body applications.", "url": "https://arxiv.org/abs/2603.10654", "type": "理论+数值", "summary": "1. 本文提出了一种基于对称性解析的理论框架，用于直接从微观耗散模型的完整Liouvillian生成元中识别与表征异常点。\n2. 其核心在于揭示了相关耗散所诱导的图对称性，该对称性将刘维尔空间分解为低维不变扇区，其中最小非厄米块主导了异常点及PT对称破缺行为的出现。\n3. 该框架为系统发掘复杂或高维开放量子系统中隐藏的异常结构提供了通用方法，并可自然地与无矩阵及张量网络算法结合，拓展至可扩展的多体系统研究。", "summary_source": "deepseek", "authors": [{"name": "Eric R. Bittner"}, {"name": "Bhavay Tyagi"}, {"name": "Kevin E. Bassler"}], "featured_authors": [{"name": "Eric R. Bittner"}, {"name": "Bhavay Tyagi"}, {"name": "Kevin E. Bassler"}], "author_count": 3}, {"id": "2603.10707", "category": "quant-ph", "title": "Hybrid Photonic Quantum Reservoir Computing for High-Dimensional Financial Surface Prediction", "abstract": "We propose a hybrid photonic quantum reservoir computing (QRC) framework for swaption surface prediction. The pipeline compresses 224-dimensional surfaces to a 20-dimensional latent space via a sparse denoising autoencoder, extracts 1,215 Fock-basis features from an ensemble of three fixed photonic reservoirs, concatenates them with a 120-dimensional classical context, and maps the resulting 1,335-dimensional feature vector to predictions with Ridge regression. We benchmark against 10 classical and quantum baselines on six held-out trading days. Our approach achieves the lowest surface RMSE of~$0.0425$ while maintaining sub-millisecond inference. The quantum layer has zero trainable parameters, sidestepping barren plateaus entirely. Variational quantum methods (VQC, Quantum LSTM) yield negative $R^{2}$ on test data, confirming that fixed quantum feature extractors paired with regularised readouts are more viable for low-data financial applications.", "url": "https://arxiv.org/abs/2603.10707", "type": "数值", "summary": "1. 该工作提出了一个用于利率互换期权曲面预测的混合光子量子储备计算框架，包含经典压缩、固定光子储备池特征提取与岭回归预测的完整流程。\n2. 其核心创新在于量子层采用零可训练参数的光子储备池，完全避免了贫瘠高原问题，并在保持亚毫秒推理速度的同时实现了最低的曲面预测误差。\n3. 这证实了固定量子特征提取器与正则化经典读出相结合的策略，对于低数据量的金融时序预测等实际应用比变分量子方法更具可行性，为量子增强的时序建模指明了实用化方向。", "summary_source": "deepseek", "authors": [{"name": "Fyodor Amanov"}, {"name": "Azamkhon Azamov"}], "featured_authors": [{"name": "Fyodor Amanov"}, {"name": "Azamkhon Azamov"}], "author_count": 2}, {"id": "2603.10839", "category": "quant-ph", "title": "Open quantum systems beyond equilibrium: Lindblad equation and path integral molecular dynamics", "abstract": "The Lindblad equation determines the time evolution of the density operator of open quantum systems. While valid for any system size, its use is, in practice, restricted to prototype/surrogate models with the aim of tackling specific aspects of the overall quantum complexity of a multi-atomic system. Path integral molecular dynamics (PIMD) instead provides static and dynamical quantum statistical averages of physical observables for systems in equilibrium composed of up to thousands of atoms over timescales up to nanoseconds, under the condition that short-time quantum coherence is not relevant for the properties of interest. PIMD relies on the well-established technique of molecular dynamics (MD) with its associated classical trajectories. However, it cannot describe a direct time evolution of a system and its convergence to a stationary state in situations out of equilibrium. In this work, we analyze the link between the Lindblad equation and PIMD; specifically, we will discuss how PIMD can actually be used to calculate the time evolution of ensemble-averaged physical observables and their convergence to a stationary state for situations out of equilibrium, bypassing the need of explicitly solving the Lindblad equation. Yet, at the same time, the Lindblad equation and PIMD are linked to one another through a formal relation of equivalence, which provides an argument for the consistency of PIMD results, namely the positivity of the density operator at any time. A numerical study of a prototype system, which is of interest in chemical physics, will be used to showcase the method.", "url": "https://arxiv.org/abs/2603.10839", "type": "理论+数值", "summary": "1. 该工作分析了Lindblad主方程与路径积分分子动力学（PIMD）之间的联系，并展示了如何利用PIMD计算非平衡态下系综平均物理可观测量随时间演化及其向稳态的收敛。\n2. 其核心在于建立了两种方法间的形式等效关系，这为PIMD计算结果的内部自洽性（特别是密度算符的长时间正定性）提供了理论依据，从而绕过了直接求解Lindblad方程的困难。\n3. 这一结果为在化学物理等领域的实际多原子系统中，利用成熟的PIMD框架研究非平衡量子动力学过程提供了新的可靠途径与理论支撑。", "summary_source": "deepseek", "authors": [{"name": "Benedikt M. Reible"}, {"name": "Somayeh Ahmadkhani"}, {"name": "Luigi Delle Site"}], "featured_authors": [{"name": "Benedikt M. Reible"}, {"name": "Somayeh Ahmadkhani"}, {"name": "Luigi Delle Site"}], "author_count": 3}, {"id": "2603.10883", "category": "quant-ph", "title": "Quantum Telepathy: A Quantum Technology with Near-Term Applications", "abstract": "Quantum telepathy is the concept of using quantum entanglement to solve real-world problems involving decision coordination between parties with restricted communication. One possible reason for this restriction is a latency constraint: some pairs of parties do not have enough time to communicate with each other before they have to produce their outputs. Example scenarios include high frequency trading and distributed systems. Another reason is isolation: for some pairs of parties, there is an obstacle to communication. Example scenarios include locating a stray traveler by a rescue team and coordination within a network where nodes are owned by competing firms. In this paper we give a concise overview of the different application areas of quantum telepathy. We find that these real-world problems can be modeled as nonlocal games or its generalizations. We also discuss possible physical implementations. Quantum telepathy guarantees a quantum advantage via Bell's theorem and can directly solve real-world problems, such as reducing risk in high frequency trading or balancing data loads efficiently in ad hoc networks. Moreover, this quantum advantage can be physically realized with existing NISQ hardware.", "url": "https://arxiv.org/abs/2603.10883", "type": "理论", "summary": "1. 本文系统综述了量子传心术在受限通信场景下的多种近现实应用，并将相关问题建模为广义非局域博弈。\n2. 其核心物理优势在于，通过贝尔定理保证的量子优势可直接用于解决实际问题，且该优势可在现有NISQ硬件上实现。\n3. 应急响应等具体应用场景的衔接提供了明确路径。", "summary_source": "deepseek", "authors": [{"name": "Dawei Ding"}, {"name": "Xinyu Xu"}], "featured_authors": [{"name": "Dawei Ding"}, {"name": "Xinyu Xu"}], "author_count": 2}, {"id": "2603.10919", "category": "quant-ph", "title": "Hybridlane: A Software Development Kit for Hybrid Continuous-Discrete Variable Quantum Computing", "abstract": "Hybrid quantum computing systems that combine discrete-variable qubits with continuous-variable qumodes offer promising advantages for quantum simulation, error correction, and sensing applications. However, existing quantum software frameworks lack native support for expressing and manipulating hybrid circuits, forcing developers to work with fragmented toolchains or rely on simulation-coupled representations that limit scalability. We present Hybridlane, an open-source software development kit providing a unified frontend for hybrid continuous-discrete variable quantum computing. Hybridlane introduces automatic wire type inference to distinguish qubits from qumodes without manual annotations, enabling compile-time validation of circuit correctness. By decoupling gate semantics from matrix representations, Hybridlane can describe wide and deep circuits with minimal memory consumption and without requiring simulation. The framework implements a comprehensive library of hybrid gates and decompositions following established instruction set architectures, while remaining compatible with PennyLane's extensive qubit algorithm library. Furthermore, it supports multiple backends including classical simulation with Bosonic Qiskit and hardware compilation to Sandia National Laboratories' QSCOUT ion trap. We demonstrate Hybridlane's capabilities through bosonic quantum phase estimation and ion trap calibration workflows.", "url": "https://arxiv.org/abs/2603.10919", "type": "数值", "summary": "将离散变量量子位与连续变量量子模式相结合的混合量子计算系统为量子模拟、纠错和传感应用提供了有希望的优势。然而，现有的量子软件框架缺乏对表达和操作混合电路的原生支持，迫使开发人员使用分散的工具链或依赖限制可扩展性的模拟耦合表示。我们推出 Hybridlane，这是一个开源软件开发套件，为混合连续离散可变量子计算提供统一的前端。 Hybridlane 引入了自动线路类型推断，无需手动注释即可区分量子位和量子模式，从而实现电路正确性的编译时验证。通过将门语义与矩阵表示解耦，Hybridlane 可以以最小的内存消耗描述宽而深的电路，并且不需要仿真。该框架按照既定的指令集架构实现了混合门和分解的综合库，同时保持与 PennyLane 广泛的量子位算法库兼容。\n\n此外，它还支持多个后端，包括使用 Bosonic Qiskit 的经典模拟以及桑迪亚国家实验室 QSCOUT 离子阱的硬件编译。我们通过玻色子量子相位估计和离子阱校准工作流程展示了 Hybridlane 的功能。", "summary_source": "translation", "authors": [{"name": "Jim Furches"}, {"name": "Timothy J. Stavenger"}, {"name": "Carlos Ortiz Marrero"}], "featured_authors": [{"name": "Jim Furches"}, {"name": "Timothy J. Stavenger"}, {"name": "Carlos Ortiz Marrero"}], "author_count": 3}, {"id": "2603.10931", "category": "quant-ph", "title": "Variational Adaptive Gaussian Decomposition: Scalable Quadrature-Free Time-Sliced Thawed Gaussian Dynamics", "abstract": "Time-slicing has emerged as a strategy for incorporating semiclassical propagation into real-time path integral formulation and recovering full quantum mechanical dynamics. A central step is the decomposition of a time-evolved wave function into a superposition of Gaussian wave packets. Here we introduce a quadrature-free variational framework for Gaussian wave packet decomposition, reformulating it as an optimization problem in which the parameters of Gaussian wave packets are chosen to maximize the overlap with the time-evolving wave function. An autoencoder-decoder neural network is used for this optimization, with the representation being adaptively reoptimized during propagation. Each wave packet in this decomposition represents a localized patch of the underlying semiclassical manifold, while retaining full correlations between all degrees of freedom. This variational adaptive Gaussian decomposition (VAGD) approach yields a compact Gaussian expansion, providing a scalable route to time-sliced semiclassical quantum dynamics. While general, applying VAGD to facilitate time-slicing of thawed Gaussian approximation (TGA) simulation allows a route to improving the semiclassical result to the full quantum mechanical result in a systematic manner.", "url": "https://arxiv.org/abs/2603.10931", "type": "数值", "summary": "1. 本文提出了一种变分自适应高斯分解（VAGD）方法，通过无积分的变分框架和自编码器-解码器神经网络，实现了对演化波函数的高斯波包分解。\n2. 该方法的核心在于将分解转化为优化问题，自适应地优化高斯波包参数以最大化与目标波函数的重叠，从而为时间切片半经典动力学提供了可扩展的途径。\n3. 此工作为系统性地改进（如解冻高斯近似等）半经典模拟结果、逼近完全量子力学解提供了明确框架，并可拓展至其他波函数演化问题。", "summary_source": "deepseek", "authors": [{"name": "Rahul Sharma"}, {"name": "Amartya Bose"}], "featured_authors": [{"name": "Rahul Sharma"}, {"name": "Amartya Bose"}], "author_count": 2}, {"id": "2603.10981", "category": "quant-ph", "title": "Permutation-invariant codes: a numerical study and qudit constructions", "abstract": "We investigate Permutation-Invariant (PI) quantum error-correcting codes encoding a logical qudit of dimension $\\mathrm{d}_\\mathrm{L}$ in PI states using physical qudits of dimension $\\mathrm{d}_\\mathrm{P}$. We extend the Knill--Laflamme (KL) conditions for $d-1$ deletion errors from qubits to qudits and investigate numerically both qubit ($\\mathrm{d}_\\mathrm{L} = \\mathrm{d}_\\mathrm{P} = 2$) and qudit ($\\mathrm{d}_\\mathrm{L} > 2$ or $\\mathrm{d}_\\mathrm{P} > 2$) PI codes. We analyze the scaling of the block length $n$ in terms of the code distance $d$, and compare to existing families of PI codes due to Ouyang, Aydin--Alekseyev--Barg (AAB) and Pollatsek--Ruskai (PR). Our three main findings are: (i) We conjecture that qubit PI codes correcting up to $d-1$ deletion errors have block length $n(d) \\geq (3d^2 + 1) / 4$, which implies an upper bound $d \\leq \\sqrt{12n-3}/3$ on their code distance, and that PR codes can saturate this bound. (ii) For qudit PI codes encoding a single qudit we numerically observe that increasing $\\mathrm{d}_\\mathrm{P}$ results in $n$ monotonically decreasing and approaching the quantum Singleton bound $n(d) \\geq 2d-1$. (iii) We propose a semi-analytic extension of the qubit AAB construction to qudits that finds explicit solutions by solving a linear program. Our results therefore provide key insights into lower bounds on the block length scaling of both qubit and qudit PI codes, and demonstrate the benefit of increased physical local dimension in the context of PI codes.", "url": "https://arxiv.org/abs/2603.10981", "type": "理论+数值", "summary": "我们研究了排列不变（PI）量子纠错码，使用维度 $\\mathrm{d}_\\mathrm{P}$ 的物理 qudits 在 PI 状态中编码维度 $\\mathrm{d}_\\mathrm{L}$ 的逻辑 qudit。我们将 $d-1$ 删除错误的 Knill--Laflamme (KL) 条件从量子位扩展到 qudits，并以数值方式研究两个量子位 ($\\mathrm{d}_\\mathrm{L} = \\mathrm{d}_\\mathrm{P} = 2$) 和 qudit ($\\mathrm{d}_\\mathrm{L} > 2$ 或$\\mathrm{d}_\\mathrm{P} > 2$) PI 代码。我们根据代码距离 $d$ 分析了块长度 $n$ 的缩放，并与 Ouyang、Aydin-Alekseyev-Barg (AAB) 和 Pollat​​sek-Ruskai (PR) 的现有 PI 代码系列进行比较。我们的三个主要发现是：（i）我们推测纠正高达 $d-1$ 删除错误的量子位 PI 代码的块长度为 $n(d) \\geq (3d^2 + 1) / 4$，这意味着其代码距离的上限 $d \\leq \\sqrt{12n-3}/3$，并且 PR 代码可以使该边界饱和。 (ii) 对于编码单个 qudit 的 qudit PI 代码，我们在数值上观察到增加 $\\mathrm{d}_\\mathrm{P}$ 会导致 $n$ 单调递减并接近量子单例边界 $n(d) \\geq 2d-1$。\n\n(iii) 我们提出将量子位 AAB 结构半解析扩展到 qudits，通过求解线性程序找到显式解。因此，我们的结果提供了对 qubit 和 qudit PI 代码的块长度缩放下限的关键见解，并证明了在 PI 代码的背景下增加物理局部维度的好处。", "summary_source": "translation", "authors": [{"name": "Liam J. Bond"}, {"name": "Jiří Minář"}, {"name": "Māris Ozols"}, {"name": "Arghavan Safavi-Naini"}, {"name": "Vladyslav Visnevskyi"}], "featured_authors": [{"name": "Liam J. Bond"}, {"name": "Jiří Minář"}, {"name": "Māris Ozols"}, {"name": "Arghavan Safavi-Naini"}, {"name": "Vladyslav Visnevskyi"}], "author_count": 5}, {"id": "2603.11014", "category": "quant-ph", "title": "Universality of Classically Trainable, Quantum-Deployed Boson-Sampling Generative Models", "abstract": "Recent work on the instantaneous quantum polynomial-time (IQP) quantum-circuit Born machine (QCBM) highlights a promising paradigm for generative modeling: train classically, deploy quantumly. In this setting, the training objective can be evaluated efficiently on a classical computer, while sampling from the resulting model may still be classically intractable. Furthermore, in the IQP-QCBM framework, extending the model family with ancillary qubits has been proven to yield universality. This paper asks whether similar results hold for linear-optical generative models. To this end, we introduce the Boson Sampling Born Machine (BSBM). Our analysis retraces analogous steps as were found for IQP-QCBMs with twists. Using recent results that enable classical approximation of broad classes of expectation values in linear optics, we show that BSBMs can be trained classically for wide families of loss functions. Next, we argue that \"basic\" BSBMs are not universal generative models, and that universality can be achieved by expanding the model while preserving efficient classical training and sampling hardness. In our approach, we introduce and analyze the role of constant-function postprocessing, generalizing the construction for IQP-QCBMs, which under suitable conditions can lead to universality while preserving the hardness of classically simulating the models. We showcase a family of BSBMs, characterized by a single hyperparameter, that allows for a monotonic increase in expressivity toward universality while retaining the capacity to represent ostensibly hard distributions. Furthermore, we discuss the possible modalities for the efficient classical training, in the sense of efficient estimation of gradients of the loss function.", "url": "https://arxiv.org/abs/2603.11014", "type": "理论+数值", "summary": "1. 该工作将“经典训练、量子部署”范式引入线性光学领域，提出了玻色采样玻恩机（BSBM）这一生成模型。\n2. 其核心在于证明了通过引入辅助光子与常数函数后处理，BSBM可在保持经典训练高效性与采样困难性的前提下，实现通用表达能力。\n3. 这为未来研究指明了方向，即需系统探索损失函数梯度的经典高效估计方案，以平衡模型表达能力与经典模拟难度。", "summary_source": "deepseek", "authors": [{"name": "Andrii Kurkin"}, {"name": "Ulysse Chabaud"}, {"name": "Zoltán Kolarovszki"}, {"name": "Bence Bakó"}, {"name": "Zoltán Zimborás"}, {"name": "Vedran Dunjko"}], "featured_authors": [{"name": "Andrii Kurkin"}, {"name": "Ulysse Chabaud"}, {"name": "Zoltán Kolarovszki"}, {"name": "Bence Bakó"}, {"name": "Zoltán Zimborás"}, {"name": "Vedran Dunjko"}], "author_count": 6}, {"id": "2603.11034", "category": "quant-ph", "title": "Quantum-to-classical correspondence in Krylov complexity", "abstract": "We study quantum-to-classical correspondence of the Krylov space for evolutions driven by unitary maps with a classical limit. This entails a proper definition of corresponding quantum and classical operators, inner products and initial states. We prove that with these definitions the purely classical Krylov space is indeed obtained as the asymptotic $\\hbar\\to 0$ expansion of the quantum Krylov space, and provide several examples of such correspondence. We use these examples to analyze some general aspects about the evolution of the Krylov complexity as they relate to the phase-space representation for the Krylov states. Additionally, we discuss alternative definitions to obtain the correspondence and why they fail. This paper constitutes a first step in understanding complexity and ergodicity of unitary evolution through the Krylov perspective as they relate to classical dynamical notions.", "url": "https://arxiv.org/abs/2603.11034", "type": "理论", "summary": "1. 该工作研究了具有经典极限的幺正演化驱动下Krylov空间的量子-经典对应性，定义了相应的量子与经典算符、内积及初始态。\n2. 严格证明了在此定义下，经典Krylov空间可作为量子Krylov空间在ℏ→0时的渐近展开得到，并通过对应对应的相位空间表示分析了Krylov复杂度的演化特性。\n3. 这为从Krylov视角理解幺正演化的复杂度与遍历性及其与经典动力学概念的联系奠定了理论基础。", "summary_source": "deepseek", "authors": [{"name": "Gastón F. Scialchi"}, {"name": "Augusto J. Roncaglia"}, {"name": "Diego A. Wisniacki"}], "featured_authors": [{"name": "Gastón F. Scialchi"}, {"name": "Augusto J. Roncaglia"}, {"name": "Diego A. Wisniacki"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese translation fallback")}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
