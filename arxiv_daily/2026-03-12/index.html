f relations between Dirac structures and spinors. It is shown under which circumstances a spinor relation gives a Courant algebroid relation and how it descends to a relation between Dirac structures. A converse to this result is proved: a T-duality relation induces a spinor relation that links the Dirac generating operators defining T-dual Courant algebroids, generalising the isomorphism of twisted cohomology associated with topological T-duality. We introduce the notion of relation between generalised complex structures and characterise their reduction. We also define relations between generalised Kähler structures, and rephrase them in terms of bi-Hermitian structures which induce T-duality relations between $\\mathcal{N}=(2,2)$ supersymmetric sigma-models. We prove existence results for T-dual structures, and demonstrate compatibility of T-duality relations with Type II supergravity equations.", "url": "https://arxiv.org/abs/2603.10819", "type": "理论", "summary": "1. 该工作发展了基于柯朗代数胚关系的理论框架，用以统一描述狄拉克结构、旋量、广义复结构及广义凯勒结构之间的关系，并将T对偶纳入此框架。\n2. 其核心在于证明了旋量关系与柯朗代数胚关系的等价性，并揭示了T对偶变换如何诱导旋量关系，从而推广了拓扑T对偶中扭曲上同调的同构。\n3. 这为统一处理超引力方程与N=(2,2)超对称sigma模型的T对偶性提供了严格数学基础，并推动了广义几何在弦理论中的应用。", "summary_source": "deepseek", "authors": [{"name": "Thomas C. De Fraja"}, {"name": "Vincenzo Emilio Marotta"}, {"name": "Richard J. Szabo"}], "featured_authors": [{"name": "Thomas C. De Fraja"}, {"name": "Vincenzo Emilio Marotta"}, {"name": "Richard J. Szabo"}], "author_count": 3}, {"id": "2603.11003", "category": "hep-th", "title": "Nucleating an Inflationary Universe: Euclidean Wormholes and their No-Boundary Limit", "abstract": "No-boundary instantons and Euclidean \"wineglass\" wormholes have both been proposed as providing suitable initial conditions for the current expanding phase of our universe, and in particular for providing conditions that are favorable to an inflationary phase. These finite action solutions have generally been regarded as unrelated, and enacting different scenarios - in one case the creation of spacetime from nothing, and in the other up-tunneling from a Euclidean Anti-de Sitter vacuum. By studying explicit solutions of both axionic and magnetic wineglass wormholes, we find that in the zero-charge limit the throat of the wormholes pinches off, leaving a no-boundary instanton that disconnects from the asymptotic Anti-de Sitter region. Thus wormholes and no-boundary instantons are part of a common family of Euclidean solutions. Along the way, we resolve the long-known puzzle that the action of wineglass wormholes can become negative. Moreover, small-charge wormholes lead to a longer inflationary phase than large-charge solutions, while no-boundary instantons dominate the probability distribution overall.", "url": "https://arxiv.org/abs/2603.11003", "type": "理论", "summary": "1. 该工作通过研究轴子与磁性的酒杯虫洞解，揭示了无边界瞬子与欧几里得虫洞同属一个解族。\n2. 零荷极限下虫洞喉部收缩并脱离渐进反德西特尔区域，同时解决了虫洞作用量为负的长期难题。\n3. 小荷虫洞可产生更长的暴胀相，而无边界瞬子在整体概率分布中占主导地位。", "summary_source": "deepseek", "authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "featured_authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "author_count": 2}, {"id": "2603.11012", "category": "hep-th", "title": "Bouncing singularities and thermal correlators on line defects", "abstract": "Thermal correlators in holographic conformal field theories are known to exhibit singularities in complex time, sometimes referred to as ``bouncing singularities\", which are believed to be related to bulk geodesics probing the black hole interior. These singularities correspond to exponentially suppressed contributions in the high-frequency limit of the thermal correlators. We revisit in detail the calculation of retarded two-point functions of local operators dual to bulk scalar fields in the planar AdS black hole background. We confirm that these correlators develop bouncing singularities, and highlight the agreement of two independent methods: a large frequency WKB analysis with infalling boundary conditions at the horizon; and an asymptotic OPE analysis that relies only on the near-boundary expansion, without any direct input from the black hole interior. We then extend these calculations to the case of the retarded two-point function of displacement operators on a Wilson line in the finite temperature gauge theory. This is computed holographically by solving the wave equation for the transverse fluctuations of the dual string worldsheet in the planar AdS black hole background. We find that these defect correlators also exhibit bouncing singularities, and again observe exact agreement between the WKB analysis sensitive to the black hole interior and the asymptotic OPE analysis. This agreement suggests that the bouncing singularities and the corresponding OPE data encode a universal high-frequency structure of the retarded correlators, and we propose a factorization formula that encodes the deviations from this universality.", "url": "https://arxiv.org/abs/2603.11012", "type": "理论", "summary": "1. 该工作重新计算了平面AdS黑洞背景下体标量场对偶算符的推迟两点函数，并推广至有限温度规范理论中Wilson线上位移算符的类似全息计算，均确认了反弹奇点的存在。\n2. 核心物理在于大频率WKB分析与仅依赖近边界展开的渐近OPE分析在体场和缺陷场情况下完全一致，表明反弹奇点编码了与黑洞内部无关的普适高频结构。\n3. 这导致了描述推迟关联函数高频普适性及偏差的因子化公式的提出，为从边界场论数据理解全息对偶中黑洞内部物理提供了新理论框架。", "summary_source": "deepseek", "authors": [{"name": "Simone Giombi"}, {"name": "Yue-Zhou Li"}, {"name": "Jieru Shan"}], "featured_authors": [{"name": "Simone Giombi"}, {"name": "Yue-Zhou Li"}, {"name": "Jieru Shan"}], "author_count": 3}, {"id": "2603.10739", "category": "math-ph", "title": "A Radon-transform-based formula for reconstructing acoustic sources from the scattered fields", "abstract": "We propose a novel indicator function for reconstructing acoustic sources from multi-frequency near-field measurements. The theoretical basis is established by a formula relating the scattered field to the source function through the Radon transform. Such a representation enables us to recover the source function directly. The efficiency and robustness of the novel indicator function are verified by several numerical examples.", "url": "https://arxiv.org/abs/2603.10739", "type": "理论", "summary": "1. 该工作提出了一种基于拉东变换的新型指示函数，用于从多频近场测量数据中重建声源分布。\n2. 其核心在于建立了散射场与源函数通过拉东变换直接关联的理论公式，实现了对源函数的直接重构。\n3. 该方法为医学超声成像、非破坏性检测等领域的声源定位问题提供了新的理论框架与数值工具。", "summary_source": "deepseek", "authors": [{"name": "Xiaodong Liu"}, {"name": "Jing Wang"}], "featured_authors": [{"name": "Xiaodong Liu"}, {"name": "Jing Wang"}], "author_count": 2}, {"id": "2603.10761", "category": "math-ph", "title": "From path integral quantization to stochastic quantization: a pedestrian's journey", "abstract": "We give two novel proofs that the path integral and stochastic quantizations of generic scalar Euclidean quantum field theories are equivalent. Our proofs rely on Taylor interpolations indexed by forests, in the fashion of constructive field theory. The first proof works at the level of individual terms in the Feynman expansion, with the forests appearing as spanning forests in Feynman graphs. The second one works at the level of the path integral and avoids the full expansion of the Feynman perturbation series.", "url": "https://arxiv.org/abs/2603.10761", "type": "理论", "summary": "1. 该工作针对一般标量欧几里得量子场论，提出了两种证明其路径积分与随机量子化等价的创新性方法。\n2. 其核心技术在于构造了以森林索引的泰勒插值，并分别从费曼图展开项层面和避免全微扰级数展开的路径积分层面实现了证明。\n3. 这揭示了场论中组合结构与随机过程之间的深刻对偶性，为构造性场论和非微扰方法的发展提供了新的解析工具与视角。", "summary_source": "deepseek", "authors": [{"name": "Dario Benedetti"}, {"name": "Ilya Chevyrev"}, {"name": "Razvan Gurau"}], "featured_authors": [{"name": "Dario Benedetti"}, {"name": "Ilya Chevyrev"}, {"name": "Razvan Gurau"}], "author_count": 3}, {"id": "2603.10946", "category": "math-ph", "title": "Hamiltonian formulation and matrix discretization for axisymmetric magnetohydrodynamics", "abstract": "Equations of ideal magnetohydrodynamics (MHD) play an important role in the studies of turbulence, astrophysics, and plasma physics. These equations possess remarkable geometric structures and symmetries. Indeed, they admit a geodesic formulation in the sense of Arnold, as a Lie--Poisson flow on the dual of an infinite-dimensional Lie algebra. Zeitlin's model, previously developed for MHD on the flat torus and the two-sphere, is a matrix approximation of MHD consistent with the underlying geometric structures. In this paper, we derive the reduced model of axially symmetric magnetohydrodynamics on the three-sphere and give its Hamiltonian formulation. We further extend finite dimensional Zeitlin's matrix model for MHD from 2D to axially symmetric 3D flows of magnetized fluids, yielding the first discrete model for 3D magnetohydrodynamics compatible with the underlying Lie--Poisson structure.", "url": "https://arxiv.org/abs/2603.10946", "type": "理论", "summary": "1. 本文推导了三维球面上轴对称磁流体动力学的约化模型并给出了其哈密顿表述。\n2. 该工作将Zeitlin的有限维矩阵模型从二维推广到三维轴对称磁化流体流动，首次得到了与底层李-泊松结构相容的三维磁流体离散模型。\n3. 该几何相容的离散模型为在球面几何中高保真模拟天体物理和等离子体物理中的湍流磁流体过程开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Michael Roop"}], "featured_authors": [{"name": "Michael Roop"}], "author_count": 1}, {"id": "2603.10191", "category": "quant-ph", "title": "Regularized Warm-Started Quantum Approximate Optimization and Conditions for Surpassing Classical Solvers on the Max-Cut Problem", "abstract": "Demonstrating quantum heuristics that outperform strong classical solvers on large-scale optimization remains an open challenge. Here we introduce Regularized Warm-Started QAOA (RWS-QAOA), which initializes qubits by minimizing expected energy with a regularizer that penalizes near-bitstring states, preventing QAOA from stalling. We further propose a protocol that yields fixed, instance-independent parameters, enabling RWS-QAOA to operate as a non-variational algorithm in which the quantum circuit parameters are fixed and only a classical warm starting step is instance-dependent. We evaluate RWS-QAOA on the Max-Cut problem for random regular graphs, where this protocol yields a constant-depth quantum circuit, across three complementary settings. First, on Quantinuum's trapped-ion processor, RWS-QAOA outperforms the classical algorithms with the best provable guarantees for Max-Cut on $3$-regular graphs, namely Goemans-Williamson and Halperin-Livnat-Zwick, on $96$-node instances. Second, tensor-network simulations on graphs with up to $N{=}10{,}000$ nodes show that depth-$6$ RWS-QAOA, achieving an average cut fraction of $0.9167$, surpasses the best classical heuristics under matched restrictions (no local-search post-processing and no iterative refinement). Third, we remove these restrictions and benchmark against the strongest unrestricted classical heuristics, including an optimized parallel Burer-Monteiro solver that improves upon the MQLib implementation. Even against this stronger baseline, we project that surface-code RWS-QAOA reaches a quantum-classical runtime crossover below $0.2$ seconds on $3{,}000$-node graphs with fewer than $1.3$ million physical qubits. Our results show that constant-depth quantum circuits combined with a classical warm start have a credible potential to surpass classical solvers on the Max-Cut problem when executed on future quantum computers.", "url": "https://arxiv.org/abs/2603.10191", "type": "理论+数值", "summary": "1. 该工作提出并系统评估了正则化热启动量子近似优化算法（RWS-QAOA）在最大割问题上的性能，包括量子硬件实验与大规模张量网络模拟。\n2. 其技术关键在于热启动中引入正则化项惩罚近比特串状态以防止算法停滞，并提出固定参数协议实现与实例无关的非变分量子电路操作。\n3. 这为常数深度量子电路结合经典预热在未来量子计算机上超越经典求解器提供了可信证据，并基于表面码架构预测了运行时间交叉点。", "summary_source": "deepseek", "authors": [{"name": "Zichang He"}, {"name": "Anuj Apte"}, {"name": "Brandon Augustino"}, {"name": "Arman Babakhani"}, {"name": "Abid Khan"}, {"name": "Sivaprasad Omanakuttan"}, {"name": "Ruslan Shaydulin"}], "featured_authors": [{"name": "Zichang He"}, {"name": "Anuj Apte"}, {"name": "Brandon Augustino"}, {"name": "Abid Khan"}, {"name": "Sivaprasad Omanakuttan"}, {"name": "Ruslan Shaydulin"}], "author_count": 7}, {"id": "2603.10206", "category": "quant-ph", "title": "Are quantum trajectories suitable for semiclassical approximations?", "abstract": "The quantum trajectories in the de Broglie-Bohm formulation of quantum mechanics depend on an additional quantum potential derived from the full wave solution of Schrödinger's equation. The task of supplying collectively all the correct quantum results strongly alters the characteristics of the corresponding classical trajectories, which underlie semiclassical approximations to the evolving wave function. Both classical and quantum trajectories are here considered to be conservative with no influence of an external environment, even though this is the source of eventual classicality in quantum systems, that is, decoherence. The concept of integrability, closely correspondent in classical and quantum mechanics, is not preserved by the quantum trajectories. General systems, in which classical chaotic motion participates, are much harder to treat semiclassically, but quantum trajectories can be chaotic even for integrable systems. This discrepancy between the character of classical and quantum trajectories in the de Broglie-Bohm interpretation does not clarify the singular classical-quantum transition.", "url": "https://arxiv.org/abs/2603.10206", "type": "理论", "summary": "1. 该论文在德布罗意-玻姆诠释的框架下，系统研究了量子轨迹是否适用于构建半经典近似。\n2. 核心发现指出，即使对于经典可积系统，量子轨迹也可能出现混沌行为，且量子势从根本上改变了轨迹特性，导致其与经典轨迹在可积性等重要性质上存在本质差异。\n3. 这一深刻矛盾揭示了德布罗意-玻姆量子轨迹与经典轨迹之间的根本鸿沟，表明该诠释框架本身并未澄清经典-量子跃迁的奇异性，为理解退相干等引发经典性的物理过程提供了关键视角。", "summary_source": "deepseek", "authors": [{"name": "Alfredo M. Ozorio de Almeida"}], "featured_authors": [{"name": "Alfredo M. Ozorio de Almeida"}], "author_count": 1}, {"id": "2603.10325", "category": "quant-ph", "title": "Geo-ADAPT-VQE: Quantum Information Metric-Aware Circuit Optimization for Quantum Chemistry", "abstract": "Adaptive ansatz construction has emerged as a powerful technique for reducing circuit depth and improving optimization efficiency in variational quantum eigensolvers. However, existing adaptive methods, including ADAPT-VQE, rely solely on first-order gradients and therefore ignore the underlying geometry of the quantum state space, limiting both convergence behavior and operator-selection efficiency. We introduce Geo-ADAPT-VQE, a geometry-aware adaptive VQE algorithm that selects operators from a pool using the natural gradient rule. The geometric operator-selection rule enables the ansatz to grow along directions aligned with the underlying quantum-state geometry, thereby improving convergence and reducing the algorithm's susceptibility to shallow local minima and saddle-point regions. We further provide an asymptotic convergence result. We present numerical simulations involving five molecules, which demonstrate that Geo-ADAPT-VQE achieves faster and more stable convergence compared to existing methods, while producing significantly shorter ansatz. In particular, Geo-ADAPT achieves up to 100-fold reduction in energy error compared to existing methods.", "url": "https://arxiv.org/abs/2603.10325", "type": "理论+数值", "summary": "1. 本文提出了Geo-ADAPT-VQE，一种基于量子信息度量感知的自适应变分量子本征求解算法，用于优化量子化学计算中的电路构建。\n2. 其核心技术在于采用自然梯度规则从算符池中选择算符，使ansatz沿量子态空间的几何结构扩展，从而提升收敛速度、稳定性并减少对浅层局部极值和鞍点区域的敏感性。\n3. 数值模拟针对五个分子体系显示，该算法能实现高达100倍的能量误差降低、更快的收敛和更短的ansatz，其渐近收敛性结果为量子变分算法的几何优化提供了理论依据与实用启发。", "summary_source": "deepseek", "authors": [{"name": "Mohammad Aamir Sohail"}, {"name": "Toshiaki Koike-Akino"}], "featured_authors": [{"name": "Mohammad Aamir Sohail"}, {"name": "Toshiaki Koike-Akino"}], "author_count": 2}, {"id": "2603.10415", "category": "quant-ph", "title": "Tight Quantum Speed Limit for Ergotropy Charging in the N-Qubit Dicke Battery", "abstract": "We derive and analytically prove a tight quantum speed limit (QSL) for ergotropy charging in the $N$-qubit Dicke quantum battery: the first-passage time to normalised ergotropy $\\epsilon$ satisfies $\\tau^{*}(\\epsilon) \\geq \\sqrt{N\\epsilon}/(2\\lambda\\sqrt{\\bar{n}})$, where $\\lambda$ is the coupling and $\\bar{n}$ is the mean charger photon number. The bound follows from an exact perturbative identity $\\epsilon(t) = A\\lambda^2\\bar{n}t^2 + \\mathcal{O}((\\lambda t)^4)$, where $A=4/N$ is the short-time ergotropy coefficient, combined with a global upper bound proved analytically for all $N$. The composite parameter $\\Gamma_N = 2\\lambda\\sqrt{\\bar{n}/N}$ is the unique figure of merit for charging speed; all protocols collapse onto $\\Gamma_N \\tau^{*} \\geq \\sqrt{\\epsilon}$, with the bound saturated to within 1% at small $\\epsilon$.", "url": "https://arxiv.org/abs/2603.10415", "type": "理论", "summary": "1. 该工作针对N量子比特Dicke量子电池，推导并解析证明了一个紧致的做功量充电量子速度极限。\n2. 其关键在于结合了短时做功系数A=4/N的微扰恒等式与全局上界，揭示出充电速度的唯一品质因子Γ_N = 2λ√(n̄/N)。\n3. 这为评估不同量子电池协议的极限性能提供了普适基准，并暗示了多体系统中能量传输的基本约束。", "summary_source": "deepseek", "authors": [{"name": "Anass Jad"}, {"name": "Abderrahim El Allati"}], "featured_authors": [{"name": "Anass Jad"}, {"name": "Abderrahim El Allati"}], "author_count": 2}, {"id": "2603.10431", "category": "quant-ph", "title": "Coherence thermometry using multipartite quantum systems", "abstract": "We investigate, how finite temperature influences quantum coherence in multipartite open systems by analyzing a tripartite spin boson model subjected to non-Markovian dephasing. Two distinct environmental configurations are considered viz. independent local reservoir and a common structured reservoir characterized by an Ohmic spectral density. In this framework, temperature enters explicitly through the time dependent dephasing rates, enabling a systematic exploration of thermal effects on coherence dynamics. Using the relative entropy of coherence, we examine representative pure states belonging to inequivalent entanglement classes along with physically relevant mixed states constructed from them. Under local non-Markovian dephasing, all states exhibit monotonic coherence decay, with temperature acting as a universal accelerator of decoherence. In contrast, the common reservoir scenario reveals a strikingly non-universal behaviour. While $GHZ$ and $Star$ type states undergo temperature enhanced degradation, $W$ class states and certain Werner type mixtures display robust stationary coherence that remains largely insensitive to thermal fluctuations. These results demonstrate that the thermal susceptibility of coherence is governed not only by environmental configuration but also by the internal architecture of multipartite quantum states. The interplay between reservoir structure and state geometry leads to qualitatively distinct dynamical regimes ranging from rapid thermal fragility to temperature resilient coherence preservation. Our findings identify coherence dynamics as a sensitive probe of structured finite temperature environments and suggest a pathway toward coherence based quantum thermometry and nanoscale calorimetry using engineered multipartite states.", "url": "https://arxiv.org/abs/2603.10431", "type": "理论", "summary": "1. 该工作通过分析受非马尔可夫退相影响的三体自旋-玻色子模型，研究了有限温度如何影响多体开放系统的量子相干性。\n2. 其核心发现是，在共享结构环境中，相干性的热敏感性呈现非普适行为：GHZ与星型态快速退相干，而W类态及部分Werner混合态能保持对热涨落稳健的稳态相干。\n3. 这揭示了储层结构与多体态几何构型的相互作用可产生从热脆弱到热鲁棒的不同动力学区，为基于工程化多体态的相干量子测温学提供了明确路径。", "summary_source": "deepseek", "authors": [{"name": "Pranav Perumalsamy"}, {"name": "Abhijit Mandal"}, {"name": "Sovik Roy"}, {"name": "Md Manirul Ali"}], "featured_authors": [{"name": "Pranav Perumalsamy"}, {"name": "Abhijit Mandal"}, {"name": "Sovik Roy"}, {"name": "Md Manirul Ali"}], "author_count": 4}, {"id": "2603.10518", "category": "quant-ph", "title": "Airfoil shape optimization via coherent Ising machine", "abstract": "Airfoil shape optimization presents a challenge where classical solvers frequently struggle with computational efficiency and local minima. In the promising paradigm of quantum computing, the coherent Ising machine (CIM), a specialized physical solver, offers acceleration capabilities. However, its native discrete binary architecture restricts the application in aerodynamic design. To bridge this gap, we propose a comprehensive framework that translates airfoil shape optimization into hardware-compliant quadratic unconstrained binary optimization formulations. We integrate high-order response surface models via the Rosenberg order reduction, enabling the CIM to capture strong nonlinearities in the aerodynamic performance response. Furthermore, we introduce a block-diagonal scalarization strategy that compose trade-off scenarios into a single optimization. Validated on the NACA 4-digit airfoil series using CIM hardware with 615 spins, the framework successfully locates the global optimum with a computational speedup of three orders of magnitude compared to the classical simulated annealing. The parallel embedding capacity allows for the extraction of an entire optimal Pareto front in a single hardware execution. This work demonstrates a viable, quantum-enhanced paradigm for engineering optimization.", "url": "https://arxiv.org/abs/2603.10518", "type": "理论+数值", "summary": "1. 本研究提出了一个将翼型形状优化问题转化为硬件兼容的二次无约束二进制优化（QUBO）形式的综合框架，使其能够在相干伊辛机（CIM）上执行。\n2. 其核心创新在于通过Rosenberg阶次约简集成高阶响应面模型以捕捉强非线性气动响应，并引入块对角标量化策略将多目标权衡场景纳入单次优化。\n3. 这为利用CIM等专用物理处理器高效解决包含复杂约束与非线性的更广泛物理与工程优化问题开辟了一条切实可行的路径。", "summary_source": "deepseek", "authors": [{"name": "Hao Ni"}, {"name": "Qi Gao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "featured_authors": [{"name": "Hao Ni"}, {"name": "Qi Gao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "author_count": 4}, {"id": "2603.10571", "category": "quant-ph", "title": "Entanglement distribution among distinct mechanical nodes in a quantum network", "abstract": "We propose two schemes to achieve remote entanglement distribution between two mechanical nodes with a significant frequency mismatch, based on optomechanical systems. The first scheme utilizes the physical mechanism to redistribute the quantum entanglement initially established in a dispersively-coupled optomechanical system with a megahertz mechanical resonance to a distant optomechanical system which embodies the tripleresonant interaction induced by the scattering of gigahertz mechanical phonon. We also provide a fast optical pulse protocol to realize the long-distance entanglement distribution from the optomechanical system supporting the gigahertz mechanical mode to the megahertz mechanical mode included in a distant optomechanical system. Specifically, these two schemes respectively demonstrate the megahertz-to-gigahertz and gigahertz-tomegahertz entanglement distribution in the quantum network of optical photons and phonons. This work may facilitate the application of various mechanical systems in hybrid quantum network-based quantum technologies and fundamental physical research.", "url": "https://arxiv.org/abs/2603.10571", "type": "理论", "summary": "1. 该工作提出了两种基于光力学系统的方案，用于实现频率显著失谐的两个力学节点间的远程纠缠分发。\n2. 其技术核心在于利用色散耦合建立初始纠缠，并通过高频声子散射诱导的三共振相互作用或快速光学脉冲协议实现纠缠的定向转移。\n3. 这为在混合量子网络中集成不同频率特性的力学系统，应用于量子技术与基础物理研究开辟了路径。", "summary_source": "deepseek", "authors": [{"name": "Zhi-Yuan Fan"}, {"name": "Liu-Yong Cheng"}], "featured_authors": [{"name": "Zhi-Yuan Fan"}, {"name": "Liu-Yong Cheng"}], "author_count": 2}, {"id": "2603.10618", "category": "quant-ph", "title": "Topological robustness of orbital angular momentum entanglement in stochastic channels", "abstract": "Orbital angular momentum (OAM) entanglement gives access to multiple qubit and high dimensional Hilbert spaces, but is unfortunately susceptible to disturbance, decaying in real-world noisy channels. Here, we show there is an underlying topology arising from OAM entanglement that is robust to such channels, which we demonstrate using atmospheric turbulence -- exemplary of stochastic or chaotic media. Using a quantum channel with various turbulence strengths, we find the OAM topological observable preserved even though the OAM itself is shown to be highly sensitive to the turbulence. We show this is true for mixed states too, with the OAM topology intact even as the purity of the state decreases due to decoherence. Our work offers a new perspective on OAM entanglement preservation, and may easily be extended to other spatial bases, degrees of freedom, as well as complex channels, whether static or dynamic.", "url": "https://arxiv.org/abs/2603.10618", "type": "理论", "summary": "1. 该工作实验演示了轨道角动量纠缠在大气湍流等随机信道中具有鲁棒的拓扑不变性。\n2. 其关键在于揭示了轨道角动量本身的灵敏度与拓扑观测量在退相干下的稳定性可分离。\n3. 这为利用拓扑方法保护高维空间纠缠及扩展至其他自由度与复杂信道提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "Tatjana Kleine"}, {"name": "Pedro Ornelas"}, {"name": "Cade Peters"}, {"name": "Zhenyu Guo"}, {"name": "Bereneice Sephton"}, {"name": "Isaac Nape"}, {"name": "Yijie Shen"}, {"name": "Andrew Forbes"}], "featured_authors": [{"name": "Tatjana Kleine"}, {"name": "Pedro Ornelas"}, {"name": "Cade Peters"}, {"name": "Isaac Nape"}, {"name": "Yijie Shen"}, {"name": "Andrew Forbes"}], "author_count": 8}, {"id": "2603.10654", "category": "quant-ph", "title": "Graph Symmetry Organizes Exceptional Dynamics in Open Quantum Systems", "abstract": "Exceptional points (EPs), indicative of parity-time (PT) symmetry breaking, play a central role in non-Hermitian physics, yet most studies begin from deliberately engineered effective Hamiltonians whose parameters are tuned to exhibit exceptional behavior. In realistic open quantum systems, however, dynamics are governed by Lindblad superoperators whose spectral structure is high-dimensional, symmetry-constrained, and not obviously reducible to minimal non-Hermitian models. A general framework for discovering exceptional dynamics directly from microscopic dissipative models has been lacking. Here we introduce a symmetry-resolved approach for identifying and characterizing exceptional points directly from the full Liouvillian generator. Correlated dissipation induces graph symmetries that decompose Liouville space into low-dimensional invariant sectors, within which minimal non-Hermitian blocks govern the onset of EPs and PT-breaking behavior. We further introduce a numerical diagnostic - the exceptional-point strength $\\mathcal{E}$ - based on eigenvector conditioning, which quantifies proximity to defective dynamics without requiring analytic reduction. Applied to tight-binding models with correlated dephasing and relaxation, the method reproduces analytically predicted exceptional seams and reveals universal scaling of $\\mathcal{E}$ near EP manifolds. More broadly, the framework enables systematic discovery of hidden exceptional structure in complex or high-dimensional open systems and is naturally compatible with matrix-free and tensor-network implementations for scalable many-body applications.", "url": "https://arxiv.org/abs/2603.10654", "type": "理论+数值", "summary": "1. 该工作发展了一个基于图对称性的理论框架，用于直接从开放量子系统的完整Liouvillian生成元中识别和表征异常点动力学，避免了传统方法对简化有效哈密顿量的依赖。\n2. 其技术核心在于利用相关耗散诱导的对称性将高维刘维尔空间分解为低维不变子空间，使异常行为由子空间内的最小非厄米块支配，并引入基于特征向量条件化的异常点强度$\\mathcal{E}$作为无需解析简化的数值诊断工具，量化了接近缺陷动力学的程度。\n3. 这一框架为在复杂或高维耗散系统中系统性地发现隐藏异常结构提供了通用方法，其与无矩阵和张量网络实现的自然兼容性，为可扩展多体开放量子模拟的理论与数值研究开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Eric R. Bittner"}, {"name": "Bhavay Tyagi"}, {"name": "Kevin E. Bassler"}], "featured_authors": [{"name": "Eric R. Bittner"}, {"name": "Bhavay Tyagi"}, {"name": "Kevin E. Bassler"}], "author_count": 3}, {"id": "2603.10707", "category": "quant-ph", "title": "Hybrid Photonic Quantum Reservoir Computing for High-Dimensional Financial Surface Prediction", "abstract": "We propose a hybrid photonic quantum reservoir computing (QRC) framework for swaption surface prediction. The pipeline compresses 224-dimensional surfaces to a 20-dimensional latent space via a sparse denoising autoencoder, extracts 1,215 Fock-basis features from an ensemble of three fixed photonic reservoirs, concatenates them with a 120-dimensional classical context, and maps the resulting 1,335-dimensional feature vector to predictions with Ridge regression. We benchmark against 10 classical and quantum baselines on six held-out trading days. Our approach achieves the lowest surface RMSE of~$0.0425$ while maintaining sub-millisecond inference. The quantum layer has zero trainable parameters, sidestepping barren plateaus entirely. Variational quantum methods (VQC, Quantum LSTM) yield negative $R^{2}$ on test data, confirming that fixed quantum feature extractors paired with regularised readouts are more viable for low-data financial applications.", "url": "https://arxiv.org/abs/2603.10707", "type": "数值", "summary": "1. 该工作提出了一种混合光子量子储层计算框架，用于高维度金融互换期权曲面的预测。\n2. 其技术核心在于采用零可训练参数的固定光子储层提取量子特征，完全避免了贫瘠高原问题，并与经典上下文特征结合后通过岭回归实现预测。\n3. 这为低数据量的金融应用指明了一条可行的量子增强路径，因为相比而言，变分量子方法在测试中出现了负R²值。", "summary_source": "deepseek", "authors": [{"name": "Fyodor Amanov"}, {"name": "Azamkhon Azamov"}], "featured_authors": [{"name": "Fyodor Amanov"}, {"name": "Azamkhon Azamov"}], "author_count": 2}, {"id": "2603.10839", "category": "quant-ph", "title": "Open quantum systems beyond equilibrium: Lindblad equation and path integral molecular dynamics", "abstract": "The Lindblad equation determines the time evolution of the density operator of open quantum systems. While valid for any system size, its use is, in practice, restricted to prototype/surrogate models with the aim of tackling specific aspects of the overall quantum complexity of a multi-atomic system. Path integral molecular dynamics (PIMD) instead provides static and dynamical quantum statistical averages of physical observables for systems in equilibrium composed of up to thousands of atoms over timescales up to nanoseconds, under the condition that short-time quantum coherence is not relevant for the properties of interest. PIMD relies on the well-established technique of molecular dynamics (MD) with its associated classical trajectories. However, it cannot describe a direct time evolution of a system and its convergence to a stationary state in situations out of equilibrium. In this work, we analyze the link between the Lindblad equation and PIMD; specifically, we will discuss how PIMD can actually be used to calculate the time evolution of ensemble-averaged physical observables and their convergence to a stationary state for situations out of equilibrium, bypassing the need of explicitly solving the Lindblad equation. Yet, at the same time, the Lindblad equation and PIMD are linked to one another through a formal relation of equivalence, which provides an argument for the consistency of PIMD results, namely the positivity of the density operator at any time. A numerical study of a prototype system, which is of interest in chemical physics, will be used to showcase the method.", "url": "https://arxiv.org/abs/2603.10839", "type": "理论+数值", "summary": "1. 该工作分析了开放量子系统非平衡动力学的林德布拉德方程与路径积分分子动力学（PIMD）之间的理论联系。\n2. 研究的关键在于建立了二者间的形式等效关系，使得PIMD能够绕开直接求解主方程，计算系综平均物理量的时间演化及其向稳态的收敛，同时确保密度算符的正定性。\n3. 这为将PIMD的适用性从平衡态扩展到非平衡态、处理更大实际体系的开量子动力学问题提供了严格依据和可行途径。", "summary_source": "deepseek", "authors": [{"name": "Benedikt M. Reible"}, {"name": "Somayeh Ahmadkhani"}, {"name": "Luigi Delle Site"}], "featured_authors": [{"name": "Benedikt M. Reible"}, {"name": "Somayeh Ahmadkhani"}, {"name": "Luigi Delle Site"}], "author_count": 3}, {"id": "2603.10883", "category": "quant-ph", "title": "Quantum Telepathy: A Quantum Technology with Near-Term Applications", "abstract": "Quantum telepathy is the concept of using quantum entanglement to solve real-world problems involving decision coordination between parties with restricted communication. One possible reason for this restriction is a latency constraint: some pairs of parties do not have enough time to communicate with each other before they have to produce their outputs. Example scenarios include high frequency trading and distributed systems. Another reason is isolation: for some pairs of parties, there is an obstacle to communication. Example scenarios include locating a stray traveler by a rescue team and coordination within a network where nodes are owned by competing firms. In this paper we give a concise overview of the different application areas of quantum telepathy. We find that these real-world problems can be modeled as nonlocal games or its generalizations. We also discuss possible physical implementations. Quantum telepathy guarantees a quantum advantage via Bell's theorem and can directly solve real-world problems, such as reducing risk in high frequency trading or balancing data loads efficiently in ad hoc networks. Moreover, this quantum advantage can be physically realized with existing NISQ hardware.", "url": "https://arxiv.org/abs/2603.10883", "type": "理论", "summary": "1. 该论文系统综述了量子心灵感应在不同现实场景中的应用，将其建模为非局域博弈及其推广形式，并探讨了可能的物理实现方案。\n2. 其核心在于通过贝尔定理保证的量子优势可直接解决高频交易风险控制、自组织网络负载均衡等实际问题，且该优势可利用现有NISQ硬件实现。\n3. 这为在通信受限的分布式系统中，将非局域博弈理论框架与近量子器件相结合以解决协同决策问题，提供了明确的技术路径。", "summary_source": "deepseek", "authors": [{"name": "Dawei Ding"}, {"name": "Xinyu Xu"}], "featured_authors": [{"name": "Dawei Ding"}, {"name": "Xinyu Xu"}], "author_count": 2}, {"id": "2603.10919", "category": "quant-ph", "title": "Hybridlane: A Software Development Kit for Hybrid Continuous-Discrete Variable Quantum Computing", "abstract": "Hybrid quantum computing systems that combine discrete-variable qubits with continuous-variable qumodes offer promising advantages for quantum simulation, error correction, and sensing applications. However, existing quantum software frameworks lack native support for expressing and manipulating hybrid circuits, forcing developers to work with fragmented toolchains or rely on simulation-coupled representations that limit scalability. We present Hybridlane, an open-source software development kit providing a unified frontend for hybrid continuous-discrete variable quantum computing. Hybridlane introduces automatic wire type inference to distinguish qubits from qumodes without manual annotations, enabling compile-time validation of circuit correctness. By decoupling gate semantics from matrix representations, Hybridlane can describe wide and deep circuits with minimal memory consumption and without requiring simulation. The framework implements a comprehensive library of hybrid gates and decompositions following established instruction set architectures, while remaining compatible with PennyLane's extensive qubit algorithm library. Furthermore, it supports multiple backends including classical simulation with Bosonic Qiskit and hardware compilation to Sandia National Laboratories' QSCOUT ion trap. We demonstrate Hybridlane's capabilities through bosonic quantum phase estimation and ion trap calibration workflows.", "url": "https://arxiv.org/abs/2603.10919", "type": "数值", "summary": "1. 该工作提出了一个用于混合连续-离散变量量子计算的开源软件开发工具包Hybridlane，提供了统一的编程前端。\n2. 其技术核心在于实现了自动线路类型推断以区分量子比特与量子模式，并通过将门语义与矩阵表示解耦，实现了对宽深混合电路的高效、低内存描述。\n3. 这为跨量子计算平台（如离子阱）的混合算法开发与验证提供了实用工具，有望推动相关量子模拟与传感应用的实际探索。", "summary_source": "deepseek", "authors": [{"name": "Jim Furches"}, {"name": "Timothy J. Stavenger"}, {"name": "Carlos Ortiz Marrero"}], "featured_authors": [{"name": "Jim Furches"}, {"name": "Timothy J. Stavenger"}, {"name": "Carlos Ortiz Marrero"}], "author_count": 3}, {"id": "2603.10931", "category": "quant-ph", "title": "Variational Adaptive Gaussian Decomposition: Scalable Quadrature-Free Time-Sliced Thawed Gaussian Dynamics", "abstract": "Time-slicing has emerged as a strategy for incorporating semiclassical propagation into real-time path integral formulation and recovering full quantum mechanical dynamics. A central step is the decomposition of a time-evolved wave function into a superposition of Gaussian wave packets. Here we introduce a quadrature-free variational framework for Gaussian wave packet decomposition, reformulating it as an optimization problem in which the parameters of Gaussian wave packets are chosen to maximize the overlap with the time-evolving wave function. An autoencoder-decoder neural network is used for this optimization, with the representation being adaptively reoptimized during propagation. Each wave packet in this decomposition represents a localized patch of the underlying semiclassical manifold, while retaining full correlations between all degrees of freedom. This variational adaptive Gaussian decomposition (VAGD) approach yields a compact Gaussian expansion, providing a scalable route to time-sliced semiclassical quantum dynamics. While general, applying VAGD to facilitate time-slicing of thawed Gaussian approximation (TGA) simulation allows a route to improving the semiclassical result to the full quantum mechanical result in a systematic manner.", "url": "https://arxiv.org/abs/2603.10931", "type": "数值", "summary": "1. 本工作提出了变分自适应高斯分解方法，为含时切片融化高斯动力学提供了一种无需数值积分的、可扩展的框架。\n2. 其核心技术在于利用自编码器-解码器神经网络，通过变分优化最大化与演化波函数的重叠，实现了高斯波包参数的动态自适应重优化。\n3. 该方法为系统性地将融化高斯近似等半经典结果提升至全量子结果指明了一条可扩展的路径，并为相关动力学模拟提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Rahul Sharma"}, {"name": "Amartya Bose"}], "featured_authors": [{"name": "Rahul Sharma"}, {"name": "Amartya Bose"}], "author_count": 2}, {"id": "2603.10981", "category": "quant-ph", "title": "Permutation-invariant codes: a numerical study and qudit constructions", "abstract": "We investigate Permutation-Invariant (PI) quantum error-correcting codes encoding a logical qudit of dimension $\\mathrm{d}_\\mathrm{L}$ in PI states using physical qudits of dimension $\\mathrm{d}_\\mathrm{P}$. We extend the Knill--Laflamme (KL) conditions for $d-1$ deletion errors from qubits to qudits and investigate numerically both qubit ($\\mathrm{d}_\\mathrm{L} = \\mathrm{d}_\\mathrm{P} = 2$) and qudit ($\\mathrm{d}_\\mathrm{L} > 2$ or $\\mathrm{d}_\\mathrm{P} > 2$) PI codes. We analyze the scaling of the block length $n$ in terms of the code distance $d$, and compare to existing families of PI codes due to Ouyang, Aydin--Alekseyev--Barg (AAB) and Pollatsek--Ruskai (PR). Our three main findings are: (i) We conjecture that qubit PI codes correcting up to $d-1$ deletion errors have block length $n(d) \\geq (3d^2 + 1) / 4$, which implies an upper bound $d \\leq \\sqrt{12n-3}/3$ on their code distance, and that PR codes can saturate this bound. (ii) For qudit PI codes encoding a single qudit we numerically observe that increasing $\\mathrm{d}_\\mathrm{P}$ results in $n$ monotonically decreasing and approaching the quantum Singleton bound $n(d) \\geq 2d-1$. (iii) We propose a semi-analytic extension of the qubit AAB construction to qudits that finds explicit solutions by solving a linear program. Our results therefore provide key insights into lower bounds on the block length scaling of both qubit and qudit PI codes, and demonstrate the benefit of increased physical local dimension in the context of PI codes.", "url": "https://arxiv.org/abs/2603.10981", "type": "理论+数值", "summary": "1. 该研究系统地探讨了编码单逻辑qudit的置换不变量子纠错码，通过将Knill-Laflamme条件推广至qudit情形，并对qubit与qudit码进行了数值分析。\n2. 核心发现包括：推测qubit码的块长度下界n(d) ≥ (3d²+1)/4，以及数值证明增加物理维度d_P可使块长度单调下降并趋向量子Singleton界。\n3. 这些结果为优化置换不变码的构造提供了新途径，特别是物理维度增加带来的优势以及所提出的半解析扩展方法，为未来码的设计与理论界限研究奠定了重要基础。", "summary_source": "deepseek", "authors": [{"name": "Liam J. Bond"}, {"name": "Jiří Minář"}, {"name": "Māris Ozols"}, {"name": "Arghavan Safavi-Naini"}, {"name": "Vladyslav Visnevskyi"}], "featured_authors": [{"name": "Liam J. Bond"}, {"name": "Jiří Minář"}, {"name": "Māris Ozols"}, {"name": "Arghavan Safavi-Naini"}, {"name": "Vladyslav Visnevskyi"}], "author_count": 5}, {"id": "2603.11014", "category": "quant-ph", "title": "Universality of Classically Trainable, Quantum-Deployed Boson-Sampling Generative Models", "abstract": "Recent work on the instantaneous quantum polynomial-time (IQP) quantum-circuit Born machine (QCBM) highlights a promising paradigm for generative modeling: train classically, deploy quantumly. In this setting, the training objective can be evaluated efficiently on a classical computer, while sampling from the resulting model may still be classically intractable. Furthermore, in the IQP-QCBM framework, extending the model family with ancillary qubits has been proven to yield universality. This paper asks whether similar results hold for linear-optical generative models. To this end, we introduce the Boson Sampling Born Machine (BSBM). Our analysis retraces analogous steps as were found for IQP-QCBMs with twists. Using recent results that enable classical approximation of broad classes of expectation values in linear optics, we show that BSBMs can be trained classically for wide families of loss functions. Next, we argue that \"basic\" BSBMs are not universal generative models, and that universality can be achieved by expanding the model while preserving efficient classical training and sampling hardness. In our approach, we introduce and analyze the role of constant-function postprocessing, generalizing the construction for IQP-QCBMs, which under suitable conditions can lead to universality while preserving the hardness of classically simulating the models. We showcase a family of BSBMs, characterized by a single hyperparameter, that allows for a monotonic increase in expressivity toward universality while retaining the capacity to represent ostensibly hard distributions. Furthermore, we discuss the possible modalities for the efficient classical training, in the sense of efficient estimation of gradients of the loss function.", "url": "https://arxiv.org/abs/2603.11014", "type": "理论+数值", "summary": "1. 该论文针对线性光学生成模型，引入了玻色采样波恩机（BSBM），并系统探究了其是否能够实现类似IQP-QCBM的经典可训练性与量子部署范式下的普适性。\n2. 通过利用线性光学中期望值经典近似的最新成果，证明了BSBMs可在广泛损失函数下高效训练；并借助常数函数后处理扩展模型，在保持采样经典模拟困难的同时实现普适性，且表达能力可通过单一超参数单调提升。\n3. 这为量子机器学习中经典-量子混合训练框架提供了理论实例，可能推动线性光学平台在生成任务中的应用及相关算法与实验的后续研究。", "summary_source": "deepseek", "authors": [{"name": "Andrii Kurkin"}, {"name": "Ulysse Chabaud"}, {"name": "Zoltán Kolarovszki"}, {"name": "Bence Bakó"}, {"name": "Zoltán Zimborás"}, {"name": "Vedran Dunjko"}], "featured_authors": [{"name": "Andrii Kurkin"}, {"name": "Ulysse Chabaud"}, {"name": "Zoltán Kolarovszki"}, {"name": "Bence Bakó"}, {"name": "Zoltán Zimborás"}, {"name": "Vedran Dunjko"}], "author_count": 6}, {"id": "2603.11034", "category": "quant-ph", "title": "Quantum-to-classical correspondence in Krylov complexity", "abstract": "We study quantum-to-classical correspondence of the Krylov space for evolutions driven by unitary maps with a classical limit. This entails a proper definition of corresponding quantum and classical operators, inner products and initial states. We prove that with these definitions the purely classical Krylov space is indeed obtained as the asymptotic $\\hbar\\to 0$ expansion of the quantum Krylov space, and provide several examples of such correspondence. We use these examples to analyze some general aspects about the evolution of the Krylov complexity as they relate to the phase-space representation for the Krylov states. Additionally, we discuss alternative definitions to obtain the correspondence and why they fail. This paper constitutes a first step in understanding complexity and ergodicity of unitary evolution through the Krylov perspective as they relate to classical dynamical notions.", "url": "https://arxiv.org/abs/2603.11034", "type": "理论", "summary": "1. 本文建立了具有经典极限的幺正演化下Krylov空间的量子-经典对应理论，并证明经典Krylov空间可作为量子情形的渐近展开。\n2. 通过精确定义对应算符、内积与初态，揭示了相空间表示中Krylov复杂度演化的普适特征，并分析了其他定义失效的原因。\n3. 这为从Krylov视角理解幺正演化的复杂性与遍历性提供了新范式，为连接经典动力学概念与量子混沌研究开辟了路径。", "summary_source": "deepseek", "authors": [{"name": "Gastón F. Scialchi"}, {"name": "Augusto J. Roncaglia"}, {"name": "Diego A. Wisniacki"}], "featured_authors": [{"name": "Gastón F. Scialchi"}, {"name": "Augusto J. Roncaglia"}, {"name": "Diego A. Wisniacki"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
