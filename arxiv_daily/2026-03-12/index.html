<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>arXiv 2026-03-12 · Daily ArXiv Selection</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>
</head>

        页面主体优先展示 DeepSeek reasoner 生成的三句话中文总结；若 API 不可用或返回异常，则回退为英文摘要的完整中文翻译；下拉可以查看英文原版摘要。

  <script>
    const papers = [{"id": "2603.10121", "category": "cond-mat", "title": "A unifying framework for sum rules and bounds on optical, thermoelectric and thermal transport from quantum geometry", "abstract": "We present a geometric formulation of optical, thermoelectric, and thermal linear response in clean, zero temperature band insulators based on a single object: a generalized time-dependent quantum geometric tensor (g-tQGT) built from correlations of projected particle and heat polarization operators. Within this framework, the AC transport tensors admit compact expressions that make their geometric content explicit. The response splits into a Berry curvature contribution that remains finite in the DC limit and a frequency correction governed by the quantum metric, implying geometry driven effects even in topologically trivial insulators. At equal times, the g-tQGT recovers the usual integrated QGT and yields energy-weighted thermal analogs whose antisymmetric parts are fixed by orbital and heat magnetization. Importantly, in the thermal channel, a thermal quantum geometric tensor is obtained. Casting the theory in a Hilbert-Schmidt inner product form yields a bound on the trace of the thermal QGT, an uncertainty relation on the projected polarization operators and a purely geometric upper bound on the finite-time accumulated response. The latter is used in the optical channel to derive a geometric upper bound on the electric current. Finally, time derivatives of the g-tQGT are used to generate a hierarchy of generalized thermoelectric and thermal sum rules, and bounds on these sum rules are obtained. These bounds are used to find inequalities between different physical objects such as the optical mass, susceptibility functions and magnetizations.", "url": "https://arxiv.org/abs/2603.10121", "type": "理论+数值", "summary": "1. 该工作基于广义时间依赖量子几何张量，构建了清洁零温带绝缘体中光学、热电及热线性响应的统一几何框架。\n2. 其核心在于将响应分解为直流极限下有限的Berry曲率贡献与由量子度规主导的频率修正，并推导出热量子几何张量的迹上限。\n3. 这通过时间导数生成广义热电与热求和规则体系，为推导光学质量、磁化率等物理量之间的不等式提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "M. Nabil Y. Lhachemi"}, {"name": "Jennifer Cano"}], "featured_authors": [{"name": "M. Nabil Y. Lhachemi"}, {"name": "Jennifer Cano"}], "author_count": 2}, {"id": "2603.10127", "category": "cond-mat", "title": "ALD Oxidant as A Tuning Knob for Memory Window Expansion in Ferroelectric FETs for Vertical NAND Applications", "abstract": "Dielectric inserts are widely used to expand the memory window (MW) in ferroelectric FETs (FeFETs) for vertical NAND applications, with prior efforts focused primarily on material selection and stack positioning. Here, we demonstrate that the ALD oxidant used for the Al2O3 interlayer serves as a process-level tuning knob for MW engineering. H2O-grown Al2O3 yields a significantly larger MW (7-8 V) compared to O3 (4 V) for both gate-injection (12/3) and tunnel dielectric (8/3/8) configurations. While the tunnel dielectric (8/3/8) stack maintains robust retention up to 1e4s at 125C despite the larger MW, the gate-injection (12/3) configuration exhibits pronounced retention degradation for the H2O case. The enhanced MW is attributed to higher interlayer leakage associated with H2O-based ALD. These results establish oxidant choice as a key process parameter for co-optimizing MW and retention in ferroelectric NAND technologies.", "url": "https://arxiv.org/abs/2603.10127", "type": "数值", "summary": "1. 本研究证明了用于Al2O3插层的原子层沉积（ALD）氧化剂可作为工艺层面的调控手段，以扩展铁电场效应晶体管（FeFET）在垂直NAND应用中的存储窗口。\n2. 与O3氧化剂相比，使用H2O生长的Al2O3插层能在栅注入与隧穿介质两种堆叠构型下均产生显著更大的存储窗口（7-8 V对4 V），这归因于H2O-ALD工艺导致更高的插层漏电流。\n3. 该结果将氧化剂选择确立为铁电NAND技术中协同优化存储窗口与保持特性的关键工艺参数，为器件性能的精细调控提供了新维度。", "summary_source": "deepseek", "authors": [{"name": "Ranie Jeyakumar"}, {"name": "Prasanna Venkatesan"}, {"name": "Lance Fernandes"}, {"name": "Salma Soliman"}, {"name": "Priyankka Ravikumar"}, {"name": "Taeyoung Song"}, {"name": "Chengyang Zhang"}, {"name": "Woohyun Hwang"}, {"name": "Kwangyou Seo"}, {"name": "Suhwan Lim"}, {"name": "Wanki Kim"}, {"name": "Daewon Ha"}, {"name": "Shimeng Yu"}, {"name": "Suman Datta"}, {"name": "Asif Khan"}], "featured_authors": [{"name": "Ranie Jeyakumar"}, {"name": "Prasanna Venkatesan"}, {"name": "Lance Fernandes"}, {"name": "Shimeng Yu"}, {"name": "Suman Datta"}, {"name": "Asif Khan"}], "author_count": 15}, {"id": "2603.10147", "category": "cond-mat", "title": "Bridge Scaling in Conditioned Henyey-Greenstein Random Walks", "abstract": "We study fixed-length bridge paths -- half-space excursions that start and end at a planar boundary -- for three-dimensional random walks with Henyey-Greenstein scattering angles and exponentially distributed step lengths, using Monte Carlo simulation over asymmetry parameter g from 0 to 0.95 and path lengths from 4 to 200 steps. The key structural feature is that the walk evolves on a two-dimensional Markovian state space (depth, direction cosine) rather than the scalar depth coordinate alone. Four anomalies with respect to classical Brownian-excursion theory are reported. The mean amplitude scales super-diffusively, as path length to a power of 0.57--0.58 for isotropic scattering, nine standard deviations above the Brownian prediction of 0.5, with no sign of convergence out to 200 steps. The diffusion coefficient scales as the transport mean free path to the power 0.415 rather than the predicted 1.0. The midpoint depth distribution is Rayleigh rather than half-normal, consistent with a two-dimensional Bessel process. The bridge-conditioned mean direction cosine converges to minus two-thirds at the final step, independently of the asymmetry parameter and initial direction -- the classical Milne result anchored by the H-function moment identity. All anomalies are attributed to the two-dimensional state-space structure. The two anomalous exponents sum to approximately unity, suggesting a common geometric origin. Whether this constitutes a permanent universality-class shift or an anomalously slow crossover to Brownian-excursion behaviour remains the primary open question.", "url": "https://arxiv.org/abs/2603.10147", "type": "理论+数值", "summary": "1. 该工作通过蒙特卡罗模拟研究了三维Henyey-Greenstein散射随机行走在固定步长下的桥路径（半空间偏移）的标度行为。\n2. 研究揭示了与经典布朗偏移理论的四项反常，包括振幅的超扩散标度（指数约0.57–0.58）及扩散系数对输运平均自由程的0.415次幂依赖，这些反常源于二维马尔可夫态空间结构。\n3. 两个反常指数之和近似为1的现象暗示了共同的几何起源，但该行为究竟代表永久的普适类转变还是异常缓慢的跨界渡，仍是待解决的核心问题。", "summary_source": "deepseek", "authors": [{"name": "Claude Zeller"}], "featured_authors": [{"name": "Claude Zeller"}], "author_count": 1}, {"id": "2603.10159", "category": "cond-mat", "title": "Bias in Universal Machine-Learned Interatomic Potentials and its Effects on Fine-Tuning", "abstract": "Universal machine learned interatomic potentials (uMLIPs) embody a growing area of interest due to their transferability across the periodic table, displaying an error of about 0.6 kcal/mol against the Matbench Discovery test set. However, we show that achieving more accurate predictions on out-of-domain tasks requires fine-tuning. Additionally, we investigate the existence and influence of model biases in molecular dynamics (MD) by examining two approaches for data generation: from multiple MD trajectories in parallel, which we call naive fine-tuning, and from a single MD trajectory with fine-tuning after set intervals, which we call periodic fine-tuning. Our results find that naive fine-tuning generates constrained datasets that fail to represent MD simulations, and thus downstream fine-tuned models fail during extrapolation. In contrast, periodic fine-tuning yields models which are more generalizable and accurate, producing low-error dynamics. These findings indicate the role of uMLIP bias in fine-tuning, and highlights the need for multiple fine-tuning steps. Lastly, we relate unphysical behavior to principal component space, and quantify extrapolations through Q-residual analysis, which are useful as a proxy for epistemic uncertainty for larger simulations.", "url": "https://arxiv.org/abs/2603.10159", "type": "理论+数值", "summary": "1. 本研究揭示了通用机器学习原子间势能（uMLIP）微调过程中存在的数据偏见问题，并通过对比两种微调策略评估了其对分子动力学模拟的影响。\n2. 核心发现表明，从单条轨迹进行周期性微调能生成更具泛化性的模型，其通过主成分空间分析和Q残差量化外推误差，显著优于产生受限数据集的朴素并行微调方法。\n3. 该工作为大规模分子动力学模拟中认知不确定性的评估提供了可操作的代理指标，并确立了多步骤微调在提升uMLIP迁移准确性方面的必要性。", "summary_source": "deepseek", "authors": [{"name": "Nicolas Wong"}, {"name": "Julia H. Yang"}], "featured_authors": [{"name": "Nicolas Wong"}, {"name": "Julia H. Yang"}], "author_count": 2}, {"id": "2603.10164", "category": "cond-mat", "title": "Integrability-breaking-induced Mpemba effect in spin chains", "abstract": "We show that there are two distinct mechanisms that can cause the symmetry-restoration Mpemba effect in spin chains with \\textit{weakly broken} integrability, such that the asymptotic equilibration is diffusive, but the lifetime of anomalously fast spin hydrodynamics at low temperature is parametrically large. In particular, we consider isotropic spin chains quenched out of equilibrium by suppressing the $z$-components, without inducing any net magnetisation. Initially, the restoration of isotropy is faster in hotter systems -- because they have more phase space available to scramble their initial conditions -- which may cause the equilibration curves to cross at early times in both integrable and non-integrable systems. At later times, however, the equilibration is effectively hydrodynamic, and the \\textit{colder} systems start to equilibrate faster as the lifetime over which they evince superdiffusive spin hydrodynamics is parametrically larger -- but only in \\textit{non}-integrable models. Depending on the details of the temperatures and the extent of the initial symmetry-breaking, two isotropy-restoration curves may have a crossing at early time, late time, neither, or both.", "url": "https://arxiv.org/abs/2603.10164", "type": "理论", "summary": "我们表明，有两种不同的机制可以在具有 \\textit{弱破缺} 可积性的自旋链中引起对称性恢复 Mpemba 效应，使得渐近平衡是扩散的，但低温下异常快速自旋流体动力学的寿命是参数大的。特别是，我们考虑通过抑制 $z$ 分量来淬灭各向同性自旋链的平衡，而不引起任何净磁化。最初，在较热的系统中，各向同性的恢复速度更快，因为它们有更多的相空间可用于扰乱其初始条件，这可能会导致可积和不可积系统中的平衡曲线在早期交叉。然而，后来，平衡实际上是流体动力学的，并且\\textit{更冷}系统开始平衡得更快，因为它们表现出超扩散自旋流体动力学的寿命在参数上更大——但仅限于\\textit{不可积模型。根据温度的细节和初始对称性破缺的程度，两条各向同性恢复曲线可能在早期、晚期、两者都不交叉或两者都交叉。", "summary_source": "translation", "authors": [{"name": "Adam J. McRoberts"}], "featured_authors": [{"name": "Adam J. McRoberts"}], "author_count": 1}, {"id": "2603.10182", "category": "cond-mat", "title": "Deep learning statistical defect models on magnetic material dynamic and static properties", "abstract": "The modeling of realistic magnetic materials requires the inclusion of defects. Based on the pseudospectral Landau-Lifshitz description of magnetisation dynamics, we propose a statistical model that takes into account defects, specifically vacancies. This statistical model can be integrated with deep learning techniques that correlate defect thresholds with relevant physical observables. We develop a convolutional neural network and a physics-informed neural network combined with theory of functional connections to predict the dispersion relation given defect parameters and physical constraints. A two-branch convolutional neural network is developed to predict domain-wall widths depending on defects threshold, taking into account the spatial profile and domain-wall width separately to achieve a prediction. The proposed physics-informed approaches leverage deep-learning and achieve statistical predictions measured in physical units. This is a stepping stone towards the discovery of new materials and the determination of minimal defect thresholds required for desired dynamics, states, or topological textures.", "url": "https://arxiv.org/abs/2603.10182", "type": "理论", "summary": "1. 该工作建立了一个结合缺陷统计模型与深度学习的框架，用于研究磁性材料的动静态特性。\n2. 其核心在于开发了融合物理信息约束的神经网络架构，实现了对色散关系与畴壁宽度的定量统计预测。\n3. 这为定量预测缺陷阈值以实现特定磁动力学态提供了新途径，是材料发现的重要基础。", "summary_source": "deepseek", "authors": [{"name": "C. Eagan"}, {"name": "M. Copus"}, {"name": "E. Iacocca"}], "featured_authors": [{"name": "C. Eagan"}, {"name": "M. Copus"}, {"name": "E. Iacocca"}], "author_count": 3}, {"id": "2603.10205", "category": "cond-mat", "title": "Flexible Cutoff Learning: Optimizing Machine Learning Potentials After Training", "abstract": "We introduce Flexible Cutoff Learning (FCL), a method for training machine learning interatomic potentials (MLIPs) whose cutoff radii can be adjusted after training. Unlike conventional MLIPs that fix the cutoff radius during training, FCL models are trained by randomly sampling cutoff radii independently for each atom. The resulting model can then be deployed with different per-atom cutoff radii depending on the application, enabling application-specific optimization of the accuracy-cost tradeoff. Using a differentiable cost model, these per-atom cutoffs can be optimized for specific target systems after training. We demonstrate FCL with a modified MACE architecture trained on the MAD dataset. For a subset featuring molecular crystals, optimized per-atom cutoffs reduce computational cost by more than 60% while increasing force errors by less than 1%. These results show that FCL enables training of a single general-purpose MLIP that can be adapted to diverse applications through post-training cutoff optimization, eliminating the need for retraining.", "url": "https://arxiv.org/abs/2603.10205", "type": "理论+数值", "summary": "1. 该工作提出了一种名为柔性截断学习的训练方法，使机器学习原子间势的截断半径在训练后仍可灵活调整。\n2. 其核心在于训练时对每个原子独立随机采样截断半径，并部署后可基于可微分成本模型，针对具体体系优化原子级截断半径以实现精度与计算成本的权衡。\n3. 这消除了针对不同应用重新训练的需求，为构建单一通用势函数并随后适配至多样化场景提供了有效途径。", "summary_source": "deepseek", "authors": [{"name": "Rick Oerder"}, {"name": "Jan Hamaekers"}], "featured_authors": [{"name": "Rick Oerder"}, {"name": "Jan Hamaekers"}], "author_count": 2}, {"id": "2603.10223", "category": "cond-mat", "title": "Structural and Optical Characteristics of beta-Ga2O3 Implanted with Rare Earth Ions", "abstract": "We investigated the structural evolution and optical properties of beta-Ga2O3 crystals implanted with different rare-earth (RE) ions using channeling Rutherford Backscattering Spectrometry, Positron Annihilation, Photoluminescence, and Photoluminescence Excitation spectroscopies. The studies reveal that implantation-induced disorder, accompanying phase transitions, and post-annealing structural recovery are largely insensitive to the implanted RE species. The defect microstructure is also found to be similar for all implanted RE ions. Thermal annealing does not completely remove radiation-induced defects but instead drives their rearrangement into larger defect complexes. Unimplanted (virgin) beta-Ga2O3 exhibits strong UV-visible emission attributed to oxygen vacancies, whereas the introduction of RE ions produces additional emission lines originating from electronic transitions within RE3+ ions. The results indicate that RE3+ ions are excited through the host conduction band, followed by non-radiative relaxation to the 4f excited states and radiative decay to the respective ground states. Fluence-dependent studies of Yb3+ reveal the onset of concentration quenching, while RE-related emission remains efficient even in the presence of substantial lattice disorder. These findings provide new insight into defect evolution in ion-implanted beta-Ga2O3 and clarify the excitation mechanisms of RE3+ ions, offering guidance for optimizing the optical performance of beta-Ga2O3:RE materials.", "url": "https://arxiv.org/abs/2603.10223", "type": "理论+数值", "summary": "1. 该工作系统研究了不同稀土离子注入β-Ga2O3晶体后的结构演变与光学性质，综合运用沟道背散射、正电子湮没及多种发光光谱技术。\n2. 相变及退火恢复过程对稀土离子种类不敏感，且稀土离子通过宿主导带激发，其发光在显著晶格无序下仍保持高效。\n3. 这阐明了离子注入β-Ga2O3中的缺陷演化规律与稀土离子发光机制，为设计和优化基于稀土掺杂的β-Ga2O3光电子器件提供了物理依据。", "summary_source": "deepseek", "authors": [{"name": "Renata Ratajczak"}, {"name": "Joanna Matulewicz"}, {"name": "Slawomir Prucnal"}, {"name": "Maciej O. Liedke"}, {"name": "Cyprian Mieszczynski"}, {"name": "Przemyslaw Jozwik"}, {"name": "Ulrich Kentsch"}, {"name": "Rene Heller"}, {"name": "Eric Hirschmann"}, {"name": "Andreas Wagner"}, {"name": "Wojciech Wozniak"}, {"name": "Frederico Garrido"}, {"name": "Elzbieta Guziewicz"}], "featured_authors": [{"name": "Renata Ratajczak"}, {"name": "Joanna Matulewicz"}, {"name": "Slawomir Prucnal"}, {"name": "Wojciech Wozniak"}, {"name": "Frederico Garrido"}, {"name": "Elzbieta Guziewicz"}], "author_count": 13}, {"id": "2603.10238", "category": "cond-mat", "title": "Disorder-induced localisation in the Mott-Hubbard model", "abstract": "For the Fermi-Hubbard model in the Mott insulator phase, we employ the hierarchy of correlations to study how doublon and holon quasi-particle excitations are affected by adding disorder to the system. We study two types of disorder: charge disorder, in the form of on-site potential randomness; and spin disorder, in the form of a fixed, randomly generated background spin arrangement. By analysing the quasi-particle eigen-spectra and quantifying the degree to which the corresponding eigen-states localise, we find both an energetic and spatial separation between localised and delocalised states in the charge disorder. In contrast, the spin disorder results in localised states throughout the quasi-particle bands. Finally, we repeat our calculations using strong-coupling perturbation theory, and compare the results obtained from both methods.", "url": "https://arxiv.org/abs/2603.10238", "type": "理论+数值", "summary": "1. 该工作采用关联层级方法与强耦合微扰理论，研究了费米-哈伯德模型莫特绝缘体相中双粒子与空穴准粒子激发在电荷无序与自旋无序下的局域化行为。\n2. 核心发现揭示了电荷无序导致局域态与扩展态在能量和空间上的分离，而自旋无序则使准粒子能带整体局域化的显著差异。\n3. 这为理解强关联体系中无序类型对输运性质的差异化影响提供了理论依据，并确立了关联层级方法在研究此类问题上的可靠性。", "summary_source": "deepseek", "authors": [{"name": "Ričards Kristers Knipšis"}, {"name": "Friedemann Queisser"}, {"name": "Jesumony Jayabalan"}, {"name": "Gael Reecht"}, {"name": "Manuel Gruber"}, {"name": "Uwe Bovensiepen"}, {"name": "Ralf Schützhold"}], "featured_authors": [{"name": "Ričards Kristers Knipšis"}, {"name": "Friedemann Queisser"}, {"name": "Jesumony Jayabalan"}, {"name": "Manuel Gruber"}, {"name": "Uwe Bovensiepen"}, {"name": "Ralf Schützhold"}], "author_count": 7}, {"id": "2603.10304", "category": "cond-mat", "title": "Effective theory of surface oscillations in self-bound superfluid droplets", "abstract": "We investigate the low-energy dynamics of small-amplitude surface oscillations of spherical superfluid droplets in vacuum. Starting from the effective field theory of superfluid phonons, we derive an effective action governing the surface oscillations under a fixed particle-number constraint. The normal-mode eigenfrequencies $\\omega_{\\ell}$ for each angular momentum quantum number $\\ell$ are determined and shown to depend on a dimensionless parameter measuring the ratio of surface tension to bulk compressibility energy. We identify a critical value of this parameters at which the breathing mode ($\\ell = 0$) becomes mechanically unstable, and show that all multipole surface modes with $\\ell \\geq 2$ enter the low-energy regime when the surface tension is sufficiently small. Within this regime, we further quantize the surface oscillations, whose quanta correspond to ripplons, allowing the construction of general multi-ripplon states obeying angular-momentum selection rules. We also apply our formalism to a concrete example: a weakly interacting two-component Bose mixture realizing a self-bound superfluid droplet. The resulting description is universal in the sense that it applies to surface dynamics of generic nonrelativistic superfluids with a free interface, independent of microscopic details.", "url": "https://arxiv.org/abs/2603.10304", "type": "理论", "summary": "我们研究了真空中球形超流体液滴小幅度表面振荡的低能动力学。从超流体声子的有效场论出发，我们推导出在固定粒子数约束下控制表面振荡的有效作用。每个角动量量子数 $\\ell$ 的简正模特征频率 $\\omega_{\\ell}$ 被确定并显示为取决于测量表面张力与体积压缩能之比的无量纲参数。我们确定了该参数的临界值，在该值处呼吸模式 ($\\ell = 0$) 变得机械不稳定，并表明当表面张力足够小时，所有具有 $\\ell \\geq 2$ 的多极表面模式进入低能量状态。在这个范围内，我们进一步量化表面振荡，其量子对应于波纹，从而允许构建遵守角动量选择规则的一般多波纹状态。我们还将我们的形式主义应用于一个具体的例子：弱相互作用的双组分玻色混合物实现了自结合的超流体液滴。\n\n由此产生的描述是通用的，因为它适用于具有自由界面、独立于微观细节的通用非相对论超流体的表面动力学。", "summary_source": "translation", "authors": [{"name": "Jun Mitsuhashi"}, {"name": "Keisuke Fujii"}, {"name": "Masaru Hongo"}], "featured_authors": [{"name": "Jun Mitsuhashi"}, {"name": "Keisuke Fujii"}, {"name": "Masaru Hongo"}], "author_count": 3}, {"id": "2603.10363", "category": "cond-mat", "title": "Symmetry Breaking and Transition to Robust Excitonic Topological Order in InAs/GaSb Bilayers", "abstract": "Symmetry and topology are fundamental concepts deeply intertwined in various fields of physics, especially in the studies of quantum phases of matter. The critical role that Coulomb interactions play in symmetry breaking during topological transitions is a fundamental problem that has not been fully understood. Utilizing gated indium arsenide-gallium antimonide bilayers, we demonstrate that Coulomb interactions play a critical role in symmetry breaking and topological transitions. Whereas the quantum spin Hall insulator (QSHI) dominates the high-density regime, gating the system into the dilute regime enhances interlayer Coulomb interactions and leads to an emergent excitonic topological order (ETO) with spontaneous time-reversal-symmetry breaking. Moreover, applying a magnetic field drives a transition from the QSHI to the ETO accompanied by Coulomb-induced spin-rotation-symmetry breaking, which selects triplet electron-hole pairing in the lowest Landau levels. These results underscore an intricate interplay between symmetry and topology under Coulomb interactions in electron-hole bilayers.", "url": "https://arxiv.org/abs/2603.10363", "type": "理论", "summary": "对称性和拓扑学是在物理的各个领域中紧密相连的基本概念，特别是在物质量子相的研究中。库仑相互作用在拓扑转变过程中对称性破缺中发挥的关键作用是一个尚未完全理解的基本问题。利用门控砷化铟-锑化镓双层，我们证明库仑相互作用在对称性破缺和拓扑转变中发挥着关键作用。虽然量子自旋霍尔绝缘体 (QSHI) 在高密度区域占主导地位，但将系统门控到稀区域会增强层间库仑相互作用，并导致出现自发时间反转对称性破缺的激子拓扑序 (ETO)。此外，施加磁场会驱动从 QSHI 到 ETO 的转变，并伴随着库仑引起的自旋旋转对称性破缺，从而选择最低朗道能级中的三线态电子-空穴配对。这些结果强调了电子-空穴双层库仑相互作用下对称性和拓扑之间复杂的相互作用。", "summary_source": "translation", "authors": [{"name": "Xinghao Wang"}, {"name": "Wenfeng Zhang"}, {"name": "Yujiang Dong"}, {"name": "Weiliang Qiao"}, {"name": "Peizhe Jia"}, {"name": "Rui-Rui Du"}], "featured_authors": [{"name": "Xinghao Wang"}, {"name": "Wenfeng Zhang"}, {"name": "Yujiang Dong"}, {"name": "Weiliang Qiao"}, {"name": "Peizhe Jia"}, {"name": "Rui-Rui Du"}], "author_count": 6}, {"id": "2603.10472", "category": "cond-mat", "title": "Microstructural Characterization of Nb3Sn Thin Films Using FIB Tomography", "abstract": "The accelerating gradient of Nb3Sn superconducting radiofrequency (SRF) cavities is currently limited, and the underlying cause remains an open question in the field. One leading hypothesis attributes this limitation to the presence of tin-deficient regions within the Nb3Sn coating, which can suppress the superheating field. Due to the relatively large coherence length of Nb3Sn, defects near the surface may significantly interact with the RF field. However, these subsurface defects have proven difficult to characterize. This research aims to investigate the structure and distribution of subsurface Sn deficient regions to better understand their influence on cavity performance. We employ focused ion beam (FIB) tomography to analyze the subsurface microstructure of Nb3Sn thin films. This technique enables three-dimensional reconstruction of both the tin distribution and the grain structure within the film. By correlating Sn content with grain structure, we find that Sn deficient regions are more prevalent that previously thought. However, the Sn deficient regions are consistently located below the surface of the film where RF fields are strongly attenuated by supercurrent screening and are likely not a limiting factor for cavity performance.", "url": "https://arxiv.org/abs/2603.10472", "type": "理论", "summary": "1. 该工作利用聚焦离子束断层扫描技术，对Nb3Sn超导射频腔薄膜的亚表面微观结构与锡分布进行了三维重构研究。\n2. 研究发现锡缺失区域虽比预期更为普遍，但均位于薄膜亚表面层，该处射频场因超流屏蔽而显著衰减，表明其并非腔体性能的主要限制因素。\n3. 这促使研究焦点从锡缺失区域转移，需进一步探究其他潜在缺陷或机制对Nb3Sn超导腔加速梯度的实际限制作用。", "summary_source": "deepseek", "authors": [{"name": "Eric Viklund"}, {"name": "David N. Seidman"}, {"name": "Sam Posen"}], "featured_authors": [{"name": "Eric Viklund"}, {"name": "David N. Seidman"}, {"name": "Sam Posen"}], "author_count": 3}, {"id": "2603.10475", "category": "cond-mat", "title": "Directional information transfer between interacting Brownian particles", "abstract": "We theoretically investigate how information flows when two particles interact with each other. Understanding the physical mechanisms of directional information flow is crucial for advancing information thermodynamics and stochastic computing. However, the fundamental connection between mechanical motion and causal information transfer remains elusive. To focus only on essential effects of physical dynamics, we examine two interacting Brownian particles confined in a one-dimensional potential. By simulating their Langevin dynamics, we quantify the causal information exchange using transfer entropy. We demonstrate that a mass asymmetry inherently breaks the symmetry of information flow, inducing a net directional transfer from the heavier to the lighter particle. Physically, the heavier particle, possessing larger inertia and higher active information storage, retains the memory of its trajectory longer against thermal fluctuations, thereby acting as a source of information. We analytically clarify that this net transfer is governed by a competition between the difference in memory capacity and the predictability of the particle trajectories. Furthermore, we reveal that the net information flow scales logarithmically with the mass ratio. These findings provide essential insights into the physical significance of transfer entropy and the nature of information flow in general physical systems.", "url": "https://arxiv.org/abs/2603.10475", "type": "理论", "summary": "1. 本文通过模拟一维势阱中相互作用布朗粒子的朗之万动力学，利用转移熵量化了其间的因果信息传递。\n2. 研究发现质量不对称性会打破信息流的对称性，导致净信息从质量较大的粒子流向质量较小的粒子，其物理机制源于惯性差异导致的轨迹记忆能力竞争。\n3. 这一发现为理解一般物理系统中转移熵的物理意义及信息流本质提供了关键见解，特别对信息热力学和随机计算领域具有启示作用。", "summary_source": "deepseek", "authors": [{"name": "Tenta Tani"}], "featured_authors": [{"name": "Tenta Tani"}], "author_count": 1}, {"id": "2603.10499", "category": "cond-mat", "title": "Transverse and Longitudinal Magnetothermopower Promoted by Ambipolar Effect in Half-Heusler Topological Materials", "abstract": "Topologically trivial and non-trivial semimetals with a high degree of carrier compensation are well known for demonstrating large transverse magnetothermopower ($S_{yx}$). However, in such systems, the longitudinal magnetothermopower ($S_{xx}$) is typically suppressed due to nearly perfect electron-hole compensation. Here, we show that the half-Heusler topological semimetal DyPtBi exhibits simultaneously large $S_{xx}$ and $S_{yx}$ magnetothermopowers, defying this conventional trade-off. In $B=14$\\,T, thermopower of DyPtBi reaches peak values of $S_{xx}=131\\,\\mu\\rm{V/K}$ at $T=149$\\,K and $S_{yx}=-297\\,\\mu\\rm{V/K}$ at $T=200$\\,K, and transverse component remains significantly large even at $290$\\,K ($S_{yx}=-213\\,\\mu\\rm{V/K}$). Remarkably, at $T=290$\\,K and in relatively weak magnetic field of $1$\\,T, both relevant for practical applications, DyPtBi shows $S_{yx}=-18\\,\\mu\\rm{V/K}$, which is one of the largest values reported under such conditions. The large transverse thermopower originates from an ambipolar effect associated with thermal excitation occurring in zero-gap semiconductors. Due to the imperfect electron-hole compensation, an intrinsic asymmetry between hole- and electron-type carriers enables pronounced values of both $S_{xx}$ and $S_{yx}$, resulting in high effective thermopower ($S_{xx}+|S_{yx}|=379\\,\\mu\\rm{V/K}$) in DyPtBi at 200\\,K. A comparative analysis with DyPdBi, another half-Heusler material that demonstrates large $S_{xx}=123\\,\\mu\\rm{V/K}$ but small $S_{yx}=-16\\,\\mu\\rm{V/K}$ (both values obtained at $T=293$\\,K and $B=14$\\,T), highlights the critical role of band structure and compensation tuning. These findings underscore the potential of chemical doping and band engineering in rare-earth-based half-Heusler materials for optimizing both transverse and longitudinal thermoelectric properties.", "url": "https://arxiv.org/abs/2603.10499", "type": "理论+数值", "summary": "1. 该工作通过实验观测发现半霍斯勒拓扑材料DyPtBi同时具有巨大的纵向与横向磁热电势，突破了传统载流子完全补偿体系中二者相互抑制的常规认知。\n2. 其物理关键在于零带隙半导体中热激发的双极性效应，以及由此产生的不完美电子-空穴补偿所导致的载流子本征不对称性，从而协同增强Sxx与Syx。\n3. 这一发现凸显了通过化学掺杂和能带工程调控稀土基半霍斯勒材料载流子补偿度的潜力，为同步优化横向与纵向热电性能提供了明确途径。", "summary_source": "deepseek", "authors": [{"name": "Orest Pavlosiuk"}, {"name": "Marcin Matusiak"}, {"name": "Andrzej Ptok"}, {"name": "Piotr Wiśniewski"}, {"name": "Dariusz Kaczorowski"}], "featured_authors": [{"name": "Orest Pavlosiuk"}, {"name": "Marcin Matusiak"}, {"name": "Andrzej Ptok"}, {"name": "Piotr Wiśniewski"}, {"name": "Dariusz Kaczorowski"}], "author_count": 5}, {"id": "2603.10516", "category": "cond-mat", "title": "Flocking through a sea of rods", "abstract": "We investigate the collective behavior of motile rods immersed in a monolayer of apolar rods confined between vertically vibrating plates using numerical simulations. We uncover an antidiffusive instability whereby motile rods segregate from the apolar medium and form flocks whose size increases with the medium concentration. Remarkably, enhanced segregation leads to a reduction of the global polar order. The flock structure is strongly influenced by the anisotropy of the medium rods. For small aspect ratios, the flocks are elongated perpendicular to the mean direction of motion, whereas for larger aspect ratios, they elongate along the direction of motility. We rationalize the emergence of segregation-induced disorder using a minimal mean-field model.", "url": "https://arxiv.org/abs/2603.10516", "type": "理论+数值", "summary": "1. 该工作通过数值模拟研究了垂直振动板间单层无极性杆状介质中运动杆的集体行为，揭示了反扩散不稳定性导致运动杆与介质分离并形成集群的现象。\n2. 核心发现是集群尺寸随介质浓度增加而增大，但增强的分离反而降低了全局极性序，且介质杆的各向异性显著调控集群的取向结构。\n3. 最小平均场模型成功解释了分离诱导的无序机制，这为理解活性物质在异性介质中的自组织行为提供了新的理论框架和设计思路。", "summary_source": "deepseek", "authors": [{"name": "Abhishek Sharma"}, {"name": "Harsh Soni"}], "featured_authors": [{"name": "Abhishek Sharma"}, {"name": "Harsh Soni"}], "author_count": 2}, {"id": "2603.10605", "category": "cond-mat", "title": "Formulation of intrinsic nonlinear thermal conductivity for bosonic systems using quantum kinetic equation", "abstract": "Nonlinear responses in transport phenomena have attracted significant attention because they can arise even when linear responses are forbidden by symmetry, with the quantum geometry of Bloch wave functions playing an essential role. While such effects have been extensively studied in electric transport, similar quantum-geometric mechanisms are also expected to govern nonlinear thermal transport. In particular, thermal responses are crucial in bosonic systems such as magnons and phonons, which are charge-neutral quasiparticles. However, a consistent theoretical description of nonlinear thermal transport remains challenging because of the difficulty in the treatment of energy magnetization in higher-order responses with Luttinger's gravitational potential method. Here, we formulate the intrinsic nonlinear thermal conductivity of bosonic systems using a quantum kinetic equation approach that avoids Luttinger's method and naturally incorporates contributions from energy magnetization. We identify three distinct contributions to the nonlinear thermal conductivity: two expressed in terms of quantum-geometric quantities, namely the quantum metric and the thermal Berry-connection polarizability (TBCP), and a third determined solely by the band dispersions. Applying our formalism to a specific quantum spin model within linear spin-wave theory, we show that the TBCP term dominates the nonlinear thermal Hall effect in the absence of threefold symmetry. Our results differ quantitatively from those obtained using semiclassical theory, thereby highlighting the importance of quantum corrections beyond the semiclassical picture. These findings establish a general framework for intrinsic nonlinear thermal responses in bosonic systems and reveal quantum-geometric mechanisms underlying thermal transport beyond linear response theory.", "url": "https://arxiv.org/abs/2603.10605", "type": "理论", "summary": "1. 该工作基于量子动理学方程，构建了玻色子体系内禀非线性热导率的理论框架，避免了卢廷格引力势方法处理能量磁化的困难。\n2. 热贝里联络极化率两种量子几何贡献，以及仅由能带色散决定的第三项，并通过自旋波模型证明热贝里联络极化率项在无三重对称性时主导非线性热霍尔效应。\n3. 这为超越半经典图像的玻色子系统非线性热输运研究提供了普适理论工具，并揭示了量子几何效应对非线性热响应的关键作用。", "summary_source": "deepseek", "authors": [{"name": "Aoi Kuwabara"}, {"name": "Joji Nasu"}], "featured_authors": [{"name": "Aoi Kuwabara"}, {"name": "Joji Nasu"}], "author_count": 2}, {"id": "2603.10612", "category": "cond-mat", "title": "Tuning of anomalous magnetotransport properties in half-Heusler topological semimetal GdPtBi", "abstract": "Half-Heusler compounds from the $RE$PtBi family exemplify Weyl semimetals in which external magnetic field induce Weyl nodes. These materials exceptionally host topologically non-trivial states near the Fermi level and their manifestation can be clearly seen in the magnetotransport properties. In this study, we tune the Fermi level of the archetypal half-Heusler Weyl semimetal GdPtBi through high-energy electron irradiation, moving it away from the Weyl nodes to investigate the resilience of the contribution of topologically non-trivial states to magnetotransport properties. Remarkably, we observe that the negative longitudinal magnetoresistance, which is a definitive indicator of the chiral magnetic anomaly occurring in topological semimetals, persists even when the Fermi level is shifted by 100\\,meV from its original position in the pristine sample. Additionally, the anomalous Hall effect shows complex variations as the Fermi level is altered, attributed to the energy-dependent nature of the Berry curvature, which arises from avoided band crossing. Our findings show the robust influence of Weyl nodes on the magneto-transport properties of GdPtBi, irrespective of the Fermi level position, a behaviour likely applicable to many half-Heusler Weyl semimetals.", "url": "https://arxiv.org/abs/2603.10612", "type": "理论", "summary": "1. 该工作通过高能电子辐照调控典型半赫斯勒外尔半金属GdPtBi的费米能级，系统研究了拓扑非平庸态对磁输运贡献的稳健性。\n2. 核心发现是即使费米能级偏离外尔节点100 meV，作为手征磁反常关键指标的负纵向磁电阻依然持续存在，且反常霍尔效应随费米能级变化呈现复杂演化。\n3. 这揭示了外尔节点对磁输运性质的影响具有超越费米能级位置的普适性，为理解半赫斯勒家族拓扑材料的本征拓扑响应提供了新视角。", "summary_source": "deepseek", "authors": [{"name": "Orest Pavlosiuk"}, {"name": "Piotr Wiśniewski"}, {"name": "Romain Grasset"}, {"name": "Marcin Konczykowski"}, {"name": "Andrzej Ptok"}, {"name": "Dariusz Kaczorowski"}], "featured_authors": [{"name": "Orest Pavlosiuk"}, {"name": "Piotr Wiśniewski"}, {"name": "Romain Grasset"}, {"name": "Marcin Konczykowski"}, {"name": "Andrzej Ptok"}, {"name": "Dariusz Kaczorowski"}], "author_count": 6}, {"id": "2603.10620", "category": "cond-mat", "title": "Theory of Many-Body Multipole Operators in Single-Centered Electron Systems: Two-Body Toroidal Monopoles in Spinless Orbitals", "abstract": "One-body multipole operators are defined as irreducible representations of rotational symmetry together with spatial-inversion and time-reversal symmetries, providing a systematic framework for classifying electronic internal degrees of freedom and for describing a wide variety of composite order parameters. While this formalism has been successfully established for the one-body operator space, a systematic classification of the many-body operator space, especially in interacting systems, remains an open challenge. In this paper, we extend the multipole formalism in the one-body operator space to the many-body operator space. By formulating fermionic creation and annihilation operators as spherical tensors and employing Clebsch-Gordan coupling combined with the exterior (Grassmann) algebra, we construct an irreducible decomposition of many-body operators that fully incorporates fermionic antisymmetrization. As a concrete application, we classify monopoles appearing in spinless many-body operators. In particular, we show that the electric toroidal monopole, a pseudoscalar breaking spatial-inversion symmetry, and the magnetic toroidal monopole, a time reversal-odd scalar, become active in spinless interacting many-body systems, although they are absent in the spinless one-body hybrid orbital space.", "url": "https://arxiv.org/abs/2603.10620", "type": "理论", "summary": "单体多极算子被定义为旋转对称性以及空间反演和时间反演对称性的不可约表示，为电子内部自由度分类和描述各种复合序参数提供了系统框架。虽然这种形式已经在单体操作空间中成功建立，但多体操作空间的系统分类，特别是在交互系统中，仍然是一个开放的挑战。在本文中，我们将单体算子空间中的多极形式扩展到多体算子空间。通过将费米子产生和湮没算子表述为球面张量，并采用 Clebsch-Gordan 耦合与外（格拉斯曼）代数相结合，我们构造了完全结合费米子反对称性的多体算子的不可约分解。作为一个具体的应用，我们对无自旋多体算子中出现的单极子进行分类。\n\n特别是，我们表明，电环形单极子（一种打破空间反转对称性的赝标量）和磁环形单极子（一种时间反转奇标量）在无自旋相互作用多体系统中变得活跃，尽管它们在无自旋单体混合轨道空间中不存在。", "summary_source": "translation", "authors": [{"name": "Shingo Kuniyoshi"}, {"name": "Rikuto Oiwa"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Shingo Kuniyoshi"}, {"name": "Rikuto Oiwa"}, {"name": "Satoru Hayami"}], "author_count": 3}, {"id": "2603.10631", "category": "cond-mat", "title": "High-Throughput-Screening Workflow for Predicting Volume Changes by Ion Intercalation in Battery Materials", "abstract": "Mechanical stresses and strains developing locally within the microstructure of active ion-battery-electrode materials during charge-discharge cycles can compromise their long-term stability. In this context, crystalline compounds exhibiting low volume changes are of particular interest. Atomistic simulations can be employed to quantify the volume change of the crystal structure upon intercalation and deintercalation of ions and to elucidate the local mechanisms underlying the global structural response. While density functional theory (DFT) offers a robust and accurate framework for such calculations, its computational cost limits its applicability for large-scale screening of diverse intercalation structures and sites. In this work, we present a workflow designed to prioritize candidate materials for subsequent detailed characterization. The workflow calculates the volume change upon intercalation using atomic-level features and a machine-learning model for bond-length prediction. The bond-length predictions are based on the assumption that bonds between the same ionic species in similar local coordination environments exhibit comparable lengths across different crystallographic structures. The model was trained on a DFT-generated dataset, which inherently defines the chemical space in which reliable predictions can be expected. We demonstrate the workflow's utility by screening approximately 1,175,000 transition-metal oxides and fluorides, followed by DFT validation of the most promising candidates. The proposed workflow enables filtering of large candidate sets and accelerates the potential discovery of low volume change intercalation materials for batteries.", "url": "https://arxiv.org/abs/2603.10631", "type": "理论+数值", "summary": "1. 该论文提出了一种用于预测电池材料中离子插层体积变化的高通量筛选工作流程，旨在优先选择候选材料以供后续详细表征。\n2. 其核心技术在于利用原子级特征和基于DFT数据集训练的机器学习模型预测键长，该模型基于相同离子物种在相似局部配位环境中键长可类比的假设，从而高效计算体积变化并筛选了约117.5万种过渡金属氧化物和氟化物。\n3. 此工作流程通过减少对昂贵DFT计算的依赖，为大规模加速发现低体积变化插层材料提供了可行途径，并对电池材料设计中的高通量预测方法具有明确启示。", "summary_source": "deepseek", "authors": [{"name": "Aljoscha Felix Baumann"}, {"name": "Daniel Mutter"}, {"name": "Daniel F. Urban"}, {"name": "Christian Elsässer"}], "featured_authors": [{"name": "Aljoscha Felix Baumann"}, {"name": "Daniel Mutter"}, {"name": "Daniel F. Urban"}, {"name": "Christian Elsässer"}], "author_count": 4}, {"id": "2603.10659", "category": "cond-mat", "title": "Gauge transformation for pulse propagation and time ordered integrals", "abstract": "We investigate a gauge transformation based on the successive elimination of time-dependent onsite potentials at individual sites in finite or infinite systems. Our analysis shows that this transformation renormalizes the inward hoppings by a phase factor $e^{i \\phi(t)}$ and the outward hoppings by $e^{-i \\phi(t)}$. We further demonstrate how this procedure facilitates the reduction and simulation of pulse propagation in scattering systems, while significantly simplifying the time-ordered integrals involved in the time evolution operator for time-dependent Schrodinger equation.", "url": "https://arxiv.org/abs/2603.10659", "type": "理论+数值", "summary": "1. 该工作基于逐个消除格点含时在位势的规范变换，研究了有限或无限系统中脉冲传播与时间演化算符的时序积分问题。\n2. 其核心机制在于该变换将向内跳跃幅重整为相位因子e^{iφ(t)}、向外跳跃幅重整为e^{-iφ(t)}，从而显著简化了散射系统中脉冲传播的模拟与含时薛定谔方程的时序积分计算。\n3. 这为处理复杂含时散射问题与开放量子动力学模拟提供了一种系统性的规范选择方案，并可能推广至非平衡输运或光与物质相互作用等领域。", "summary_source": "deepseek", "authors": [{"name": "Adel Abbout"}], "featured_authors": [{"name": "Adel Abbout"}], "author_count": 1}, {"id": "2603.10696", "category": "cond-mat", "title": "Fast readout for large scale spin-based qubits", "abstract": "In this letter, we present fast readout of Pauli spin blockade phenomena and interdot coupling tunability in a silicon double quantum dot (DQD) fabricated using industry-compatible processes. The interdot couplings are tuned with a second self-aligned gate layer. The charge sensing and spin readout are performed by using gate-based reflectometry techniques. The results pave the way for scalable fast readout of large-scale industry-standard manufactured Si spin qubit arrays.", "url": "https://arxiv.org/abs/2603.10696", "type": "理论", "summary": "1. 该工作基于工业兼容工艺制备的硅双量子点，实现了泡利自旋阻塞现象的快速读取及量子点间耦合的可调谐性。\n2. 其技术核心在于采用第二层自对准栅极调控耦合强度，并利用基于栅极的反射计技术进行电荷传感与自旋读取。\n3. 工业标准制造的硅自旋量子比特阵列的可扩展快速读出奠定了关键技术基础。", "summary_source": "deepseek", "authors": [{"name": "X. Luo"}, {"name": "B. Bertrand"}, {"name": "H. Niebojewski"}, {"name": "F. Martins"}, {"name": "C. Smith"}, {"name": "T.-Y. Yang"}], "featured_authors": [{"name": "X. Luo"}, {"name": "B. Bertrand"}, {"name": "H. Niebojewski"}, {"name": "F. Martins"}, {"name": "C. Smith"}, {"name": "T.-Y. Yang"}], "author_count": 6}, {"id": "2603.10716", "category": "cond-mat", "title": "Non-Collinear and Non-Coplanar Magnetic Orders in 1/1 Periodic Approximant to the Icosahedral Quasicrystal", "abstract": "Ground-state properties of rare-earth based 1/1 periodic approximants of icosahedral quasicrystal are clarified theoretically on the basis of an effective model for magnetism taking into account uniaxial anisotropy arising from crystalline electric field. By performing numerically-exact calculation on the 1/1 approximant crystal with a lattice constant $a$=14.725 Å, we have determined the ground-state phase diagram for ferromagnetic interactions. The result shows that eight kinds of noncollinear and noncoplanar magnetic structures are stabilized, whose magnetic space groups are identified as $I_{\\rm P}m'\\bar{3}'$, $C2'/m'$ and $R\\bar{3}$. We have clarified the degeneracy of each ground state, which is expected to be reflected in the numbers of the domains. By analyzing each state, the magnetic as well as topological properties are revealed. Our results are shown to explain the measured magnetic structures in the 1/1 approximants and the effective model is discussed to be useful for understanding the magnetic structures and their topological properties in broad range of rare-earth based 1/1 approximants.", "url": "https://arxiv.org/abs/2603.10716", "type": "理论+数值", "summary": "1. 该工作通过计入晶体电场引起的单轴各向异性的有效磁性模型，从理论上阐明了二十面体准晶体1/1周期近似晶体中稀土基材料的基态性质。\n2. 研究通过数值精确计算，确定了铁磁相互作用下的基态相图，揭示了八种非共线且非共面的磁性结构，其磁空间群被鉴定为 \\(I_{\\mathrm{P}}m'\\bar{3}'\\)、\\(C2'/m'\\) 和 \\(R\\bar{3}\\)。\n3. 此模型不仅解释了1/1近似晶体中实测的磁性结构，还为理解更广泛的稀土基1/1近似晶体的磁性结构及其拓扑性质提供了有效途径。", "summary_source": "deepseek", "authors": [{"name": "Shinji Watanabe"}, {"name": "Tatsuya Iwasaki"}], "featured_authors": [{"name": "Shinji Watanabe"}, {"name": "Tatsuya Iwasaki"}], "author_count": 2}, {"id": "2603.10815", "category": "cond-mat", "title": "Dissipation- versus Chaos-Induced Relaxation in Non-Markovian Quantum Many-Body Systems", "abstract": "In interacting quantum many-body systems, relaxation toward equilibrium reflects a competition between internal chaotic dynamics and environmental dissipation. While conventional Markovian baths typically produce exponential decay, non-Markovian dissipation can give rise to more intricate behavior, including algebraic relaxation. We study an open Sachdev-Ye-Kitaev (SYK) model coupled to a pseudogapped fermionic bath, using the Keldysh formalism to compute steady-state correlations in the large-$N$ limit. Our results uncover a rich dynamical phase diagram, with regimes of bath-driven power-law relaxation, chaos-driven exponential decay, and an intermediate pre-relaxation phase where exponential decay crosses over to algebraic decay. These findings demonstrate that non-Markovian environments can qualitatively reshape relaxation mechanisms in strongly correlated quantum many-body systems.", "url": "https://arxiv.org/abs/2603.10815", "type": "理论+数值", "summary": "1. 该工作通过Keldysh形式研究了大N极限下耦合赝能隙费米子浴的开放SYK模型，计算了稳态关联函数。\n2. 研究揭示了丰富的动力学相图，包括浴驱动的幂律弛豫、混沌主导的指数衰减以及两者间的交叉预弛豫相。\n3. 这表明非马尔可夫环境能从根本上重塑强关联量子多体系统的弛豫机制，为开放量子混沌体系研究提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Gabriel Almeida"}, {"name": "Pedro Ribeiro"}, {"name": "Masudul Haque"}, {"name": "Lucas Sá"}], "featured_authors": [{"name": "Gabriel Almeida"}, {"name": "Pedro Ribeiro"}, {"name": "Masudul Haque"}, {"name": "Lucas Sá"}], "author_count": 4}, {"id": "2603.10954", "category": "cond-mat", "title": "Importance of nonlinear long-range electron-phonon interaction on the carrier mobility of anharmonic halide perovskites", "abstract": "The interaction between the electrons and the lattice vibrations in a solid is responsible for various important effects, such as formation of polarons, temperature dependent bandgaps, phonon-limited carrier transport, and conventional superconductivity. Most works assume a linear electron-phonon interaction, where the electron only interacts with one phonon at a time. However, the validity of this assumption has not been verified in polar anharmonic materials, where large ionic displacements may invalidate the assumption of linear interaction. Here, we show that nonlinear electron-phonon interactions contribute significantly to the finite-temperature electron mobility of the inorganic lead halide perovskite CsPbI$_3$. We calculate the electron mobility from first principles using the self-energy relaxation time approximation and the long-range approximation. The effect of nonlinear interaction is taken into account using the recently derived expression for the long-range part of the one-electron-two-phonon matrix element. We show that due to the low phonon frequencies of CsPbI$_3$, the one-electron-two-phonon interaction changes the temperature scaling of the mobility and contributes about 10\\% to the mobility at room temperature. The results underscore the importance of including nonlinear electron-phonon interaction in anharmonic halide perovskites.", "url": "https://arxiv.org/abs/2603.10954", "type": "理论", "summary": "1. 本研究通过第一性原理计算，揭示了非线性长程电子-声子相互作用对无机卤化物钙钛矿CsPbI₃有限温度电子迁移率的重要贡献。\n2. 其核心在于采用自能弛豫时间近似与长程近似，并利用新推导的单电子-双声子矩阵元长程部分表达式，定量证明了低频声子主导的非线性相互作用改变了迁移率的温度标度行为。\n3. 这明确指出了在强非谐性钙钛矿材料中必须超越线性相互作用近似，为精确模拟该类光电材料的载流子输运性质提供了关键理论范式。", "summary_source": "deepseek", "authors": [{"name": "Matthew Houtput"}, {"name": "Ingvar Zappacosta"}, {"name": "Serghei Klimin"}, {"name": "Samuel Poncé"}, {"name": "Jacques Tempere"}, {"name": "Cesare Franchini"}], "featured_authors": [{"name": "Matthew Houtput"}, {"name": "Ingvar Zappacosta"}, {"name": "Serghei Klimin"}, {"name": "Samuel Poncé"}, {"name": "Jacques Tempere"}, {"name": "Cesare Franchini"}], "author_count": 6}, {"id": "2603.10966", "category": "cond-mat", "title": "Microscopic screening theory for excitons in two-dimensional materials: A bridge between effective models and ab initio descriptions", "abstract": "We present a computational approach for exciton calculations in two-dimensional (2D) materials within the Bethe-Salpeter equation (BSE) framework, employing an atomistic description with point-like orbitals. Unlike widespread efficient calculations that rely on classical or effective interaction models, such as the Rytova-Keldysh model, our method incorporates quantum screened interactions. By explicitly computing the 2D dielectric function at the random-phase approximation level, we capture screening effects beyond such approximations with an accuracy akin to first-principles methods. Consequently, we can realistically estimate excitonic binding energies with a bearable computational cost. A detailed account of the various convergence parameters sheds light on a possible cause of the large dispersion of binding energies reported in the literature using first-principles GW/BSE implementations. This work thus provides an alternative pathway towards efficient and faithful dielectric screening and exciton computations in low-dimensional materials.", "url": "https://arxiv.org/abs/2603.10966", "type": "理论+数值", "summary": "1. 该工作提出了一种基于原子级点状轨道描述的Bethe-Salpeter方程计算框架，用于二维材料中的激子计算。\n2. 其核心物理突破在于采用随机相位近似下显式计算二维介电函数，从而以可承受计算成本实现了超越经典Rytova-Keldysh模型的量子屏蔽相互作用精确描述。\n3. 这为低维材料中高效且可靠的介电屏蔽与激子计算提供了新范式，并可解释现有第一性原理GW/BSE计算中结合能数据离散度较大的问题。", "summary_source": "deepseek", "authors": [{"name": "P. Ninhos"}, {"name": "A. J. Uría-Álvarez"}, {"name": "C. Tserkezis"}, {"name": "N. A. Mortensen"}, {"name": "J. J. Palacios"}], "featured_authors": [{"name": "P. Ninhos"}, {"name": "A. J. Uría-Álvarez"}, {"name": "C. Tserkezis"}, {"name": "N. A. Mortensen"}, {"name": "J. J. Palacios"}], "author_count": 5}, {"id": "2603.10968", "category": "cond-mat", "title": "Island Sliding Barriers: A first-principles metric for determining remote epitaxy viability", "abstract": "Remote epitaxy, where a 2D van der Waals material (usually graphene) is inserted on top of the substrate before film epitaxy, has emerged as a promising path for growing electronics with lower defect rates and less stringent lattice matching requirements. The exact mechanism behind remote epitaxy has not been definitively shown, however, and it is not obvious when examining a new substrate-film pair whether they would be compatible with the remote epitaxy process. In this paper, we use first principles calculations to test several different mechanisms for determining whether a given substrate-film pair will successfully be grown with remote epitaxy. We find that previously calculated metrics such as electrostatic potential do not hold sufficient explanatory power. We find that the sliding barrier of small islands on the surface when the atomic positions are allowed to optimize provides the most rigorous criteria for whether a given substrate-film pair is remote epitaxy active. This indicates that remote epitaxy is likely a phenomenon related to the kinetics and ease of island migration on the graphene surface.", "url": "https://arxiv.org/abs/2603.10968", "type": "理论+数值", "summary": "1. 本研究通过第一性原理计算，系统评估了多种机制对远程外延可行性的预测能力，以确定给定衬底-薄膜组合的兼容性。\n2. 关键发现表明，表面小岛在原子位置优化后的滑动势垒提供了最严格的判据，优于先前提出的静电势等度量，揭示了动力学主导的物理本质。\n3. 这为理解远程外延的微观机制提供了清晰方向，并将指导未来针对特定材料对的实验设计与理论筛选。", "summary_source": "deepseek", "authors": [{"name": "Quinn T. Campbell"}, {"name": "Manny Xavier de Jesus Lopez"}, {"name": "Anthony Rice"}, {"name": "Timothy J. Ruggles"}, {"name": "Taisuke Ohta"}, {"name": "Caitlin McCowan"}, {"name": "Sadhvikas Addamane"}, {"name": "Scott W. Schmucker"}, {"name": "Justine Koepke"}], "featured_authors": [{"name": "Quinn T. Campbell"}, {"name": "Manny Xavier de Jesus Lopez"}, {"name": "Anthony Rice"}, {"name": "Sadhvikas Addamane"}, {"name": "Scott W. Schmucker"}, {"name": "Justine Koepke"}], "author_count": 9}, {"id": "2603.10972", "category": "cond-mat", "title": "Violating the All-or-Nothing Picture of Local Charges in Non-Hermitian Bosonic Chains", "abstract": "We present explicit counterexamples to a widespread empirical expectation that local commuting charges display all-or-nothing behavior. In the class of bosonic chains with symmetric nearest-neighbor hopping and arbitrary on-site terms (including non-Hermitian terms), we exhibit systems that possess k-local charges for some but not all k. Concretely, we construct non-Hermitian models with a 3-local charge but no other nontrivial local charges and models with k-local charges for all k except k = 4. These results show that the Grabowski--Mathieu integrability test based on 3-local charges is not universally applicable. We further give necessary and sufficient conditions for the existence of k-local charges in this class, yielding an exhaustive classification and uncovering additional integrable models.", "url": "https://arxiv.org/abs/2603.10972", "type": "理论", "summary": "1. 该工作为玻色子链中局域对易荷的“全有或全无”行为普遍预期提供了明确反例。\n2. 其核心发现是，在具有对称最近邻跃迁的模型中，可以构造出仅存在特定k-局域荷（如仅有3-局域荷）或缺失单一k值局域荷的中间情况。\n3. 这推翻了基于3-局域荷的Grabowski-Mathieu可积性判据的普适性，并为基于局域荷的完备分类与新可积模型的发现提供了严格框架。", "summary_source": "deepseek", "authors": [{"name": "Mizuki Yamaguchi"}, {"name": "Naoto Shiraishi"}], "featured_authors": [{"name": "Mizuki Yamaguchi"}, {"name": "Naoto Shiraishi"}], "author_count": 2}, {"id": "2603.10986", "category": "cond-mat", "title": "Theory of Cell Body Lensing and Phototaxis Sign Reversal in \"Eyeless\" Mutants of $Chlamydomonas$", "abstract": "Phototaxis of many species of green algae relies upon directional sensitivity of their membrane-bound photoreceptors, which arises from the presence of a pigmented \"eyespot\" behind them that blocks light passing through the cell body from reaching the photoreceptor. A decade ago it was discovered that the spherical cell body of the alga $Chlamydomonas~reinhardtii$ acts as a lens to concentrate incoming light, and that in \"eyeless\" mutants of $Chlamydomonas$ the consequence of that focused light reaching the photoreceptor from behind is a reversal in the sign of phototaxis relative to the wild type behavior. We present a quantitative theory of this sign reversal by completing a recent simplified analysis of lensing [Yang, et al., Phys. Rev. E 113, 022401 (2026)] and incorporating it into an adaptive model for $Chlamydomonas$ phototaxis. This model shows that phototactic dynamics in the presence of lensing is subtle because of the existence of internal light caustics when the cellular index of refraction exceeds that of water. During each period of cellular rotation about its body-fixed axis, the photoreceptor receives two competing signals: a relatively long, slowly-varying signal from the direct illumination, and a stronger, shorter, rapidly-varying lensed signal. The reversal of the sign of phototaxis is then a consequence of the dominance of the flagellar photoresponse to the signal with the higher time derivative. These features lead to a quantitative understanding of phototaxis sign reversal, including bistability in the direction choice, a prediction that can be tested in single-cell tracking studies of mutant phototaxis.", "url": "https://arxiv.org/abs/2603.10986", "type": "理论", "summary": "许多种类的绿藻的趋光性依赖于它们的膜结合光感受器的方向敏感性，这是由于它们后面存在色素“眼斑”，阻止光线穿过细胞体到达光感受器。十年前，人们发现藻类$Chlamydomonas~reinhardtii$的球形细胞体充当透镜来聚集入射光，而在$Chlamydomonas$的“无眼”突变体中，聚焦光从后面到达光感受器的结果是相对于野生型行为的趋光性信号发生逆转。我们通过完成最近对透镜效应的简化分析，提出了这种符号反转的定量理论[Yang, et al., Phys. Rev. E 113, 022401 (2026)] 并将其纳入 $Chlamydomonas$ 趋光性的自适应模型中。该模型表明，当细胞折射率超过水的折射率时，由于存在内部光焦散，因此在透镜作用下的趋光动力学是微妙的。\n\n在细胞围绕其身体固定轴旋转的每个周期中，光感受器接收两个竞争信号：来自直接照明的相对较长、缓慢变化的信号，以及更强、较短、快速变化的透镜信号。趋光性符号的反转是鞭毛对具有较高时间导数的信号的光响应占主导地位的结果。这些特征导致了对趋光性信号反转的定量理解，包括方向选择的双稳定性，这一预测可以在突变趋光性的单细胞跟踪研究中进行测试。", "summary_source": "translation", "authors": [{"name": "Sumit Kumar Birwa"}, {"name": "Ming Yang"}, {"name": "Adriana I. Pesci"}, {"name": "Raymond E. Goldstein"}], "featured_authors": [{"name": "Sumit Kumar Birwa"}, {"name": "Ming Yang"}, {"name": "Adriana I. Pesci"}, {"name": "Raymond E. Goldstein"}], "author_count": 4}, {"id": "2603.11007", "category": "cond-mat", "title": "Two-Body Solution and Instabilities along Streda Lines in Moire Flat Bands", "abstract": "Moire minibands in twisted homobilayer semiconductors can, under suitable approximations, be modeled as a pair of Landau levels with opposite Chern numbers. This provides a minimal model for searching novel topological states in a time-reversal-symmetric Hamiltonian. In this work, we investigate the effects of an external magnetic field in this model. We study the many-body ground state in the density-magnetic-field (n-B) plane along the dn/dB = \\pm1/Phi0 Streda line with Hartree-Fock approximation. Away from charge neutrality, we find the Chern-insulating (incompressible) state is very robust while towards charge neutrality, we find a transition from incompressible phase to compressible phase as the interaction strength kappa decreases. Using time-dependent mean-field theory, we further analyze spin-flip excitations and find that the incompressible state along Streda line toward charge neutrality becomes unstable even at large kappa when magnetic field is sufficiently large. Finally, we solve the two-body problem in a given Landau level exactly where the two particles experience unequal magnetic fields using a new basis called center-of-charge basis. This basis allows any isotropic interaction to be parameterized by a single quantum number, the relative angular momentum, thereby extending the Haldane pseudopotentials to the unequal-magnetic-fields case. As the difference of the two magnetic fields varies, these pseudopotentials show a sequence of level crossings, leading to non-monotonic structure of pseudopotentials that is absent in ordinary Landau level systems. Our formulation provides a useful starting point for studying weak-field physics in moire flat bands, where magnetic Bloch-state basis becomes computationally impossible due to the large basis sizes.", "url": "https://arxiv.org/abs/2603.11007", "type": "理论+数值", "summary": "1. 本研究针对摩尔平带中时间反演对称的拓扑模型，结合外磁场作用，沿Streda线在密度-磁场平面上用哈特里-福克近似研究了多体基态，并精确求解了不等磁场下的两体问题。\n2. 关键创新在于引入“电荷中心基”，将各向同性相互作用参数化为单一相对角动量量子数，从而将Haldane赝势推广至不等磁场情形，并揭示了由此导致的非单调赝势结构。\n3. 该理论框架为研究弱场下摩尔平带的物理提供了有效起点，尤其适用于磁Bloch态基组因维度巨大而无法计算的情形，并为理解电荷中性点附近的相变与不稳定性指明了方向。", "summary_source": "deepseek", "authors": [{"name": "Guopeng Xu"}, {"name": "Chunli Huang"}], "featured_authors": [{"name": "Guopeng Xu"}, {"name": "Chunli Huang"}], "author_count": 2}, {"id": "2603.10106", "category": "hep-th", "title": "Complexity and Operator Growth in Holographic 6d SCFTs", "abstract": "We study Krylov (spread) complexity in strongly coupled six-dimensional ${\\cal N}=(1,0)$ superconformal field theories with holographic duals in massive type IIA supergravity. Extending recent holographic proposals relating Krylov complexity growth to the proper momentum of an infalling particle, we analyse the dynamics of massive geodesic probes in these geometries. In our setup, the bulk particle is allowed to move along three directions: the radial AdS coordinate, the internal $S^2$ associated with the $SU(2)_R$ symmetry, and the coordinate parametrising the quiver. In the dual field theory these motions encode, respectively, operator growth, the presence of R-symmetry charges, and spreading across different nodes of the quiver. We analyse the geodesic motion both analytically and numerically for representative quiver configurations. The motion along the quiver direction is typically damped and localised at early times, while the late-time behaviour is dominated by the radial AdS motion. As a consequence, the generalised proper momentum grows linearly at late times, consistent with expectations for Krylov complexity in conformal theories. The inclusion of angular momentum ($SU(2)_R$ charge) introduces additional constraints on the allowed motion and modifies the early-time dynamics while leaving the asymptotic behaviour unchanged. These results provide a first exploration of Krylov complexity in higher-dimensional holographic conformal theories and reveal how operator growth can probe both internal symmetries and quiver structure in strongly coupled conformal field theories.", "url": "https://arxiv.org/abs/2603.10106", "type": "理论", "summary": "我们研究强耦合六维 ${\\cal N}=(1,0)$ 超共形场论中的克雷洛夫（传播）复杂性，以及大规模 IIA 型超引力中的全息对偶。扩展最近将克雷洛夫复杂性增长与下落粒子的适当动量相关的全息提案，我们分析了这些几何形状中的大规模测地线探针的动力学。在我们的设置中，允许块体粒子沿三个方向移动：径向 AdS 坐标、与 $SU(2)_R$ 对称性相关的内部 $S^2$ 以及参数化箭袋的坐标。在双场理论中，这些运动分别编码算子生长、R 对称电荷的存在以及在箭袋的不同节点上的传播。我们对代表性箭袋配置的测地运动进行了解析和数值分析。沿着箭袋方向的运动通常在早期被阻尼和局部化，而后期行为则由径向 AdS 运动主导。因此，广义固有动量在后期线性增长，与共形理论中克雷洛夫复杂性的预期一致。\n\n包含角动量（$SU(2)_R$ 电荷）对允许的运动引入了额外的约束，并修改了早期动力学，同时保持渐近行为不变。这些结果首次探索了高维全息共形理论中的克雷洛夫复杂性，并揭示了算子增长如何探测强耦合共形场论中的内部对称性和颤动结构。", "summary_source": "translation", "authors": [{"name": "Ali Fatemiabhari"}, {"name": "Carlos Nunez"}, {"name": "Ricardo T. Santamaria"}], "featured_authors": [{"name": "Ali Fatemiabhari"}, {"name": "Carlos Nunez"}, {"name": "Ricardo T. Santamaria"}], "author_count": 3}, {"id": "2603.10117", "category": "hep-th", "title": "Entanglement and Renormalization Group Irreversibility of Quantum Field Theory in AdS", "abstract": "We study nonperturbative aspects of quantum field theory (QFT) in rigid anti de Sitter (AdS) spacetime using quantum information theoretic methods. While irreversibility of renormalization group (RG) flows is well established in flat space, it is not obvious whether it persists in AdS, where negative curvature and an asymptotic timelike boundary significantly modify infrared dynamics. Using strong subadditivity and AdS invariance, we derive an entropic second-order differential inequality for the difference between the vacuum entanglement entropy of a QFT and that of its ultraviolet fixed point, evaluated for spherical bulk regions. This inequality allows us to define RG charges that measure the relevant number of degrees of freedom, and we prove the irreversibility of the RG in $2,\\,3,$ and $4$ spacetime dimensions. We further analyze free scalar and fermion theories in AdS, developing lattice formulations adapted to the geometry and computing entanglement entropies and RG charges. In AdS$_2$, we obtain analytic results for a massive Dirac fermion and compare them with numerical lattice calculations. These examples illustrate the general irreversibility theorem and clarify the distinction between conformal and massive theories in AdS.", "url": "https://arxiv.org/abs/2603.10117", "type": "理论", "summary": "1. 该工作利用量子信息论方法研究了刚性反德西特（AdS）时空中量子场论的非微扰性质，并通过推导熵不等式证明了重整化群（RG）的不可逆性。\n2. 其核心在于结合强次可加性与AdS不变性，导出了球形区域真空中纠缠熵差的二阶微分不等式，从而在2、3、4维时空严格建立了RG流的不可逆性。\n3. 这为理解弯曲时空中量子场论的非平庸红外行为提供了新范式，并明确区分了AdS中共形理论与有质量理论的物理差异。", "summary_source": "deepseek", "authors": [{"name": "Nicolás Abate"}, {"name": "Ignacio Salazar"}, {"name": "Gonzalo Torroba"}], "featured_authors": [{"name": "Nicolás Abate"}, {"name": "Ignacio Salazar"}, {"name": "Gonzalo Torroba"}], "author_count": 3}, {"id": "2603.10168", "category": "hep-th", "title": "Towards Two-to-Two Scattering of Scalars in Asymptotically Safe Quantum Gravity", "abstract": "We compute the graviton-mediated two-to-two scattering amplitude and cross section for scalar particles in asymptotically safe quantum gravity. Specifically, we compute the full momentum dependence of the scalar-graviton three-point scattering vertex for spacelike momenta with the functional renormalisation group. We also discuss the analytic continuation to the Minkowski branch, and in particular its angular dependence. Then, the timelike part of the vertex is reconstructed and used to compute the scattering amplitude and cross-section. We show that the cross-section reduces to that in General Relativity at small energies, and it respects unitarity in the UV.", "url": "https://arxiv.org/abs/2603.10168", "type": "理论", "summary": "1. 本文在渐近安全量子引力框架下计算了标量粒子经由引力子中介的二体至二体散射振幅与截面。\n2. 核心进展在于利用泛函重整化群计算了类空间动量下完整动量依赖的标量-引力子三点顶点，并通过解析延拓至闵可夫斯基分支重建了类时部分。\n3. 该方法为在渐近安全引力背景下系统研究高能散射过程及其幺正性提供了可行路径，并可拓展至更复杂粒子与引力子的相互作用研究。", "summary_source": "deepseek", "authors": [{"name": "Angelo P. Chiesa"}, {"name": "Jan M. Pawlowski"}, {"name": "Manuel Reichert"}], "featured_authors": [{"name": "Angelo P. Chiesa"}, {"name": "Jan M. Pawlowski"}, {"name": "Manuel Reichert"}], "author_count": 3}, {"id": "2603.10171", "category": "hep-th", "title": "States of 2D Yang-Mills and Large-Volume Entanglement", "abstract": "We study entanglement in two-dimensional Yang-Mills theory, viewed as a quasi-topological model of emergent space. The most familiar class of states in this theory are states defined by Euclidean path integrals over Riemann surfaces. Bipartite states of this class have thermofield double structure, with entanglement consistently reducing with total area and the number of topological defects, turning separable in the infinite-area limit. In contrast, Wilson lines and loops generate rich non-monotonic behavior of the entanglement entropy. Most notably, we find that for a certain discrete set of configurations, entanglement remains finite at infinite area. The reduced density matrices, in such configurations, take the form of finite-dimensional projectors onto non-trivial vacuum sectors. We also discuss the implications of the large-volume effects for confinement and find that special asymptotic configurations are related to transitions in the confining force.", "url": "https://arxiv.org/abs/2603.10171", "type": "理论", "summary": "1. 本文研究了二维杨-米尔斯理论作为涌现空间的准拓扑模型中的纠缠结构，系统分析了由黎曼面欧几里得路径积分定义的态及威尔逊线/环产生的态。\n2. 核心发现是纠缠熵在威尔逊算符影响下呈现非单调行为，且特定离散构型可在无限大面积极限下保持有限纠缠，其约化密度矩阵退化为有限维非平凡真空子空间的投影算符。\n3. 这一无限体积极限下的特殊纠缠行为为理解该理论中禁闭相的转变机制提供了新的理论线索。", "summary_source": "deepseek", "authors": [{"name": "Dmitry Melnikov"}, {"name": "Jefferson T. Oliveira"}, {"name": "Valmir Peixoto"}, {"name": "Marcia Tenser"}], "featured_authors": [{"name": "Dmitry Melnikov"}, {"name": "Jefferson T. Oliveira"}, {"name": "Valmir Peixoto"}, {"name": "Marcia Tenser"}], "author_count": 4}, {"id": "2603.10183", "category": "hep-th", "title": "Induced current by a magnetic flux in $(1+2)-$dimensional conical spacetime in a Ho{ř}ava-Lifshitz Lorentz-violating scenario", "abstract": "We investigate the vacuum expectation value of bosonic current induced by a magnetic flux in a $(2+1)-$dimensional conical spacetime in the presence of a circular boundary, in a Ho{ř}ava-Lifshitz Lorentz violation symmetry scenario. We assume that the circular boundary is concentric with magnetic flux, and the massive scalar quantum field obeys the Robin boundary condition on the boundary. In order to develop this analysis, we calculate the positive frequency Wightman functions for both regions, inside and outside the boundary. Using these functions, we obtain analytical expressions for the vacuum expectation bosonic currents. As we will see, these functions are presented in the form of the sum of boundary-free and boundary-induced parts. As to the boundary-induced currents, some asymptotic behaviors are investigated for specific limiting cases; moreover, in order to provide a better understanding about the behavior of the currents, some plots are given.", "url": "https://arxiv.org/abs/2603.10183", "type": "理论", "summary": "1. 该论文研究了Hořava-Lifshitz洛伦兹破缺背景下，(2+1)维锥形时空中由磁通量诱导的玻色子流真空期望值，并考虑了圆形边界及Robin边界条件。\n2. 通过严格计算边界内外区域的正频Wightman函数，获得了流期望值的解析表达式，并将其清晰分解为无边界贡献与边界诱导贡献两部分。\n3. 这一结果为理解拓扑缺陷与边界在洛伦兹破缺时空中的量子效应提供了定量框架，并可推广至其他对称性破缺场景或有限温度情形。", "summary_source": "deepseek", "authors": [{"name": "E. R. Bezerra de Mello"}, {"name": "H. F. Santana Mota"}], "featured_authors": [{"name": "E. R. Bezerra de Mello"}, {"name": "H. F. Santana Mota"}], "author_count": 2}, {"id": "2603.10197", "category": "hep-th", "title": "Regge's Inferno", "abstract": "We study large-spin operators in conformal field theories (CFTs) in spacetime dimensions $d>2$ by placing the theory on appropriate pp-wave backgrounds. We show that these geometries admit Heisenberg-group symmetries, and that these symmetries, combined with locality of quantum fields on such spacetimes, impose strong constraints on the asymptotic spectrum in the large-spin limit. The pp-wave backgrounds probe both the small-twist regime, corresponding to the Regge or light-cone bootstrap, and a strongly coupled regime of large twist. Finally, we demonstrate that causality (or the requirement that the energy be bounded from below) leads to a new unitarity bound in $3+1$ dimensions.", "url": "https://arxiv.org/abs/2603.10197", "type": "理论", "summary": "1. 该工作通过在适当pp-wave背景上放置共形场论，研究了d>2时空维度中大自旋算子的渐近谱。\n2. 其核心在于揭示了该背景的海森堡群对称性与局域性共同对大自旋极限下的谱施加了强约束，并统一处理了小扭曲与强耦合大扭曲两种体系。\n3. 由此导出的因果性要求导致在3+1维度中发现了新的幺正性界限，为Regge bootstrap与高扭曲区域的研究建立了更严格的约束框架。", "summary_source": "deepseek", "authors": [{"name": "Zohar Komargodski"}, {"name": "Alessio Miscioscia"}, {"name": "Fedor K. Popov"}], "featured_authors": [{"name": "Zohar Komargodski"}, {"name": "Alessio Miscioscia"}, {"name": "Fedor K. Popov"}], "author_count": 3}, {"id": "2603.10278", "category": "hep-th", "title": "Non-Lorentzian Supergravity from Matrix Theory", "abstract": "It was recently shown that the decoupling limits leading to matrix (gauge) theories on D-branes give rise to non-Lorentzian target space geometries. Perturbatively, matrix theory describes a quantum gravity theory whose low-energy supergravity description exhibits non-Lorentzian behavior. Focusing on the D-particle case associated with the Banks-Fischler-Shenker-Susskind matrix theory, and using techniques from ambitwistor string theory, we show evidence that the dynamics of this non-Lorentzian gravity should be related to anomalies in the current algebra of the associated fundamental string worldsheet theory. At large N, the D-particle backreaction deforms the non-Lorentzian supergravity to the Lorentzian IIA theory, providing a holographic description of the BFSS matrix theory. At a moderately large N such that the D-particles decouple at the leading order, this non-Lorentzian supergravity maps holographically to the leading-order contribution of weakly coupled bulk gravity. This approximately non-Lorentzian regime is related to the null reduction of eleven-dimensional supergravity. Within the non-Lorentzian supergravity, non-trivial dynamics arises from the backreaction of extended brane objects that form BPS states with the D-particles. Finally, we generalize these results to other D-brane and string soliton holographic constructions.", "url": "https://arxiv.org/abs/2603.10278", "type": "理论", "summary": "1. 本研究聚焦于与BFSS矩阵理论相关的D粒子情形，利用 ambitwistor 弦理论技术，探讨了从矩阵理论中涌现的非洛伦兹超重力。\n2. 其核心发现表明，该非洛伦兹重力的动力学应与基础弦世界面理论中流代数反常相关，并在不同N极限下与洛伦兹IIA理论或弱耦合体引力呈现全息对应。\n3. 这将非洛伦兹超重力的研究框架推广至其他D膜与弦孤子全息构造，为理解量子引力中非洛伦兹几何的全息涌现提供了明确路径。", "summary_source": "deepseek", "authors": [{"name": "Dawid Maskalaniec"}, {"name": "Ziqi Yan"}, {"name": "Utku Zorba"}], "featured_authors": [{"name": "Dawid Maskalaniec"}, {"name": "Ziqi Yan"}, {"name": "Utku Zorba"}], "author_count": 3}, {"id": "2603.10627", "category": "hep-th", "title": "Efficient Conformal Block Evaluation with GoBlocks", "abstract": "Conformal blocks in odd spacetime dimensions are not known in closed analytic form. To facilitate efficient computations in the conformal bootstrap, we introduce $\\texttt{GoBlocks}$: a novel conformal-block generator implemented in the Go programming language, designed for rapid, on-the-fly, parallel evaluation using recursive relations. The package supports both multi-point and derivative-based bootstrap approaches and allows flexible control over accuracy and performance. We benchmark $\\texttt{GoBlocks}$ against the $\\texttt{scalar_blocks}$ package, finding significant speed improvements in applications where computational speed and moderate accuracy are critical, but ultra-high precision is not essential. As an illustration, we apply $\\texttt{GoBlocks}$ to the mixed-correlator bootstrap of the three-dimensional Ising model, formulated as a non-convex optimisation problem in a suitable truncation scheme. We simultaneously optimise over external scaling dimensions and OPE CFT data. In addition, we discuss how the approach scales as we increase the number of mixed correlators in more general $O(N)$ vector models.", "url": "https://arxiv.org/abs/2603.10627", "type": "理论", "summary": "1. 本工作开发了名为GoBlocks的快速共形块生成器，用于奇数维时空下的共形自举计算，并在三维伊辛模型的混合关联
