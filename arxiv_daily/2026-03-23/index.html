e Gauss law constraint. The Gauss law constraint promotes spacetime coordinates to gauge fields and extends the string worldsheet into the brane worldvolume. While the Virasoro constraint is used to reduce the spacetime coordinate, the Gauss law constraint is used to reduce both the worldvolume and the spacetime coordinates. As in conventional gauge theories, the treatment of the Gauss law constraint is a technically important aspect of the quantization of A-theory. We show that the string solution is only consistent solution of the Gauss law dimensional reduction condition for D=3 and 4 cases. This result implies that the physical symmetry of the theory is two-dimensional conformal symmetry, suggesting that the theory admits a string-like quantization. We further construct a string solution that is covariant under the exceptional group symmetry. The relation between this solution and the constant charge parameter appearing in the exceptional {\\sigma}-model is also discussed.", "url": "https://arxiv.org/abs/2603.19878", "type": "理论", "summary": "1. 本研究系统分析了A理论中膜世界体积上的高斯定律约束，构建了在例外群对称下协变的弦解，并探讨了其与例外σ模型中常数电荷参数的关系。\n2. 关键发现是，弦解仅在时空维度D=3和4时满足高斯定律降维条件的一致性要求，这揭示了理论的物理对称性本质为二维共形对称性。\n3. 这一结果表明A理论可能允许弦式的量子化方案，为理解高维膜理论与低维弦描述之间的对应关系提供了新的理论线索。", "summary_source": "deepseek", "authors": [{"name": "Machiko Hatsuda"}, {"name": "Ondrej Hulık"}, {"name": "William D. Linch"}, {"name": "Di Wang"}, {"name": "Yu-Ping Wang"}], "featured_authors": [{"name": "Machiko Hatsuda"}, {"name": "Ondrej Hulık"}, {"name": "William D. Linch"}, {"name": "Di Wang"}, {"name": "Yu-Ping Wang"}], "author_count": 5}, {"id": "2603.19923", "category": "hep-th", "title": "Some rigidity results for supergravity backgrounds in 11 dimensions", "abstract": "This paper is a contribution to the supersymmetry gap problem for supergravity backgrounds $(M,g,F)$ in $11$ dimensions. We study restrictions on the curvature of $(M,g,F)$ and, using the bijective correspondence between the space of certain filtered deformations of Lie superalgebras and the space of highly supersymmetric supergravity backgrounds, we establish the following general rigidity result: if the $4$-form $F$ has rank $\\operatorname{rk}(F)\\leq 6$, Euclidean support, and the space $\\mathfrak{k}_{\\bar 1}$ of Killing spinors has dimension $\\dim\\mathfrak{k}_{\\bar 1}> 26$ then $(M,g,F)$ is locally isometric to the maximally supersymmetric Minkowski spacetime or Freund Rubin background $\\mathrm{AdS}_7\\times\\mathrm{S}^4$. The same rigidity result but with finer estimates on $\\dim\\mathfrak{k}_{\\bar 1}$ is provided for certain types of $\\mathfrak k_{\\bar 1}$ and specific orbits of the $4$-form under the action of the Lorentz group.", "url": "https://arxiv.org/abs/2603.19923", "type": "理论", "summary": "1. 该工作对11维超引力背景的奇偶对称性缺口问题做出贡献，证明了在4-形式F的秩≤6且具有欧氏支集条件下，若基林旋量空间维度超过26，则背景局部等距于最大超对称闵氏时空或Freund-Rubin背景。\n2. 其技术核心在于利用特定李超代数的过滤形变空间与高超对称背景空间的双射对应，将曲率约束转化为代数分类问题，并对不同旋量轨道给出更精细的维度估计。\n3. 这一结果为超对称缺口的下界估计提供了严格分析框架，并为通过代数分类方法系统研究各类超引力背景的刚性指明了可行路径。", "summary_source": "deepseek", "authors": [{"name": "Emanuele Di Bella"}, {"name": "Willem A. de Graaf"}, {"name": "Andrea Santi"}], "featured_authors": [{"name": "Emanuele Di Bella"}, {"name": "Willem A. de Graaf"}, {"name": "Andrea Santi"}], "author_count": 3}, {"id": "2603.20083", "category": "hep-th", "title": "Giant graviton integrated correlators at finite coupling and all orders in $1/N$", "abstract": "We study the giant graviton integrated correlator in SU$(N)$ $\\mathcal{N}=4$ super Yang-Mills at finite complexified coupling $\\tau$. Despite the formidable complexity arising from the heavy nature of the operators considered, the large-$N$ expansion simplifies dramatically and exhibits manifest modular invariance. At each order in $1/N$, the expansion coefficients are linear combinations of non-holomorphic Eisenstein series thus capturing the full spectrum of perturbative and non-perturbative effects in the Yang-Mills coupling. Furthermore, we find additional contributions which are modular functions exponentially suppressed in $N$. In the 't Hooft limit, this yields an all-orders result in the $1/N$ expansion at arbitrary coupling $\\lambda$, extending beyond prior results of leading orders. For the U$(N)$ theory, we obtain a closed-form expression valid for all $N$ and $\\tau$, and show that the coupling-dependent sector of the large-$N$ expansion is universal between SU$(N)$ and U$(N)$ to all orders. Crucially, we exploit the integrated correlator constraints and determine the giant graviton correlator itself to two-loop order at finite $N$, previously only accessible in the planar limit.", "url": "https://arxiv.org/abs/2603.20083", "type": "理论", "summary": "1. 本文研究了SU(N)和U(N) N=4超对称杨-米尔斯理论中巨型引力子积分关联函数在有限复耦合τ下的行为，实现了全阶1/N展开并得到了U(N)理论的闭式表达式。\n2. 其技术突破在于大N展开具有显式模不变性，系数由非全纯爱森斯坦级数线性组合构成，从而完整捕捉了微扰和非微扰效应，并揭示了SU(N)与U(N)耦合依赖部分的普适性。\n3. 这首次在有限N下将巨型引力子关联函数确定至两圈阶，突破了原有平面极限，为全耦合区域和非平面修正的深入研究提供了新基础。", "summary_source": "deepseek", "authors": [{"name": "Augustus Brown"}, {"name": "Daniele Dorigoni"}, {"name": "Congkao Wen"}], "featured_authors": [{"name": "Augustus Brown"}, {"name": "Daniele Dorigoni"}, {"name": "Congkao Wen"}], "author_count": 3}, {"id": "2603.19442", "category": "math-ph", "title": "Symmetry-protected Interface Modes Bifurcated from Double Dirac Cones", "abstract": "We rigorously prove the existence of interface modes in a sharp interface model, which bifurcate from the double Dirac cone as a consequence of the band inversion induced by super-symmetry breaking. The exact number of interface modes are determined. The proof is based on a discrete version of the layer-potential framework. Moreover, we prove that such interface modes are symmetry-protected against perturbations that respect the reflection symmetry.", "url": "https://arxiv.org/abs/2603.19442", "type": "理论", "summary": "1. 该工作严格证明了尖锐界面模型中存在从双狄拉克锥分岔的界面模式。\n2. 其技术核心在于基于离散层势框架的解析证明，确定了界面模式数目并揭示其受反射对称性保护。\n3. 这为设计具有对称性保护的鲁棒界面态提供了理论依据，可指导相关拓扑系统的研究。", "summary_source": "deepseek", "authors": [{"name": "Habib Ammari"}, {"name": "Jiayu Qiu"}], "featured_authors": [{"name": "Habib Ammari"}, {"name": "Jiayu Qiu"}], "author_count": 2}, {"id": "2603.19475", "category": "math-ph", "title": "Disordered Ground States of Ergodic Quantum Spin Systems", "abstract": "In this letter, we fill a hole in the existing literature about disordered quantum spin systems generated by a random local interaction $\\{\\mathfrak{h}(Z)\\}_{Z\\Subset \\mathbb{Z}^\\nu}$ satisfying a statistical version of translation invariance. We show such systems always have disordered ground states in the thermodynamic limit with the same symmetry. A key tool we use is a disordered version of the Lieb-Robinson bounds, which hold almost surely under mild conditions on $\\mathfrak{h}$. Along the way, we formalize the notion of a random state on a $C^*$-algebra and prove a weak-$\\ast$ version of the Riesz-Markov-Kakutani theorem, which seems not to have been recorded in the vector measures literature. As a consequence of the existence of the aforementioned disordered ground states, we show that the spectrum of the GNS Hamiltonain associated to the bulk dynamics is deterministic with respect to the disorder.", "url": "https://arxiv.org/abs/2603.19475", "type": "理论", "summary": "1. 本文证明了满足统计平移不变性的随机局域相互作用量子自旋系统，在热力学极限下始终存在具有相同对称性的无序基态。\n2. 关键技术创新在于发展了一套适用于随机系统的李-罗宾逊边界理论，并形式化了C*代数上随机态的概念，证明了向量测度理论中未记录的弱-*版本Riesz-Markov-Kakutani定理。\n3. 由此导出的无序基态存在性表明，与之关联的GNS哈密顿量谱在无序分布意义下是确定性的，这为理解无序量子多体系统的普适性提供了严格基础。", "summary_source": "deepseek", "authors": [{"name": "Eric B. Roon"}, {"name": "Jeffrey H. Schenker"}], "featured_authors": [{"name": "Eric B. Roon"}, {"name": "Jeffrey H. Schenker"}], "author_count": 2}, {"id": "2603.19525", "category": "math-ph", "title": "Homotopy lattice gauge fields 1: The fields and their properties", "abstract": "We introduce homotopy lattice gauge fields (HLGFs), a version of gauge fields over a discretized base, based on a notion of higher parallel transport that enriches the usual parallel transport along paths on a lattice to also consider higher dimensional paths. Higher dimensional data keeps information about the parallel transport along homotopies of curves. With this data, a HLGF on a base space of dimension two or three determines a principal bundle over the base manifold. This data is also responsible for our formulas for the topological charge on two-dimensional bases. Our framework is an application of a nonabelian algebraic topology framework developed to solve the local to global problem in higher dimensional homotopy. No previous knowledge of higher category theory is assumed. The second part will be devoted to the space of fields as an arena for doing Quantum Field Theory, and to give the first examples of how our framework refines standard lattice gauge theory.", "url": "https://arxiv.org/abs/2603.19525", "type": "理论", "summary": "1. 该工作提出了一种基于格点离散基底的同伦格点规范场理论，将传统沿路径的平行传输推广至更高维路径。\n2. 其核心在于引入高维路径的平行传输数据，该数据不仅编码曲线同伦信息，还可在二维或三维基底上唯一确定主丛结构，并给出拓扑荷的显式计算公式。\n3. 此框架为第二部分在量子场论中的应用奠定了基础，并为精化标准格点规范理论提供了新的数学工具。", "summary_source": "deepseek", "authors": [{"name": "Juan Orendain"}, {"name": "Ivan Sanchez"}, {"name": "José A. Zapata"}], "featured_authors": [{"name": "Juan Orendain"}, {"name": "Ivan Sanchez"}, {"name": "José A. Zapata"}], "author_count": 3}, {"id": "2603.19522", "category": "quant-ph", "title": "Preserving MWPM-Decodability in Fault-Equivalent Rewrites", "abstract": "Decoding a quantum error correction code is generally NP-hard, but corrections must be applied at a high frequency to suppress noise successfully. Matchable codes, like the surface code, exhibit a special structure that makes it possible to efficiently, approximately solve the decoding problem through minimum-weight perfect matching (MWPM). However, this efficiency-enabling property can be lost when constructing implementations for fault-tolerant gadgets such as syndrome-extraction circuits or logical operations. In this work, we take a circuit-centric perspective to formalise how the decoding problem changes when applying ZX rewrites to a ZX diagram with a given detector basis. We demonstrate a set of rewrites that preserve MWPM-decodability of circuits and show that these matchability-preserving rewrites can be used to fault-tolerantly extract quantum circuits from phase-free ZX diagrams. In particular, this allows us to build efficiently decodable, fault-tolerant syndrome-extraction circuits for matchable codes.", "url": "https://arxiv.org/abs/2603.19522", "type": "理论", "summary": "1. 该工作从电路角度形式化分析了在给定探测器基的ZX图中应用ZX重写时解码问题的变化，并展示了一组能保持电路MWPM可解码性的重写规则。\n2. 其技术关键在于这些保持匹配性的重写规则使得相位自由的ZX图能够被容错地提取为量子电路，从而构建出可高效解码的症候提取电路。\n3. 这为匹配码（如表面码）的容错逻辑操作与症候提取电路设计提供了系统化方法，拓展了ZX演算在量子纠错实际实现中的应用前景。", "summary_source": "deepseek", "authors": [{"name": "Maximilian Schweikart"}, {"name": "Linnea Grans-Samuelsson"}, {"name": "Aleks Kissinger"}, {"name": "Benjamin Rodatz"}], "featured_authors": [{"name": "Maximilian Schweikart"}, {"name": "Linnea Grans-Samuelsson"}, {"name": "Aleks Kissinger"}, {"name": "Benjamin Rodatz"}], "author_count": 4}, {"id": "2603.19785", "category": "quant-ph", "title": "Transfer of nonlocality and entanglement of an open three-qubit W state in the background of dilaton black hole", "abstract": "Constrained by the complexity of theoretical calculations, current research on genuine tripartite nonlocality (GTN) within the relativistic framework concentrates mainly on Greenberger-Horne-Zeilinger-like states, with few studies addressing W states or even general tripartite states. In this paper, we apply numerical methods to investigate how environmental decoherence and spacetime dilaton influence GTN and genuine tripartite entanglement (GTE) of W states. Our results show that GTN in the physically accessible region displays a ``sudden death phenomenon'' and that sufficiently strong decoherence completely destroys GTN. By contrast, GTE in the physically accessible region initially remains unchanged and then decays only when the dilaton parameter becomes large. Notably, the GTN and GTE in the physically accessible region can be enhanced by adjusting the decoherence parameter. Furthermore, we also find that the GTN in the physically inaccessible region cannot be generated, whereas the GTE will be produced there. This implies that GTE can cross the event horizon of a black hole and realize the redistribution of quantum entanglement. Finally, we further discuss whether the GTN can be transferred to the bipartite subsystem of the system.", "url": "https://arxiv.org/abs/2603.19785", "type": "理论+数值", "summary": "1. 该工作通过数值模拟研究了开放量子系统中W态在膨胀子黑洞背景下的真三方非定域性与纠缠演化。\n2. 研究发现可及区域内的GTN会突发死亡而GTE保持稳定，且通过调节退相干参数可增强两者，同时GTE能穿越视界实现纠缠再分布。\n3. 这为相对论框架下多体量子关联的调控及黑洞信息悖论的研究提供了新的数值依据与理论线索。", "summary_source": "deepseek", "authors": [{"name": "Chun-yao Liu"}, {"name": "Zheng-wen Long"}, {"name": "Qi-liang He"}], "featured_authors": [{"name": "Chun-yao Liu"}, {"name": "Zheng-wen Long"}, {"name": "Qi-liang He"}], "author_count": 3}, {"id": "2603.19901", "category": "quant-ph", "title": "SDP bounds on quantum codes: rational certificates", "abstract": "A fundamental problem in quantum coding theory is to determine the maximum size of quantum codes of given block length and distance. A recent work introduced bounds based on semidefinite programming, strengthening the well-known quantum linear programming bounds. However, floating-point inaccuracies prevent the extraction of rigorous non-existence proofs from the numerical methods. Here, we address this by providing rational infeasibility certificates for a range of quantum codes. Using a clustered low-rank solver with heuristic rounding to algebraic expressions, we can improve upon $18$ upper bounds on the maximum size of $n$-qubit codes with $6 \\leq n \\leq 19$. Our work highlights the practicality and scalability of semidefinite programming for quantum coding bounds.", "url": "https://arxiv.org/abs/2603.19901", "type": "理论+数值", "summary": "1. 该论文通过为量子码的半正定规划界限提供有理不可行性证书，解决了浮点计算不精确性导致的严谨性缺失问题，并对6≤n≤19的量子比特码改进了18个最大尺寸上界。\n2. 其核心技术在于结合聚类低秩求解器与启发式向代数表达式舍入，实现了从数值结果到精确有理证书的转换，从而确保非存在性证明的数学可靠性。\n3. 此项工作凸显了半正定规划在量子编码理论中的实际可行性与扩展潜力，为未来更高效可靠的界限计算与理论探索奠定了坚实基础。", "summary_source": "deepseek", "authors": [{"name": "Gerard Anglès Munné"}, {"name": "Felix Huber"}], "featured_authors": [{"name": "Gerard Anglès Munné"}, {"name": "Felix Huber"}], "author_count": 2}, {"id": "2603.19927", "category": "quant-ph", "title": "One-parameter counterexamples to the refined Bessis-Moussa-Villani conjecture", "abstract": "The Bessis-Moussa-Villani (BMV) conjecture, originating in quantum statistical mechanics, was proved by Stahl after an influential reformulation by Lieb and Seiringer. A later refinement asks whether the normalized average over all words with $n$ letters $A$ and $m$ letters $B$ is always bounded above by $\\mathrm{tr}(A^nB^m)$ and below by $\\mathrm{tr}\\exp(n\\log A+m\\log B)$. We study a specific one-parameter family $(A_x, B_x)$ and derive exact closed formulas for both sides of the first inequality when $(n,m)=(5,5)$. In particular, $x=10^{-3}$ gives a counterexample.", "url": "https://arxiv.org/abs/2603.19927", "type": "理论", "summary": "1. 该工作研究了一个特定单参数矩阵族，推导了(n,m)=(5,5)情形下不等式两端精确的闭式表达式。\n2. 通过解析计算首次发现参数x=10^{-3}时该族矩阵违背了精化BMV猜想中的上界不等式，从而构造出反例。\n3. 这一反例彻底否定了精化猜想的普遍性，为理解厄密矩阵乘积迹的复杂行为提供了新的计算范式和理论起点。", "summary_source": "deepseek", "authors": [{"name": "Hyunho Cha"}], "featured_authors": [{"name": "Hyunho Cha"}], "author_count": 1}, {"id": "2603.19985", "category": "quant-ph", "title": "Cryptanalysis of four arbitrated quantum signature schemes", "abstract": "Arbitrated quantum signature (AQS) schemes aim at ensuring the authenticity of a message with the help of an arbitrator. Moreover, they aim at preventing repudiation, both from a sender that denies the origin of a message, and from a receiver who disavows its reception. Such protocols use quantum communication and are often designed to protect quantum messages. In this paper, we study four recently submitted AQS schemes and propose attacks on their security. Firstly, we look at Zhang, Sun, Zhang and Jia's AQS scheme which aims at signing quantum messages with chained CNOT encryption. We show that the sender can repudiate her messages and make false allegation of reception. Moreover, we show that a dishonest receiver can forge signatures. Secondly, we analyse Ding, Xin, Yang and Sang's AQS protocol to sign classical messages based on GHZ states. We show that both the sender and the receiver have simple repudiation strategies. Thirdly, we study Lu, Li, Yu and Han's AQS scheme that uses controlled teleportation to protect quantum messages. We expose forgeries, false allegation attacks and the possibility of repudiation by both parties. Fourthly, we focus on the AQS scheme by Zhang, Xin, Sun, Li and Li designed to sign classical messages without entangled states. We show that one can disavow the reception of messages, and that information-theoretic security is not achieved for other security goals.", "url": "https://arxiv.org/abs/2603.19985", "type": "理论", "summary": "1. 该论文系统分析了四种近期提出的仲裁量子签名方案，并提出了针对其安全性的攻击方法。\n2. 研究揭示了这些方案在防止发送方或接收方抵赖、抵御伪造签名等核心安全目标上均存在可被利用的漏洞。\n3. 这表明现有方案的安全证明存在缺陷，为设计具有信息论安全保证的实用量子签名协议指明了改进方向。", "summary_source": "deepseek", "authors": [{"name": "Pierre-Alain Jacqmin"}, {"name": "Jean Liénardy"}], "featured_authors": [{"name": "Pierre-Alain Jacqmin"}, {"name": "Jean Liénardy"}], "author_count": 2}, {"id": "2603.20024", "category": "quant-ph", "title": "Layered Quantum Architecture Search for 3D Point Cloud Classification", "abstract": "We introduce layered Quantum Architecture Search (layered-QAS), a strategy inspired by classical network morphism that designs Parametrised Quantum Circuit (PQC) architectures by progressively growing and adapting them. PQCs offer strong expressiveness with relatively few parameters, yet they lack standard architectural layers (e.g., convolution, attention) that encode inductive biases for a given learning task. To assess the effectiveness of our method, we focus on 3D point cloud classification as a challenging yet highly structured problem. Whereas prior work on this task has used PQCs only as feature extractors for classical classifiers, our approach uses the PQC as the main building block of the classification model. Simulations show that our layered-QAS mitigates barren plateau, outperforms quantum-adapted local and evolutionary QAS baselines, and achieves state-of-the-art results among PQC-based methods on the ModelNet dataset.", "url": "https://arxiv.org/abs/2603.20024", "type": "理论+数值", "summary": "1. 该研究提出了分层量子架构搜索方法，并将其应用于三维点云分类任务。\n2. 其核心在于将参数化量子电路作为分类模型主体，通过渐进式生长策略有效缓解了贫瘠高原问题。\n3. 这为量子机器学习在复杂结构化任务中的应用提供了新范式，推动了量子架构自动设计的发展。", "summary_source": "deepseek", "authors": [{"name": "Natacha Kuete Meli"}, {"name": "Jovita Lukasik"}, {"name": "Vladislav Golyanik"}, {"name": "Michael Moeller"}], "featured_authors": [{"name": "Natacha Kuete Meli"}, {"name": "Jovita Lukasik"}, {"name": "Vladislav Golyanik"}, {"name": "Michael Moeller"}], "author_count": 4}, {"id": "2603.20038", "category": "quant-ph", "title": "Search-Driven Clause Learning for Product-State Quantum $k$-SAT (PRODSAT-QSAT)", "abstract": "We study PRODSAT-QSAT($k$): given rank-one $k$-local projectors, determine whether a quantum $k$-SAT instance admits a satisfying product state. We present a CDCL-style refutation framework that searches a finite partition of each qubit's Bloch sphere while a sound theory solver checks region feasibility using a geometric overapproximation of the projection amplitudes for each constraint. When the theory solver proves that no state in a region can satisfy a constraint, it produces a sound conflict clause that blocks that region; accumulated blocking clauses can yield a global result of product-state unsatisfiability (UN-PRODSAT). We formalise the problem, prove the soundness of the clause-learning rule, and describe a practical algorithm and implementation.", "url": "https://arxiv.org/abs/2603.20038", "type": "理论+数值", "summary": "1. 该工作针对PRODSAT-QSAT问题，引入了一个基于冲突驱动子句学习(CDCL)框架的判定算法，以检验量子k-SAT实例是否存在满足条件的直积态。\n2. 其核心创新在于将每个量子比特的布洛赫球面离散化为有限区域，并通过几何过近似技术构建了可证明的区域不可行性检验与冲突子句生成机制。\n3. 该算法为严格证明量子k-SAT实例的直积态不可满足性提供了首个形式化、可实现的判定工具，对量子约束满足问题的算法研究具有基础性意义。", "summary_source": "deepseek", "authors": [{"name": "Samuel González-Castillo"}, {"name": "Joon Hyung Lee"}, {"name": "Alfons Laarman"}], "featured_authors": [{"name": "Samuel González-Castillo"}, {"name": "Joon Hyung Lee"}, {"name": "Alfons Laarman"}], "author_count": 3}, {"id": "2603.20072", "category": "quant-ph", "title": "Antenna Array Beamforming Based on a Hybrid Quantum Optimization Framework", "abstract": "This paper proposes a hybrid quantum optimization framework for large-scale antenna-array beamforming with jointly optimized discrete phases and continuous amplitudes. The method combines quantum-inspired search with classical gradient refinement to handle mixed discrete-continuous variables efficiently. For phase optimization, a Gray-code and odd-combination encoding scheme is introduced to improve robustness and avoid the complexity explosion of higher-order Ising models. For amplitude optimization, a geometric spin-combination encoding and a two-stage strategy are developed, using quantum-inspired optimization for coarse search and gradient optimization for fine refinement. To enhance solution diversity and quality, a rainbow quantum-inspired algorithm integrates multiple optimizers for parallel exploration, followed by hierarchical-clustering-based candidate refinement. In addition, a double outer-product method and an augmented version are proposed to construct the coupling matrix and bias vector efficiently, improving numerical precision and implementation efficiency. Under the scoring rules of the 7th National Quantum Computing Hackathon, simulations on a 32-element antenna array show that the proposed method achieves a score of 461.58 under constraints on near-main-lobe sidelobes, wide-angle sidelobes, beamwidth, and optimization time, nearly doubling the baseline score. The proposed framework provides an effective reference for beamforming optimization in future wireless communication systems.", "url": "https://arxiv.org/abs/2603.20072", "type": "理论+数值", "summary": "1. 该工作提出了一个用于大规模天线阵列波束赋形的混合量子优化框架，联合优化离散相位与连续幅度。\n2. 其技术优势在于结合量子启发搜索与经典梯度精修，通过特定编码策略高效处理混合变量。\n3. 这为未来无线通信系统中的波束赋形优化提供了有效的算法参考与实现基础。", "summary_source": "deepseek", "authors": [{"name": "Shuai Zeng"}], "featured_authors": [{"name": "Shuai Zeng"}], "author_count": 1}, {"id": "2603.20091", "category": "quant-ph", "title": "Symmetric Resourceful Steady States via Non-Markovian Dissipation", "abstract": "We prove a no-go theorem for symmetry-based dissipative engineering of collective-spin steady states: in spin-only Lindblad dynamics with jump operators linear in the collective-spin operators, any unique steady state exhibiting at least $\\mathbb{Z}_2 \\times \\mathbb{Z}_2$ symmetry is necessarily the maximally mixed state. We then show that bath memory lifts this obstruction, enabling unique entangled steady states with a prescribed symmetry and a metrological gain, and providing a steady-state witness of non-Markovianity. Notably, this framework is largely insensitive to the microscopic details of the bath.", "url": "https://arxiv.org/abs/2603.20091", "type": "理论", "summary": "1. 本文证明了仅含集体自旋线性跳算子的Lindblad动力学中存在对称性稳态无解的禁阻定理，并通过引入非马尔可夫耗散实现了具有预设对称性的唯一稳态制备。\n2. 核心突破在于揭示了环境记忆效应可突破线性耗散的对称性约束，制备出兼具纠缠资源和计量学优势的稳态，且该框架对微观浴细节不敏感。\n3. 这为基于对称性保护的稳态量子资源工程提供了新路径，同时为通过稳态特征探测非马尔可夫性提供了可行方案。", "summary_source": "deepseek", "authors": [{"name": "Baptiste Debecker"}, {"name": "Eduardo Serrano-Ensástiga"}, {"name": "Thierry Bastin"}, {"name": "François Damanet"}, {"name": "John Martin"}], "featured_authors": [{"name": "Baptiste Debecker"}, {"name": "Eduardo Serrano-Ensástiga"}, {"name": "Thierry Bastin"}, {"name": "François Damanet"}, {"name": "John Martin"}], "author_count": 5}, {"id": "2603.20168", "category": "quant-ph", "title": "Certified Quantum Schrödinger Control via Hierarchical Tucker Models", "abstract": "High-dimensional Schrödinger systems arising from tensor-product discretizations suffer from exponential state growth, making direct controller synthesis and real-time closed-loop simulation computationally challenging. Hierarchical Tucker (HT) tensor representations offer scalable low-rank surrogates, but the impact of fixed-rank truncation on closed-loop stability is not well understood. This paper develops a local robustness framework for sampled-data feedback control implemented with fixed-rank HT projections. By viewing each truncation as a bounded, rank-dependent perturbation of the nominal closed loop, and assuming a local phase-invariant contraction certificate together with trajectory-level hierarchical spectral decay, we show that the HT-projected dynamics are practically exponentially stable: trajectories converge to a dimension-independent tube whose radius decreases with the prescribed rank. We further obtain an explicit logarithmic rank-accuracy relation and establish conditions under which controllers designed on the HT-truncated surrogate model retain practical exponential tracking guarantees when deployed on the full system, together with an explicit bound quantifying the resulting surrogate-to-plant mismatch. A compact lattice example demonstrates the applicability of the framework.", "url": "https://arxiv.org/abs/2603.20168", "type": "理论+数值", "summary": "1. 该研究针对高维薛定谔控制系统中的指数状态增长问题，构建了一个基于层次塔克张量表示的局部鲁棒性分析框架，用于采样数据反馈控制。\n2. 核心在于将固定秩截断建模为有界扰动，结合局部相位不变收缩证书和轨迹级谱衰减，严格证明了投影动力学的实际指数稳定性，并导出了显式的对数秩-精度关系及代理模型与完整系统的失配界限。\n3. 这为利用低秩张量方法实现可认证的量子控制器设计和闭环仿真提供了理论保障，并通过紧凑晶格示例验证了框架的适用性。", "summary_source": "deepseek", "authors": [{"name": "Nahid Binandeh Dehaghani"}, {"name": "Rafal Wisniewski"}, {"name": "A. Pedro Aguiar"}], "featured_authors": [{"name": "Nahid Binandeh Dehaghani"}, {"name": "Rafal Wisniewski"}, {"name": "A. Pedro Aguiar"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
