k regions rather than globally. By exploiting spatial noise asymmetries, LEP reduces resource consumption and enables scalable purification strategies for larger quantum systems.", "url": "https://arxiv.org/abs/2604.02428", "type": "理论", "summary": "1. 该工作提出了局域化纠缠纯化协议，为多体量子网络实现了基于区域而非全局的纠缠蒸馏新范式。\n2. 其核心在于利用空间噪声不对称性，显著降低了资源消耗，为实现大规模量子系统的可扩展纯化提供了技术路径。\n3. 这为分布式量子计算与量子网络的实际部署提供了更高效的纠缠资源管理方案，并启发了对噪声空间结构的进一步利用。", "summary_source": "deepseek", "authors": [{"name": "Katerina Stloukalova"}, {"name": "Jorge Miguel-Ramiro"}, {"name": "Wolfgang Dür"}, {"name": "Julius Wallnöfer"}], "featured_authors": [{"name": "Katerina Stloukalova"}, {"name": "Jorge Miguel-Ramiro"}, {"name": "Wolfgang Dür"}, {"name": "Julius Wallnöfer"}], "author_count": 4}, {"id": "2604.02484", "category": "quant-ph", "title": "Hybrid quantum-classical dynamics with stationary thermal states", "abstract": "Quantum and classical systems can consistently be coupled via non-unitary time-irreversible mechanisms. In this paper we characterize which kind of corresponding dynamics converge in the stationary regime to a thermal hybrid state, that is, a density matrix that maximizes the hybrid arrangement entropy under the constraints of a canonical ensemble. Introducing a detailed balance condition, it is found that a specific subclass of hybrid Lindblad equations fulfill the demanded requirement. The main theoretical results are exemplified through a set of specific examples that in addition lighten how the thermal state of each subsystem in isolation is affected by their mutual coupling. In particular, a Gaussian thermal state could become a bimodal distribution when increasing the interaction strength of a classical subsystem with a quantum two-level subsystem.", "url": "https://arxiv.org/abs/2604.02484", "type": "理论", "summary": "1. 该研究刻画了能使混合量子-经典系统动力学在稳态下收敛于热混合态的特定类型林德布拉德方程。\n2. 通过引入细致平衡条件，严格推导出该方程子类可确保系统演化至满足正则系综约束的熵最大混合态。\n3. 这一理论框架揭示了子系统间耦合如何显著改变其各自的热态分布，为研究非平凡量子-经典协同热化现象提供了基础。", "summary_source": "deepseek", "authors": [{"name": "Adrián A. Budini"}], "featured_authors": [{"name": "Adrián A. Budini"}], "author_count": 1}, {"id": "2604.02530", "category": "quant-ph", "title": "AQ-Stacker: An Adaptive Quantum Matrix Multiplication Algorithm with Scaling via Parallel Hadamard Stacking", "abstract": "Matrix multiplication (MatMul) is the computational backbone of modern machine learning, yet its classical complexity remains a bottleneck for large-scale data processing. We propose a hybrid quantum-classical algorithm for matrix multiplication based on an adaptive configuration of Hadamard tests. By leveraging Quantum Random Access Memory (QRAM) for state preparation, we demonstrate that the complexity of computing the inner product of two vectors can be reduced to $O(\\log N)$. We introduce an \"Adaptive Stacking\" framework that allows the algorithm to dynamically reconfigure its execution pattern from sequential horizontal stacking to massive vertical parallelism based on available qubit resources. This flexibility enables a tunable time-complexity range, theoretically reaching $O(N^2)$ on fault-tolerant systems while maintaining compatibility with near-term hardware. We validate the numerical stability of our approach through a Quantum Machine Learning (QML) simulation, achieving 96% accuracy on the MNIST handwritten digit dataset. Our results suggest that adaptive quantum MatMul provides a viable path toward super-classical efficiency in high-dimensional linear algebra operations.", "url": "https://arxiv.org/abs/2604.02530", "type": "数值", "summary": "1. 本文提出了一种基于自适应哈达玛测试配置的混合量子经典矩阵乘法算法框架。\n2. 其核心技术在于引入了自适应堆叠框架，能依据可用量子比特资源动态调整执行模式，并利用QRAM将向量内积计算复杂度降至对数级。\n3. 这为在近期量子硬件上实现可扩展的高维线性代数运算，并最终达成超越经典计算效率提供了可行的技术路径。", "summary_source": "deepseek", "authors": [{"name": "Wladimir Silva"}], "featured_authors": [{"name": "Wladimir Silva"}], "author_count": 1}, {"id": "2604.02550", "category": "quant-ph", "title": "Open-source implementation of the anti-Hermitian contracted Schrödinger equation for electronic ground and excited states", "abstract": "Efficient simulation of strongly correlated electrons has become a routine tool in molecular electronic structure theory due to recent advances in approximate configuration interaction (CI) techniques. Nonetheless, the quantitative and predictive description of molecular electronic states remains a significant challenge due to the difficulty of computing all-electron correlation beyond CI. Here, we describe a new open-source implementation of the anti-Hermitian contracted Schrödinger equation (ACSE) for use in accurate simulation of all-electron correlation in molecules. In contrast to standard approaches via multireference perturbation theory, the scaling of the ACSE does not depend on the complexity of the strongly correlated reference wavefunction. Furthermore, the ACSE employs the exact electronic Hamiltonian, rather than an approximate perturbative Hamiltonian. Our benchmark results demonstrate good accuracy for main group and transition metal systems, in weakly and strongly correlated regimes, with various basis sets, and for ground and excited states. The results suggest that the ACSE has potential as a scalable and robust technique for simulating all-electron correlation in molecular ground and excited states.", "url": "https://arxiv.org/abs/2604.02550", "type": "理论+数值", "summary": "1. 本研究开发了反厄米收缩薛定谔方程的开源代码，实现了对分子中全电子关联的高精度模拟，适用于基态和激发态计算。\n2. 该方法的核心物理优势是其计算复杂度不随参考波函数的强关联程度而变化，且直接使用精确哈密顿量，从而克服了多参考微扰理论的标度问题和近似性。\n3. 广泛的数值测试表明，该技术在多种化学体系、关联强度和基组下均表现良好，为未来强关联电子结构的理论研究提供了新的可靠工具。", "summary_source": "deepseek", "authors": [{"name": "Daniel Gibney"}, {"name": "Anthony W Schlimgen"}, {"name": "Jan-Niklas Boyn"}], "featured_authors": [{"name": "Daniel Gibney"}, {"name": "Anthony W Schlimgen"}, {"name": "Jan-Niklas Boyn"}], "author_count": 3}, {"id": "2604.02635", "category": "quant-ph", "title": "From Liouville equation to universal quantum control: A study of generating ultra highly squeezed states", "abstract": "Within a unified framework, we reveal that the seemingly disparate control approaches for classical and quantum continuous-variable systems are interconnected via differential manifolds of the ancillary representations. For classical systems, the ancillary representation is defined by the time-dependent ancillary canonical variables resulting from a symplectic transformation over the original canonical variables. Under the conditions of the Hamilton-Jacobi equation, the ancillary canonical variables act as dynamical invariants to guide the system nonadiabatically through the entire phase space. The second quantization of the Liouville equation for the canonical variables leads to the Heisenberg equation for the relevant ancillary operators, which is found to be a sufficient condition to yield nonadiabatic passages towards arbitrary target states in both Hermitian and non-Hermitian systems and constrained exact solutions of the time-dependent Schroedinger equation. Using the non-Hermitian Hamiltonian rigorously derived from the Lindblad master equation, our theory is exemplified by the generation of single-mode squeezed states with a squeezing level of 29.3 dB and double-mode squeezed states with 20.5 dB, respectively.", "url": "https://arxiv.org/abs/2604.02635", "type": "理论+数值", "summary": "1. 该工作建立了一个统一框架，揭示了经典与量子连续变量系统控制方法通过辅助表示微分流形的内在联系。\n2. 核心在于通过对正则变量进行辛变换定义辅助变量，并证明刘维尔方程的二阶量子化所得海森堡方程是实现厄米及非厄米系统中任意目标态非绝热演化的充分条件。\n3. 此理论框架为超越绝热极限的普适量子态制备提供了严格路径，并以从林德布拉德主方程导出的非厄米哈密顿量生成29.3分贝单模与20.5分贝双模压缩态为例证。", "summary_source": "deepseek", "authors": [{"name": "Zhu-yao Jin"}, {"name": "J. Q. You"}, {"name": "Jun Jing"}], "featured_authors": [{"name": "Zhu-yao Jin"}, {"name": "J. Q. You"}, {"name": "Jun Jing"}], "author_count": 3}, {"id": "2604.02731", "category": "quant-ph", "title": "Polaron Transformed Canonically Consistent Quantum Master Equation", "abstract": "A central challenge in the theory of open quantum systems is the development of theoretical frameworks capable of accurately describing large, strongly interacting quantum many-body systems in the regime of strong system-bath interaction. In this work, we take a step toward this goal by formulating a polaron-transformed version of the canonically consistent quantum master equation (CCQME) [T. Becker et al., Phys. Rev. Lett. 129, 200403 (2022)]. The CCQME extends beyond standard weak-coupling approaches while retaining the same numerical complexity as conventional quantum master equations, thereby enabling the treatment of large quantum systems. The polaron transformation further enhances the accessible system-bath interaction strengths, allowing us to move from moderate to strong interaction regimes. We present a unified and transparent derivation of these two approaches and combine them to obtain the polaron-transformed CCQME (PT-CCQME). Applying our method to the paradigmatic spin-boson model, we find excellent agreement with numerically exact time-evolving matrix product operator (TEMPO) simulations. Finally, we predict an initial-state-independent slowing down of thermalization in the strong-coupling regime of the spin-boson model.", "url": "https://arxiv.org/abs/2604.02731", "type": "理论+数值", "summary": "1. 该论文发展了一种基于极化子变换的规范一致量子主方程（PT-CCQME），用于处理开放量子系统中的强系统-环境相互作用问题。\n2. 其核心创新在于通过结合极化子变换与CCQME，显著扩展了可处理的相互作用强度范围，同时维持了与传统量子主方程相当的数值效率，并在自旋-玻色模型验证中与精确时间演化矩阵乘积算子（TEMPO）模拟完美吻合。\n3. 由此首次预测了强耦合条件下自旋-玻色模型热化动力学中初始态无关的减缓效应，这为深入理解开放量子多体系统在强耗散区域的非平衡行为提供了关键理论启示。", "summary_source": "deepseek", "authors": [{"name": "Juzar Thingna"}, {"name": "Xiansong Xu"}, {"name": "Daniel Manzano"}], "featured_authors": [{"name": "Juzar Thingna"}, {"name": "Xiansong Xu"}, {"name": "Daniel Manzano"}], "author_count": 3}, {"id": "2604.02741", "category": "quant-ph", "title": "Computational framework for non-Markovian multi-emitter dynamics beyond the single-excitation limit", "abstract": "While non-Markovian dynamics have been extensively studied in the single-excitation limit to predict non-trivial phenomena, this regime remains an idealization. Moving beyond it is essential, as optical nonlinearities and phase-error accumulation in multi-photon processes render the Markovian approximation fragile. In this work, we present a Green's function-based framework for modeling non-Markovian multi-emitter quantum electrodynamics within the two-excitation manifold. The modified Langevin noise (M-LN) formalism is employed for first-principles treatment of dissipative environments, while the emitter-centered mode (ECM) framework ensures computational tractability. Unlike conventional approaches that integrate out the reservoir, we construct a non-Markovian hierarchy of coupled differential equations by explicitly retaining photonic amplitudes. Within the two-excitation hierarchy, the formulation preserves total probability and retains phase information necessary to capture multi-photon interference. As numerical demonstrations, we investigate non-Markovian atom-field interactions in structured semi-infinite waveguide environments. We first consider a homogeneous waveguide as a baseline, observing enhanced Bell-state fidelity in selected configurations. Next, we examine collective decay of symmetric Dicke states in a waveguide with an embedded lossy dielectric slab, revealing selective stabilization and delayed excitation transfer induced by the structured reservoir. Finally, we analyze entanglement dynamics in the same setting, highlighting entanglement sudden birth and oscillatory revivals. In principle, the framework applies to arbitrary electromagnetic environments for which the dyadic Green's function can be obtained numerically, providing a versatile tool for investigating complex non-Markovian multi-photon phenomena beyond the single-excitation limit.", "url": "https://arxiv.org/abs/2604.02741", "type": "理论+数值", "summary": "1. 该工作发展了一个基于格林函数的计算框架，用于模拟双激发态流形内的非马尔可夫多发射体量子电动力学。\n2. 其技术核心在于结合修正的朗之万噪声形式与发射体中心模式框架，通过显式保留光子振幅构建了保证概率守恒的非马尔可夫耦合微分方程层次。\n3. 该框架原则上适用于任意可通过数值获取并矢格林函数的环境，为研究超越单激发极限的复杂非线性量子光学现象提供了通用工具。", "summary_source": "deepseek", "authors": [{"name": "Hyunwoo Choi"}, {"name": "Weng Cho Chew"}, {"name": "Dong-Yeop Na"}], "featured_authors": [{"name": "Hyunwoo Choi"}, {"name": "Weng Cho Chew"}, {"name": "Dong-Yeop Na"}], "author_count": 3}, {"id": "2604.02793", "category": "quant-ph", "title": "Parity $\\notin$ QAC0 $\\iff$ QAC0 is Fourier-Concentrated", "abstract": "A major open problem in understanding shallow quantum circuits (QAC$^0$) is whether they can compute Parity. We show that this question is solely about the Fourier spectrum of QAC$^0$: any QAC$^0$ circuit with non-negligible high-level Fourier mass suffices to exactly compute PARITY in QAC$^0$. Thus, proving a quantum analog of the seminal LMN theorem for AC$^0$ is necessary to bound the quantum circuit complexity of PARITY. In the other direction, LMN does not fully capture the limitations of AC$^0$. For example, despite MAJORITY having $99\\%$ of its weight on low-degree Fourier coefficients, no AC$^0$ circuit can non-trivially correlate with it. In contrast, we provide a QAC$^0$ circuit that achieves $(1-o(1))$ correlation with MAJORITY, establishing the first average-case decision separation between AC$^0$ and QAC$^0$. This suggests a uniquely quantum phenomenon: unlike in the classical setting, Fourier concentration may largely characterize the power of QAC$^0$. PARITY is also known to be equivalent in QAC$^0$ to inherently quantum tasks such as preparing GHZ states to high fidelity. We extend this equivalence to a broad class of state-synthesis tasks. We demonstrate that existing metrics such as trace distance, fidelity, and mutual information are insufficient to capture these states and introduce a new measure, felinity. We prove that preparing any state with non-negligible felinity, or derived states such as poly(n)-weight Dicke states, implies PARITY $\\in$ QAC$^0$.", "url": "https://arxiv.org/abs/2604.02793", "type": "理论", "summary": "1. 该工作证明了奇偶性（Parity）不在浅层量子电路（QAC^0）中可计算当且仅当QAC^0是傅里叶集中的，并将此等价关系推广到制备高保真度GHZ态等量子态合成任务。\n2. 通过构造与多数函数（MAJORITY）具有(1-o(1))相关性的QAC^0电路，首次实现了经典AC^0与量子QAC^0在平均决策问题上的分离，突出了量子计算的优势。\n3. 这引入了新度量“felinity”来量化量子态合成，表明傅里叶集中性可能更本质地刻画QAC^0的计算能力，为量子电路复杂性和态制备研究提供新方向。", "summary_source": "deepseek", "authors": [{"name": "Lucas Gretta"}, {"name": "Meghal Gupta"}, {"name": "Malvika Raj Joshi"}], "featured_authors": [{"name": "Lucas Gretta"}, {"name": "Meghal Gupta"}, {"name": "Malvika Raj Joshi"}], "author_count": 3}, {"id": "2604.02873", "category": "quant-ph", "title": "Frame perspectives for process matrices: from coordinate parametrization to spacetime representation", "abstract": "We study how to implement and transform frame perspectives for quantum processes in the process-matrix formalism. We argue that, for pure processes, the causal reference frames (CRF)and time-delocalized subsystems (TDS) formalisms should be understood as coordinate parametrizations of a single perspective-neutral higher-order object. A genuine perspective arises when one endows the process with additional frame data by choosing an operational foliation into circuit fragments (events). With this distinction, existing no-go results acquire a clear scope: they rule out unitary transformations that preserve time foliation, attempting to switch perspectives while keeping the fragment boundaries -- hence the global past/future partition -- fixed. Focusing on the quantum switch, we construct explicit maps that transform perspectives unitarily at the price of reshuffling the notions of past and future. We then show that unitary transformations between perspectives can also be achieved in a different way, namely by extending the process with subsystems that define quantum reference frames and provide a shared spatiotemporal scaffold. In this extended setting, complementary CRF/TDS perspectives become unitarily related while preserving global past and future. We discuss how this frame-perspectival approach informs the broader question of empirical realizability of abstract process matrices.", "url": "https://arxiv.org/abs/2604.02873", "type": "理论", "summary": "1. 本文在过程矩阵框架下研究了量子过程中参考系视角的实施与变换，将因果参考系（CRF）和时间非局域子系统（TDS）形式体系统一理解为纯过程的单一视角中性高阶对象的坐标参数化。\n2. 核心在于通过引入操作性的分层（事件划分）来定义真实视角，并阐明现有不可行结论的适用范围：它们仅排除了保持时间分层结构的酉变换，而在量子开关示例中，通过重构过去/未来概念可实现视角间的酉变换。\n3. 这为通过扩展量子参考系子系统实现视角间酉变换提供了具体方案，并为抽象过程矩阵的实验实现问题奠定了框架基础。", "summary_source": "deepseek", "authors": [{"name": "Luca Apadula"}, {"name": "Alexei Grinbaum"}, {"name": "Časlav Brukner"}], "featured_authors": [{"name": "Luca Apadula"}, {"name": "Alexei Grinbaum"}, {"name": "Časlav Brukner"}], "author_count": 3}, {"id": "2604.02874", "category": "quant-ph", "title": "A Unified Poisson Summation Framework for Generalized Quantum Matrix Transformations", "abstract": "We present a unified algorithmic framework for quantum simulation of non-unitary dynamics and matrix functions, governed by the principle of spectral aliasing derived from the Poisson Summation Formula (PSF). By reinterpreting discretization errors as spectral folding in dual domains, we synthesize two distinct algorithmic paths: (i) the Fourier-PSF path, generalizing transmutation methods for time-domain filtering, which is optimal for singular and fractional dynamics $e^{-tH^\\alpha}$, here $H\\succeq 0$; and (ii) the contour-PSF path, a novel discrete contour transform based on the resolvent formalism, which achieves exponential convergence for holomorphic matrix functions via radius optimization. This dual framework resolves the smoothness-sparsity trade-off: it utilizes the Fourier basis to handle branch-point singularities where analyticity fails, and the Resolvent basis to exploit complex-plane regularity where it exists. We demonstrate the versatility of this framework by efficiently simulating diverse phenomena, from fractional anomalous diffusion to high-precision solutions of stiff differential equations, outperforming existing methods in their respective optimal regimes.", "url": "https://arxiv.org/abs/2604.02874", "type": "理论+数值", "summary": "1. 该工作提出了基于泊松求和公式的量子算法统一框架，用于非幺正动力学与矩阵函数的模拟。\n2. 其核心创新在于通过频谱混叠原理构建了傅里叶-泊松与围道-泊松双路径算法，解决了光滑度-稀疏性权衡问题。\n3. 这为分数阶反常扩散、刚性微分方程等广泛问题的量子模拟提供了超越现有方法性能的新途径。", "summary_source": "deepseek", "authors": [{"name": "Chao Wang"}, {"name": "Xi-Ning Zhuang"}, {"name": "Menghan Dou"}, {"name": "Zhao-Yun Chen"}, {"name": "Guo-Ping Guo"}], "featured_authors": [{"name": "Chao Wang"}, {"name": "Xi-Ning Zhuang"}, {"name": "Menghan Dou"}, {"name": "Zhao-Yun Chen"}, {"name": "Guo-Ping Guo"}], "author_count": 5}, {"id": "2604.02962", "category": "quant-ph", "title": "Universal Robust Quantum Gates via Doubly Geometric Control", "abstract": "Geometric quantum computation offers a potential route to fault-tolerant quantum information processing by exploiting the global nature of geometric phases. However, achieving controlled high-order suppression of multiple error sources remains a long-standing limitation, particularly in realistic large-scale circuits with complex noise environments. This limitation is largely due to the absence of a general framework that directly characterizes error accumulation and enables systematic improvement. Here we establish such a framework for universal doubly geometric gates by embedding target operations into a hierarchy of level-n identity constructions. This approach enables direct quantification of error accumulation while removing structural constraints inherent in previous schemes. We analytically show that the defining conditions lead to simultaneous fourth-order suppression of control errors, with a systematic extension to sixth-order suppression via higher-level constructions. Our results establish doubly geometric control as a general and scalable route toward high-order robust quantum gates, with potential implications for fault-tolerant quantum information processing.", "url": "https://arxiv.org/abs/2604.02962", "type": "理论", "summary": "1. 该工作建立了一个通过层级化n阶恒等构造实现普适双重几何量子门的理论框架。\n2. 其核心在于通过该构造直接量化误差积累，并同时实现对控制误差的四阶抑制。\n3. 这为可扩展的高阶鲁棒量子门设计及容错量子信息处理提供了系统性途径。", "summary_source": "deepseek", "authors": [{"name": "Hai Xu"}, {"name": "Tao Chen"}, {"name": "Junkai Zeng"}, {"name": "Xiu-Hao Deng"}, {"name": "Fang Gao"}, {"name": "Xin Wang"}, {"name": "Zheng-Yuan Xue"}, {"name": "Chengxian Zhang"}], "featured_authors": [{"name": "Hai Xu"}, {"name": "Tao Chen"}, {"name": "Junkai Zeng"}, {"name": "Xin Wang"}, {"name": "Zheng-Yuan Xue"}, {"name": "Chengxian Zhang"}], "author_count": 8}, {"id": "2604.03005", "category": "quant-ph", "title": "Quantum mutual information, coherence and unified relations of top quarks in QCD processes", "abstract": "As the most massive particle in the Standard Model, the top quark's exceptionally short lifetime preserves its spin polarization information through direct decay, making it an ideal system for probing quantum correlations in high-energy physics. In this letter, we presents a comprehensive investigation of quantum correlations in top quark-antiquark pairs produced through QCD. We employ multiple quantum information theoretic measures including quantum mutual information, relative entropy of coherence, complete complementarity relations, and the intrinsic relationship, establishing their dependence on kinematic variables. Furthermore, we find that for quarks and gluons initial mixing, as the probability of gluons Wgg increases, the maximum of the left-hand side of the intrinsic relation also increases. We thus believe the current findings are beneficial to insight into the systemic quantumness in QCD.", "url": "https://arxiv.org/abs/2604.03005", "type": "理论", "summary": "1. 本工作综合运用量子互信息、相干性相对熵、完全互补关系及本征关系，深入探究了量子色动力学产生顶夸克对的量子关联特性。\n2. 主要创新点在于建立了关联度量与运动学变量的依赖关系，并发现初态胶子组分Wgg增大时本征关系左侧最大值单调增加，揭示了初态混合的量子效应。\n3. 此研究为理解QCD中的系统量子性提供了新证据，有望推动高能物理与量子信息科学的交叉领域发展。", "summary_source": "deepseek", "authors": [{"name": "Duo-Duo Chen"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "featured_authors": [{"name": "Duo-Duo Chen"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "author_count": 4}, {"id": "2604.03184", "category": "quant-ph", "title": "Quantum Contact Processes on a Topological Lattice", "abstract": "Contact processes play an important role in classical non-equilibrium dynamics, describing the spreading of diseases, the dynamics of earthquakes and forest fires, and the distribution of information through the internet. Here we show that their quantum counterpart, where the spreading occurs through coherent couplings, displays even richer dynamics and offers new means of control. A quantum contact process on a topologically non-trivial lattice can be confined to a protected subspace corresponding to either a single site or a fully excited lattice. Furthermore, excitation spreading can be controlled to occur in quantized steps and on demand when employing topological pumps. We show that the many-body dynamics of excited domains can be mapped to an effective single-particle model, which also determines the topological properties. Throughout this work, we consider a specific type of contact process corresponding to coherent Rydberg facilitation in a tweezer array of trapped atoms in a one-dimensional lattice.", "url": "https://arxiv.org/abs/2604.03184", "type": "理论", "summary": "1. 该工作研究了拓扑晶格上的量子接触过程，并在里德堡原子光镊阵列中实现了相干激发传播的受控动力学。\n2. 其核心在于利用拓扑泵浦实现了激发在保护子空间中的量子化步进式传播，并将多体动力学映射到决定拓扑性质的有效单粒子模型。\n3. 这为在可控量子平台上探索非平衡拓扑动力学及相干激发输运提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Julius Bohm"}, {"name": "Richard Schmidt"}, {"name": "Michael Fleischhauer"}, {"name": "Daniel Brady"}], "featured_authors": [{"name": "Julius Bohm"}, {"name": "Richard Schmidt"}, {"name": "Michael Fleischhauer"}, {"name": "Daniel Brady"}], "author_count": 4}, {"id": "2604.03228", "category": "quant-ph", "title": "Belief Propagation and Tensor Network Expansions for Many-Body Quantum Systems: Rigorous Results and Fundamental Limits", "abstract": "Belief propagation (BP) provides a scalable heuristic for contracting tensor networks on loopy graphs, but its success in quantum many-body settings has largely rested on empirical evidence. Developing upon a recently introduced cluster-expansion framework for tensor networks, we rigorously study the applicability of BP to many-body quantum systems. For a state represented as a PEPS satisfying a ``loop-decay\" condition, we prove that BP supplemented by cluster corrections approximates local observables with exponentially small relative error, and we give explicit formulas expressing local expectation values as BP predictions dressed by connected clusters intersecting the observable region. This representation establishes a direct link between cluster corrections and physical correlation functions. As a result, we show that ``loop-decay\" \\emph{necessarily implies} exponential decay of connected correlations, yielding sharp, rigorous criteria for when BP can and cannot succeed, and ruling out its validity at critical points. Numerical simulations of the two- and three-dimensional transverse field Ising model at zero and finite temperature confirm our analytical predictions, demonstrating quantitative accuracy deep in gapped phases and systematic failure near criticality.", "url": "https://arxiv.org/abs/2604.03228", "type": "理论+数值", "summary": "1. 该工作基于张量网络的簇展开框架，严格研究了置信传播算法在满足“环路衰减”条件的PEPS态中计算局域可观测量时的适用性与基本极限。\n2. 关键点在于严格证明了该条件下，置信传播辅以簇修正能以指数小相对误差近似局域期望值，并揭示了簇修正与物理关联函数间的直接联系，从而将环路衰减与关联衰减必然关联。\n3. 这为置信传播在量子多体系统中的应用提供了明确的严格判据，既解释了其在能隙相中的成功，也从根本上排除了其在临界点附近的有效性，为张量网络算法的可靠性分析建立了理论基础。", "summary_source": "deepseek", "authors": [{"name": "Siddhant Midha"}, {"name": "Grace M. Sommers"}, {"name": "Joseph Tindall"}, {"name": "Dmitry A. Abanin"}], "featured_authors": [{"name": "Siddhant Midha"}, {"name": "Grace M. Sommers"}, {"name": "Joseph Tindall"}, {"name": "Dmitry A. Abanin"}], "author_count": 4}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
