l method as a special case. Compared to Zhandry's technique, our approach has two key differences. First, we do not use any oracles (except for the standard input oracle), and define ``knowledge'' directly through the expansion of the state of the algorithm in the Fourier basis. Second, we allow arbitrary probability distributions of inputs. We show how this framework behaves on the problem of finding equal elements in the input string. In particular, we demonstrate its power by proving a first tight quantum query lower bound for the k-Distinctness problem.", "url": "https://arxiv.org/abs/2604.05133", "type": "理论+数值", "summary": "1. 该工作引入了一种新的量子查询下界框架，并证明了k-Distinctness问题的首个紧量子查询下界。\n2. 其卖点在于框架无需使用预言机，通过傅里叶基展开直接定义知识，允许任意输入分布，且将多项式方法囊括为特例。\n3. 这为量子查询复杂性中的其他组合搜索问题提供了有效的下界证明工具，有望推动后续研究。", "summary_source": "deepseek", "authors": [{"name": "Aleksandrs Belovs"}], "featured_authors": [{"name": "Aleksandrs Belovs"}], "author_count": 1}, {"id": "2604.05170", "category": "quant-ph", "title": "Star product for qubit states in phase space and star exponentials", "abstract": "In this paper, we formulate the phase space description of qubit systems using coadjoint orbits of $SU(2)$ and the Stratonovich-Weyl correspondence, yielding a deformation quantization on the sphere. The resulting star product reproduces the operator algebra of complexified quaternions and its antisymmetric part induces the Lie-Poisson structure associated with the Kirillov-Kostant-Souriau symplectic form. We show that quantum dynamics can be expressed entirely in phase space through star exponentials of Hamiltonian symbols, leading to an explicit representation of the propagator. Further, we establish the equivalence between the coherent-state path integral formulation on $S^2$ and the algebraic description in terms of star exponentials. Some examples illustrating the construction of the star-exponential functions and the resulting Poisson structure are included.", "url": "https://arxiv.org/abs/2604.05170", "type": "理论", "summary": "1. 该工作基于SU(2)的余伴随轨道与Stratonovich-Weyl对应，构建了量子比特系统在球面相空间中的变形量子化表述，引入了星积与星指数形式体系。\n2. 关键突破在于所得星积重现了复四元数算子代数，其反对称部分诱导出与Kirillov-Kostant-Souriau辛形式相关的Lie-Poisson结构，使得量子动力学可完全通过哈密顿符号的星指数在相空间中描述。\n3. 这为自旋系统的相空间量子化提供了严格框架，所证明的相干态路径积分与星指数描述的等价性，为量子模拟与几何量子计算中的相位空间方法奠定了理论基础。", "summary_source": "deepseek", "authors": [{"name": "Jasel Berra-Montiel"}, {"name": "Alberto Molgado"}, {"name": "Mar Sánchez-Córdova"}], "featured_authors": [{"name": "Jasel Berra-Montiel"}, {"name": "Alberto Molgado"}, {"name": "Mar Sánchez-Córdova"}], "author_count": 3}, {"id": "2604.05218", "category": "quant-ph", "title": "Quantum Hilbert Space Fragmentation and Entangled Frozen States", "abstract": "We find that rank deficiency of the local Hamiltonian in a classically fragmented model is the key mechanism leading to quantum Hilbert space fragmentation. The rank deficiency produces local null directions that can generate entangled frozen states (EFS): entangled states embedded in mobile classical Krylov sectors that do not evolve under Hamiltonian dynamics. When the entangled frozen subspace is non-empty, the mobile classical sector splits into an mobile quantum Krylov subspace and an entangled frozen subspace, and the model exhibits quantum fragmentation. We establish this mechanism in four models of increasing symmetry structure: an asymmetric qubit projector with no symmetry, the $\\mathbb{Z}_2$-symmetric GHZ projector, a $\\mathbb{Z}_3$-symmetric cyclic qutrit projector, and the Temperley-Lieb model. For the asymmetric and GHZ projector models, we obtain closed-form expressions for irreducible Krylov dimensions, degeneracies, and sector multiplicities. Further, we introduce the notion of weak and strong quantum fragmentation, the quantum counterpart of the weak-strong distinction in classical fragmentation. After removing the EFS, the mobile quantum Krylov subspace decomposes into irreducible blocks. In the weak case, the number of irreducible blocks remains $\\mathcal{O}(1)$, each is individually ergodic with Gaussian Orthogonal Ensemble (GOE) level statistics, and the unresolved spectrum follows an $m$GOE distribution. In the strong case, the number of irreducible blocks grows with system size, and the gap-ratio distribution approaches Poisson as $L\\to\\infty$.", "url": "https://arxiv.org/abs/2604.05218", "type": "理论+数值", "summary": "1. 该工作在一系列经典碎片化模型中，通过分析局部哈密顿量的秩亏缺机制，研究了量子希尔伯特空间碎片化现象。\n2. 其核心物理机制在于，秩亏缺产生局部零方向，从而在经典可移动的Krylov子空间中嵌入不随时间演化的纠缠冻结态。\n3. 这提出了弱与强量子碎片化的新分类，并为理解不同对称性模型下能级统计的普适类转变提供了明确框架。", "summary_source": "deepseek", "authors": [{"name": "Zihan Zhou"}, {"name": "Tian-Hua Yang"}, {"name": "Bo-Ting Chen"}], "featured_authors": [{"name": "Zihan Zhou"}, {"name": "Tian-Hua Yang"}, {"name": "Bo-Ting Chen"}], "author_count": 3}, {"id": "2604.05325", "category": "quant-ph", "title": "Noise is not always detrimental: the capacity of quantum batteries is enhanced in black holes", "abstract": "Quantum battery capacity, as a critical metric for quantifying energy storage and release in quantum systems, exhibits complex behaviors in curved spacetime and noisy environments. This study focuses on bipartite mixed state, aiming to explore the modulation of quantum battery capacity by Hawking radiation and environmental noise. We find a counterintuitive phenomenon that Hawking radiation can enhance battery capacity, exerting a positive influence on energy storage, a result that stands in stark contrast to the detrimental effects typically associated with entanglement and coherence. When a quantum battery is simultaneously subjected to environmental noise and Hawking radiation, its capacity generally degrades, with the extent of degradation depending on the type of noise. The charging and discharging behaviors largely follow the same patterns observed in the noiseless scenario; however, under a bit flip channel with strong noise intensity, the charging-discharging pattern reverses. In the extreme case of maximum noise intensity, the capacity of the quantum battery under depolarizing noise tends to zero. The underlying physical mechanism lies in the fact that the bit flip channel disrupts the original population distribution of energy levels, thereby altering the average energy of the system and establishing a perturbative environment for bidirectional energy exchange. This differs fundamentally from the phase flip channel. These findings offer a new perspective for the theory of quantum batteries in noninertial reference frames.", "url": "https://arxiv.org/abs/2604.05325", "type": "理论", "summary": "1. 本文研究了霍金辐射与环境噪声对双体混合态量子电池容量的调制效应。\n2. 反直觉地发现霍金辐射可增强电池容量，而比特翻转噪声在强强度下会逆转充放电模式。\n3. 这为弯曲时空背景下量子电池的理论发展提供了新视角。", "summary_source": "deepseek", "authors": [{"name": "Xukun Wang"}, {"name": "Xiaofen Huang"}, {"name": "Zhihao Ma"}, {"name": "Shao-Ming Fei"}, {"name": "Tinggui Zhang"}], "featured_authors": [{"name": "Xukun Wang"}, {"name": "Xiaofen Huang"}, {"name": "Zhihao Ma"}, {"name": "Shao-Ming Fei"}, {"name": "Tinggui Zhang"}], "author_count": 5}, {"id": "2604.05331", "category": "quant-ph", "title": "Dynamics of Entanglement in Schwarzschild Black Holes", "abstract": "To characterize the effect of Hawking radiation induced by the quantum atmosphere beyond the event horizon on entanglement, we employ concurrence as the entanglement measure for a bipartite mixed state and investigate its evolution with Hawking temperature. We find that the physically accessible concurrence decreases as the Hawking acceleration increases, whereas the physically inaccessible concurrence exhibits the opposite behavior, increasing monotonically from zero. We further establish several trade-off relations on concurrence, revealing its distribution between physically accessible and inaccessible regions. Additionally, we study the dynamics of concurrence under three types of channel noise. The results indicate that the evolution of concurrence depends on the specific noise channel: unlike the phase damping channel, sudden death of concurrence occurs in both phase flip and bit flip channels, the concurrence exhibits a certain symmetry with respect to the noise parameter during its evolution under bit flip channel noise.", "url": "https://arxiv.org/abs/2604.05331", "type": "理论", "summary": "1. 该工作采用共生纠缠度作为纠缠度量，研究了史瓦西黑洞霍金辐射对二分混合态纠缠动力学的影响。\n2. 其核心在于揭示了物理可访问与不可访问区域的纠缠度之间存在此消彼长的互补关系，且在不同噪声信道下演化行为迥异。\n3. 这为黑洞信息问题提供了定量分析工具，并为理解弯曲时空中的量子噪声效应建立了明确的理论框架。", "summary_source": "deepseek", "authors": [{"name": "Fang Xie"}, {"name": "Ying Yang"}, {"name": "Tinggui Zhang"}, {"name": "Xiaofen Huang"}], "featured_authors": [{"name": "Fang Xie"}, {"name": "Ying Yang"}, {"name": "Tinggui Zhang"}, {"name": "Xiaofen Huang"}], "author_count": 4}, {"id": "2604.05455", "category": "quant-ph", "title": "Another Triumph of Locality: Colliding Histories Skew Handshakes", "abstract": "From gravity to electromagnetism, apparent action at a distance has always been resolved by deeper, local explanations. Yet today, Bell's theorem is widely interpreted as the death knell for local reality. In this chapter, I present the theorem in accessible terms, examine the three main strategies that attempt to preserve hidden variables, and argue that they share a common defect: the attempt to explain the quantum from the classical rather than the other way around. In unitary quantum mechanics, classicality itself is given a quantum account, and, when the Bell scenario is formulated in the Heisenberg picture, a strictly local explanation emerges. This chapter serves as a non-technical front-end to 'Explaining Bell Locally' (Proc. R. Soc. A).", "url": "https://arxiv.org/abs/2604.05455", "type": "理论+数值", "summary": "1. 该论文在可读性框架下分析贝尔定理，并通过对三种主要隐变量策略的考察，论证了在希尔伯特空间的量子力学中能构建严格局域的解释。\n2. 核心在于将分析视角从“用经典解释量子”转变为“用量子解释经典”，并在海森堡绘景下对贝尔场景进行重构，从而揭示局域性得以保全的物理基础。\n3. 这为在幺正量子力学框架内严格建立局域现实性，以及重新审视量子基础中的因果与解释关系提供了清晰的纲领性视角。", "summary_source": "deepseek", "authors": [{"name": "Charles Alexandre Bédard"}], "featured_authors": [{"name": "Charles Alexandre Bédard"}], "author_count": 1}, {"id": "2604.05627", "category": "quant-ph", "title": "Loss-aware state space geometry for quantum variational algorithms", "abstract": "The natural gradient descent optimisation technique is an efficient optimising protocol for broad classes of classical and quantum systems that takes the underlying geometry of the parameter manifold into account by means of using either the Fisher information metric of the classical probability distribution function or the Fubini-Study tensor of the associated parametrised quantum states in the consequent update rules. Even though the natural gradient descent procedure utilises the geometry of the space of probability or states, it is, however, insensitive to the measure of parametrised distance on the space of possible outcomes when the corresponding optimising problem is considered for the expectation value of a classical or quantum observable with respect to the probability distribution or the quantum state. In this work, we introduce a generic optimising principle, where the intrinsic geometry of the space of outcomes has been taken into account suitably, either by using an ambient space construction with a base statistical manifold with the usual Fisher information metric (or the Fubini-Study tensor), where the loss hypersurface is embedded to, or by means of a first-principle construction from the overlap of nearby quantum states on the projective Hilbert space. This construction as well as a family of conformal variants yields a form of loss-aware natural gradient updates that rescale the effective step size while preserving the descent direction. We benchmark the resulting optimisers on variational quantum circuit examples and on a classical neural network task, finding that, while the standard natural gradient remains the most robust on average, the proposed conformal schemes can improve best-case convergence in favourable regimes.", "url": "https://arxiv.org/abs/2604.05627", "type": "理论+数值", "summary": "1. 本文提出了一种考虑结果空间内禀几何的通用优化原理，通过嵌入构造或第一性原理方法将损失超曲面纳入参数更新规则。\n2. 核心创新在于利用环境空间构造或射影希尔伯特空间量子态重叠，发展出保持下降方向但重新标度有效步长的损失感知自然梯度更新族。\n3. 在变分量子线路和经典神经网络任务上的基准测试表明，该保形方案虽平均鲁棒性不及标准自然梯度，但在有利条件下能优化最佳收敛性能。", "summary_source": "deepseek", "authors": [{"name": "Ankit Gill"}, {"name": "Kunal Pal"}], "featured_authors": [{"name": "Ankit Gill"}, {"name": "Kunal Pal"}], "author_count": 2}, {"id": "2604.05637", "category": "quant-ph", "title": "Quantum Learning of Classical Correlations with continuous-domain Pauli Correlation Encoding", "abstract": "We propose a quantum machine learning framework for estimating classical covariance matrices using parameterized quantum circuits within the Pauli-Correlation-Encoding (PCE) paradigm. We introduce two quantum covariance estimators: the C-Estimator, which constructs the covariance matrix through a Cholesky factorization to enforce positive (semi)definiteness, and a computationally efficient E-Estimator, which directly estimates covariance entries from observable expectation values. We analyze the trade-offs between the two estimators in terms of qubit requirements and learning complexity, and derive sufficient conditions on regularization parameters to ensure positive (semi)definiteness of the estimators. Furthermore, we show that the barren plateau phenomenon in training the variational quantum circuit for E-estimator can be mitigated by appropriately choosing the regularization parameters in the loss function for HEA ansatz. The proposed framework is evaluated through numerical simulations using randomly generated covariance matrices. We examine the convergence behavior of the estimators, their sensitivity to low-rank assumptions, and their performance in covariance completion with partially observed matrices. The results indicate that the proposed estimators provide a robust approach for learning covariance matrices and offer a promising direction for applying quantum machine learning techniques to high-dimensional statistical estimation problems.", "url": "https://arxiv.org/abs/2604.05637", "type": "数值", "summary": "1. 该工作提出了基于Pauli关联编码的量子机器学习框架，用于估计经典协方差矩阵，并引入了C-Estimator和E-Estimator两种量子估计器。\n2. 其技术优势在于通过Cholesky分解确保正半定性或直接高效估计，并利用正则化参数缓解变分量子电路训练中的贫瘠高原现象。\n3. 这为高维统计估计问题的量子机器学习应用提供了稳健方法，并在协方差矩阵补全等任务中展现出潜力。", "summary_source": "deepseek", "authors": [{"name": "Vicente P. Soloviev"}, {"name": "Bibhas Adhikari"}], "featured_authors": [{"name": "Vicente P. Soloviev"}, {"name": "Bibhas Adhikari"}], "author_count": 2}, {"id": "2604.05660", "category": "quant-ph", "title": "Coherence and Imaginarity as Resources in Quantum Circuit Complexity", "abstract": "Quantum circuit complexity quantifies the minimal number of gates needed to realize a unitary transformation and plays a central role in quantum computation. In this work, we investigate the complexity of quantum circuits through coherence and imaginarity resources. We establish a lower bound on the circuit cost by the Tsallis relative $\\alpha$ entropy of cohering power, which is shown to be tighter than the one presented by Bu et al.[\\textit{Communications in Mathematical Physics} 405, no. 7 (2024):161] under restrictive conditions. As a consequence, we obtain the relationships between the circuit cost and the coherence generating power via probabilistic average in terms of skew information/relative entropy, and present explicit bounds of the circuit cost for typical quantum gates. Moreover, we derive lower bounds on the circuit cost via the imaginaring power of the circuit, induced by the Tsallis relative $\\alpha$ entropy and relative entropy. We demonstrate that imaginarity can yield nontrivial constraints on the circuit cost even when coherence-based lower bounds are zero (e.g., for the $T$ gate), which implies that imaginarity may provide advantages under certain circumstances compared with coherence. Our results may help better understand the connections between quantum resources and circuit complexity.", "url": "https://arxiv.org/abs/2604.05660", "type": "理论", "summary": "1. 本研究通过相干性和虚数性资源探究了量子电路复杂度的下界，并针对典型量子门给出了明确的电路代价界限。\n2. 其核心在于利用Tsallis相对α熵等度量，证明了虚数性资源即使在相干性下界为零时仍能对电路代价施加非平凡约束。\n3. 这为从量子资源角度深入理解电路复杂度提供了新途径，并可能启发针对特定资源优化的门设计策略。", "summary_source": "deepseek", "authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Nanrun Zhou"}], "featured_authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Nanrun Zhou"}], "author_count": 3}, {"id": "2604.05675", "category": "quant-ph", "title": "The final version of a recent approach towards quantum foundation", "abstract": "In several articles, this author has advocated an alternative approach towards quantum foundation based upon a set of postulates, and based upon the notions of theoretical variables and of accessible theoretical variables. It is shown in this article that this basis can be considerably simplified. In particular, the assumption that there exists an inaccessible variable $\\phi$ such that all the accessible ones can be seen as functions of $\\phi$, can be dropped. This assumption has been difficult to motivate in the previous articles. From this, I get a simple basis for the main this http URL essential assumption is that there in the given context exist two different maximal accessible variables, what Niels Bohr would have called two complementary variables. From this, the whole Hilbert space formalism may be derived. It is also discussed in some detail how this Hilbert space should be chosen. The resulting theory is a purely mathematical theory, but it leads to qunantum mechanics by letting the variables be physical variables. Other applications of the main theory are also considered. The mathematical proofs are mostly deferred to the Appendix.", "url": "https://arxiv.org/abs/2604.05675", "type": "理论", "summary": "1. 该工作进一步简化了基于理论变量与可及变量假设的量子基础替代性方法。\n2. 其核心突破在于仅需两个互补的最大可及变量假设即可导出整个希尔伯特空间形式体系。\n3. 这为将纯数学理论应用于量子力学及其他领域提供了明确且更简洁的公理化基础。", "summary_source": "deepseek", "authors": [{"name": "Inge S. Helland"}], "featured_authors": [{"name": "Inge S. Helland"}], "author_count": 1}, {"id": "2604.05693", "category": "quant-ph", "title": "A plug-and-play superconducting quantum controller at millikelvin temperatures enables exceeding 99.9% average gate fidelity", "abstract": "The development of large-scale superconducting quantum computing requires efficient in-situ control methods that allow high-fidelity operations at millikelvin temperatures. Superconducting circuits based on Josephson junctions offer a promising solution due to their high speed, low power dissipation, and cryogenic nature. Here, we report a superconducting quantum controller that enables direct chip-to-chip interconnection with qubits at 10 mK and high-fidelity, all-digital manipulation. Randomized benchmarking reveals a uniformly high average Clifford fidelity of 99.9% with leakage to high energy levels on the order of $10^{-4}$, and an estimated average gate operation energy of 0.121 fJ, demonstrating the potential to resolve the control bottleneck in superconducting quantum computing.", "url": "https://arxiv.org/abs/2604.05693", "type": "理论", "summary": "1. 研制了可在毫开温度下直接与量子比特芯片互连的超导量子控制器，实现了全数字化的高保真度操控。\n2. 其优势在于通过随机基准测试验证了平均克利福德门保真度达99.9%，同时单次门操作能耗低至0.121 fJ。\n3. 该成果为解决超导量子计算中控制部分的瓶颈、推动系统规模化集成提供了可行的技术路径。", "summary_source": "deepseek", "authors": [{"name": "Kuang Liu"}, {"name": "Zhiyuan Wang"}, {"name": "Xiaoliang He"}, {"name": "Siqi Li"}, {"name": "Hao Wu"}, {"name": "Xiangyu Ren"}, {"name": "Zhengqi Niu"}, {"name": "Wangpeng Gao"}, {"name": "Chenluo Zhang"}, {"name": "Pei Huang"}, {"name": "Yu Wu"}, {"name": "Liliang Ying"}, {"name": "Wei Peng"}, {"name": "Jaw-Shen Tsai"}, {"name": "Zhirong Lin"}], "featured_authors": [{"name": "Kuang Liu"}, {"name": "Zhiyuan Wang"}, {"name": "Xiaoliang He"}, {"name": "Wei Peng"}, {"name": "Jaw-Shen Tsai"}, {"name": "Zhirong Lin"}], "author_count": 15}, {"id": "2604.05747", "category": "quant-ph", "title": "Kinetic Uncertainty Relation in Collective Dissipative Quantum Many-Body Systems", "abstract": "Attaining the ultimate precision remains a central objective in the engineering of nanoscale systems and the investigation of nonequilibrium processes. While thermodynamic and kinetic uncertainty relations establish fundamental precision bounds, prior derivations in the quantum regime have remained confined to single-body systems. Consequently, the ultimate precision limits for interacting many-body systems have been unknown. In this Letter, we analytically formulate a kinetic uncertainty relation for a many-body system undergoing collective dissipation, a paradigmatic model of boundary time crystals. By applying a mean-field approximation, we derive lower bounds for relative fluctuations expressed in terms of clear physical quantities. Our analysis identifies a cooperative enhancement mechanism, demonstrating that collective interactions allow the precision to scale with the number of particles. We validate these findings through numerical simulations across the stationary, critical, and boundary time crystal phases. Our work presents the first theoretical description of precision bounds in collective dissipative quantum many-body systems for an arbitrary particle number $N$, providing a solid foundation for designing future quantum technologies that exploit many-body phenomena.", "url": "https://arxiv.org/abs/2604.05747", "type": "理论+数值", "summary": "1. 本工作首次为经历集体耗散的量子多体系统推导出了普适的动力学不确定关系，确立了其精度的基本极限。\n2. 通过应用平均场近似，该分析揭示了一种合作增强机制，表明精度可随粒子数$N$实现标度提升，并在静止相、临界相和边界时间晶体相中得到数值验证。\n3. 这为未来利用多体现象设计量子技术（如量子传感与模拟）提供了严格的理论基础与设计准则。", "summary_source": "deepseek", "authors": [{"name": "Hayato Yunoki"}, {"name": "Yoshihiko Hasegawa"}], "featured_authors": [{"name": "Hayato Yunoki"}, {"name": "Yoshihiko Hasegawa"}], "author_count": 2}, {"id": "2604.05776", "category": "quant-ph", "title": "A Nested Amplitude Amplification Protocol for the Binary Knapsack Problem", "abstract": "Amplitude Amplification offers a provable speedup for search problems, which is leveraged in combinatorial optimization by Grover Adaptive Search (GAS). The protocol demands deep circuits that are challenging with regards to NISQ capabilities. We propose a nested Amplitude Amplification protocol for the binary knapsack problem that splits the decision tree at a tunable depth, performing a partial amplification on the first variables before executing a global GAS on the full search space. The partial amplification is implemented by an Inner Iteration Finder that selects the rotation count maximizing marked-subspace amplitude. The resulting biased superposition serves as the initial state for the outer Amplitude Amplification. Using the Quantum Tree Generator for feasible-state preparation and an efficient classical amplitude-tracking scheme, we simulate the protocol on knapsack instances of sizes intractable by statevector simulation. Our results show that the nested approach reduces the cost of improving an incumbent solution compared to baseline GAS, particularly for a specific subset of knapsack instances. As combinatorial problems in domains such as semiconductor supply-chain planning grow in scale, methods that reduce circuit cost are an important step toward eventual quantum advantage for such applications.", "url": "https://arxiv.org/abs/2604.05776", "type": "数值", "summary": "1. 本文提出了一种针对二进制背包问题的嵌套振幅放大协议，通过将决策树在可调深度处分割，先在部分变量上执行局部放大，再对完整搜索空间进行全局格罗夫自适应搜索。\n2. 该协议的核心技术在于引入内部迭代查找器，以优化旋转次数并最大化标记子空间振幅，从而产生用作外层放大初始状态的偏置叠加态。\n3. 该方法显著降低了改进当前解所需的量子电路成本，为半导体供应链规划等大规模组合优化问题迈向量子优势提供了可行路径。", "summary_source": "deepseek", "authors": [{"name": "Laurin Demmler"}, {"name": "Maximilian Hess"}], "featured_authors": [{"name": "Laurin Demmler"}, {"name": "Maximilian Hess"}], "author_count": 2}, {"id": "2604.05881", "category": "quant-ph", "title": "Hybrid Quantum-Classical Algorithm for Hamiltonian Simulation", "abstract": "We introduce a hybrid classical-quantum algorithm for simulating a Hamiltonian of the form $H= \\sum_{i=1}^K H_i = \\sum_{i=1}^K H_{i_1} \\otimes H_{i_2} \\otimes \\cdots \\otimes H_{i_M}$. Given that the entries of all $\\{ H_{i_1}, H_{i_2} , \\cdots , H_{i_M}\\}$ (for all $i$) are classically known, we present a procedure (with three variants) in which these operators are classically diagonalized, and then this information is fed into three possible quantum procedures to obtain the block-encoding of $H$. The evolution operator $\\exp(-iHt)$ is then obtained using the standard block-encoding/quantum singular value transformation framework. In the case where $\\{H_i\\}_{i=1}^K$ commute pairwise, our method can be trivially extended to the case with time-dependent coefficients. We provide a detailed discussion of the efficient regime of our hybrid framework and compare it with existing quantum simulation algorithms. Our algorithm can serve as a useful complement to existing quantum simulation algorithms, thereby expanding the reach of quantum computers for practically simulating physical systems. As a side contribution, we will show how the recent technique called \\textit{randomized truncation to a quantum state} developed by Harrow, Lowe, and Witteveen [arXiv preprint arXiv:2510.08518 , 2025] can be applied to the context of quantum simulation and particularly quantum state preparation, for which the latter can be of independent interest.", "url": "https://arxiv.org/abs/2604.05881", "type": "理论+数值", "summary": "1. 本文提出了一种用于模拟哈密顿量$H=\\sum_i H_{i_1}\\otimes\\cdots\\otimes H_{i_M}$的混合经典-量子算法框架，其核心步骤包括经典对角化已知的局部算符并利用量子过程实现$H$的块编码。\n2. 该算法的关键优势在于通过经典预处理有效降低了量子资源开销，并且在$\\{H_i\\}$对易时可直接推广至含时系数情形，同时还将随机截断技术创造性地应用于量子模拟与态制备问题。\n3. 这项工作为实际物理系统的模拟提供了与现有量子算法互补的新途径，并展示了经典计算与量子信息处理在复杂动力学模拟中的协同潜力。", "summary_source": "deepseek", "authors": [{"name": "Nhat A. Nghiem"}, {"name": "Tzu-Chieh Wei"}], "featured_authors": [{"name": "Nhat A. Nghiem"}, {"name": "Tzu-Chieh Wei"}], "author_count": 2}, {"id": "2604.05915", "category": "quant-ph", "title": "Quantum advantage in transfer of quantum states", "abstract": "Quantum advantage, broadly understood as the ability of quantum systems to significantly outperform their classical counterparts, underpins current interest to quantum technologies and is a topic of active investigation. In many situations, its existence is subject to debate, and the areas of supremacy of large-scale quantum systems are not well defined. Here, we uncover a novel niche where quantum advantage can be clearly defined and proven. We study a time-optimal transfer of excitations in the lattice involving both nearest-neighbor and longer-range couplings. We prove that the quantum-mechanical property of a particle to propagate along several trajectories simultaneously speeds up the transfer process, which takes a shorter time compared to any particular trajectory and thus provides a clear example of quantum advantage.", "url": "https://arxiv.org/abs/2604.05915", "type": "理论", "summary": "1. 该工作在一个可严格证明的新领域中定义了量子优势，并研究了晶格中激发的时空最优传输问题。\n2. 其核心物理在于证明了量子叠加原理使粒子能同时沿多条轨迹传播，导致传输时间短于任何单一经典轨迹。\n3. 这为在量子信息传输等任务中，基于量子叠加原理设计高效协议提供了明确的理论依据和范例。", "summary_source": "deepseek", "authors": [{"name": "Andrei Stepanenko"}, {"name": "Kseniia Chernova"}, {"name": "Maxim Gorlach"}], "featured_authors": [{"name": "Andrei Stepanenko"}, {"name": "Kseniia Chernova"}, {"name": "Maxim Gorlach"}], "author_count": 3}, {"id": "2604.05962", "category": "quant-ph", "title": "Distributed Quantum Property Testing with Communication Constraints", "abstract": "We introduce a framework for distributed quantum inference under communication constraints. In our model, $m$ distributed nodes each receive one copy of an unknown $d$-dimensional quantum state $\\rho$, before communicating via a constrained one-way communication channel with a central node, which aims to infer some property of $\\rho$. This framework generalizes the classical distributed inference framework introduced by Acharya, Canonne, and Tyagi [COLT2019], by allowing quantum resources such as quantum communication and shared entanglement. Within this setting, we focus on the fundamental problem of quantum state certification: Given a complete description of some state $\\sigma$, decide whether $\\rho=\\sigma$ or $\\|\\rho-\\sigma\\|_1\\geq \\epsilon$. Additionally, we focus on the case of limited quantum communication between distributed nodes and the central node. We show that when each communication channel is limited to only $n_q\\leq \\log d$ qubits, then the sample complexity of distributed state certification is $\\mathcal{O}(\\frac{d^2}{2^{n_q}\\epsilon^2})$ when public randomness is available to all nodes. Moreover, under the assumption that the channels used by the distributed nodes are mixedness-preserving, we prove a matching lower bound. We further demonstrate that shared randomness is necessary to achieve the above complexity, by proving an $\\Omega(\\frac{d^3}{4^{n_q} \\epsilon^2})$ lower bound in the private-coin setting under the same assumption as above. Our lower bounds leverage a recently introduced quantum analogue of the celebrated Ingster-Suslina method and generalize arguments from the classical setting. Together, our work provides the first characterization of distributed quantum state certification in the regime of limited quantum communication and establishes a general framework for distributed quantum inference with communication constraints.", "url": "https://arxiv.org/abs/2604.05962", "type": "理论", "summary": "1. 该研究建立了通信约束下的分布式量子推断框架，聚焦于有限量子通信场景下的量子态认证问题，并给出了样本复杂度的精确刻画。\n2. 通过假设信道具有保混合性特性，证明了在公共随机性条件下样本复杂度上界与下界匹配，并揭示了共享随机性对降低复杂度的重要作用。\n3. 所提出的框架为分布式量子推断研究奠定了基础，其建立的量子化Ingster-Suslina方法可推广至更广泛的分布式量子假设检验问题。", "summary_source": "deepseek", "authors": [{"name": "Mina Doosti"}, {"name": "Ryan Sweke"}, {"name": "Chirag Wadhwa"}], "featured_authors": [{"name": "Mina Doosti"}, {"name": "Ryan Sweke"}, {"name": "Chirag Wadhwa"}], "author_count": 3}, {"id": "2604.05986", "category": "quant-ph", "title": "Quantum Machine Learning for particle scattering entanglement classification", "abstract": "Entanglement is a key quantity for characterizing quantum correlations in particle scattering processes, but its direct evaluation is computationally demanding on quantum hardware. In this work, we investigate whether fermion density profiles, which are easier to access, can serve as proxies for entanglement by framing the problem as a classification task across multiple entanglement thresholds. Using the fermion scattering in the Thirring model as a test bed, we compare Quantum Convolutional Neural Networks (QCNNs) with classical CNNs of comparable parameter counts, and find that QCNNs achieve consistently competitive or superior accuracy with faster convergence and lower variance. Notably, we observe that increasing the model size does not improve the performance within the architectures studied here, and larger models appear to be more sensitive to the choice of encoding. Instead, a compact 4-qubits QCNN provides the best results, suggesting the importance of trainability and encoding choices over model scaling. These findings demonstrate the potential of quantum and quantum-inspired machine learning models for extracting nontrivial quantum information from accessible observables, with implications for high-energy physics and quantum many-body systems.", "url": "https://arxiv.org/abs/2604.05986", "type": "理论+数值", "summary": "1. 该工作将费米子密度分布作为纠缠熵的替代观测指标，以Thirring模型中的费米子散射为测试平台，系统比较了量子卷积神经网络与经典卷积神经网络的分类性能。\n2. 核心发现是参数规模相当的量子卷积神经网络在收敛速度、稳定性与分类准确度上均表现出优势，且最优性能由紧凑的4量子比特模型实现，突显了可训练性与编码方案比单纯扩展模型规模更为关键。\n3. 这一结果为从易获取的观测量中提取非平凡量子信息提供了可行路径，对高能物理与量子多体系统中基于量子机器学习的关联特征识别具有启发意义。", "summary_source": "deepseek", "authors": [{"name": "Hala Elhag"}, {"name": "Yahui Chai"}], "featured_authors": [{"name": "Hala Elhag"}, {"name": "Yahui Chai"}], "author_count": 2}, {"id": "2604.06007", "category": "quant-ph", "title": "Scaling Laws for Hybrid Quantum Neural Networks: Depth, Width, and Quantum-Centric Diagnostics", "abstract": "Hybrid quantum neural networks are increasingly explored for classification, yet it remains unclear how their performance and quantum behavior scale with circuit depth and qubit count. We present a controlled scaling study of hybrid quantum-classical classifiers along two axes: (1) increasing the number of quantum layers L at fixed qubits Q, and (2) increasing the number of qubits Q at fixed depth L. Across multiple datasets, we evaluate predictive performance using Accuracy, PR-AUC, Precision, Recall, and F1, and track quantum-specific metrics (QCE, EEE, QGN) to characterize how quantum properties evolve under scaling. Our results summarize scaling trends, saturation regimes, and dataset-dependent sensitivity, and further analyze how quantum metrics relate to predictive performance. This study provides practical guidance for selecting (Q,L) in hybrid QNN classifiers and establishes a consistent evaluation protocol for scaling analysis.", "url": "https://arxiv.org/abs/2604.06007", "type": "理论+数值", "summary": "1. 本研究对混合量子-经典分类器进行了受控缩放分析，系统考察了量子层数L（固定量子比特数Q）与量子比特数Q（固定深度L）两个维度对模型性能的影响。\n2. 通过同时评估传统分类指标与量子特异性指标（如QCE、EEE、QGN），首次清晰揭示了量子特性随电路规模演化的规律及其与预测性能的关联。\n3. 这项工作为混合量子神经网络的结构选择提供了实证依据，并建立了可重复的缩放分析评估框架，对后续实验设计与理论研究具有直接指导意义。", "summary_source": "deepseek", "authors": [{"name": "Danil Vyskubov"}, {"name": "Kirill Vyskubov"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Danil Vyskubov"}, {"name": "Kirill Vyskubov"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "author_count": 4}, {"id": "2604.06027", "category": "quant-ph", "title": "Exploring bosonic bound states with parallel reaction coordinates", "abstract": "Bound states are dissipation-resilient states that may emerge when quantum systems are strongly coupled to reservoirs with band gaps. We analyze an exactly solvable bosonic model for bound state existence and reproduce these results by a weak-coupling treatment of a supersystem composed of the original system and multiple reaction coordinates, which are individually representing small energy intervals of the reservoir spectral function. Within the perturbative supersystem treatment, the bound state stability results from its energy being inside the band gap. We discuss cases of multiple band gaps and also show that already in presence of weak interactions the bound state's lifetime is finite -- but can be increased by raising the system-reservoir coupling strength.", "url": "https://arxiv.org/abs/2604.06027", "type": "理论", "summary": "1. 该工作通过并行反应坐标探索了强耦合带隙储层中玻色子束缚态的存在性，基于精确可解模型并利用弱耦合超系统处理复现了束缚态条件。\n2. 其物理核心在于使用代表储层谱函数小能量区间的多个反应坐标构建超系统，在微扰框架下证明束缚态稳定性源于能量位于带隙内，且该方法可处理多带隙情形。\n3. 这为理解弱相互作用下束缚态有限寿命的调控提供了机制，表明增强系统-储层耦合可延长寿命，对相关量子工程中的耗散管理具有启示意义。", "summary_source": "deepseek", "authors": [{"name": "Guan-Yu Lai"}, {"name": "Friedemann Queißer"}, {"name": "Gernot Schaller"}], "featured_authors": [{"name": "Guan-Yu Lai"}, {"name": "Friedemann Queißer"}, {"name": "Gernot Schaller"}], "author_count": 3}, {"id": "2604.06077", "category": "quant-ph", "title": "Simulating Thermal Properties of Bose-Hubbard Models on a Quantum Computer", "abstract": "While recent advances have established efficient quantum algorithms for preparing Gibbs states of finite-dimensional systems, comparable complexity results for bosonic and other infinite-dimensional models remain unexplored. We introduce the first general rigorous Gibbs sampling framework for bosonic many-body systems, showing that physically relevant bosonic models admit gapped dissipative generators, enabling efficient preparation of thermal states. Although our results hold for broad classes of models, we illustrate them using Bose-Hubbard Hamiltonians, both within and beyond the mean-field regime. In both cases, we show that the associated dissipative generators maintain a positive spectral gap, thereby implying exponential convergence to the thermal state. Our argument in the multi-mode case is based on a finite-rank reduction of the dissipative dynamics, which allows us to control the generator via compact perturbations and deduce the discreteness of the spectrum and the stability of the gap. We apply our results to provide efficient preparation of the corresponding Gibbs state on qubit hardware, and by that a quantum algorithm to compute thermal properties of the associated model. This provides the first mathematically controlled route to Gibbs sampling in infinite-dimensional systems, with implications for quantum simulation, thermalization, and many-body complexity, where quantum advantages may arise.", "url": "https://arxiv.org/abs/2604.06077", "type": "理论+数值", "summary": "1. 该工作针对无限维玻色多体系统，首次提出了可严格分析的吉布斯态制备框架，并以玻色-哈伯德模型为例进行了阐释。\n2. 其核心在于证明了物理相关模型具有带隙耗散生成元，并借助有限秩约化方法控制了多模情形下的谱间隙稳定性，从而确保热态的高效指数收敛。\n3. 这为在量子计算机上模拟无限维系统的热力学性质提供了第一条数学严格路径，对量子模拟、热化及相关多体复杂性问题的量子优势研究具有基础意义。", "summary_source": "deepseek", "authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "featured_authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "author_count": 3}, {"id": "2604.06127", "category": "quant-ph", "title": "Necessary and sufficient conditions for the N-representability of functionals of the one-electron reduced density matrix", "abstract": "We establish necessary and sufficient conditions for the N-representability of the universal one-electron reduced density matrix functional. Functionals satisfying these conditions are guaranteed to yield variational upper bounds on the true energy in one-electron reduced density matrix functional theory, regardless of the strength of the interparticle repulsion. Conversely, any functional violating these conditions will necessarily underestimate the true energy for certain systems. These exact constraints impose a stringent restriction on density matrix functional approximations, as many existing functionals-including the Hartree-Fock functional-appear to violate them. This mathematical formalism, therefore, can guide the development of new approximate functionals and numerical algorithms.", "url": "https://arxiv.org/abs/2604.06127", "type": "理论+数值", "summary": "1. 该研究建立了通用单电子约化密度矩阵泛函的N-可表示性的充要条件。\n2. 满足此条件的泛函保证在任意相互作用强度下给出真实能量的变分上界，而违反条件则必然在某些体系中低估真实能量。\n3. 该精确约束为发展新的密度矩阵泛函近似和数值算法提供了严格的数学框架，尤其适用于修正现有违反条件的泛函。", "summary_source": "deepseek", "authors": [{"name": "Jannis Erhard"}, {"name": "Paul W. Ayers"}], "featured_authors": [{"name": "Jannis Erhard"}, {"name": "Paul W. Ayers"}], "author_count": 2}, {"id": "2604.06135", "category": "quant-ph", "title": "Shot-Based Quantum Encoding: A Data-Loading Paradigm for Quantum Neural Networks", "abstract": "Efficient data loading remains a bottleneck for near-term quantum machine-learning. Existing schemes (angle, amplitude, and basis encoding) either underuse the exponential Hilbert-space capacity or require circuit depths that exceed the coherence budgets of noisy intermediate-scale quantum hardware. We introduce Shot-Based Quantum Encoding (SBQE), a data embedding strategy that distributes the hardware's native resource, shots, according to a data-dependent classical distribution over multiple initial quantum states. By treating the shot counts as a learnable degree of freedom, SBQE produces a mixed-state representation whose expectation values are linear in the classical probabilities and can therefore be composed with non-linear activation functions. We show that SBQE is structurally equivalent to a multilayer perceptron whose weights are realised by quantum circuits, and we describe a hardware-compatible implementation protocol. Benchmarks on Fashion MNIST and Semeion handwritten digits, with ten independent initialisations per model, show that SBQE achieves 89.1% +/- 0.9% test accuracy on Semeion (reducing error by 5.3% relative to amplitude encoding and matching a width-matched classical network) and 80.95% +/- 0.10% on Fashion MNIST (exceeding amplitude encoding by +2.0% and a linear multilayer perceptron by +1.3%), all without any data-encoding gates.", "url": "https://arxiv.org/abs/2604.06135", "type": "理论+数值", "summary": "1. 该工作提出了一种名为基于测量的量子编码的新型数据嵌入策略，用于解决量子机器学习中数据加载的瓶颈问题。\n2. 其核心技术在于将硬件原生资源（测量次数）作为可学习自由度，通过数据相关的经典分布分配到多个初始量子态上，从而构建出期望值呈线性、可与非线性激活函数兼容的混合态表示。\n3. 这一范式为在近期嘈杂量子硬件上实现更高效的量子-经典混合机器学习算法提供了可行的技术路径，并启发了对量子资源与经典计算模块间新型协同方式的探索。", "summary_source": "deepseek", "authors": [{"name": "Basil Kyriacou"}, {"name": "Viktoria Patapovich"}, {"name": "Maniraman Periyasamy"}, {"name": "Alexey Melnikov"}], "featured_authors": [{"name": "Basil Kyriacou"}, {"name": "Viktoria Patapovich"}, {"name": "Maniraman Periyasamy"}, {"name": "Alexey Melnikov"}], "author_count": 4}, {"id": "2604.06142", "category": "quant-ph", "title": "Light-Induced Quantum Self-Trapping of Vibrational Excitons in an Optical Cavity", "abstract": "In an optical cavity, strong light--matter coupling between excitons and photons has been widely reported as a way to enhance energy delocalization through spatially extended polaritonic states. In contrast, leveraging cavity-mediated light--matter effects to promote the reciprocal phenomenon, namely \\textit{energy localization}, remains largely underexplored. In the present work, we address this question by focusing on a special form of energy localization arising from nonlinear matter interactions: \\textit{Quantum Self-Trapping} (QST). We employ a generalized Tavis--Cummings model to investigate the transport of vibrational excitons -- \\textit{i.e., vibrons} -- between two anharmonic vibrational modes and examine their interplay with cavity photons. In the absence of a cavity, the arising of true and complete QST -- \\textit{i.e.}, an infinite-lifetime localization -- is not possible due to the symmetry of the system. The energy transfer between the two modes still occurs, slowed down by the many-body interactions. Coupling the system to a single-mode cavity strongly alters this behavior, with two emerging regimes. First, at weak light--matter coupling, destructive interference between newly opened transition pathways suppresses energy exchange, leading to cavity-enhanced self-trapping. As the coupling strength increases, these interference effects evolve leading to cavity-assisted energy transfer, where we observe an acceleration of the vibrational energy flow. Most notably, we identify critical coupling strengths that separate both regimes in which the dynamics almost totally freeze, suggesting the arising of a ``stabilized'' light-induced~QST of many-vibron bound states. These results suggest that optical cavities can not only enhance transport but could also stabilize energy localization phenomena, providing a new route to control energy flow in quantum systems.", "url": "https://arxiv.org/abs/2604.06142", "type": "理论", "summary": "1. 本研究通过广义Tavis-Cummings模型，探究了光学腔中两个非谐振动模式间振动激子（vibron）的输运及其与腔光子的相互作用。\n2. 关键发现表明：弱光-物质耦合下新跃迁通道的干涉抑制能量交换，而临界耦合强度可实现多vibron束缚态的\"稳定化\"光致量子自俘获。\n3. 这为利用光学腔主动调控量子系统中能量流的局域化与输运过程提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "Vincent Pouthier"}, {"name": "Saad Yalouz"}], "featured_authors": [{"name": "Vincent Pouthier"}, {"name": "Saad Yalouz"}], "author_count": 2}];

    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
