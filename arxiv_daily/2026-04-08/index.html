。\n2. 通过对比不同晶向的发射沟道图样与模拟结果，首次实验证实注入的⁶He占据四面体间隙位，并在800°C时观测到因扩散导致的占位分数下降，由此推得He间隙迁移的激活能约为1.63–2.89 eV。\n3. 这一激活能范围意味着单纯间隙He在地质时间尺度上无法稳定存在于金刚石中，暗示自然界金刚石中的He可能被缺陷捕获或以包裹体等形式存在。", "summary_source": "deepseek", "authors": [{"name": "U. Wahl"}, {"name": "J.G. Correia"}, {"name": "A. Costa"}, {"name": "B. Biesmans"}, {"name": "G. Magchiels"}, {"name": "S.M. Tunhuma"}, {"name": "A. Lamelas"}, {"name": "A. Vantomme"}, {"name": "L.M.C. Pereira"}, {"name": "ISOLDE Collaboration"}], "featured_authors": [{"name": "U. Wahl"}, {"name": "J.G. Correia"}, {"name": "A. Costa"}, {"name": "A. Vantomme"}, {"name": "L.M.C. Pereira"}, {"name": "ISOLDE Collaboration"}], "author_count": 10}, {"id": "2604.05997", "category": "cond-mat", "title": "Numerically Exact Study of Flat-Band Superconductivity", "abstract": "Current theories of high-temperature superconductivity in flat-band systems predict a linear dependence of the transition temperature on the attractive interaction, $T_c(U) = c|U|$. However, neither the value of $c$ nor the full nonlinear $T_c(U)$ curve -- with a maximum at large $|U|$ -- is known beyond mean-field and quantum geometry estimates. Using a controlled diagrammatic Monte Carlo technique, we trace the onset of superfluid response in the Lieb lattice with attractive Hubbard interaction. Focusing on the half-filled flat-band case, where the ordering mechanism differs fundamentally from both BCS and preformed Cooper pair scenarios, we find that the pairing response diverges linearly with decreasing temperature over a broad range of $U$, leading to a sharp crossover to long-range correlations at a characteristic temperature $T_*$, which provides a controlled upper bound on $T_c$. The highest $T_*$ occurs when all three bands touch at a single momentum point, potentially corresponding to high $T_c$ values.", "url": "https://arxiv.org/abs/2604.05997", "type": "理论+数值", "summary": "1. 本研究采用受控图蒙特卡洛方法，数值精确地研究了吸引哈伯德模型中Lieb晶格平带填充下的超导响应。\n2. 其核心发现是：在宽泛的相互作用范围内，配对响应随温度降低呈线性发散，特征温度T*为超导转变温度Tc提供了受控上限。\n3. 当三能带在单一动量点接触时，体系达到最高T*，这为探索平带系统中潜在的高温超导机制指明了具体条件与方向。", "summary_source": "deepseek", "authors": [{"name": "I.S. Tupitsyn"}, {"name": "B. Currie"}, {"name": "B.V. Svistunov"}, {"name": "E. Kozik"}, {"name": "N.V. Prokof'ev"}], "featured_authors": [{"name": "I.S. Tupitsyn"}, {"name": "B. Currie"}, {"name": "B.V. Svistunov"}, {"name": "E. Kozik"}, {"name": "N.V. Prokof'ev"}], "author_count": 5}, {"id": "2604.06048", "category": "cond-mat", "title": "Large Language Model Assisted Discovery of Optimal Dopants for Enhanced Thermoelectric Performance in CoSb$_3$ Based Skutterudites", "abstract": "We present a data-driven approach for accelerating the discovery of high-performance CoSb$_3$-based skutterudites by curating a comprehensive dataset of compositions with various filler elements from over 300 research articles. Leveraging large language models (LLMs), we extract and embed compositional representations, which are then used to train a regression head for predicting thermoelectric figure of merit. Compared to traditional deep neural networks relying on elemental descriptors such as atomic radii, our LLM-based model achieves significantly lower mean-squared error losses. We further employ the trained model to propose novel filler compositions with promising thermoelectric properties. Finally, we support these predicted candidates through density functional theory and molecular dynamics calculations to assess their electrical and thermal conductivity. This data-driven approach demonstrates the potential of combining natural language processing, machine learning, and quantum simulations for thermoelectric materials design.", "url": "https://arxiv.org/abs/2604.06048", "type": "理论+数值", "summary": "1. 该工作提出了一种利用大语言模型加速高性能CoSb3基方钴矿热电材料发现的数据驱动方法，通过整理超过300篇文献中的填充元素成分数据并训练预测模型。\n2. 其技术优势在于基于自然语言处理的成分表征嵌入模型相比依赖传统元素描述符的深度神经网络，显著降低了热电优值预测的均方误差损失。\n3. 这展示了自然语言处理、机器学习与量子模拟相结合的方法框架，为高效探索成分复杂的功能材料体系提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Yagnik Bandyopadhyay"}, {"name": "Dylan Noel Serrao"}, {"name": "Houlong L. Zhuang"}], "featured_authors": [{"name": "Yagnik Bandyopadhyay"}, {"name": "Dylan Noel Serrao"}, {"name": "Houlong L. Zhuang"}], "author_count": 3}, {"id": "2604.06051", "category": "cond-mat", "title": "Disentangling High Harmonic Generation from Surface and Bulk States of a Topological Insulator", "abstract": "The discovery of topological phases has introduced a new dimension to materials science. Three-dimensional (3D) topological insulators (TIs) are a remarkable class of matter that is insulating in the bulk while hosting conductive topological surface states (TSSs) with unique charge and spin properties. High-order harmonic generation (HHG) has emerged as a powerful tool to probe condensed matter systems by providing insights into their electronic structure and dynamic behavior. Here, we investigate HHG in the prototype 3D-TI Bi$_2$Se$_3$. We demonstrate that the contributions of bulk and surface states to the harmonic emission can be controlled by tuning the thickness of thin film samples. An ultrathin (6 nm) film substantially enhances HHG from the surface states, while the bulk states dominate HHG in a thicker (50 nm) film. By applying a quasi-static terahertz perturbing field, we disentangle the bulk and surface responses and reveal the significant impact of the surface states' shift vector and Berry curvature on HHG. Our study provides effective methods for isolating the optical responses of TSSs from those of the bulk, which opens the door to resolving an ongoing debate regarding whether it is possible to reliably extract topological signatures in HHG.", "url": "https://arxiv.org/abs/2604.06051", "type": "理论", "summary": "1. 该工作研究了三维拓扑绝缘体Bi₂Se₃中的高次谐波产生，并通过调控薄膜厚度实现了对体态与表面态贡献的分离控制。\n2. 其核心在于利用太赫兹微扰场解析两种响应，首次揭示了表面态的移位矢量和贝里曲率对高次谐波产生的关键影响。\n3. 这为在非线性光学测量中可靠提取拓扑表面态的响应并验证其拓扑特征提供了有效方法，解决了该领域的长期争议。", "summary_source": "deepseek", "authors": [{"name": "Sha Li"}, {"name": "Wenyi Zhou"}, {"name": "Kazi A. Imroz"}, {"name": "Yaguo Tang"}, {"name": "Tiana A. Townsend"}, {"name": "Vyacheslav Leshchenko"}, {"name": "Larissa Boie"}, {"name": "Pierre Agostini"}, {"name": "Alexandra S. Landsman"}, {"name": "Roland K. Kawakami"}, {"name": "Lun Yue"}, {"name": "Louis F. DiMauro"}], "featured_authors": [{"name": "Sha Li"}, {"name": "Wenyi Zhou"}, {"name": "Kazi A. Imroz"}, {"name": "Roland K. Kawakami"}, {"name": "Lun Yue"}, {"name": "Louis F. DiMauro"}], "author_count": 12}, {"id": "2604.06153", "category": "cond-mat", "title": "Solving the Peierls-Boltzmann transport equation with matrix product states", "abstract": "The Peierls-Boltzmann transport equation (PBE), which governs non-equilibrium phonon transport, suffers from the curse of dimensionality due to its high-dimensional phase space including both real and modal spaces. We explore the use of matrix product states (MPS) for numerical simulation of the PBE. We show that an MPS configuration based on scattering events combined with a dimensionless form of the solution can drastically increase the locality of correlations between tensors in the MPS representation, enhancing its effectiveness in dimension reduction. We further examine the effects of index ordering in an MPS and find that the highest locality is achieved when tensor chains associated with both real and modal spaces are connected from the coarsest grid to each other in the center of the MPS. Using this optimal configuration and a solver inspired by the density matrix renormalization group, we solve the PBE discretized by a finite volume method (FVM). The solution is obtained for crystalline silicon across ballistic, quasi-ballistic, and diffusive transport regimes. An MPS truncated to the compression ratio of $10^{-3}$ suffices to reproduce reference solutions with high fidelity. The computational cost scales sublinearly with the number of grid points in both real and modal spaces, achieving roughly an order of magnitude reduction in computational time compared to the FVM with sparse matrix operation.", "url": "https://arxiv.org/abs/2604.06153", "type": "理论+数值", "summary": "1. 该工作将矩阵乘积态应用于求解高维相空间的 Peierls-Boltzmann 输运方程，实现了晶体硅在弹道、准弹道及扩散输运区的数值模拟。\n2. 其技术核心在于提出能显著增强张量关联局域化的 MPS 构型与指标排序方案，使得在 10^{-3} 压缩比下仍能高保真复现结果，计算成本相对于稀疏矩阵有限体积法降低约一个量级。\n3. 这为跨越不同尺度的声子输运问题提供了高效降维计算框架，并可推广至其他高维相空间动力学方程的求解。", "summary_source": "deepseek", "authors": [{"name": "Sangyeop Lee"}, {"name": "Hirad Alipanah"}, {"name": "Juan José Mendoza-Arenas"}], "featured_authors": [{"name": "Sangyeop Lee"}, {"name": "Hirad Alipanah"}, {"name": "Juan José Mendoza-Arenas"}], "author_count": 3}, {"id": "2604.06157", "category": "cond-mat", "title": "Tractable model for a fractionalized Fermi liquid (FL$^*$) on a square lattice", "abstract": "Motivated by the continued interest in Fermi-surface reconstruction without symmetry breaking, we present an analytically tractable microscopic model of a fractionalized Fermi liquid (FL$^*$) on a square lattice and discuss its potential relevance to the cuprates. As in ancilla-qubit constructions, the model is related to Kondo lattice systems, but in this case, the conduction electrons interact with a $\\mathbb{Z}_2$ spin liquid of the Yao--Lee type, with a Majorana Fermi surface. The associated $\\mathbb Z_2$ gauge theory is static so that the model can be analytically solved to leading-logarithic accuracy. There are two phases: one in which the fractionalized fermions of the spin liquid hybridize with conduction electrons to form a common Fermi surface violating the naive Luttinger count, and one in which they remain decoupled. We discuss the salient features of the small Fermi-surface phase, including analytically derived momentum dependent coherence factors responsible for the appearance of Fermi arcs à la Yang-Rice-Zhang. We further discuss the impact of quantum and thermal fluctuations, including a strong diamagnetic response and a logarithmically divergent Sommerfeld coefficient at the onset of the pseudogap.", "url": "https://arxiv.org/abs/2604.06157", "type": "理论+数值", "summary": "1. 该工作提出了一种在正方晶格上解析可解的分数化费米液体微观模型，并讨论了其在铜氧化物中的潜在相关性。\n2. 其核心在于传导电子与具有马约拉纳费米面的Yao-Lee型$\\mathbb{Z}_2$自旋液体耦合，该体系具有静态$\\mathbb{Z}_2$规范理论，可在领头对数精度下解析求解，并展示出违反传统卢廷格计数的反常杂化相。\n3. 该模型为研究铜氧化物赝能隙相中的小费米面、费米弧形成以及热力学响应的对数发散行为提供了具体的微观理论框架。", "summary_source": "deepseek", "authors": [{"name": "Piers Coleman"}, {"name": "Elio J. König"}, {"name": "Aaditya Panigrahi"}, {"name": "Alexei Tsvelik"}], "featured_authors": [{"name": "Piers Coleman"}, {"name": "Elio J. König"}, {"name": "Aaditya Panigrahi"}, {"name": "Alexei Tsvelik"}], "author_count": 4}, {"id": "2604.06162", "category": "cond-mat", "title": "Mutual Linearity in and out of Stationarity for Markov Jump Processes: A Trajectory-Based Approach", "abstract": "Nonequilibrium response theory is a fundamental framework for understanding how physical systems respond to perturbations. Recently, a mutual linearity has been discovered for Markov jump processes using linear algebra analysis. This mutual linearity states that two observables are linearly dependent on each other in the long-time limit when the transition rate of a single edge is altered. It has also been extended to non-stationary cases for current observables. In this work, we provide a trajectory-based derivation of mutual linearity utilizing the trajectory-level linear response theory. The trajectory approach allows us to generalize the mutual linearity to non-stationary relaxation dynamics for state observables and counting observables. Our results shed light on the fundamental response properties far from equilibrium and the trajectory-level origin of mutual linearity. Our trajectory-based approach makes it possible to generalize the mutual linearity to a broader class of systems, including diffusion processes and open quantum systems.", "url": "https://arxiv.org/abs/2604.06162", "type": "理论", "summary": "1. 该工作通过轨迹层次的线性响应理论，为马尔可夫跳跃过程提供了互线性的轨迹式推导，并将其推广至非定态弛豫动力学下的状态与计数观测量。\n2. 其核心在于利用轨迹方法，统一了定态与非定态情形，揭示了观测量在单一边跃迁率扰动下长期线性依赖的轨迹层次起源。\n3. 这为理解远离平衡态的基本响应性质奠定了基础，并使互线性概念向扩散过程与开放量子系统等更广泛体系推广成为可能。", "summary_source": "deepseek", "authors": [{"name": "Jiming Zheng"}, {"name": "Zhiyue Lu"}], "featured_authors": [{"name": "Jiming Zheng"}, {"name": "Zhiyue Lu"}], "author_count": 2}, {"id": "2604.05025", "category": "hep-th", "title": "Feynman integral reduction with intersection theory made simple", "abstract": "Feynman integral reduction based on intersection theory provides an alternative to the traditional integration-by-parts method, yet its practical application has been constrained by the large number of variables required in the computation. In this Letter, we demonstrate that by employing the recently introduced branch representation, the reduction of $L$-loop Feynman integrals with an arbitrary number of external legs can be achieved through the computation of at most $(3L-3)$-variable intersection numbers. This constitutes a significant simplification compared to existing approaches, particularly for multi-leg integrals where the number of variables in conventional methods scales with the total number of propagators. We validate the proposed method through explicit calculations of two-loop diagrams, demonstrating substantial improvements in computational efficiency relative to both traditional intersection-theory approaches and standard integration-by-parts reduction techniques.", "url": "https://arxiv.org/abs/2604.05025", "type": "理论", "summary": "1. 该工作基于分支表示发展了一套基于相交理论的费曼积分约化新方法，将其应用于具有任意外腿数的L圈积分。\n2. 该方法的核心优势在于将约化所需的变量数降至最多(3L-3)个，显著优于传统方法中变量数随传播子总数增长的计算复杂度。\n3. 这为多圈、多腿散射振幅的高效解析计算提供了新途径，并通过双圈图例验证了相较于传统相交理论及分部积分法的效率提升。", "summary_source": "deepseek", "authors": [{"name": "Li-Hong Huang"}, {"name": "Yan-Qing Ma"}, {"name": "Ziwen Wang"}, {"name": "Li Lin Yang"}], "featured_authors": [{"name": "Li-Hong Huang"}, {"name": "Yan-Qing Ma"}, {"name": "Ziwen Wang"}, {"name": "Li Lin Yang"}], "author_count": 4}, {"id": "2604.05026", "category": "hep-th", "title": "Quantum Solitons", "abstract": "We construct geometries describing the quantum backreaction of thermal fields in AdS$_3$. The solutions are obtained from branes in a four-dimensional AdS C-metric. They can be viewed as solutions of the semiclassical effective theory on the brane, which couples three-dimensional gravity to the CFT dual to the four-dimensional bulk. This brane construction is related by a double analytic continuation to earlier studies of quantum BTZ solutions. There are two families of solutions, labelled by the asymptotic mass. Solutions with negative mass correspond to the back-reaction of a thermal CFT state on global AdS$_3$. Solutions with positive mass have a horizon for zero back-reaction, which is replaced by a smooth origin in the back-reacted solution. We study the thermodynamics and first law on the brane, which we argue is realised in a two-brane setup where we include both the quantum BTZ brane and our quantum soliton brane.", "url": "https://arxiv.org/abs/2604.05026", "type": "理论", "summary": "1. 该工作通过在四维AdS C-度规中构造膜解，建立了描述AdS₃中热场量子反作用的全息几何。\n2. 核心物理在于揭示了由渐近质量标定的两类解族：负质量解对应热CFT态在全局AdS₃上的反作用，正质量解的反作用效应将视界平滑化为原点。\n3. 基于包含量子BTZ膜与量子孤子膜的双膜构型，文中建立的热力学框架为研究全息系统中量子引力效应提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Robie A. Hennigar"}, {"name": "Ayan K. Patra"}, {"name": "Simon F. Ross"}], "featured_authors": [{"name": "Robie A. Hennigar"}, {"name": "Ayan K. Patra"}, {"name": "Simon F. Ross"}], "author_count": 3}, {"id": "2604.05082", "category": "hep-th", "title": "Worldline Images for Yang-Mills Theory within Boundaries", "abstract": "In this article we develop a worldline technique based on the method of images to study the effective action associated to Yang-Mills theories on manifolds with boundaries. We consider the possibility of having either relative or absolute boundary conditions, which are particular types of mixed boundary conditions. Both vector fields and ghost fields are taken into account in this analysis. As a check of our construction, we compute the first three Seeley-DeWitt coefficients of the heat kernel asymptotics. Finally, we employ our technique to calculate the rate of gluon production due to a chromoelectric field background in the presence of a boundary.", "url": "https://arxiv.org/abs/2604.05082", "type": "理论", "summary": "1. 本文发展了一种基于镜像法的世界线技术，用以研究带边界流形上杨-米尔斯理论的有效作用量，并考虑了相对与绝对两类混合边界条件。\n2. 该方法创新地将镜像法适配于包含矢量场与鬼场的非阿贝尔规范理论，并通过计算热核渐近展开的前三个 Seeley-DeWitt 系数验证了其自洽性。\n3. 该技术被应用于计算边界存在时色电场背景下的胶子产生率，为有限体积或边界影响下的量子色动力学现象研究提供了新工具。", "summary_source": "deepseek", "authors": [{"name": "Santiago Christiansen Murguizur"}, {"name": "Lucas Manzo"}, {"name": "Pablo Pisani"}], "featured_authors": [{"name": "Santiago Christiansen Murguizur"}, {"name": "Lucas Manzo"}, {"name": "Pablo Pisani"}], "author_count": 3}, {"id": "2604.05094", "category": "hep-th", "title": "Weak-Field Limits of Black Hole Metrics from the KMOC formalism: Schwarzschild, Kerr, Reissner-Nordström, and Kerr-Newman", "abstract": "The KMOC (Kosower-Maybee-O'Connell) formalism establishes a bridge between quantum scattering amplitudes and classical observables in gravitational systems. In this work, we show how the weak-field limits of the four classical black hole metrics - Schwarzschild, Kerr, Reissner-Nordstrom, and Kerr-Newman - can be reproduced within this formalism. Starting from three-point amplitudes with exponential spin structure for both gravitational and electromagnetic interactions, we compute four-point scattering amplitudes and extract the momentum impulse via the KMOC formula. Matching these results with geodesic motion in a general metric allows us to reconstruct the metric components to leading order in G, a, and Q^2. For the Kerr-Newman case, we include interference terms between gravitational and electromagnetic interactions, which produce a Q^2 a/r^3 contribution to g_{t\\phi} that does not appear in the Kerr or Reissner-Nordstrom weak-field limits separately. Our results are consistent with those of arXiv:1907.00431 [hep-th], where the Kerr-Newman metric is derived from minimal coupling amplitudes using the KMOC formalism arXiv:1908.04342 [hep-th]. All results are verified through their consistency with the well-known full metrics, though we emphasize that the KMOC formalism as applied here reproduces only the weak-field expansions, not the complete non-linear solutions.", "url": "https://arxiv.org/abs/2604.05094", "type": "理论", "summary": "1. 本研究基于KMOC形式体系，从引力与电磁相互作用的散射振幅出发，系统地导出了史瓦西、克尔、莱斯纳-诺德斯特伦及克尔-纽曼黑洞的弱场极限度规。\n2. 核心亮点在于，对于克尔-纽曼情形，计算揭示了引力与电磁相互作用的干涉项，该贡献产生了单独在克尔或莱斯纳-诺德斯特伦弱场极限中均不存在的、正比于Q²a/r³的g_{tφ}分量。\n3. 此结果明确了该振幅方法在弱场展开区域内的有效性与边界，为利用现代振幅技术进一步研究经典引力与电磁的耦合系统提供了明确范例。", "summary_source": "deepseek", "authors": [{"name": "Jacobo Hernández C"}], "featured_authors": [{"name": "Jacobo Hernández C"}], "author_count": 1}, {"id": "2604.05103", "category": "hep-th", "title": "Untwisting the double copy: the zeroth copy as an optical seed", "abstract": "We present a historical optical foundation for stationary vacuum Kerr--Schild spacetimes on a flat background and interpret it in modern double-copy language. In this setting, a complex optical seed \\(\\rho=-\\theta-i\\omega\\), built from the expansion and signed twist of the Kerr--Schild congruence, is harmonic, while its inverse obeys an eikonal equation and reconstructs the congruence algebraically. Thus the local stationary geometry is organized by a single complex seed. In the overlap of the stationary Kerr--Schild and Petrov type--D Weyl double-copy framework, this seed furnishes a normalized representative of the zeroth-copy data, while its real part yields the Kerr--Schild profile and its gradient generates the single-copy gauge-field strength. The construction provides, without recourse to twistor methods, a spacetime realization of how a single complex seed builds the congruence, organizes the associated spacetime and gauge fields, and encodes the geometric content of the zeroth copy.", "url": "https://arxiv.org/abs/2604.05103", "type": "理论", "summary": "1. 该工作为平背景上的稳态真空 Kerr--Schild 时空提供了一个历史的光学解释，并将其置于现代的双拷贝语言中加以阐释。\n2. 其核心在于引入了一个由类光测地线汇的膨胀和带符号挠率构成的复光学种子 \\(\\rho=-\\theta-i\\omega\\)，该种子是调和的，且其倒数满足程函方程并能代数重构整个汇。\n3. 这一构造在不依赖于扭量理论的情况下，清晰地展示了单个复种子如何构建测地线汇、组织时空与规范场，并编码了零拷贝的几何内涵，为相关框架的推广提供了具体途径。", "summary_source": "deepseek", "authors": [{"name": "Damien A. Easson"}, {"name": "Michael J. Falato"}], "featured_authors": [{"name": "Damien A. Easson"}, {"name": "Michael J. Falato"}], "author_count": 2}, {"id": "2604.05139", "category": "hep-th", "title": "The double-logarithmic four-graviton Regge sector as a rank-two twisted period system", "abstract": "We study the double-logarithmic four-graviton Regge sector in $N$-extended supergravity. Its Mellin-space solution is already known in terms of parabolic-cylinder functions. We show that the same answer can be organized as a rank-two twisted period system, meaning that two closely related weighted integrals determine the full Mellin partial wave. These functions satisfy a simple pair of first-order differential equations and a recursion as the number of supersymmetries $N$ changes. This gives a uniform description of the full supergravity family, clarifies the relation between the positive-ray Euler integral and the earlier contour representation, and reproduces the same reduction rule through intersection theory. The reformulation also makes the special cases with four and six supersymmetries particularly transparent and yields a simple Hermite-polynomial construction for the low-even theories.", "url": "https://arxiv.org/abs/2604.05139", "type": "理论", "summary": "1. 该研究将 $N$ 超引力的双对数四引力子 Regge 扇区已知解重新表述为一个二阶扭曲周期系统。\n2. 该形式体系通过一对一阶微分方程和超对称数 $N$ 变化的递推关系，为整个超引力家族提供了统一描述，并阐明了不同积分表示间的关联。\n3. 此重构使得四超对称和六超对称的特殊情形尤为清晰，并为低偶理论提供了简洁的厄米多项式构造方案。", "summary_source": "deepseek", "authors": [{"name": "Agustín Sabio Vera"}], "featured_authors": [{"name": "Agustín Sabio Vera"}], "author_count": 1}, {"id": "2604.05173", "category": "hep-th", "title": "New-born strings are tensionless", "abstract": "We report a physical origin of tensionless strings, obtained by formulating string dynamics in finite-lifetime settings for the first time. Departing from the conventional paradigm of eternal strings, we construct an inertial worldsheet confined to a finite region of two-dimensional Minkowski spacetime, known as a causal diamond. This reveals a striking result: tensionless strings arise only at the moment of their birth. The ultra-shrinking limit of the diamond worldsheet realizes this birth configuration, thereby uncovering a new tensionless string phase characterized by a global, ultra-local Carrollian structure.", "url": "https://arxiv.org/abs/2604.05173", "type": "理论", "summary": "1. 该研究首次在有限寿命的物理设定中公式化弦动力学，通过构造因果菱形内的惯性世界面，揭示了无张力弦的物理起源。\n2. 其核心发现是，当取该有限世界面的超缩极限时，弦仅在诞生时刻呈现无张力特性，并涌现出一个具有全局超局域Carrollian结构的新相。\n3. 这一新无张力弦相的发现，为在有限寿命背景下研究弦理论以及探索Carroll几何与引力对偶等关联领域提供了新的理论框架和切入点。", "summary_source": "deepseek", "authors": [{"name": "Sudip Karan"}, {"name": "Bibhas Ranjan Majhi"}], "featured_authors": [{"name": "Sudip Karan"}, {"name": "Bibhas Ranjan Majhi"}], "author_count": 2}, {"id": "2604.05262", "category": "hep-th", "title": "Residual Symmetries and Their Algebras in the Kerr-Schild Double Copy", "abstract": "The Kerr-Schild double copy (KSDC) is well-known for relating exact classical solutions between Yang-Mills theory and theories of gravity. However, whether this correspondence provides a more fundamental mapping between the underlying symmetries of gauge theory and gravity remains an underdeveloped area of research in the contemporary double copy program. In this paper, we demonstrate that the KSDC correspondence does not provide a mapping between the residual symmetry structures of the Kerr-Schild ansatz in Yang-Mills theory and gravity. On the gauge theory side, residual symmetries form an infinite-dimensional algebra of functions along null directions. On the gravitational side, residual diffeomorphisms preserving the Kerr-Schild form of the Schwarzschild metric generate a conformal algebra on $S^2$, which decomposes into Killing vectors and proper conformal Killing vectors (CKVs). While the Killing sector reproduces the expected global isometries, the CKV sector yields an infinite-dimensional algebra after imposing asymptotic flatness and horizon regularity. This appears to contradict the fact that the Schwarzschild solution admits no proper conformal symmetries. We resolve this apparent contradiction by constructing a Weyl-compensated BRST complex, showing that the CKV sector is BRST-exact and therefore trivial in cohomology, so that the physical symmetry algebra reduces to the global isometries of Schwarzschild. This demonstrates that the KSDC introduces an enlarged symmetry structure at the level of the ansatz, but preserves physical symmetries after a cohomological reduction, revealing a fundamental mismatch between Yang-Mills and gravity at the level of residual symmetries.", "url": "https://arxiv.org/abs/2604.05262", "type": "理论", "summary": "1. 本文研究了Kerr-Schild双重对应中规范理论与引力的残余对称性代数映射问题。\n2. 通过构建Weyl补偿的BRST复形，揭示了引力侧看似无限维的共形Killing矢量代数实际为BRST恰当项，在物理上平凡，从而化解了与史瓦西解无共形对称性的表面矛盾。\n3. 这一结果表明，Kerr-Schild双重对应在留数对称性层面存在根本性失配，为深入理解双重对应程序背后的对称性原理提供了关键限制。", "summary_source": "deepseek", "authors": [{"name": "B. P. Holton"}], "featured_authors": [{"name": "B. P. Holton"}], "author_count": 1}, {"id": "2604.05447", "category": "hep-th", "title": "Kerr-Schild Double Copy of the Randall-Sundrum Black String", "abstract": "We construct the Kerr-Schild classical double copy of the black string in the Randall-Sundrum II model, deriving the single and zeroth copies, and verifying the associated field equations. The single copy gauge field is independent of the holographic coordinate and satisfies a sourceless Maxwell equation on the curved background, in direct analogy with the Coulomb field of the Schwarzschild double copy. The zeroth copy scalar obeys a modified Klein-Gordon equation with a first-order derivative term along the extra dimension; a field redefinition yields a standard Klein-Gordon equation with effective mass $m^2 = 12/l^2$, induced by the warp factor. We further show that an alternative Kerr-Schild splitting, gravitationally equivalent to the canonical one, produces a physically inequivalent double copy: the gauge field is supported by a conserved but delocalized bulk current, and the zeroth copy satisfies a massless equation that carries no imprint of the warped extra dimension.", "url": "https://arxiv.org/abs/2604.05447", "type": "理论", "summary": "1. 该工作构建了 Randall-Sundrum II 模型中黑洞弦的 Kerr-Schild 经典双拷贝，导出了单拷贝与零拷贝，并验证了其场方程。\n2. 其核心发现在于单拷贝规范场不依赖全息坐标，且在弯曲背景上满足无源麦克斯韦方程，而另一种引力等效的 Kerr-Schild 分割则产生物理不等价的双拷贝结构。\n3. 这揭示了弯曲时空与规范理论之间的结构对应在卷曲额外维模型中的具体实现方式，为额外维场景下的双拷贝研究提供了新的范例与方向。", "summary_source": "deepseek", "authors": [{"name": "Jesús A. Rodríguez"}], "featured_authors": [{"name": "Jesús A. Rodríguez"}], "author_count": 1}, {"id": "2604.05538", "category": "hep-th", "title": "Phase Transitions in Primary Hair Planar Black Holes and Solitons", "abstract": "We present a new family of Ricci-flat black hole and soliton solutions with primary scalar hair in asymptotically anti-de Sitter (AdS) space in $D$ dimensions. By solving the coupled Einstein-scalar field equations, we obtain analytic planar hairy black hole and soliton geometries. In these solutions, the scalar field and curvature scalars remain regular everywhere. We also derive analytic expressions for the mass and free energy, which indicate that the hairy soliton represents the ground state of the system. We further analyze the phase transitions between the hairy black hole and the hairy soliton, and find that there exists a first-order phase transition between them, with the transition point controlled by the ratio of the periods of Euclidean time and compact spacelike cycle. We further analyze how the scalar hair affects the transition temperature, and find that the temperature window in which the soliton phase remains preferred expands as the hair parameter increases. The hairy soliton solution obtained here is partly motivated by holographic QCD and may provide a useful gravitational background for modeling the confined phase of QCD from a bottom-up holographic perspective.", "url": "https://arxiv.org/abs/2604.05538", "type": "理论", "summary": "1. 该工作通过求解耦合的爱因斯坦-标量场方程，在渐近反德西特时空中构造了一族新的、处处正则的D维平面毛状黑洞与孤子解析解，并分析了其热力学相变。\n2. 研究揭示了系统存在由欧几里得时间周期与紧致空间环周期之比控制的一级相变，且标量毛参数增大会显著拓宽孤子基态为优选相的温区窗口。\n3. 由此获得的毛状孤子解为从自底向上全息视角构建QCD禁闭相的引力对偶背景提供了具潜力的理论框架。", "summary_source": "deepseek", "authors": [{"name": "Som Abhisek Mohanty"}, {"name": "Subhash Mahapatra"}], "featured_authors": [{"name": "Som Abhisek Mohanty"}, {"name": "Subhash Mahapatra"}], "author_count": 2}, {"id": "2604.05630", "category": "hep-th", "title": "Symmetry-resolved Krylov Complexity and the Uncoloured Tensor Model", "abstract": "The symmetry-resolved Krylov complexity is a useful tool in studying chaotic properties of systems that are endowed with symmetries. We investigate the conditions under which an invariant operator would have the symmetry-resolved Krylov complexity in a charge subspace identical to the Krylov complexity of the full operator. Further, we study the Krylov complexity of the Uncoloured Tensor Model, a disorder-free kin of the SYK Model which has a plethora of symmetries. We find charge subspaces of the same operator in which the equipartition holds as well as where it doesn't. We also find that within the computational limits, the Krylov complexity averaged over the symmetry subspace is bounded above by that of the operator in the full space.", "url": "https://arxiv.org/abs/2604.05630", "type": "理论", "summary": "1. 该研究系统分析了对称分辨Krylov复杂度在电荷子空间与完整算子复杂度等效的条件，并将其应用于具有丰富对称性的无色张量模型。\n2. 核心发现揭示了特定电荷子空间中复杂度等分配现象的存在与破缺，并证明对称子空间平均复杂度在计算局限下受全空间复杂度的上界约束。\n3. 这为理解对称性在张量模型量子混沌动力学中的作用提供了新视角，并为后续研究广义对称体系中的算子增长机制建立了理论框架。", "summary_source": "deepseek", "authors": [{"name": "Shaliya Kotta"}, {"name": "P N Bala Subramanian"}], "featured_authors": [{"name": "Shaliya Kotta"}, {"name": "P N Bala Subramanian"}], "author_count": 2}, {"id": "2604.05641", "category": "hep-th", "title": "Causal Dynamical Triangulations: New Lattice Theory of Quantum Gravity", "abstract": "Causal Dynamical Triangulations (CDT) is a methodology to define and compute the gravitational path integral, whose aim is a fully fledged nonperturbative quantum field theory of gravity and spacetime. Analogous to lattice formulations of nongravitational quantum fields, CDT provides a blueprint for lattice quantum gravity, where - crucially - the dynamical, curved and causal nature of spacetime is built into the structure of the lattices from the outset. The regularized path integral involves a sum over triangulated spacetimes, each assembled from flat, Minkowskian building blocks. The degrees of freedom of general relativity are encoded in a coordinate-free manner in the neighbourhood relations of the building blocks and the length of their edges, which also serves as a short-distance cutoff. A well-defined Wick rotation makes this path integral amenable to Monte Carlo simulations. Despite the absence of an a priori preferred background geometry, numerical experiments have revealed the dynamical emergence of a quantum universe near the Planck scale. Its global properties are compatible with those of a de Sitter space, providing strong evidence for a well-defined classical limit. At the same time, large quantum fluctuations lead to unexpected properties on short scales, most prominently, a spectral dimension near 2, replacing the classical value of 4. Computer simulations indicate the presence of an ultraviolet fixed point under renormalization, opening the door to a nontrivial continuum theory. Efforts are under way to construct observables that can elucidate the nonperturbative quantum origins of early-universe cosmology.", "url": "https://arxiv.org/abs/2604.05641", "type": "理论", "summary": "1. 本研究提出了一种基于因果动力三角剖分的非微扰晶格量子引力框架，用于定义和计算引力路径积分。\n2. 其核心技术在于将时空的动力学、弯曲与因果结构直接内置于晶格构建中，并通过良定义的Wick转动实现蒙特卡洛模拟。\n3. 该理论预示了普朗克尺度下量子宇宙的涌现及紫外不动点的存在，为研究早期宇宙的非微扰量子起源与连续极限提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "J. Ambjørn"}, {"name": "R. Loll"}], "featured_authors": [{"name": "J. Ambjørn"}, {"name": "R. Loll"}], "author_count": 2}, {"id": "2604.05676", "category": "hep-th", "title": "Vortex Harmonic Spinors on the Nappi-Witten Space", "abstract": "We establish a correspondence between vortex equations on flat Riemann surfaces and harmonic spinors on the Nappi--Witten space, the group manifold of a central extension of the Euclidean group $SE(2)$. Vortex configurations lift naturally to this setting, producing explicit solutions of a twisted Dirac equation. Using the conformal flatness of the Nappi--Witten metric, these solutions induce harmonic spinors on four-dimensional Minkowski space. This yields a geometric construction of Abelian magnetic zero-modes on flat Minkowski spacetime from vortex data.", "url": "https://arxiv.org/abs/2604.05676", "type": "理论", "summary": "1. 该工作建立了平坦黎曼曲面上的涡旋方程与Nappi-Witten空间上调和旋量之间的对应关系。\n2. 其核心在于利用Nappi-Witten度规的共形平坦性，将涡旋构型自然提升为该空间上扭曲狄拉克方程的显式解，进而诱导出四维闵可夫斯基空间的调和旋量。\n3. 这为从涡旋数据出发，在平坦时空中几何构造阿贝尔磁零模提供了一种系统方法，并为相关广义相对论与规范理论问题的研究开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Calum Ross"}, {"name": "Raúl Sánchez Galán"}], "featured_authors": [{"name": "Calum Ross"}, {"name": "Raúl Sánchez Galán"}], "author_count": 2}, {"id": "2604.05696", "category": "hep-th", "title": "Monodromy-Matrix Description of Extremal Multi-centered Black Holes", "abstract": "We study solution-generating techniques based on the Breitenlohner--Maison linear system for extremal, stationary biaxisymmetric black hole solutions in five-dimensional $U(1)^3$ supergravity. Focusing on multi-center configurations over a Gibbons--Hawking base, we analyze both BPS and almost-BPS solutions, including rotating single-center black holes and two-center black rings. After dimensional reduction to three dimensions, the system is described by a coset sigma model with target space $SO(4,4)/[SO(2,2)\\times SO(2,2)]$, where solutions are encoded in coset and monodromy matrices. For Bena--Warner BPS solutions, we construct the coset and monodromy matrices and show that they admit an exponential representation governed by nilpotent elements. Although the monodromy matrices generically exhibit double poles, they can be factorized explicitly using the nilpotent algebra of $\\mathfrak{so}(4,4)$, reconstructing the solutions. We extend this to almost-BPS solutions and derive the corresponding matrices. While the single-center case exhibits commuting residues, the two-center black ring leads to a more intricate structure with a third-order pole, which disappears when regularity is imposed. Finally, we analyze the extremal limits of the Rasheed--Larsen solution, where the fast-rotating branch is governed by idempotent elements. We also construct an explicit $SO(4,4)$ duality transformation relating the slowly-rotating branch to a single-center almost-BPS solution. These results will provide the BM formalism as a unified framework for extremal multi-center black holes.", "url": "https://arxiv.org/abs/2604.05696", "type": "理论", "summary": "1. 本研究利用基于Breitenlohner-Maison线性体系的生成技术，系统构建了五维U(1)^3超引力中极值、稳态双轴对称多中心黑洞（包括BPS与近BPS解）的单值矩阵与陪集矩阵描述。\n2. 其核心在于利用李代数𝔰𝔬(4,4)的幂零与幂等代数结构，显式分解了单值矩阵的极点，并为快旋转与慢旋转分支建立了由SO(4,4)对偶变换联系的统一框架。\n3. 这为在陪集模型框架下系统生成与分类极值多中心黑洞解提供了严格且可扩展的数学基础，尤其是处理具有复杂极点结构的非平凡相互作用体系。", "summary_source": "deepseek", "authors": [{"name": "Jun-ichi Sakamoto"}, {"name": "Shinya Tomizawa"}], "featured_authors": [{"name": "Jun-ichi Sakamoto"}, {"name": "Shinya Tomizawa"}], "author_count": 2}, {"id": "2604.05815", "category": "hep-th", "title": "Probing the Factorized Island Branch with the Capacity of Entanglement in JT Gravity", "abstract": "Black hole islands are usually diagnosed through the von Neumann entropy, but the full replica saddle contains more information than survives in the limit $n \\to 1$. In this paper we show that the capacity of entanglement can detect that extra structure already within the controlled factorized island branch of JT gravity coupled to a large-$c$ bath. In the late-time high-temperature regime, the entropy plateau remains unchanged at the first nontrivial order, while the capacity acquires a definite correction. This provides a sharp semiclassical example in which nearby replica data are physically meaningful even when the entropy itself appears rigid. Our result shows that the factorized island saddle already carries finite-$n$ information beyond the entropy, and that the capacity is a natural observable for exposing it. More broadly, it highlights that the physics of island saddles is not exhausted by the $n=1$ limit: the surrounding replica geometry can contain additional, and observable, information about how the semiclassical saddle is assembled.", "url": "https://arxiv.org/abs/2604.05815", "type": "理论", "summary": "1. 本工作利用纠缠容量探测了JT引力中大c浴耦合因子化岛支的副本鞍点结构。\n2. 在高温晚时区，熵平台保持不变而容量获得确定修正，揭示了邻近副本数据的物理意义。\n3. 这表明超越n=1极限的副本几何蕴含可观测信息，为研究半经典鞍点组装机制开辟新途径。", "summary_source": "deepseek", "authors": [{"name": "Raúl Arias"}, {"name": "Agustín Tamis"}], "featured_authors": [{"name": "Raúl Arias"}, {"name": "Agustín Tamis"}], "author_count": 2}, {"id": "2604.05878", "category": "hep-th", "title": "Exact WKB analysis of inverted triple-well: resonance, PT-symmetry breaking, and resurgence", "abstract": "We study non-Hermitian quantum mechanics of an inverted triple-well potential within the exact WKB framework. For a single classical potential, different Siegert boundary conditions define three distinct quantum problems: the PT-symmetric, resonance, and anti-resonance systems. For each case, we derive the exact quantization condition and construct the associated trans-series solution. By identifying the resurgent structures and cancellations in these non-Hermitian setups, we obtain the median-summed series, clarifying when the spectra are real or complex in accordance with the physical properties of each system. Establishing explicit links to the semi-classical path integral formalism, we elucidate the roles of bounce and bion configurations in these non-Hermitian systems. This analysis predicts PT-symmetry breaking, which we also verify numerically. Using the median quantization conditions, we prove the existence of this symmetry breaking and establish an exact equation for the exceptional point, which emerges as a remarkably simple algebraic relation between the bounce and bion actions. We further show that the median-summed non-perturbative correction to the spectrum vanishes at the exceptional point, while the resurgent structure survives through a universal minimal trans-series. For the resonance and anti-resonance systems, we find that the exact median-summed spectra are related by complex conjugation, representing time reversal in this setting, are necessarily complex, and do not exhibit an exceptional point. Although their spectra differ significantly from the PT-symmetric case, they share the same minimal trans-series. By maintaining explicit links with the path integral saddles and the formal theory of resurgence, our analysis provides a unified and general perspective on the quantization of non-Hermitian theories.", "url": "https://arxiv.org/abs/2604.05878", "type": "理论", "summary": "1. 该工作在精确WKB框架下研究了倒置三势阱的非厄米量子力学，针对PT对称、共振及反共振三种Siegert边界条件推导了精确量子化条件并构造了关联的瞬子级数解。\n2. 通过辨识这些非厄米设置中的复活结构与相消，获得了中值求和级数，从而阐明了谱的实复性质如何与各系统的物理特性一致，并建立了与半经典路径积分中bounce和bion构型的明确联系。\n3. 通过维持与路径积分鞍点及复活形式理论的明确联系，该分析为更广泛的非厄米理论的量子化提供了一个统一而普遍的视角。", "summary_source": "deepseek", "authors": [{"name": "Syo Kamata"}, {"name": "Tatsuhiro Misumi"}, {"name": "Cihan Pazarbaşı"}, {"name": "Hidetoshi Taya"}], "featured_authors": [{"name": "Syo Kamata"}, {"name": "Tatsuhiro Misumi"}, {"name": "Cihan Pazarbaşı"}, {"name": "Hidetoshi Taya"}], "author_count": 4}, {"id": "2604.05889", "category": "hep-th", "title": "Edge modes in Chern-Simons theory on a strip", "abstract": "We investigate abelian Chern-Simons gauge theory on a strip geometry with two spatial boundaries. In the presence of boundaries, gauge invariance is broken by boundary conditions, leading to physical edge excitations. By deriving the most general local boundary conditions consistent with power counting in the sense of Symanzik, we show that the bulk equations of motion determine the boundary degrees of freedom through a broken gauge Ward identity, yielding boundary Kac-Moody current algebras with opposite central charges on the two edges. The corresponding two-dimensional boundary actions are of Tomonaga-Luttinger type and describe chiral bosons propagating in opposite directions along the two boundaries. A consistency condition, interpreted as a holographic-like bulk-boundary matching, relates the Chern-Simons coupling constant and the boundary parameters to the physical edge velocities. Within this framework, the equality and opposite sign of the two velocities in a symmetric setup follow directly from the boundary structure rather than from model-dependent assumptions about confining potentials, and the velocities are independent of the strip width. Our analysis provides a fully field-theoretic realization of bulk-boundary correspondence in Chern-Simons theory with two boundaries, with direct applications to edge physics in quantum Hall systems and related topological/hydrodynamic settings.", "url": "https://arxiv.org/abs/2604.05889", "type": "理论", "summary": "1. 该工作研究了具有两个空间边界的条带几何上阿贝尔陈-西蒙斯规范理论，推导出边界条件诱导的物理边缘激发及其动力学描述。\n2. 通过构建Symanzik意义下最一般的局域边界条件，理论表明运动方程通过破缺的规范Ward恒等式决定边界自由度，从而在两边缘上产生具有相反中心荷的Kac-Moody流代数，其对应的二维边界作用量为Tomonaga-Luttinger类型。\n3. 该框架为量子霍尔系统及相关拓扑/流体动力学场景中的边缘物理提供了完全场论化的体-边对应实现，并可通过体耦合常数与边界参数的匹配关系直接预测边缘速度等物理量。", "summary_source": "deepseek", "authors": [{"name": "Erica Bertolini"}, {"name": "Michael Doyle"}, {"name": "Nicola Maggiore"}, {"name": "Conor Murphy"}, {"name": "Carlotta Piras"}], "featured_authors": [{"name": "Erica Bertolini"}, {"name": "Michael Doyle"}, {"name": "Nicola Maggiore"}, {"name": "Conor Murphy"}, {"name": "Carlotta Piras"}], "author_count": 5}, {"id": "2604.05901", "category": "hep-th", "title": "Geodesics from Quantum Field Theory: A Case Study in AdS", "abstract": "Localized one-particle states of a quantum field theory--whether in flat space or on a curved background--are expected to exhibit geodesic motion in an appropriate semiclassical regime. This expectation is often invoked heuristically: in this work we develop two precise implementations and test them in detail in global AdS$_3$. First, we define a covariant ''center-of-mass'' trajectory from the expectation value of the stress tensor operator and show, using only $\\nabla_\\mu\\langle T^{\\mu\\nu}\\rangle=0$, that it obeys the geodesic equation in the monopole (sufficiently localized) approximation in a general spacetime. This provides a QFT-in-curved-spacetime generalization of the Mathisson-Papapetrou-Dixon framework in classical general relativity. Second, we construct position operators from the Klein--Gordon inner product and mode completeness, and compute their expectation values in generic single-particle wave packet states. We then build explicit normalizable wave packets of a free scalar field in empty AdS$_3$ with tunable energy and angular momentum, and demonstrate analytically and numerically that both prescriptions reproduce the expected radial, circular, and elliptical-like timelike and null geodesics. Our discussion also isolates a natural ultra-relativistic regime in which the wave packet trajectory exhibits a controlled crossover from timelike to null geodesic behavior. We identify precise limits where the localized geodesic interpretation of the wave packet breaks down. On the CFT side, we show that bulk localization--specifically the radial data--is captured by how the state is distributed over global descendants of the dual primary.", "url": "https://arxiv.org/abs/2604.05901", "type": "理论", "summary": "1. 本文在全局 AdS$_3$ 中建立并验证了两种从量子场论态提取测地线运动的精确方案：基于应力张量期望值的协变质心轨迹，以及基于 Klein-Gordon 内积构造的位置算符期望值。\n2. 其核心在于，仅从应力张量的守恒律 $\\nabla_\\mu\\langle T^{\\mu\\nu}\\rangle=0$ 出发，在单极子近似下严格推导出质心轨迹满足测地线方程，这推广了经典广义相对论中的 Mathisson-Papapetrou-Dixon 框架至弯曲时空量子场论。\n3. 该工作为全息对偶中体局域化与边界 CFT 态分布（特别是对全局后代态的依赖）的精确对应关系提供了具体范例，并为波包轨迹从类时到类光测地线的可控过渡及解释失效的极限确立了清晰判据。", "summary_source": "deepseek", "authors": [{"name": "Vaibhav Burman"}, {"name": "Chethan Krishnan"}, {"name": "Livesh Parajuli"}], "featured_authors": [{"name": "Vaibhav Burman"}, {"name": "Chethan Krishnan"}, {"name": "Livesh Parajuli"}], "author_count": 3}, {"id": "2604.05919", "category": "hep-th", "title": "${\\cal N}=4$ supersymmetric Yang-Mills thermodynamics to order $λ^{5/2}$", "abstract": "We calculate the resummed perturbative free energy of ${\\cal N} = 4$ supersymmetric Yang-Mills in four spacetime dimensions (SYM$_{44}$) to order $\\lambda^{5/2}$ in the 't Hooft coupling at finite temperature and zero chemical potential. All infrared divergences cancel when we include contributions from SYM$_{44}$ ring diagrams and the final result is both ultraviolet and infrared finite. Our result has special significance since order $\\lambda^{5/2}$ is the highest order calculation that can be done with perturbation theory, because there are nonperturbative effects associated with the magnetic mass scale that come into play at order $\\lambda^3$. We compare results obtained with regularization by dimensional reduction (RDR), which preserves supersymmetry, and canonical dimensional regularization (DR). We also compare with a generalized Padé approximant constructed by matching the weak coupling result at order $\\lambda^2$ and the large $N_c$ strong coupling result at order $\\lambda^{-3/2}$. Finally we make a comparison between our result and the QCD free energy and show that SYM$_{44}$ has better convergence properties.", "url": "https://arxiv.org/abs/2604.05919", "type": "理论", "summary": "1. 该工作计算了四维N=4超对称Yang-Mills理论在有限温度下的微扰自由能至't Hooft耦合常数λ的5/2阶，并进行了多种正则化方案的比较。\n2. 所有红外发散在包含环图贡献后完全抵消，且λ^(5/2)阶是微扰理论可达到的最高阶，之后将出现磁质量尺度相关的非微扰效应。\n3. 此结果为强耦合规范场论的热力学提供了精确的微扰边界，其优于QCD的收敛特性为研究夸克-胶子等离子体提供了新的对比基准。", "summary_source": "deepseek", "authors": [{"name": "Margaret E. Carrington"}, {"name": "Gabor Kunstatter"}, {"name": "Ubaid Tantary"}], "featured_authors": [{"name": "Margaret E. Carrington"}, {"name": "Gabor Kunstatter"}, {"name": "Ubaid Tantary"}], "author_count": 3}, {"id": "2604.05950", "category": "hep-th", "title": "The 't Hooft loop from a center-vortex wave functional", "abstract": "Previously, we proposed an infrared vacuum wave functional for $SU(N)$ Yang-Mills theory peaked at thin center vortices and showed that it yields an area law for the Wilson loop. In this work, we use this wave functional to calculate the spatial 't Hooft loop, for which we find a perimeter law, in accordance with 't Hooft's criterion for confinement.", "url": "https://arxiv.org/abs/2604.05950", "type": "理论", "summary": "1. 该工作利用之前提出的峰值位于薄中心涡旋上的红外真空波泛函，计算了空间't Hooft圈的期望值。\n2. 核心发现是得到了't Hooft圈的周长律，这符合't Hooft提出的色禁闭判据。\n3. 该结果与同一波泛函给出的Wilson圈面积律相结合，为红外区中心涡旋机制的有效描述提供了有力证据。", "summary_source": "deepseek", "authors": [{"name": "D. R. Junior"}, {"name": "L. E. Oxman"}, {"name": "H. Reinhardt"}], "featured_authors": [{"name": "D. R. Junior"}, {"name": "L. E. Oxman"}, {"name": "H. Reinhardt"}], "author_count": 3}, {"id": "2604.05970", "category": "hep-th", "title": "Holographic entanglement entropy, Wilson loops, and neural networks", "abstract": "We apply artificial neural networks to the holographic inverse problem, reconstructing bulk geometry from boundary entanglement entropy by using the Ryu--Takayanagi area functional as a differentiable loss. Validated on the AdS-Schwarzschild background, this approach recovers the blackening factor to 1.7% accuracy. For finite-density backgrounds like the Gubser--Rocha model, we demonstrate that strip entanglement entropy determines only the spatial metric. We resolve this exact one-function degeneracy by incorporating holographic Wilson loop data, which couples to the timelike metric. We present a semi-analytical inversion combining Bilson's and Hashimoto's formulas, alongside a general three-network variational method minimizing the combined area and Nambu--Goto actions. The neural network achieves sub-0.2% accuracy for both metric functions without closed-form derivative relations, establishing a flexible framework for integrating multiple holographic observables.", "url": "https://arxiv.org/abs/2604.05970", "type": "理论", "summary": "1. 该工作应用人工神经网络解决全息逆问题，通过以Ryu-Takayanagi面积为可微损失函数，从边界纠缠熵重建体几何，并引入威尔逊圈数据消除度量函数简并。\n2. 核心突破在于结合条纹纠缠熵与类时威尔逊圈观测值，通过三网络变分方法联合优化面积与Nambu-Goto作用量，在无解析导数关系情况下实现双度量函数精度优于0.2%。\n3. 这为整合多种全息观测量建立了灵活框架，为有限密度系统及更复杂引力背景的几何重建提供了可扩展的数值方法。", "summary_source": "deepseek", "authors": [{"name": "Veselin G. Filev"}], "featured_authors": [{"name": "Veselin G. Filev"}], "author_count": 1}, {"id": "2604.05972", "category": "hep-th", "title": "Background Fields Meet the Heat Kernel: Gauge Invariance and RGEs without diagrams", "abstract": "We introduce a new method that exploits the combination of the Heat Kernel (HK) and Background Field Method to compute gauge-invariant and gauge parameter-independent quantities such as the effective potential, anomalous dimensions, and renormalization group equations. In contrast to currently employed techniques, these results are obtained exclusively from the dynamics of the background fields, without relying on supplementary input from, e.g., traditional diagrammatic calculations. This is achieved by a consistent treatment of open and closed derivatives in the HK expansions. In this way, we compute the standard quantities such as $\\beta$ functions and their gauge-parameter independence when background fields are on-shell. We demonstrate this formalism for instructive examples such as Scalar QED and Yukawa theory. Full results for the bosonic part of the Standard Model provide further validation of our approach.", "url": "https://arxiv.org/abs/2604.05972", "type": "理论", "summary": "1. 该研究发展了一种基于热核与背景场方法融合的新计算框架，旨在无需传统费曼图的情况下，直接求解规范不变的有效势、反常维度及重正化群方程等关键物理量。\n2. 其核心物理卖点是通过对热核展开中开闭导数的一致性处理，实现仅依赖背景场动力学导出所有结果，从而在背景场满足运动方程时自动保证如β函数等量的规范参数独立性。\n3. 此方法在标量QED和Yukawa理论中进行了示例计算，并成功应用于标准模型玻色子部分，为未来在更复杂规范理论中进行高效、无图的计算提供了切实可行的方案。", "summary_source": "deepseek", "authors": [{"name": "Debanjan Balui"}, {"name": "Joydeep Chakrabortty"}, {"name": "Christoph Englert"}, {"name": "Subhendra Mohanty"}, {"name": "Tushar"}], "featured_authors": [{"name": "Debanjan Balui"}, {"name": "Joydeep Chakrabortty"}, {"name": "Christoph Englert"}, {"name": "Subhendra Mohanty"}, {"name": "Tushar"}], "author_count": 5}, {"id": "2604.06009", "category": "hep-th", "title": "Are Black Holes Fuzzballs? Probing Horizon-Scale Structure with LISA", "abstract": "Gravitational waves provide a unique probe of the strong-field regime of gravity, offering access to physics beyond the classical black hole paradigm. We explore how space-based observations of extreme-mass-ratio inspirals (EMRIs) by the Laser Interferometer Space Antenna (LISA) can be used to test the fuzzball proposal, a quantum gravity-inspired alternative to Kerr black holes. By introducing generic multipolar deformations encoding potential symmetry breakings and performing a systematic parameter estimation analysis, we forecast LISA's ability to constrain deviations from the Kerr geometry in the near-horizon region. We show that EMRI signals with realistic signal-to-noise ratios can constrain multiple higher-order multipoles at levels orders of magnitude beyond current electromagnetic and ground-based gravitational-wave bounds, opening a new observational window onto horizon-scale structure. In particular, we find that LISA can constrain generic non-axisymmetric mass quadrupole deformations at the $10^{-3}$ level and axisymmetric mass octupole deformations at the $10^{-2}$ level, providing concrete observational targets for identifying fuzzball geometries. Our results demonstrate that precision measurements of EMRI waveforms will transform LISA into a powerful laboratory for fundamental physics and offer the first direct empirical constraints on quantum-gravity-motivated models of compact objects.", "url": "https://arxiv.org/abs/2604.06009", "type": "理论", "summary": "1. 该研究利用空间引力波探测器LISA对极端质量比旋进（EMRI）的观测能力，系统评估了其对量子引力启发的模糊球替代模型与克尔黑洞偏差的约束潜力。\n2. 研究通过引入编码潜在对称性破缺的通用多极形变，并执行参数估计分析，证明了LISA能以高达$10^{-3}$（非轴对称四极矩）和$10^{-2}$（轴对称八极矩）的精度约束近视界几何的高阶多极矩。\n3. 这为从观测上证认或排除包括模糊球在内的黑洞替代模型确立了明确的精度标准，并将引力波天文学拓展为研究黑洞微观结构的直接实验手段。", "summary_source": "deepseek", "authors": [{"name": "Pablo F. Muguruza"}, {"name": "Carlos F. Sopuerta"}], "featured_authors": [{"name": "Pablo F. Muguruza"}, {"name": "Carlos F. Sopuerta"}], "author_count": 2}, {"id": "2604.06062", "category": "hep-th", "title": "$ξRϕ^2$ non-minimal coupling, and the long range gravitational potential for different spin fields from 2-2 scattering amplitudes", "abstract": "In this paper we investigate the long range gravitational effect of curvature-scalar field non-minimal coupling, in the form of $\\xi R \\phi^2$, in the perturbative quantum gravity framework. Such coupling is most naturally motivated from the renormalisation of a scalar field theory with a quartic self interaction in a curved spacetime background. This coupling results in two scalar-$n$ graviton vertices which contain no explicit momenta of the scalar, qualitatively different from the usual, e.g. $\\kappa h^{\\mu\\nu}T_{\\mu\\nu}$-type minimal matter-graviton vertices. Assuming the dimensionless coupling parameter $\\xi$ to be small, we compute the 2-2 scattering Feynman amplitudes between such scalars up to ${\\cal O}(G^2 \\xi)$. From the non-relativistic limit of these amplitudes, we compute the corresponding long range gravitational potential. There exists no tree level contribution $({\\cal O}(\\xi G))$ here, and hence the one loop ${\\cal O}(G^2 \\xi)$ result is leading. Recently, the effect of a cosmological constant in such non-minimal interaction and the subsequent gravitational potential was computed. In this work we take the cosmological constant to be vanishing. The resulting potential is found to have $r^{-4}$ leading behaviour. We further extend these results for scalar-massive spin-1 and massive spin-1/2 scattering. Spin and polarisation dependence of the two body potential have been explicitly demonstrated. We discuss some possible physical implications of these results.", "url": "https://arxiv.org/abs/2604.06062", "type": "理论", "summary": "1. 该研究在微扰量子引力框架下，计算了非最小耦合项ξRφ²导致的标量、自旋1/2与自旋1粒子间二体散射的长程引力势。\n2. 其核心发现是，该耦合通过不含标量场外动量的新顶点产生领头阶单圈贡献，给出了区别于牛顿势的r⁻⁴主导行为，并显式揭示了势对粒子自旋与极化态的依赖。\n3. 这一结果为弯曲时空量子场论中的有效耦合修正、修改引力理论的长程检验以及相关有效场论系数的匹配提供了可计算的微观基础。", "summary_source": "deepseek", "authors": [{"name": "Avijit Sen Majumder"}, {"name": "Ayan Kumar Naskar"}, {"name": "Sourav Bhattacharya"}], "featured_authors": [{"name": "Avijit Sen Majumder"}, {"name": "Ayan Kumar Naskar"}, {"name": "Sourav Bhattacharya"}], "author_count": 3}, {"id": "2604.06088", "category": "hep-th", "title": "Comments on Symmetry Operators, Asymptotic Charges and Soft Theorems", "abstract": "We study the relation between emergent 1-form symmetries and soft photon theorems in QED. We show that in the relevant massive and massless kinematic regimes, described respectively by HQET and SCET, the soft sector admits electric and magnetic 1-form symmetries. We then show that these symmetries give rise to an infinite-dimensional Abelian algebra of ordinary conserved charges, with a central extension. In Minkowski spacetime, suitable choices of hypersurfaces reduce these charges to the familiar asymptotic symmetry charges and imply the leading electric and magnetic soft photon theorems. We further show that the central term in this algebra fixes a contact term appearing in scattering amplitudes involving two soft photons with mixed electric-magnetic polarizations. Finally, we extend the same construction to inclusive observables and apply it to QED photon detectors.", "url": "https://arxiv.org/abs/2604.06088", "type": "理论", "summary": "1. 本文研究了量子电动力学中涌现的1形式对称性与软光子定理之间的关系，论证了在HQET和SCET描述的有质量与无质量运动学区域中，软光子部分容许电性和磁性的1形式对称性。\n2. 这些对称性生成具有中心扩展的无穷维阿贝尔守恒荷代数，其中心项固定了混合电磁极化双软光子散射振幅中的接触项。\n3. 该构造可推广至包含可观测量，为QED光子探测器的理论描述提供了新框架。", "summary_source": "deepseek", "authors": [{"name": "Luigi Tizzano"}], "featured_authors": [{"name": "Luigi Tizzano"}], "author_count": 1}, {"id": "2604.06145", "category": "hep-th", "title": "Massive Exchange and the Sign of the Equilateral Bispectrum", "abstract": "We study the inflationary bispectrum generated by the tree-level exchange of a massive hidden-sector scalar during inflation. When the interaction between the inflaton and the hidden sector arises only from the leading boost-breaking operator of the Effective Field Theory (EFT) of inflation, the equilateral bispectrum for principal-series scalar exchange is known to be universally negative, independent of the sign of the coupling. We revisit this result within the full EFT operator basis. Using bootstrap methods, we construct the de Sitter-invariant seed four-point function and obtain the inflationary bispectrum via weight-shifting operators and a soft-limit procedure. While the equilateral bispectrum remains strictly negative when only the leading interaction is present, additional operators generate independent cubic structures whose contributions compete in the equilateral configuration. As a result, the sign of the bispectrum is no longer universal. We derive a critical ratio of interaction coefficients that separates regions of positive and negative equilateral bispectrum. We further study the effects of reduced sound speed $c_s<1$ and the exchange of multiple particles. In both cases, the critical ratio is modified, and for multi-particle exchange a positive equilateral bispectrum can arise even when the higher-order operator is subdominant. Our results show that the negativity of the equilateral bispectrum from massive exchange is not generic, but reflects a restricted operator structure in the EFT of inflation.", "url": "https://arxiv.org/abs/2604.06145", "type": "理论", "summary": "1. 本研究在暴胀有效场论的完整算符基下，重新审视了暴胀期间通过大质量隐藏扇区标量粒子树级交换产生的三点函数。\n2. 通过自举方法构建德西特不变的种子四点函数，并利用权重移动算符与软极限程序，揭示了等边构型三点函数的符号不再普适为负，而是取决于相互作用系数的临界比率。\n3. 这一结果表明，等边三点函数的负性并非普适特征，而是反映了暴胀有效场论中算符结构的特定限制，为早期宇宙模型中隐藏扇区相互作用的观测约束提供了新的理论视角。", "summary_source": "deepseek", "authors": [{"name": "Diptimoy Ghosh"}, {"name": "Suvashis Maity"}, {"name": "Farman Ullah"}], "featured_authors": [{"name": "Diptimoy Ghosh"}, {"name": "Suvashis Maity"}, {"name": "Farman Ullah"}], "author_count": 3}, {"id": "2604.05109", "category": "math-ph", "title": "Near-Tsirelson Bell-CHSH Violations in Quantum Field Theory via Carleman and Hankel Operators", "abstract": "We study Bell-Clauser-Horne-Shimony-Holt (Bell-CHSH) violations in the vacuum state of free spinor fields in $(1+1)$-dimensional Minkowski spacetime. We construct explicit smooth compactly supported test functions with spacelike separated supports whose Bell-CHSH correlators converge to Tsirelson's bound $2\\sqrt2$. In the massless case, after passage to the time-zero slice and a natural symmetry reduction, the problem reduces to the quadratic form of the Carleman operator on $L^2([0,\\infty))$. Near-maximal Bell violation is then governed by the spectral edge $\\pi$, and explicit near-extremizers are obtained from compactly supported cutoffs of the generalized eigenfunction $x^{-1/2}$. This also explains the appearance of the constant $\\pi$ in earlier wavelet-based formulations. In the massive case, the same reduction leads to a Hankel operator with kernel $mK_1(m(x+y))$, where $K_1$ denotes the modified Bessel function of the second kind of order $1$, and exponentially damped variants of the massless test functions again yield Bell-CHSH values converging to $2\\sqrt2$. Therefore, we establish a direct link between Bell-CHSH violations for free $(1+1)$-dimensional spinor fields and the spectral theory of Carleman and Hankel operators on the half-line.", "url": "https://arxiv.org/abs/2604.05109", "type": "理论", "summary": "1. 本文研究了(1+1)维闵可夫斯基时空自由旋量场真空态中的贝尔-CHSH违反，通过构造显式光滑紧支持测试函数使其在类空间分离区域的关联子收敛至Tsirelson界限2√2。\n2. 核心发现在于将问题约简为半直线上Carleman和Hankel算子的谱理论：无质量场中Carleman算子的谱边缘π控制近最大违反，有质量场中Hankel算子核mK₁(m(x+y))指导指数衰减变体实现相同收敛。\n3. 这建立了量子场论贝尔违反与积分算子谱理论之间的直接数学联系，解释了常数π在小波方法中的起源，并为拓展至更复杂场论模型或实验的非定域性研究提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "David Dudal"}, {"name": "Ken Vandermeersch"}], "featured_authors": [{"name": "David Dudal"}, {"name": "Ken Vandermeersch"}], "author_count": 2}, {"id": "2604.05300", "category": "math-ph", "title": "Constructive Quantum Field Theory and Rigorous Statistical Mechanics via Operator Algebras and Probability Theory -- Guiding Principles and Research Perspectives", "abstract": "We present a hierarchical viewpoint on the operator-algebraic formulation of quantum systems, in which $C^{*}$-algebras are responsible for the universal and intrinsic description, whereas von Neumann algebras provide the detailed account obtained after fixing a state compatible with the dynamics. From this standpoint, for bosonic many-body systems the resolvent algebra, rather than the Weyl algebra, is the natural object; in particular, its nuclearity, trivial center, and rich ideal structure faithfully reflect purely quantum-mechanical structures. Macroscopic variables or sector structures associated with phase transitions are captured as the center appearing in the weak closure of the GNS representation. Moreover, the equivalence between representations of operator algebras and functional integrals allows powerful probabilistic methods to be employed. Taking these as guiding principles, we outline research perspectives on concrete objects in constructive quantum field theory and rigorous statistical mechanics.", "url": "https://arxiv.org/abs/2604.05300", "type": "理论", "summary": "1. 本文提出了基于算子代数的量子系统层级化描述框架，其中C*代数提供普适描述，而冯·诺依曼代数对应特定动力学态的详细刻画。\n2. 核心创新在于指出玻色多体系统中解析代数（而非外尔代数）因其核性、平凡中心与理想结构，能更本质地反映量子力学结构。\n3. 该框架通过算子代数表示与泛函积分的等价性，为构造性量子场论和严格统计力学中具体问题的研究提供了系统的数学基础。", "summary_source": "deepseek", "authors": [{"name": "Yoshitsugu Sekine"}], "featured_authors": [{"name": "Yoshitsugu Sekine"}], "author_count": 1}, {"id": "2604.05598", "category": "math-ph", "title": "On some topological and spectral properties of kinetic Langevin processes driven by L{é}vy noises", "abstract": "We investigate several fundamental properties of kinetic Langevin processes in $\\mathbb{R}^{2d}$, defined as solutions to the following system: $$dx\\_t = v\\_t \\, dt, \\qquad dv\\_t = \\mathbf{B}(x\\_t, v\\_t) \\, dt + dL\\_t$$ where $(L\\_t, t \\ge 0)$ is a pure-jump L{é}vy process. Our analysis covers both the original process and its killed counterpart, where killing occurs upon exiting domains of the form $\\mathscr{D} = \\mathscr{O} \\times \\mathbb{R}^d$ for an arbitrary open set $\\mathscr{O} \\subset \\mathbb{R}^d$. Operating within a low-regularity framework - where the drift $\\mathbf{B}$ is not assumed to be continuous - we establish key structural and spectral properties for both the associated non-killed and killed semigroups. These include: the strong Feller property, weak continuity of trajectories with respect to initial conditions, topological irreducibility and the existence of a spectral gap. Furthermore, we prove, in this low-regularity framework, the existence and uniqueness of a weak solution when the driving noise is a rotationally invariant $\\alpha$-stable process, when $\\alpha \\in (1,2)$. For this specific case, we show that the aforementioned properties hold and further establish the existence of densities within certain $L^m$ spaces as well as the Feller $C\\_0(\\mathbb R^{2d})$-semigroup property. Finally, we address the existence and uniqueness of stationary and quasi-stationary distributions, proving exponential ergodicity for the non-killed process and exponential convergence to the quasi-stationary limit for the conditioned process. We show that these results extend to every $\\alpha \\in (0,1]$ when the drift is smooth.", "url": "https://arxiv.org/abs/2604.05598", "type": "理论", "summary": "1. 该工作在ℝ^{2d}中系统研究了由纯跳跃Lévy噪声驱动的动力学朗之万过程及其在域𝒟=𝒪×ℝ^d退出时被杀死版本的基本拓扑与谱性质。\n2. 在漂移𝐁不假设连续的低正则性框架下，为原过程与杀死半群确立了强Feller性、弱连续性、拓扑不可约性及谱间隙，并对α∈(1,2)的旋转不变α稳定噪声证明了弱解存在唯一性、L^m空间密度存在性及Feller C_0半群性质。\n3. 这些结果可扩展至α∈(0,1]的平滑漂移情形，并证明了平稳与拟平稳分布的存在唯一性及指数遍历性，为低正则性Lévy驱动系统的谱理论与遍历行为研究提供了新基础。", "summary_source": "deepseek", "authors": [{"name": "T Batisse"}, {"name": "A Guillin"}, {"name": "B Nectoux"}, {"name": "L Wu"}], "featured_authors": [{"name": "T Batisse"}, {"name": "A Guillin"}, {"name": "B Nectoux"}, {"name": "L Wu"}], "author_count": 4}, {"id": "2604.05750", "category": "math-ph", "title": "Analytic exact solutions to the nonlinear Dirac equation", "abstract": "We present analytic exact solutions to the nonlinear Dirac equation: they display a ring singularity for the Nambu--Jona-Lasinio nonlinearity and a shell singularity for the Soler nonlinearity. For both cases the size of the singular region is of the order of the Compton length.", "url": "https://arxiv.org/abs/2604.05750", "type": "理论", "summary": "1. 该工作针对具有Nambu-Jona-Lasinio型和Soler型非线性项的狄拉克方程，构造了精确解析解。\n2. 其核心物理发现是，两类解分别呈现环状奇异性与壳层奇异性，且奇异性区域的尺寸均约为康普顿波长量级。\n3. 这些具有明确奇异性结构的精确解，为深入研究非线性相对论性量子场模型的非微扰行为与奇异几何特征提供了基准。", "summary_source": "deepseek", "authors": [{"name": "Luca Fabbri"}, {"name": "Roberto Cianci"}], "featured_authors": [{"name": "Luca Fabbri"}, {"name": "Roberto Cianci"}], "author_count": 2}, {"id": "2604.06011", "category": "math-ph", "title": "Analyticity, asymptotics and natural boundary for a one-point function of the finite-volume critical Ising chain", "abstract": "This note reports the following observation: the finite-volume expectation value of the spin operator (the one-point function) between the $\\mathbb{Z}_2$-even and odd ground states in the critical periodic Ising chain, when continued as a complex-analytic function of the system length $N$ through the Borel resummation of its large-$N$ expansion, has a natural boundary of analyticity along the negative real axis. The singular behavior near the negative real axis, after an exponential map, is the same as that of a Lambert-type series for the odd-divisor-squared sum near the unit circle $|z|=1$. The same divisor sum also governs the strengths of the Borel discontinuities of the one-point function's factorially-divergent large-$N$ asymptotics. We also report the all-order large-$N$ asymptotics of the leg function for the finite-volume spin-operator form factor, and the similarities to certain known quantities in the literature.", "url": "https://arxiv.org/abs/2604.06011", "type": "理论", "summary": "1. 该工作通过Borel重求和解析延拓，研究了临界周期伊辛链中Z2偶/奇基态间自旋算符单点函数作为复系统长度N函数的解析结构。\n2. 核心发现是解析延拓后的函数在负实轴上存在自然边界，其邻近奇异行为经指数映射后与单位圆处Lambert型级数的除数平方和奇性一致。\n3. 这暗示类似自然边界结构可能普遍存在于其他可积模型中，为有限体积可积系统非扰动解析性质的系统性研究提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Yizhuang Liu"}], "featured_authors": [{"name": "Yizhuang Liu"}], "author_count": 1}, {"id": "2604.05031", "category": "quant-ph", "title": "Geometry of Free Fermion Commutants", "abstract": "Understanding the structure of operators that commute with $k$ identical replicas of unitary ensembles, also known as their $k$-commutants, is an important problem in quantum many-body physics with deep implications for the late-time behavior of physical quantities such as correlation functions and entanglement entropies under unitary evolution. In this work, we study the $k$-commutants of free-fermion unitary systems, which are heuristically known to contain $SO(k)$ and $SU(k)$ groups without and with particle number conservation respectively, with formal derivations of projectors onto these commutants appearing only very recently. We establish a complementary perspective by highlighting a larger $O(2k)$ replica symmetry (or $SU(2k)$ respectively) that the $k$-commutant transforms irreducibly under, which leads to a simple geometric understanding of the commutant in terms of coherent states parametrized by a Grassmannian manifold. We derive this structure by mapping the $k$-commutant to the ground state of effective ferromagnetic Heisenberg models, analogous to the ones that appear in the noisy circuit literature, which we solve exactly using standard representation theory methods. Further, we show that the Grassmannian manifold of the $k$-commutant is exactly the manifold of fermionic Gaussian states on $2k$ sites, which reveals a duality between real space and replica space in free-fermion systems. This geometric understanding also provides a compact projection formula onto the $k$-commutant, based on the resolution of identity for coherent states, which can prove advantageous in analytical calculations of averaged non-linear functionals of Gaussian states, as we demonstrate using some examples for the entanglement entropies. In all, this work provides a geometric perspective on the $k$-commutant of free-fermions that naturally connects to problems in quantum many-body physics.", "url": "https://arxiv.org/abs/2604.05031", "type": "理论+数值", "summary": "1. 该工作深入探究了自由费米子幺正系统 \\(k\\)-对易子的几何结构，建立了基于格拉斯曼流形的相干态描述。\n2. 关键进展在于通过映射到有效铁磁海森堡模型并精确求解，揭示了 \\(k\\)-对易子服从更大的 \\(O(2k)\\) 或 \\(SU(2k)\\) 复制对称性，并证明其与 \\(2k\\) 格点费米子高斯态流形相同，从而阐明了实空间与复制空间的二元性。\n3. 这一几何理解催生了基于相干态恒等分辨的紧凑投影公式，为纠缠熵等非线性泛函的解析计算提供了便利，有望推动量子多体物理中晚期演化行为的研究。", "summary_source": "deepseek", "authors": [{"name": "Marco Lastres"}, {"name": "Sanjay Moudgalya"}], "featured_authors": [{"name": "Marco Lastres"}, {"name": "Sanjay Moudgalya"}], "author_count": 2}, {"id": "2604.05032", "category": "quant-ph", "title": "Real-time Dynamics in 3D for up to 1000 Qubits with Neural Quantum States: Quenches and the Quantum Kibble--Zurek Mechanism", "abstract": "Exponential complexity of many-body wave functions limits accurate numerical simulations of real-time dynamics, especially beyond 1D, where rapid entanglement growth poses severe challenges. Neural Quantum States (NQS) have emerged as a powerful approach for real-time dynamics in 2D, but their scalability and accuracy in 3D have remained an open challenge. Here, we establish NQS as a scalable framework for 3D quantum dynamics by introducing a residual-based convolutional architecture tailored to cubic spin lattices. Focusing on the 3D transverse-field Ising model, we demonstrate that NQS reliably capture distinct quench regimes, including collapse-and-revival dynamics and, most challengingly, the dynamics following a sudden quench to the quantum critical point. We perform finite-rate quenches to the critical point on lattices containing up to $1000$ qubits, an unprecedented system size for numerical simulations of real-time dynamics beyond 1D. This enables the first large-scale numerical demonstration of the 3D quantum Kibble--Zurek mechanism. The QKZM in 3D is particularly intriguing because it lies at the upper critical dimension of the Ising universality class, where the standard power laws are modified by logarithmic factors together with prominent sub-leading logarithmic corrections. By deriving these corrections from renormalization-group flow equations up to two-loop order, we obtain a robust data collapse across all simulated system sizes for the correlation function, the excess energy, and the quantum Fisher information, the latter revealing universal multipartite-entanglement dynamics. In all cases, we find compelling agreement with the expected scaling dimensions. Our findings establish NQS as a scalable and reliable tool for exploring nonequilibrium phenomena in 3D quantum matter and for providing numerical benchmarks for 3D quantum simulators.", "url": "https://arxiv.org/abs/2604.05032", "type": "理论+数值", "summary": "1. 该工作利用残差卷积架构的神经量子态，首次实现了三维立方自旋晶格中多达1000量子比特的非平衡实时动力学模拟。\n2. 其核心在于通过该可扩展框架，首次在三维伊辛模型临界点淬火动力学中观测到量子Kibble-Zurek机制，并利用两圈重整化流方程解析获得了含对数修正的普适标度律。\n3. 这为三维量子模拟器提供了数值基准，并确立了神经量子态作为探索三维量子物质非平衡现象的可靠工具。", "summary_source": "deepseek", "authors": [{"name": "Vighnesh Dattatraya Naik"}, {"name": "Zheng-Hang Sun"}, {"name": "Markus Heyl"}], "featured_authors": [{"name": "Vighnesh Dattatraya Naik"}, {"name": "Zheng-Hang Sun"}, {"name": "Markus Heyl"}], "author_count": 3}, {"id": "2604.05036", "category": "quant-ph", "title": "Efficient simulation of noisy IQP circuits with amplitude-damping noise", "abstract": "Efficient classical simulation of noisy intermediate-scale quantum (NISQ) circuits has been a topic of intense study over the past few years. The majority of results on efficient simulation assume that the circuits undergo some variant of unital noise or involve sufficient randomness. However, there are limited results for circuits undergoing non-unital noise in the absence of randomness. In this work, we present a polynomial-time classical algorithm to sample from the output distributions of amplitude-damped instantaneous quantum polynomial (IQP) circuits. Our algorithm works for circuits generated by arbitrary $l$-local diagonal gates with depth $d = \\Omega(\\log(n))$, undergoing constant amplitude-damping noise.", "url": "https://arxiv.org/abs/2604.05036", "type": "数值", "summary": "1. 该工作提出了多项式时间经典算法，用于对具有恒定振幅阻尼噪声的 IQP 电路输出分布进行采样。\n2. 其技术核心在于针对非酉噪声且无随机性假设的电路，首次实现了深度为对数规模的任意局域对角门电路的高效模拟。\n3. 这为更广泛非酉噪声下量子电路的经典可模拟性研究提供了新途径，并可能推动对 NISQ 计算极限的进一步理解。", "summary_source": "deepseek", "authors": [{"name": "Shravan Shravan"}, {"name": "Mohsin Raza"}, {"name": "Ariel Shlosberg"}], "featured_authors": [{"name": "Shravan Shravan"}, {"name": "Mohsin Raza"}, {"name": "Ariel Shlosberg"}], "author_count": 3}, {"id": "2604.05098", "category": "quant-ph", "title": "Quantum Algorithms for Heterogeneous PDEs: The Neutron Diffusion Eigenvalue Problem", "abstract": "We develop a hybrid classical-quantum algorithm to solve a type of linear reaction-diffusion equation, the neutron diffusion (generalized) k-eigenvalue problem that establishes nuclear criticality. The algorithm handles an equation with piecewise constant coefficients, describing a problem in a heterogeneous medium. We apply uniform finite elements and show that the quantum algorithm provides significant polynomial end-to-end speedup over its classical counterparts. This speedup leverages recent advances in quantum linear systems -- fast inversion and quantum preconditioning -- and uses Hamiltonian simulation as a subroutine. Our results suggest that quantum algorithms may provide speedups for heterogeneous PDEs, though the extent of this advantage over the fastest classical algorithm depends on the effectiveness of other classical approaches such as nonuniform or adaptive meshing for a given problem instance.", "url": "https://arxiv.org/abs/2604.05098", "type": "理论+数值", "summary": "1. 本文针对描述异质介质中核临界条件的广义中子扩散k-本征值问题，开发了一种混合经典-量子算法。\n2. 该算法结合均匀有限元方法，通过量子线性系统快速求逆与量子预处理技术，并辅以哈密顿模拟子程序，实现了相对于经典算法的显著多项式级端到端加速。\n3. 研究结果提示量子算法在异质偏微分方程求解中具潜力，但其相对于采用非均匀或自适应网格等经典方法的实际优势，仍取决于具体问题实例。", "summary_source": "deepseek", "authors": [{"name": "Andrew M. Childs"}, {"name": "Lincoln Johnston"}, {"name": "Brian Kiedrowski"}, {"name": "Mahathi Vempati"}, {"name": "Jeffery Yu"}], "featured_authors": [{"name": "Andrew M. Childs"}, {"name": "Lincoln Johnston"}, {"name": "Brian Kiedrowski"}, {"name": "Mahathi Vempati"}, {"name": "Jeffery Yu"}], "author_count": 5}, {"id": "2604.05107", "category": "quant-ph", "title": "Quantum noise in ranging with optical pulses", "abstract": "Optical frequency combs combine ultrashort pulse duration and phase stability, making them powerful resources for high-precision ranging even when affected by atmospheric dispersion. It has been established that by classical modal engineering and mdoe-sensitive detection sensitivity to distance at the standard limit can be achieved, however attaining improved uncertainties by the use of squeezing has not been explored. Here, we apply an effective Hamiltonian framework to the problem of ranging with quantum frequency combs in order to derive the associated precision bounds for distance estimation. We analyse the role of intensity anti-squeezing and temporal beam shaping, and find that quantum solutions may be appealing mostly for short-distance applications.", "url": "https://arxiv.org/abs/2604.05107", "type": "理论", "summary": "1. 该工作针对量子频率梳测距问题，采用有效哈密顿量框架推导了距离估计的精度极限。\n2. 研究揭示了强度反压缩效应与时域光束整形在提升精度中的关键作用，并量化了其影响。\n3. 结果表明量子增强方案在短程测距中更具应用潜力，这为面向实际场景的量子计量设计提供了重要参考。", "summary_source": "deepseek", "authors": [{"name": "Mylenne Manrique"}, {"name": "Ilaria Gianani"}, {"name": "Marco Barbieri"}, {"name": "Valentina Parigi"}, {"name": "Nicolas Treps"}], "featured_authors": [{"name": "Mylenne Manrique"}, {"name": "Ilaria Gianani"}, {"name": "Marco Barbieri"}, {"name": "Valentina Parigi"}, {"name": "Nicolas Treps"}], "author_count": 5}, {"id": "2604.05126", "category": "quant-ph", "title": "In-Situ Simultaneous Magic State Injection on Arbitrary CSS qLDPC Codes", "abstract": "Quantum low-density parity-check (qLDPC) codes can encode many logical qubits within a single code block at low physical qubit overhead, yet magic state injection into such codes remains largely underexplored. Existing state injection proposals for qLDPC codes predominantly follow an external prepare-and-transfer paradigm, in which raw magic states are prepared outside the target code block and subsequently injected via inter-code operations. We propose the first \\emph{in-situ} magic state injection: a scheme in which logical magic states are directly prepared within a qLDPC memory block, only using resources required for syndrome extraction. We show that our scheme is generalizable to any CSS qLDPC code, with examples of circuit-level simulations on the $[[144,12,12]]$ Bivariate Bicycle (BB) code and the $[[225,9,4]]$ Hypergraph Product code. We focus on a regime where correlated injection errors are negligible. In the BB code, this corresponds to a configuration that simultaneously injects four logical $|Y\\rangle$ states. Under a uniform depolarizing noise model with physical error rate $10^{-3}$, this achieves an injection error rate of $1.62 \\times 10^{-3}$ per logical qubit, while the correlated-error contribution is only $2 \\times 10^{-5}$ per logical qubit (about $1\\%$ of the injection error rate). Under a hardware-motivated asymmetric noise model where single-qubit gate errors are $10\\%$ of two-qubit gate errors, the injection error rate per logical qubit falls to $ 6.7 \\times 10^{-4} $, below the error rate ($ 10^{-3} $) of the two-qubit gates used to encode the magic states. Its simplicity allows our scheme to be applied to arbitrary CSS qLDPC codes using only the ancilla qubits native to syndrome extraction, and yield a reduction in space overhead relative to both prepare-and-transfer approaches and surface-code-based magic state injection schemes.", "url": "https://arxiv.org/abs/2604.05126", "type": "理论+数值", "summary": "1. 该工作首次提出了一种在任意CSS qLDPC码中直接制备逻辑魔法态的局内注入方案，仅需纠错所需的辅助比特资源。\n2. 其技术关键在于绕过了外部制备-传输范式，通过电路级仿真在[[144,12,12]]双变量自行车码等实例中实现了低于物理门错误率的注入误差（如6.7×10⁻⁴）。\n3. 该方案为各类CSS qLDPC码的实用化提供了可行路径，其资源效率相较于表面码方案和传统传输方法具有显著优势。", "summary_source": "deepseek", "authors": [{"name": "Kun Liu"}, {"name": "Shifan Xu"}, {"name": "Tomas Jochym-O'Connor"}, {"name": "Zhiyang He"}, {"name": "Shraddha Singh"}, {"name": "Yongshan Ding"}], "featured_authors": [{"name": "Kun Liu"}, {"name": "Shifan Xu"}, {"name": "Tomas Jochym-O'Connor"}, {"name": "Zhiyang He"}, {"name": "Shraddha Singh"}, {"name": "Yongshan Ding"}], "author_count": 6}, {"id": "2604.05133", "category": "quant-ph", "title": "Tight Quantum Lower Bound for k-Distinctness", "abstract": "In this paper, we introduce a new quantum query lower bound framework. It is inspired by Zhandry's compressed oracle technique, but it also subsumes the polynomia
