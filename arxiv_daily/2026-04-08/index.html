<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>arXiv 2026-04-08 · Daily ArXiv Selection</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2604.04968", "category": "cond-mat", "title": "Emergent symmetry and thermodynamic crossovers for supercritical AdS black holes", "abstract": "Ising symmetry typically emerges in the critical domain between liquid-gas phases. Universality of this property imposes strong constraints on the behavior of thermodynamic crossovers for supercritical fluids. In this work, we develop a novel approach to investigate the crossover lines for supercritical AdS black holes using Lee-Yang phase transition theory. We analytically continue Lee-Yang zeros into the complex plane within the supercritical region by keeping a modular pressure real. Consequently, we obtain a pair of complex crossover lines, which exhibit universal scalings and manifest the emergent Ising symmetry in the complex phase space. The real crossover lines are defined by projecting the complex crossovers onto the real phase space. As a result, the phase diagram above the critical point is divided into three distinct regimes: liquid-like, indistinguishable and gas-like states, in sharp contrast to scenarios featuring only a single crossover line.", "url": "https://arxiv.org/abs/2604.04968", "type": "理论+数值", "summary": "1. 该工作基于Lee-Yang相变理论，提出了一种研究超临界AdS黑洞中热力学交叉线的新方法。\n2. 其核心在于通过对模压保持实值，将Lee-Yang零点解析延拓至复平面，从而在复相空间中揭示出具有普适标度行为的复交叉线，并呈现了涌现的Ising对称性。\n3. 由此定义的实交叉线将临界点以上的相图划分为类液体态、不可区分态和类气体态三个区域，这与仅存在单一交叉线的传统图像形成鲜明对比。", "summary_source": "deepseek", "authors": [{"name": "Zhong-Ying Fan"}], "featured_authors": [{"name": "Zhong-Ying Fan"}], "author_count": 1}, {"id": "2604.05052", "category": "cond-mat", "title": "Predicting spin-orbit coupling in hole spin qubit arrays with vision-transformer-based neural networks on a generalized Hubbard model", "abstract": "We introduce a neural-network-based machine learning method to predict the effective spin-orbit coupling (SOC) strength in hole quantum dot arrays from standard charge stability diagrams. Specifically, we study a $2\\times 2$ Ge hole quantum dot array described by a generalized spin-orbit coupled Hubbard model that incorporates random site- and bond-dependent disorder in all system parameters, including onsite potentials, Coulomb interaction strengths, interdot tunneling amplitudes, as well as the direction and angle of the SOC-induced spin rotations accompanying interdot tunneling. We train the neural network on numerically simulated charge stability diagrams from nearest-neighbor pairs of quantum dots for different chemical potentials and out-of-plane magnetic fields, and show that this enables us to predict the SOC-induced spin-flip tunneling amplitudes -- and, thus, the effective SOC strength -- with high fidelity ($R^2\\approx 0.94$) even when all other Hubbard model parameters are unknown. Furthermore, our neural network can also predict the other Hubbard model parameters with high fidelity, demonstrating that neural-network-based approaches can be a powerful tool for the automated characterization of hole spin qubit arrays.", "url": "https://arxiv.org/abs/2604.05052", "type": "理论+数值", "summary": "1. 该工作提出了一种基于视觉Transformer神经网络的方法，通过标准电荷稳定图来预测空穴量子点阵列中的有效自旋轨道耦合强度。\n2. 其核心在于即使哈伯德模型所有参数未知，网络仍能以高保真度从模拟数据中提取出自旋翻转隧穿振幅，从而确定有效SOC强度。\n3. 这为大规模空穴自旋量子比特阵列的自动化、高效率表征提供了强有力的机器学习工具路径。", "summary_source": "deepseek", "authors": [{"name": "Jacob R. Taylor"}, {"name": "Katharina Laubscher"}, {"name": "Sankar Das Sarma"}], "featured_authors": [{"name": "Jacob R. Taylor"}, {"name": "Katharina Laubscher"}, {"name": "Sankar Das Sarma"}], "author_count": 3}, {"id": "2604.05097", "category": "cond-mat", "title": "Surface Response, Plasma Modes of coated Multi-Layered anisotropic Semi-Dirac Heterostructures", "abstract": "We derived closed-form analytical expressions for the surface response functions (SRFs) for heterostructure. We investigate structures consisting of up to three layered, coated heterostructure of two-dimensional (2D) materials with a dielectric medium or vacuum interface. The dielectric media serves to inhibit charge transfer between layers for the case when a pair of 2D layers serve as coatings for a dielectric film. Our results revise the established picture for the dispersion equation for two layers of reduced dimensionality surrounded by dielectric media. An impinging electromagnetic field incident on the surface leads to Coulomb coupled plasma excitations in the structure which are yielded by the SRF. This is achieved by employing Maxwell's equations and linear response theory. We use these results to investigate the plasmonic properties of tilted semi-Dirac materials both analytically and numerically. Closed-form analytical expressions are derived for the plasmon dispersions in the long wavelength limit for single and double layers. We numerically obtain density plots of the loss functions and observe anisotropic behavior in different momentum directions. For the cases when there are two or three layers, we observe two plasmon branches corresponding to in-phase and out-of-phase charge density oscillations, where the in-phase optical modes have higher intensity than the out-of-phase acoustic modes. We calculated the optical absorption spectra for plasma modes in layered semi-Dirac materials produced by an external electromagnetic field carrying an electric polarization and frequency. Possible applications include durable protection coatings providing UV resistance, chemical protection and improving upon traditional ceramic coatings.", "url": "https://arxiv.org/abs/2604.05097", "type": "理论+数值", "summary": "1. 该工作基于麦克斯韦方程和线性响应理论，推导了介电涂层多层各向异性半狄拉克异质结表面响应函数的闭式解析表达式，并系统研究了电磁场入射诱导的等离子体激发。\n2. 其物理卖点在于修订了介电媒介中二维层体系的色散方程，并通过解析与数值方法揭示了长波极限下等离子体激元的各向异性色散及多层中同相与反相模式的分支特性。\n3. 这为理解涂层异质结中的库仑耦合等离子体行为提供了新框架，并对半狄拉克材料在等离子体器件和耐久涂层应用中的设计具有明确启发。", "summary_source": "deepseek", "authors": [{"name": "Teresa Lee"}, {"name": "Godfrey Gumbs"}, {"name": "Thi Nga Do"}, {"name": "Andrii Iurov"}, {"name": "Danhong Huang"}], "featured_authors": [{"name": "Teresa Lee"}, {"name": "Godfrey Gumbs"}, {"name": "Thi Nga Do"}, {"name": "Andrii Iurov"}, {"name": "Danhong Huang"}], "author_count": 5}, {"id": "2604.05198", "category": "cond-mat", "title": "Decoding Equilibrium and Dynamical Criticality in the 2D Topological Order", "abstract": "Unifying equilibrium criticality and dynamical quantum phase transitions (DQPTs) under complex driving fields remains a profound challenge. Here, we decode this connection in the 2D strongly interacting Wen-plaquette model. By mapping its anyonic excitations to 1D effective dissipative channels, we reveal that microscopic single-particle fidelity zeros exactly reconstruct the macroscopic equilibrium topological phase boundaries. Beyond equilibrium, we demonstrate that during non-unitary quench dynamics, these very same static singularities enforce an absolute momentum-space exclusion against dynamical Fisher zeros. Furthermore, a newly identified dissipation-phase racing mechanism prematurely depletes the decaying mode, fundamentally annihilating DQPTs and generating topologically trivial steady states. Our results establish exact microscopic static singularities as the universal decoder for macroscopic non-unitary topological dynamics.", "url": "https://arxiv.org/abs/2604.05198", "type": "理论", "summary": "1. 该工作通过将二维强相互作用Wen-plaquette模型中任意子激发映射至一维有效耗散通道，解码了平衡态临界性与非平衡动力学相变在复杂驱动场下的统一关联。\n2. 研究揭示微观单粒子保真度零点精确重构了宏观平衡拓扑相边界，且这些静态奇点在非幺正淬火动力学中强制产生动量空间的动态Fisher零点绝对排斥效应。\n3. 新发现的耗散-相位赛跑机制通过提前耗尽衰减模式，从根本上湮灭了动力学量子相变，为理解非幺正拓扑动力学的普适解码机制提供了严格微观理论基础。", "summary_source": "deepseek", "authors": [{"name": "Xiao-Ming Zhao"}, {"name": "Cui-Xian Guo"}, {"name": "Gaoyong Sun"}, {"name": "Su-Peng Kou"}], "featured_authors": [{"name": "Xiao-Ming Zhao"}, {"name": "Cui-Xian Guo"}, {"name": "Gaoyong Sun"}, {"name": "Su-Peng Kou"}], "author_count": 4}, {"id": "2604.05216", "category": "cond-mat", "title": "Approximate vortex lattices of atomic Fermi superfluid on a spherical surface", "abstract": "While planar Fermi superfluids form Abrikosov vortex lattices under magnetic or effective gauge fields, spherical geometry forbids perfect lattices above 20 vortices. We characterize approximate vortex structures of atomic Fermi superfluids under an effective monopole field on a spherical surface as an analogue of the planar vortex-lattice problem by two constructions based on the Ginzburg-Landau theory. The first one is geometric and uses the random, geodesic-dome, and Fibonacci lattices as scaffolds to construct the order parameter from the degenerate monopole harmonics. The second one minimizes the free energy by numerically adjusting the coefficients to find the solution with the minimal Abrikosov parameter. We have verified the vortices from both constructions are zeros of the order parameter with circulating currents around the vortex cores. As the number of vortices increases, the Abrikosov parameters of both the Fibonacci-lattice and minimization solutions extrapolate to the planar value. We briefly discuss implications for ultracold atoms in thin spherical-shell geometry.", "url": "https://arxiv.org/abs/2604.05216", "type": "理论+数值", "summary": "1. 该工作通过Ginzburg-Landau理论，研究了有效单极场中球面上原子费米超流体的近似涡旋晶格结构，并采用了基于简并单极谐波的几何构造与自由能最小化数值两种方案。\n2. 其核心物理发现是，随着涡旋数目增加，斐波那契晶格构造和能量最小化解的阿布里科索夫参数均趋近于平面极限值，从而建立了球面与平面涡旋晶格问题间的定量对应关系。\n3. 这为在薄球壳几何中利用超冷原子模拟受限拓扑超流体的涡旋态提供了理论基准，并启示了对曲面上非平庸规范场下超流有序参量结构的进一步探索。", "summary_source": "deepseek", "authors": [{"name": "Keshab Sony"}, {"name": "Yan He"}, {"name": "Chih-Chun Chien"}], "featured_authors": [{"name": "Keshab Sony"}, {"name": "Yan He"}, {"name": "Chih-Chun Chien"}], "author_count": 3}, {"id": "2604.05220", "category": "cond-mat", "title": "Many-body description of two-dimensional van der Waals ferroelectric $α-$In$_2$Se$_3$", "abstract": "Two-dimensional (2D) van der Waals ferroelectrics are recognized for enabling many applications, from memory and logic to neuromorphic computing, as well as transforming other materials to control electronic phase transitions and topological states. While these materials are typically weakly correlated and expected to have their ground-state properties well described with the commonly used density functional theory, by focusing on bilayers and trilayers of In$_2$Se$_3$ we show that this approach may not be reliable. The underlying electronic structure strongly depends on the polarization structure of the multilayer system and is surprisingly challenging to accurately calculate, requiring a high-fidelity many-body theory of the quasiparticle self-consistent \\textit{GW} approximation. We develop this underlying description by extending the capabilities of Green function implementation within the open-source Questaal package. We show that even a sophisticated hybrid functional approach may fail to predict a nonvanishing gap in a bilayer In$_2$Se$_3$ and yields charge density, polarization, and band offsets that strongly deviate from the many-body picture. We discuss the implications of these computational advances for future opportunities in 2D ferroelectrics.", "url": "https://arxiv.org/abs/2604.05220", "type": "理论+数值", "summary": "1. 该工作针对二维范德华铁电体α-In₂Se₃的双层与三层结构，揭示了标准密度泛函理论描述其基态性质的不可靠性。\n2. 研究通过开发Questaal软件包中的格林函数方法，实现了准粒子自洽GW近似，证明即使混合泛函也会错误预测零带隙并显著偏离多体理论给出的电荷密度、极化和带偏移。\n3. 这些计算进展为二维铁电体的精确电子结构研究确立了新标准，并为理解其极化依赖的物理性质提供了关键理论工具。", "summary_source": "deepseek", "authors": [{"name": "Denzel Ayala"}, {"name": "Dimitar Pashov"}, {"name": "Tong Zhou"}, {"name": "Kirill Belashchenko"}, {"name": "Mark van Schilfgaarde"}, {"name": "Igor Žutić"}], "featured_authors": [{"name": "Denzel Ayala"}, {"name": "Dimitar Pashov"}, {"name": "Tong Zhou"}, {"name": "Kirill Belashchenko"}, {"name": "Mark van Schilfgaarde"}, {"name": "Igor Žutić"}], "author_count": 6}, {"id": "2604.05223", "category": "cond-mat", "title": "A Modular 3D-Printed Design to Investigate Prebiotic Chemical Systems in Hot Spring Pools", "abstract": "The emergence of membranous compartments (protocells) with encapsulated genetic material was a crucial step life's origin and evolution. The hot spring hypothesis for the origin of life suggests that protocells could have formed in hot spring pools and encapsulated organic matter. Previous investigations have focused on mimicking wet-dry (WD) cycles within a single pool, which precludes simulation of many hydrothermal field conditions, such as differential mineralogy, variable temperature and pH and water flow between multiple hot spring pools. Here, we present a modular 3D-printed hydrothermal field simulator that mimics the complex nature of hot spring fields by controlling the variability of a series of linked pools, including WD cycles, temperature, pH, mineralogy, and mixing of different fluids. Results from using the prototype hot spring field design demonstrate the ability to spontaneously form lipid vesicles that encapsulate organic matter within membranous compartments comprised of decanoic acid:decanol (4:1) or the phospholipids POPC:POPG (1:1). We observed distinct morphological differences in the vesicles, ranging from thick-walled multilamellar, thin-walled oligolamellar and unilamellar as well as giant unilamellar vesicles formed under multiple WD cycles in the simulator pools. Cargo encapsulation was favoured in the cell-like giant unilamellar and small oligolamellar vesicles. Overall, hot-spring simulator offers a customisable avenue for studying other hot spring processes such as prebiotic chemical reactions, mineral surface catalysis, and the complexity of hydrothermal field dynamics.", "url": "https://arxiv.org/abs/2604.05223", "type": "数值", "summary": "1. 该工作设计并构建了一种模块化3D打印热泉场模拟器，用于模拟具有不同矿物组成、温度、pH及流体交换的多个相连池体环境。\n2. 该装置的关键优势在于能精确调控多个环境参数，并成功观察到在干湿循环条件下，癸酸/癸醇或磷脂混合物可自发形成包裹有机物的多种结构脂质体囊泡。\n3. 这一可定制化平台为系统研究其他生命起源前化学过程、矿物表面催化及热液场复杂动力学提供了新的实验途径。", "summary_source": "deepseek", "authors": [{"name": "Arslan Siddique"}, {"name": "Dev Chauhan"}, {"name": "Alethea Dutton"}, {"name": "Kavish Reddy"}, {"name": "Soumya Kanti De"}, {"name": "Albert C. Fahrenbach"}, {"name": "Tracie Barber"}, {"name": "Martin Van Kranendonk"}, {"name": "Anna Wang"}], "featured_authors": [{"name": "Arslan Siddique"}, {"name": "Dev Chauhan"}, {"name": "Alethea Dutton"}, {"name": "Tracie Barber"}, {"name": "Martin Van Kranendonk"}, {"name": "Anna Wang"}], "author_count": 9}, {"id": "2604.05244", "category": "cond-mat", "title": "Edge universality in Floquet sideband spectra", "abstract": "We show that, for non-interacting fermions under a monochromatic phase drive (Tien--Gordon regime), the outgoing sideband occupations at a sharp Fermi edge are governed by the discrete Bessel kernel -- an exact result at any drive amplitude~$A$. In the large-amplitude regime the edge of this kernel converges, on the $A^{1/3}$ scale, to the Airy kernel of random matrix theory. This universality has a direct transport consequence: the deficit of the photo-assisted shot-noise slope from its high-bias plateau collapses onto the Airy-kernel diagonal. The derivation rests on a bridge between the linear detection chain and the Floquet scattering matrix: commensurate gating isolates a single coherence-order block of the one-body correlator. We identify the crossover temperature below which the Airy scaling is sharp, extend the analysis to biased two-terminal occupations, and argue that multi-tone drives make Pearcey-kernel cusps accessible in Floquet--Sambe space.", "url": "https://arxiv.org/abs/2604.05244", "type": "理论", "summary": "1. 该工作证明了在单色相位驱动下，非相互作用费米子体系在尖锐费米边沿的出射边带占据数由离散贝塞尔核精确描述。\n2. 其核心在于揭示了在大驱动振幅极限下，该核的边缘在A^{1/3}尺度上收敛于随机矩阵理论的Airy核，并确定了相关交叉温度。\n3. 这一普适性行为直接预言了光辅助散粒噪声斜率的特征塌缩，并为在弗洛凯-桑伯空间中观测Pearcey核尖峰提供了理论路径。", "summary_source": "deepseek", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2604.05258", "category": "cond-mat", "title": "Nematic Phase Transitions and Density Modulations in 1D Flat Band Condensates", "abstract": "We investigate the ground-state properties of one-dimensional Gross-Pitaevskii flat-band lattices. We uncover a geometry-driven phase transition into a macroscopically degenerate nematic state with broken time reversal symmetry. Focusing on all-bands-flat (ABF) models, we demonstrate that even infinitesimal onsite interactions can destabilize a uniform, constant-phase condensate, driving the system into a nematic manifold as the flat-band geometry controlled parameter $\\theta \\geq \\pi/8$. At a critical endpoint (\\(\\theta=\\pi/4\\)), where the compact localized states exhibit constant amplitudes, we identify an additional pair of density-modulated ground states characterized by vanishing phase stiffness. Utilizing Bogoliubov-de Gennes excitations and simulated annealing, we show that these density-modulated phases are thermally selected at low temperatures via an order-by-disorder mechanism. Finally, we demonstrate that these non-trivial condensate phases extend beyond ABF models, as exemplified by the sawtooth lattice. Our findings also reveal that the sound velocity in flat-band condensates is a sensitive probe of the underlying geometric phase structure.", "url": "https://arxiv.org/abs/2604.05258", "type": "理论", "summary": "1. 本研究探讨了一维Gross-Pitaevskii平带晶格中由几何参数调控的向列相变与密度调制基态。\n2. 即使在无穷小在位相互作用下，当几何参数θ≥π/8时平带几何会驱动均匀凝聚失稳，进入宏观简并的破时间反演对称向列态；在θ=π/4临界点处还发现了具有消失相位刚度的密度调制基态。\n3. 这些非平凡凝聚相可推广至锯齿晶格等更广模型体系，且平带凝聚体中的声速成为探测其几何相结构的灵敏探针。", "summary_source": "deepseek", "authors": [{"name": "Yeongjun Kim"}, {"name": "Oleg I. Utesov"}, {"name": "Alexei Andreanov"}, {"name": "Mikhail V. Fistul"}, {"name": "Sergej Flach"}], "featured_authors": [{"name": "Yeongjun Kim"}, {"name": "Oleg I. Utesov"}, {"name": "Alexei Andreanov"}, {"name": "Mikhail V. Fistul"}, {"name": "Sergej Flach"}], "author_count": 5}, {"id": "2604.05264", "category": "cond-mat", "title": "Stability and superstructural ordering of alkali-triel-pnictide clathrates A$_8$T$_{27}$Pn$_{19}$", "abstract": "Clathrates are a class of inclusion compounds that offer various useful and surprising phenomena, including superconductivity, thermoelectricity, and the potential for high-density ion storage. Stability conditions within the Alkali-Triel-Pnictide A$_8$T$_{27}$Pn$_{19}$ family of unconventional clathrates are investigated with high-throughput density functional theory calculations, establishing trends in formation energy, structural and electronic properties. Electronic structure calculations and first-principles molecular dynamics simulations show that the ionization potential of guest alkaline atoms strongly influences the stability of electron-exact clathrates and affects their rattler behavior. Targeted reactive synthesis from elemental precursors is attempted, resulting in two novel ternary compounds. However, the targeted clathrate phases are not obtained. Further analysis reveals that the stability of ATPn clathrate compounds containing heavy elements, such as bismuth, depends strongly on spin-orbit effects, which are often neglected in high-throughput studies that compute formation energies. Finally, chemically induced superstructural ordering is described in relation to Wyckoff sites in the prototypical type-I clathrate unit cell.", "url": "https://arxiv.org/abs/2604.05264", "type": "理论+数值", "summary": "1. 该工作通过高通量密度泛函理论计算与合成尝试，研究了碱金属-三族-磷族元素包合物A8T27Pn19的稳定性及超结构有序性。\n2. 其技术亮点在于揭示了客体碱金属原子的电离势对电子精确包合物稳定性及振动行为的影响，并指出自旋轨道效应对含重元素体系稳定性的关键作用。\n3. 这强调了在高通量形成能计算中考虑自旋轨道效应的必要性，并为基于Wyckoff位点的化学诱导超结构有序性研究提供了明确启示。", "summary_source": "deepseek", "authors": [{"name": "Frank Cerasoli"}, {"name": "Xiaochen Jin"}, {"name": "Genevieve Amobi"}, {"name": "Kirill Kovnir"}, {"name": "Davide Donadio"}], "featured_authors": [{"name": "Frank Cerasoli"}, {"name": "Xiaochen Jin"}, {"name": "Genevieve Amobi"}, {"name": "Kirill Kovnir"}, {"name": "Davide Donadio"}], "author_count": 5}, {"id": "2604.05319", "category": "cond-mat", "title": "H-NESSi: The Hierarchical Non-Equilibrium Systems Simulation package", "abstract": "We present H-NESSi (The Hierarchical Non-Equilibrium Systems Simulation package), an open-source software package for solving the Kadanoff-Baym equations (KBE) of nonequilibrium Green's function (NEGF) theory using hierarchical low-rank compression techniques. The simulation of strongly correlated quantum systems out of equilibrium is severely limited by the cubic scaling in propagation time and quadratic memory growth associated with conventional two-time formulations. H-NESSi overcomes these limitations by combining high-order time-stepping schemes with hierarchical off-diagonal low-rank (HODLR) representations of the retarded and lesser Green's functions, enabling controllable accuracy at substantially reduced computational cost and memory usage. Imaginary time quantities are efficiently represented using the discrete Lehmann representation (DLR), allowing compact and accurate treatment of thermal initial states. The implementation supports multiorbital systems, adaptive singular value truncation, and both shared-memory (OpenMP) and distributed-memory (MPI) parallelization strategies suitable for large-scale lattice calculations. The workflow closely mirrors established NEGF frameworks while introducing compression transparently into the propagation procedure. Benchmark applications to driven superconductors within dynamical mean-field theory and to the two-dimensional Hubbard model demonstrate favorable scaling compared to conventional implementations, with asymptotic time complexity significantly below the cubic scaling of uncompressed approaches. H-NESSi thus enables long-time and large-system nonequilibrium simulations of correlated quantum materials which were previously computationally prohibitive.", "url": "https://arxiv.org/abs/2604.05319", "type": "理论+数值", "summary": "1. 该工作开发了开源软件包H-NESSi，用于基于层次低秩压缩技术求解非平衡格林函数理论中的Kadanoff-Baym方程。\n2. 其核心突破在于将高阶时间步进方案与延迟/小于格林函数的层次非对角低秩表示相结合，在可控精度下显著降低了计算复杂度和内存需求。\n3. 这为强关联量子材料的长时程、大尺度非平衡动力学模拟，特别是动力学平均场理论和二维哈伯德模型等研究，提供了切实可行的计算工具。", "summary_source": "deepseek", "authors": [{"name": "Thomas Blommel"}, {"name": "Jeremija Kovačević"}, {"name": "Jason Kaye"}, {"name": "Emanuel Gull"}, {"name": "Jakša Vučičević"}, {"name": "Denis Golež"}], "featured_authors": [{"name": "Thomas Blommel"}, {"name": "Jeremija Kovačević"}, {"name": "Jason Kaye"}, {"name": "Emanuel Gull"}, {"name": "Jakša Vučičević"}, {"name": "Denis Golež"}], "author_count": 6}, {"id": "2604.05352", "category": "cond-mat", "title": "Chemical Short-Range Order Regulates Hydrogen Energetics and Hydrogen-Dislocation Interactions in CoNiV", "abstract": "Chemical short-range order (CSRO) has emerged as a critical structural feature in concentrated alloys, yet its coupling with hydrogen remains an active discussion. Here, we develop a machine-learning interatomic potential for the Co-Ni-V-H system and investigate how CSRO regulates hydrogen energetics and dislocation behavior in CoNiV, an alloy with reported strong resistance to hydrogen embrittlement. We identify strong V-centered ordering that suppresses V-V clustering and significantly reshapes the hydrogen solution landscape. Compared to a chemically random alloy, the ordered state exhibits higher average hydrogen solution energies and a reduced population of strongly binding sites, indicating lower bulk hydrogen uptake. At partial dislocations, hydrogen preferentially segregates to tensile core regions, acting as a shallow, reversible trap with a much weaker effect compared to chemical trapping states. These results demonstrate that local chemical order strongly regulates hydrogen-dislocation coupling and provide an atomistic understanding for tuning hydrogen-assisted deformation in concentrated CoNiV alloys.", "url": "https://arxiv.org/abs/2604.05352", "type": "理论+数值", "summary": "1. 本研究通过构建Co-Ni-V-H体系的机器学习原子势，系统探究了化学短程有序（CSRO）对CoNiV合金中氢能量学和氢-位错相互作用的影响。\n2. 研究揭示了V中心有序化通过抑制V-V团簇、提高氢平均固溶能并减少强结合位点数量，从而显著降低体相氢摄取能力，同时发现氢在部分位错的拉伸核心区优先偏聚，形成浅而可逆的陷阱。\n3. 这为在浓缩CoNiV合金中通过调控局域化学有序来定制氢辅助变形行为提供了清晰的原子尺度机理与设计思路。", "summary_source": "deepseek", "authors": [{"name": "Beihan Chen"}, {"name": "Dalia Sayed Ahmed"}, {"name": "Yang Yang"}, {"name": "Miaomiao Jin"}], "featured_authors": [{"name": "Beihan Chen"}, {"name": "Dalia Sayed Ahmed"}, {"name": "Yang Yang"}, {"name": "Miaomiao Jin"}], "author_count": 4}, {"id": "2604.05356", "category": "cond-mat", "title": "Entanglement in the open XX chain: Rényi oscillations, hard-edge crossover, and symmetry resolution", "abstract": "We derive closed-form asymptotic formulas for the Rényi entanglement entropies of the open XX spin-$1/2$ chain by mapping the underlying determinant of the boundary correlation matrix (which has Toeplitz-plus-Hankel structure) to a Hankel determinant with a positive weight whose large-size asymptotics follow from known Riemann--Hilbert results. An explicit evaluation of the Szegő function yields the leading $2k_F$ oscillatory amplitude and phase. A single variable $s = 2\\ell \\sin(k_F/2)$ organizes the hard-edge crossover as the Fermi momentum approaches the band edge: the oscillation envelope obeys $s^{\\pm1/\\alpha}$ power laws and $\\ln s$ is the natural leading logarithm for a clean data collapse. For detached blocks the oscillatory amplitude is numerically consistent with a factorization through the conformal cross-ratio. The same framework recovers the open-boundary-condition (OBC) equipartition offset $-\\tfrac{1}{2}\\log\\log\\ell$ for symmetry-resolved entropies, together with the known halving of the Gaussian width relative to the periodic chain.", "url": "https://arxiv.org/abs/2604.05356", "type": "理论+数值", "summary": "1. 该工作通过将边界关联矩阵的行列式映射为具有正权重的汉克尔行列式，推导了开放边界XX自旋1/2链的Rényi纠缠熵的闭式渐近公式。\n2. 研究揭示了一个由变量s = 2ℓ sin(k_F/2)组织的硬边交叉行为，其中振荡包络服从s^{±1/α}幂律，且ln s为数据塌缩的主导对数项。\n3. 该框架成功恢复了开放边界条件下对称分辨熵的等分偏移项-½ log log ℓ，并为关联系统及纠缠对称性结构的研究提供了严格解析基础。", "summary_source": "deepseek", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2604.05385", "category": "cond-mat", "title": "Rationalizing defect formation energies in metals and semiconductors with semilocal density functionals", "abstract": "The study of defects in materials is of utmost importance for technological applications and the design of new materials. In this work, we analyze the performance of density functional approximations on two prototypical sets of defective systems: monovacancies in eight fcc metals, and interstitials in the semiconductor Si-diamond. Specifically, we compute defect formation energies using the local density approximation, the Perdew-Burke-Ernzerhof generalized gradient approximation, the meta-generalized gradient approximations (meta-GGAs) strongly constrained and appropriately normed (SCAN), its regularized version (r2SCAN), the Lebeda-Aschebrock-Kummel (LAK) meta-GGA, and the Heyd-Scuseria-Ernzerhof screened hybrid functional. For metals, the local density approximation shows better performance compared to the other approximations, whereas for silicon, the meta-generalized gradient approximation Lebeda-Aschebrock-Kummel yields outstand- ing accuracy, surpassing the hybrid functional and approaching the results of more computationally demanding Quantum Monte Carlo methods. To rationalize the different performances, we study the semilocal ingredients rs, s and {\\alpha} in both the pristine and defective structures. We identify critical regions that indicate the observed trends of the defect formation energies and pave the way for improving density functional approximations.", "url": "https://arxiv.org/abs/2604.05385", "type": "理论+数值", "summary": "1. 本工作针对面心立方金属单空位和硅-金刚石间隙缺陷这两个原型系统，系统评估了局部密度近似、多种广义梯度近似、meta-GGAs及杂化泛函在缺陷形成能计算中的性能。\n2. 关键物理卖点在于揭示了局部密度近似在金属缺陷中的优异表现以及LAK meta-GGA在硅缺陷中的卓越精度，并通过分析原始与缺陷结构中的半局域参数rs、s和α，理性化了不同泛函性能差异的内在机制。\n3. 该研究为半局域密度泛函在缺陷系统中的应用提供了可靠的物理见解，并为设计更精确、高效的下一代泛函近似指明了改进方向。", "summary_source": "deepseek", "authors": [{"name": "Jorge Vega Bazantes"}, {"name": "Timo Lebeda"}, {"name": "Akilan Ramasamy"}, {"name": "Kanun Pokharel"}, {"name": "Ruiqi Zhang"}, {"name": "John Perdew"}, {"name": "Jianwei Sun"}], "featured_authors": [{"name": "Jorge Vega Bazantes"}, {"name": "Timo Lebeda"}, {"name": "Akilan Ramasamy"}, {"name": "Ruiqi Zhang"}, {"name": "John Perdew"}, {"name": "Jianwei Sun"}], "author_count": 7}, {"id": "2604.05391", "category": "cond-mat", "title": "Topologically shadowed quantum criticality: A non-compact conformal manifold", "abstract": "We put forward a proposal for topological quantum critical points (tQCPs) separating non-invertible chiral topological orders in $(2+1)$ dimensions. We conjecture that these tQCPs can be captured by a family of scale-invariant field theories forming a non-compact scale-invariant manifold. A central feature of our proposal is topological shadowing: the underlying critical theory is rigorously constrained by the global topological data of the two adjacent gapped phases. These theories can be further projected into quantum field theories with universal non-local structures. Specifically, we show that the quantum dynamics of the $U(1)$ symmetric critical point uniquely characterized by a topological angle $\\Theta_{\\text{cft}}$ -- which is defined by a commutator between two Wilson loop operators on a torus -- is determined by the braiding angles $\\Theta_{1,2}$ of the adjacent gapped phases via the relation $\\Theta_{\\text{cft}}^{-1} =\\frac{1}{2}[\\Theta_1^{-1} + \\Theta_2^{-1}]$. Despite the non-locality, our renormalization group calculations (up to two-loop order) strongly suggest that the theory shall maintain exact scale invariance. This establishes, without supersymmetry, a continuous manifold of fixed points that naturally becomes a conformal manifold when the local structure is further enforced.", "url": "https://arxiv.org/abs/2604.05391", "type": "理论+数值", "summary": "1. 该工作提出了一个理论方案，用于刻画(2+1)维非可逆手性拓扑序之间的拓扑量子临界点，并猜想其可由非紧致尺度不变流形上的场论描述。\n2. 核心物理是拓扑遮蔽：临界理论严格受相邻有能隙相全局拓扑数据的约束，具体表现为通过环面上威尔逊算符对易子定义的拓扑角Θ_cft满足Θ_cft^{-1}=½[Θ1^{-1}+Θ2^{-1}]。\n3. 尽管存在非局域性，两圈重整化群计算强烈表明理论保持精确标度不变性，从而在不依赖超对称的情况下建立了连续固定点流形，为共形场论研究提供了新视角。", "summary_source": "deepseek", "authors": [{"name": "Tianyao Fang"}, {"name": "Weicheng Ye"}, {"name": "Zhengcheng Gu"}, {"name": "Fei Zhou"}], "featured_authors": [{"name": "Tianyao Fang"}, {"name": "Weicheng Ye"}, {"name": "Zhengcheng Gu"}, {"name": "Fei Zhou"}], "author_count": 4}, {"id": "2604.05408", "category": "cond-mat", "title": "Mpemba Effect in an Expanding Lieb-Liniger Bose gas in a hard wall box", "abstract": "The Mpemba effect, broadly understood as the counterintuitive phenomenon in which a system initially farther from equilibrium relaxes faster than a system closer to equilibrium, has been widely studied in classical stochastic systems and, more recently, in quantum settings. However, its manifestation is strongly dependent on the choice of observable and the dynamical constraints of the system. In this work, we investigate the emergence of a Mpemba-type effect in the density redistribution dynamics of a strongly interacting one-dimensional Bose gas in the Tonks-Girardeau regime undergoing a sudden box expansion from length L_0 to L. By defining a physically motivated distance function based on the difference of densities between spatial regions, we provide evidence that -the relaxation dynamics of the ground and excited symmetry sectors exhibit a clear crossing in time, indicating a reversal in relaxation ordering. We emphasize that the Mpemba effect is not a universal law but rather an observable-dependent phenomenon that arises under specific dynamical conditions. In particular, we show that the interplay between initial state structure, integrability, and spatial redistribution leads to distinct relaxation pathways that enable the effect. Our results clarify common misconceptions linking the Mpemba effect to Newton's law of cooling and highlight the conditions under which such anomalous relaxation behavior can emerge in integrable quantum systems.", "url": "https://arxiv.org/abs/2604.05408", "type": "理论", "summary": "1. 该工作研究了一维Tonks-Girardeau玻色气体在硬壁盒突然扩展下，密度重分布动力学中Mpemba型效应的显现。\n2. 通过引入基于空间区域密度差异定义的物理距离函数，揭示了基态与激发对称扇区松弛动力学的时间交叉及顺序反转，并强调该效应源于初始态结构、系统可积性与空间重分布的特定相互作用。\n3. 结果澄清了Mpemba效应与牛顿冷却定律的常见误解，为可积量子系统中依赖可观测物的反常松弛行为提供了明确产生条件。", "summary_source": "deepseek", "authors": [{"name": "Sumita Datta"}], "featured_authors": [{"name": "Sumita Datta"}], "author_count": 1}, {"id": "2604.05412", "category": "cond-mat", "title": "Magnetic toroidal monopoles from relativistic polarization responses to magnetic field gradients", "abstract": "The magnetic toroidal monopole, a time-reversal-odd scalar, has attracted attention through its characteristic responses, such as electric-field-induced nonreciprocal directional dichroism observed in Co$_2$SiO$_4$. However, its evaluation in crystalline solids remains unresolved, as it cannot be defined within conventional multipole expansions or thermodynamic formulations. In this paper, we propose a theoretical framework to evaluate the magnetic toroidal monopole in periodic crystals based on the response of relativistic electric polarization to a magnetic field gradient. By incorporating the magnetic-field-gradient correction to the relativistic polarization, we derive an explicit expression for the magnetic toroidal monopole beyond symmetry arguments. The resulting expression is formulated in terms of geometric quantity such as Berry curvatures and orbital magnetic moment defined in an extended parameter space spanning momentum, magnetic field, and electric field. We further perform model calculations for an antiferromagnetic system hosting a magnetic toroidal monopole and confirm that the proposed quantity is finite. These results provide a practical route to characterize magnetic toroidal monopoles in crystalline solids and clarify their quantum geometric nature.", "url": "https://arxiv.org/abs/2604.05412", "type": "理论+数值", "summary": "1. 本研究提出了基于相对论性电极化对磁场梯度响应的理论框架，用于评估周期晶体中的磁环形单极子。\n2. 其核心突破在于通过引入磁场梯度修正，推导出超越对称性论证的明确表达式，该表达式由动量、磁场和电场扩展参数空间中的贝里曲率与轨道磁矩等几何量构成。\n3. 这为晶体中磁环形单极子的实验表征提供了可行路径，并揭示了其量子几何本质。", "summary_source": "deepseek", "authors": [{"name": "Taisei Yamanaka"}, {"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Taisei Yamanaka"}, {"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "author_count": 3}, {"id": "2604.05450", "category": "cond-mat", "title": "\\textit{Ab initio} \\textit{GW}-BSE theory of optical activity in $α$-quartz", "abstract": "We present an ab initio many-body theory of optical activity in solids within the GW-BSE framework. Dielectric spatial dispersion is formulated in two complementary forms: exciton envelope modulation and sum-over-exciton-states expansion. Our application to $\\alpha$-quartz reveals that the envelope-modulated formulation captures the low-frequency region, whereas the sum-over-exciton-states formulation is essential to reproduce the correct full frequency dependence. Comparisons with the independent-particle approximation and simple local-field corrections further highlight the decisive role of excitonic many-body effects in shaping the spectral dispersion of optical activity in solids.", "url": "https://arxiv.org/abs/2604.05450", "type": "理论+数值", "summary": "1. 该工作基于GW-BSE框架，构建了固体中光学活性的第一性原理多体理论。\n2. 理论通过激子包络调制与态求和两种互补形式描述介电空间色散，并应用于α-石英。\n3. 研究明确了激子多体效应的关键作用，为手性材料的光学响应计算提供了可靠理论基准。", "summary_source": "deepseek", "authors": [{"name": "Xiaoming Wang"}, {"name": "Yanfa Yan"}], "featured_authors": [{"name": "Xiaoming Wang"}, {"name": "Yanfa Yan"}], "author_count": 2}, {"id": "2604.05454", "category": "cond-mat", "title": "Nonlinear thermal gradient induced magnetization in $d^{\\prime }$, $g^{\\prime }$ and $i^{\\prime }$ altermagnets", "abstract": "It is a highly nontrivial question whether a magnetization can be induced by applying a nonlinear temperature gradient in the absence of any linear component. In this work, we address this issue and provide explicit examples demonstrating that such a response can indeed arise. The spin-split band structures of $d$-wave, $g$-wave, $i$-wave altermagnets are characterized by $k^{N_{X}}\\sin N_{X}\\phi $, where $N_{X}=2,4$ and $6$, respectively. In contrast, the corresponding $d^{\\prime }$-wave, $g^{\\prime } $-wave, $i^{\\prime }$-wave altermagnets are described by $k^{N_{X}}\\cos N_{X}\\phi $. We show that a finite magnetization is induced in the $d^{\\prime }$-wave, $g^{\\prime }$-wave, $i^{\\prime }$-wave altermagnets under a second-order nonlinear temperature gradient, whereas no such response occurs in the $d$-wave, $g$-wave, $i$-wave altermagnets. This constitutes the leading-order contribution because the linear response is forbidden by inversion symmetry. Furthermore, we derive analytic expressions for the induced magnetization in the high-temperature regime. We also demonstrate that no analogous nonlinear thermal response appears in $p$-wave, $f$-wave, $p^{\\prime }$-wave and $f^{\\prime }$-wave odd-parity magnets.", "url": "https://arxiv.org/abs/2604.05454", "type": "理论", "summary": "1. 该工作理论研究了仅施加非线性温度梯度时，能否在特定交替磁体中诱导出磁化强度的问题。\n2. 核心发现表明，具有$k^{N_X}\\cos N_X\\phi$能带结构的$d'$波、$g'$波、$i'$波交替磁体会产生该非线性热磁响应，而具有$k^{N_X}\\sin N_X\\phi$结构的对应体系则无此响应。\n3. 所推导的高温区磁化强度解析表达式，为在空间反演对称材料中探测此类高阶热输运效应提供了理论依据。", "summary_source": "deepseek", "authors": [{"name": "Motohiko Ezawa"}], "featured_authors": [{"name": "Motohiko Ezawa"}], "author_count": 1}, {"id": "2604.05457", "category": "cond-mat", "title": "Novel Light-Induced States in Triangular Metallic Magnet", "abstract": "Novel nonequilibrium states of magnet induced by light attract considerable attention both in nature of physics and apply. In this work, we systematically explore the electronic and magnetic states of a double-exchange model on a triangular lattice under the irradiation of circularly polarized continuous wave field, by means of molecular dynamics calculation. Several exotic nonequilibrium magnetic states are discovered, including a vortex state, long-range magnetic orders at the $\\Gamma$ and $\\textbf{K}/2$, as well as quasi(dynamical)-long-range magnetic order at the $\\textbf{K}$ and $\\textbf{M}$, respectively. Correspondingly, the evolution of electron bands and fillings are also uncovered. These results offer a promising candidate approach for the optical control of exotic magnetic and electronic states.", "url": "https://arxiv.org/abs/2604.05457", "type": "理论+数值", "summary": "1. 本论文通过分子动力学计算，系统研究了三角晶格上双交换模型在圆偏振连续波光场驱动下的非平衡电子与磁性态演化。\n2. 研究发现了包括涡旋态、Γ点和K/2点长程磁序、以及K点和M点准长程磁序在内的多种奇异非平衡磁态，并揭示了电子能带与占据数的相应变化。\n3. 这些结果为光学调控复杂磁与电子态提供了新的理论候选途径，对非平衡多体系统中新奇相的研究具有明确启发。", "summary_source": "deepseek", "authors": [{"name": "Yao Wang"}], "featured_authors": [{"name": "Yao Wang"}], "author_count": 1}, {"id": "2604.05474", "category": "cond-mat", "title": "Quantitative analysis of fluctuating hydrodynamics in uniform shear flow", "abstract": "Many theoretical predictions in fluctuating hydrodynamics under uniform shear flow have lacked precise quantitative verification due to analytical approximations whose quantitative impacts are difficult to assess a priori and the limitations of microscopic particle-based simulations. To address this problem, we perform direct numerical simulations (DNS) of the fluctuating Navier-Stokes (NS) equations with shear-periodic boundary conditions. We provide a decisive quantitative validation of two seminal frameworks: the Lutsko-Dufty theory for nonequilibrium long-range correlations, and the dynamic renormalization group (RG) theory by Forster, Nelson, and Stephen (FNS) for anomalous transport. By simulating the linearized fluctuating NS equations, we demonstrate that the predictions of the Lutsko-Dufty theory are quantitatively valid from the viscous-dominated, long-wavelength regime to the shear-dominated, short-wavelength regime, well beyond their originally assumed limits. Moving beyond the linearized equations, we simulate the full nonlinear fluctuating NS equations to test the quantitative predictive capability of the dynamical RG approach by FNS. Our results show that the one-loop RG prediction remains quantitatively accurate up to a strongly nonlinear regime, where conventional perturbation theory fails. Our findings solidify the foundations of these classical theories, paving the way for quantitative analyses using fluctuating hydrodynamics.", "url": "https://arxiv.org/abs/2604.05474", "type": "理论+数值", "summary": "1. 该工作采用剪切周期边界条件对涨落Navier-Stokes方程进行了直接数值模拟。\n2. 研究定量验证了Lutsko-Dufty非平衡长程关联理论的跨区有效性，并证实了FNS动态重整化群理论在强非线性区间的预测精度。\n3. 这巩固了经典涨落流体力学理论的基础，为相关体系的定量分析提供了可靠框架。", "summary_source": "deepseek", "authors": [{"name": "Hiroyoshi Nakano"}, {"name": "Yuki Minami"}], "featured_authors": [{"name": "Hiroyoshi Nakano"}, {"name": "Yuki Minami"}], "author_count": 2}, {"id": "2604.05494", "category": "cond-mat", "title": "Mass generation in graphs", "abstract": "We demonstrate a mechanism for the production of massive excitations in graphs. We treat the number of neighbors at each vertex in the graph (degree) as a scalar field. Then we introduce a mechanism inspired by the Higgs mechanism in quantum field theory(QFT), that couples the degree field to a vector-like field, introduced via the graph edges, represented mathematically by the incident matrices of the graph. The coupling between the two fields produces a massless ground state and massive excitations, separated by a mass gap. The excitations can be treated as emergent massive particles, propagating inside the graph. We study how the size of the graph and its density, represented by the ratio of edges over vertices, affects the mass gap and the localization properties of the massive excitations. We show that the most massive excitations, corresponding to the heaviest emergent particles, localize on regions of the graph with high density, consisting of vertices with a large degree. On the other hand, the least massive excitations, corresponding to the lightest emergent particles localize on a few vertices but with a smaller degree. Excitations with intermediate masses are less localized, spreading on more vertices instead. Our study shows that emergence of matter-like structures with various mass properties, is possible in discrete physical models, relying only on a few fundamental properties like the connectivity of the models.", "url": "https://arxiv.org/abs/2604.05494", "type": "理论", "summary": "1. 本文在离散图结构中引入类希格斯机制，通过将顶点度标量场与边诱导的矢量场耦合，产生具有质量隙的激发。\n2. 研究表明激发态质量由图的尺寸与边-顶点比调控，高密度区域局域化最重激发，低度顶点则对应最轻粒子。\n3. 这揭示了仅凭连接性等基本性质即可在离散模型中涌现类物质结构，为网络物理与凝聚态模拟提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Ioannis Kleftogiannis"}, {"name": "Ilias Amanatidis"}], "featured_authors": [{"name": "Ioannis Kleftogiannis"}, {"name": "Ilias Amanatidis"}], "author_count": 2}, {"id": "2604.05503", "category": "cond-mat", "title": "Exact solution of three-point functions in critical loop models", "abstract": "We propose an exact formula for three-point functions on the sphere in critical loop models with primary fields $V_{(r,s)}$ characterized by $2r$ legs and a parameter \\(s\\) that describes diagonal fields for $r=0$ and the momentum of legs for $r>0$. We demonstrate its validity in three ways: the conformal bootstrap method for 4-point functions, a transfer-matrix study of the lattice model, and a probabilistic method based on conformal loop ensemble and Liouville quantum gravity. This work provides a crucial missing piece for solving critical loop models and reveals a deep unity between three fundamental approaches to 2D statistical physics: transfer matrix, conformal field theory, and probability theory.", "url": "https://arxiv.org/abs/2604.05503", "type": "理论", "summary": "1. 该工作针对临界圈模型，提出了球面上由$V_{(r,s)}$初场描述的三点函数的精确公式，并通过共形自举、晶格模型的传递矩阵研究以及基于共形圈系综和Liouville量子引力的概率方法三重验证了其正确性。\n2. 其核心物理贡献在于首次统一了二维统计物理中三种根本性研究方法：传递矩阵、共形场论和概率理论，揭示了它们在该模型精确解中的深刻一致性。\n3. 这项工作填补了求解临界圈模型的关键缺失环节，为基于此精确结果进一步发展非平凡可解模型以及深化二维临界现象的多方法融合研究提供了坚实基础。", "summary_source": "deepseek", "authors": [{"name": "Morris Ang"}, {"name": "Gefei Cai"}, {"name": "Jesper Lykke Jacobsen"}, {"name": "Rongvoram Nivesvivat"}, {"name": "Paul Roux"}, {"name": "Xin Sun"}, {"name": "Baojun Wu"}], "featured_authors": [{"name": "Morris Ang"}, {"name": "Gefei Cai"}, {"name": "Jesper Lykke Jacobsen"}, {"name": "Paul Roux"}, {"name": "Xin Sun"}, {"name": "Baojun Wu"}], "author_count": 7}, {"id": "2604.05582", "category": "cond-mat", "title": "Grassmann corner transfer-matrix renormalization group approach to one-dimensional fermionic models", "abstract": "The strongly correlated fermions play a vital role in modern physics. For a given fermionic Hamiltonian system, the most widely used approach to explore the underlying physics is to study the wave function that incorporates Fermi-Dirac statistics, which can be obtained variationally by energy minimization or by imaginary-time evolution. In this work, we develop an accurate tensor network method for one-dimensional interacting fermionic models based on the coherent-state path-integral representation of the fermionic partition function. Employing the coherent-state representation, the partition function is effectively represented as a (1+1)-dimensional anisotropic Grassmann-valued tensor network, and the Grassmann version of the corner transfer-matrix renormalization group algorithm is developed to contract the tensor network and evaluate physical quantities. We validate our method in the one-dimensional fermionic Hubbard model with a magnetic field, where the essential features of the phase diagram in the $(\\mu, B)$ plane are quantitatively captured. Our work offers a promising approach to interacting fermionic models within the framework of tensor networks.", "url": "https://arxiv.org/abs/2604.05582", "type": "理论+数值", "summary": "1. 本文针对一维相互作用费米子模型，发展了一种基于相干态路径积分表示的精确张量网络方法。\n2. 该方法的关键在于将配分函数表示为各向异性Grassmann值张量网络，并开发了Grassmann版本的角转移矩阵重整化群算法。\n3. 这为在张量网络框架内研究更广泛的强关联费米子多体问题提供了可行的新途径。", "summary_source": "deepseek", "authors": [{"name": "Jian-Gang Kong"}, {"name": "Zhi Yuan Xie"}], "featured_authors": [{"name": "Jian-Gang Kong"}, {"name": "Zhi Yuan Xie"}], "author_count": 2}, {"id": "2604.05585", "category": "cond-mat", "title": "Shortcuts to state transitions for active matter", "abstract": "Shortcut schemes can accelerate quasi-static processes in passive systems by adding auxiliary controls to realize swift transitions between equilibrium states. In active systems, however, inherently directed motion driven by free energy consumption continually drives the system away from equilibrium. In this work, we develop a shortcut framework to realize swift state transitions for active systems operating in the weak activity regime. An auxiliary potential is introduced to guide the system along a predefined distribution path, allowing it to reach the target state within a finite time. Considering unavoidable energy cost in such a finite-time process, we derive a thermodynamic metric from the dissipative work to induce a Riemann manifold on the space spanned by the control parameters. The optimal protocol with minimum dissipative work is then identical to the geodesic path in the geometric space. We demonstrate this framework by considering active systems confined in an external harmonic trap and interacting via two distinct internal potentials, respectively: an attractive harmonic coupling and a repulsive pairwise Gaussian-core coupling. The strengths of both the external trap and the internal interactions are controllable. For the latter case, since the auxiliary potential can not be derived precisely, we adopt a variational method to obtain an approximate auxiliary control. Compared to linear protocols, the geodesic protocols can effectively reduce dissipation.", "url": "https://arxiv.org/abs/2604.05585", "type": "数值", "summary": "1. 该工作针对弱活性体系，提出了一个实现有限时间内快速状态转移的捷径框架，通过引入辅助势引导系统沿预定分布路径演化。\n2. 其核心在于从耗散功出发构造热力学度量，从而在控制参数空间诱导出黎曼几何结构，使最优协议对应于该几何空间中的测地线。\n3. 这一几何框架可推广至不同相互作用势，为优化活性物质非平衡态操控及探索强活性区间的动力学控制提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "Guodong Cheng"}, {"name": "Z. C. Tu"}, {"name": "Geng Li"}], "featured_authors": [{"name": "Guodong Cheng"}, {"name": "Z. C. Tu"}, {"name": "Geng Li"}], "author_count": 3}, {"id": "2604.05592", "category": "cond-mat", "title": "Taylor dispersion in a soft channel", "abstract": "Diffusion of a solute along a channel is enhanced by hydrodynamic flow, a phenomenon known as Taylor dispersion. In microfluidic applications, the compliance of the channel boundaries modifies the hydrodynamic flow and thus solutal transport. Here, we develop the theory of solutal dispersion in a soft, axisymmetric channel where the channel walls respond to the hydrodynamic pressure through a Winkler response. By deriving the modified macro-transport equation for the solutal concentration dynamics based on multiple-time-scale analysis, we explore the influence of softness on solutal transport for steady and pulsatile configurations. Our main finding is that softness enhances the effective advection velocity and dispersion coefficient, which might have practical implication in biology and microfluidic technology.", "url": "https://arxiv.org/abs/2604.05592", "type": "理论", "summary": "1. 该工作发展了在具有Winkler弹性响应的轴对称软通道中溶质扩散的宏观输运理论。\n2. 通过多尺度分析推导出修正的溶质浓度动力学方程，揭示了壁面柔顺性对稳态和脉动流下有效平流速度与弥散系数的增强效应。\n3. 这一发现为生物输运过程与微流控技术中利用通道柔韧性调控物质传输提供了理论依据。", "summary_source": "deepseek", "authors": [{"name": "Aditya Jha"}, {"name": "Masoodah Gunny"}, {"name": "Joshua D Mcgraw"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "featured_authors": [{"name": "Aditya Jha"}, {"name": "Masoodah Gunny"}, {"name": "Joshua D Mcgraw"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "author_count": 5}, {"id": "2604.05619", "category": "cond-mat", "title": "Two-Dimensional Space-Time Groups: Classification and Applications", "abstract": "The concept of space group has long served as the fundamental framework to describe the physical properties of crystalline materials, from electronic bands to photonic dispersions. The recent progress of spatiotemporal control, such as laser-driven lattices, dynamic photonic and phononic crystals, and dynamic optical lattices, necessitates the study of a new framework, space-time group, beyond that based on the Floquet theorem. Space-time group includes novel intertwined non-symmorphic spatial-temporal symmetries such as time-glide reflection and time-screw rotation. Here, we perform a complete classification of the 2+1D space-time groups based on the method of group cohomology, leading to the identification of all 275 space-time crystals, including 203 non-symmorphic ones. Under this formalism, unique physical phenomena are uncovered: A chirality-selective response rule with specific space-time symmetry is fully investigated and a novel ``horizontal cone\" structure is predicted in space-time metamaterials as a direct consequence of non-symmorphic space-time symmetry. This work serves as a starting point for predicting and engineering a wide range of novel spatiotemporal phenomena across condensed matter and metamaterials.", "url": "https://arxiv.org/abs/2604.05619", "type": "理论", "summary": "1. 该工作基于群上同调方法完成了二维时空晶体中275种时空群（含203种非简单时空群）的完整分类。\n2. 该方法系统地揭示了时空滑移反射与时空螺旋旋转等交织的时空对称性，并由此预测了时空超材料中独特的“水平锥”结构及手性选择响应规则。\n3. 此分类框架为凝聚态和超材料体系中各类新颖时空现象的预测与设计提供了系统性理论基础。", "summary_source": "deepseek", "authors": [{"name": "Chenhang Ke"}, {"name": "Congjun Wu"}], "featured_authors": [{"name": "Chenhang Ke"}, {"name": "Congjun Wu"}], "author_count": 2}, {"id": "2604.05705", "category": "cond-mat", "title": "Bias controlled Interlayer Exchange Coupling", "abstract": "We demonstrate, using computer simulations and a non-equilibrium Greens function approach, that the sign of the out-of-equilibrium interlayer exchange coupling (ooeIEC) can change in the presence of an externally applied electrical bias. Our system consists of an insulating section connected to an exchange coupled ferromagnetic (FM) tri-layer, sandwiched between semi-infinite leads. When the exchange coupled trilayer contains a quantum-well state confined in the hybridisation gap (HG) of the FM, we find that a relatively small applied electrical bias can switch the lowest energy state of the tri-layer between parallel (P) and anti-parallel (AP) configurations. We consider three cases for the insulating section; a single tunnelling barrier, a resonant tunnelling barrier and an amorphous insulating barrier and, in each case, show that the bias dependence of the ooeIEC is strongly dependent on the system conductance. We find that the lowest switching current densities are achieved with strongly confined quantum well states.", "url": "https://arxiv.org/abs/2604.05705", "type": "理论+数值", "summary": "1. 该工作通过计算机模拟与非平衡格林函数方法，系统研究了在单隧穿、共振隧穿及非晶绝缘势垒连接的铁磁三层结构中，外加电偏压对非平衡层间交换耦合（ooeIEC）符号的调控作用。\n2. 关键发现是当铁磁三层内存在量子阱态时，较小电偏压即可实现平行与反平行磁构型基态之间的切换，且ooeIEC的偏压依赖性强烈依赖于系统电导，强局域量子阱态对应最低开关电流密度。\n3. 这一结果为设计基于电偏压控制磁序的低功耗自旋电子器件，以及在不同绝缘势垒条件下优化器件性能和深化非平衡自旋输运理论研究提供了明确启示。", "summary_source": "deepseek", "authors": [{"name": "Nathan A. Walker"}, {"name": "Alex D. Durie"}, {"name": "Andrey Umerski"}], "featured_authors": [{"name": "Nathan A. Walker"}, {"name": "Alex D. Durie"}, {"name": "Andrey Umerski"}], "author_count": 3}, {"id": "2604.05708", "category": "cond-mat", "title": "Predicted DC current induced by propagating wave in gapless Dirac materials", "abstract": "In this paper, we show that the application of propagating waves can induce a DC current even in systems with spatial inversion symmetry. We derive the equation for the DC current induced by propagating waves using two methods: perturbation theory and Floquet theory. These two approaches yield consistent results. We then apply the equation to gapless graphene subjected to propagating waves. A nonzero DC current is predicted in graphene with next nearest neighbor hopping terms. Nonperturbative effects arising from a strong wave amplitude are also discussed within the framework of Floquet theory.", "url": "https://arxiv.org/abs/2604.05708", "type": "理论", "summary": "1. 该工作通过扰动理论和Floquet理论推导了传播波在空间反演对称系统中诱导直流电流的方程，并应用于无间隙石墨烯。\n2. 其卖点在于两种方法结果一致，预言了石墨烯次近邻跃迁下非零直流电流，并探讨强幅值非微扰效应。\n3. 这为研究强场条件下无间隙Dirac材料中的非平衡电流效应提供了明确启发。", "summary_source": "deepseek", "authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "featured_authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "author_count": 2}, {"id": "2604.05710", "category": "cond-mat", "title": "Nonperturbative effects in second harmonic generation", "abstract": "Second-harmonic generation (SHG) is a quintessential probe of inversion symmetry breaking in condensed matter. While perturbative $\\chi^{(2)}$ processes are well-documented, the nonperturbative regime under intense driving remains largely unexplored. In this Letter, we develop a nonperturbative Floquet-Keldysh theory to describe SHG in two-band systems. Our analysis reveals the emergence of two distinct types of nonperturbative saturation: a transition from the conventional $E^2$ scaling to a linear $E$ dependence, and a stronger saturation regime where the SHG response becomes independent of the field amplitude. These behaviors are analytically shown to be governed by one-photon and two-photon resonance processes, respectively. By applying our formalism to a tight-binding model of monolayer GeS, we demonstrate that these specific scaling behaviors are observable in realistic materials and are fully consistent with large-scale numerical Floquet-matrix calculations.", "url": "https://arxiv.org/abs/2604.05710", "type": "理论+数值", "summary": "1. 该工作发展了一套描述双带系统二次谐波产生的非微扰Floquet-Keldysh理论。\n2. 理论揭示了由单光子和双光子共振分别主导的两种非微扰饱和机制：从传统E^2标度律向线性E依赖的转变，以及响应与场幅无关的强饱和区。\n3. 通过应用于单层GeS紧束缚模型，该理论证实了这些标度行为在真实材料中的可观测性，为非微扰光-物质相互作用研究提供了普适框架。", "summary_source": "deepseek", "authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "featured_authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "author_count": 2}, {"id": "2604.05722", "category": "cond-mat", "title": "Inertial chiral active Brownian particle: Transition from Gaussian to platykurtic distribution", "abstract": "We investigate the dynamics of an inertial chiral active Brownian particle in the presence of a harmonic confinement. Through numerical simulation, we observe that when the harmonic frequency becomes comparable to the chiral frequency, the position distribution transitions from a Gaussian to a platykurtic distribution, corresponding to short tails with a nearly uniform probability near the minimum of the potential. This result is further confirmed by analyzing the kurtosis of the position of the particle as a function of harmonic frequency, which exhibits a dip when the harmonic frequency matches the chiral frequency. At the same time, the steady state mean square displacement (MSD) shows a non-monotonic feature with the harmonic frequency and shows a maximum only when the harmonic frequency is of the same order as the chiral frequency. In the rotational overdamped limit of the same model, we have calculated the exact expression for kurtosis, steady state MSD and find that the qualitative behavior remains the same. Kurtosis still exhibits a dip in the matching of chiral and harmonic frequencies, but the feature is less pronounced with a higher minimum. These findings might be relevant for controlling the transport and spatial distribution of chiral microswimmers in optical or acoustic traps, where confinement can be tuned to optimize particle distribution.", "url": "https://arxiv.org/abs/2604.05722", "type": "理论+数值", "summary": "1. 该工作通过数值模拟揭示了惯性手征活性布朗粒子在谐振势下位置分布从高斯型到平峰型的转变。\n2. 其物理关键在于谐振频率与手征频率匹配时，峰度出现极小值而均方位移呈现非单调极大值。\n3. 这为在光或声阱中通过调控约束频率优化手征微游动粒子的输运与空间分布提供了明确启示。", "summary_source": "deepseek", "authors": [{"name": "M Muhsin"}, {"name": "S Deion"}, {"name": "M Sahoo"}], "featured_authors": [{"name": "M Muhsin"}, {"name": "S Deion"}, {"name": "M Sahoo"}], "author_count": 3}, {"id": "2604.05772", "category": "cond-mat", "title": "Percolation in the three-dimensional Ising model", "abstract": "Geometric representations provide a useful perspective on critical phenomena in the Ising model. In a recent study [Phys. Rev. E 112, 034118 (2025)], we found that the two-dimensional critical Ising model exhibits two consecutive percolation transitions for geometric spin clusters as the bond-occupation probability $p$ between parallel spins increases. Here, through extensive Monte Carlo simulations, we show that this phenomenon does not persist in three dimensions, where we observe only a single percolation transition on critical Ising configurations. Further theoretical analysis of the Ising model on the complete graph also yields the same scenario. In addition, we study percolation on a two-dimensional layer embedded in the three-dimensional critical Ising model. For this layer system, we estimate the red-bond exponent $y_p = 0.426(6)$ and the fractal dimensions of the largest cluster, hull, and shortest path as $d_f = 1.8926(20)$, $d_{\\rm hull} = 1.663(4)$, and $d_{\\rm min} = 1.080(10)$, respectively. These values indicate a distinct universality class induced by coupling to out-of-plane critical correlations.", "url": "https://arxiv.org/abs/2604.05772", "type": "理论+数值", "summary": "1. 该工作通过大规模蒙特卡罗模拟，揭示三维临界伊辛模型中仅存在单一渗流转变，并研究了嵌入其中的二维层系统的渗流特性。\n2. 其核心发现是三维情况下不存在二维中的连续渗流转变，且二维层系统因面外临界关联而呈现新的普适类。\n3. 这为理解维度对伊辛模型渗流行为的影响以及耦合临界系统的新普适类提供了明确方向。", "summary_source": "deepseek", "authors": [{"name": "Jinhong Zhu"}, {"name": "Tao Chen"}, {"name": "Zhiyi Li"}, {"name": "Sheng Fang"}, {"name": "Youjin Deng"}], "featured_authors": [{"name": "Jinhong Zhu"}, {"name": "Tao Chen"}, {"name": "Zhiyi Li"}, {"name": "Sheng Fang"}, {"name": "Youjin Deng"}], "author_count": 5}, {"id": "2604.05880", "category": "cond-mat", "title": "Collective spatial reorganization from arrest to peeling and migration through density-dependent mobility in internal-state coordinates", "abstract": "Numerous problems in development, regeneration, and disease involve simultaneous evolution of both spatial organization and the internal state of the constituents in addition to local interactions and crowding. This motivates us to study a minimal model for interacting populations evolving in coupled spatial and internal-state coordinates. We focus on a specific transition of particular biological interest: the reorganization of dense collectives from compact or arrested states toward boundary-led peeling and migration. In our formulation, each particle carries a spatial position and a scalar internal state, and interacts through finite-range forces. Mobilities are defined on both spatial and internal-state coordinates with a density dependence, and are asymmetrically cross-coupled. We derive update equations for stochastic dynamics in the overdamped limit and perform numerical simulations. We find that mobility in internal-state coordinates alone provides an independent control axis for large-scale spatial reorganization. In particular, increasing the baseline internal-state diffusivity and tuning its density dependence drives a transition from arrested aggregates to a peeling-like regime with broad spatial excursions, strong outward radial bias, and edge-localized activity, while the baseline positional diffusivity is held fixed. The transition is accompanied by correlated broadening of spatial and internal-state displacements, systematic reorganization of radial density and density-curvature profiles, and a pronounced dependence on system size, consistent with the idea that growing aggregates can cross into a boundary-dominated migratory state. These results establish the utility of our approach and motivate a broader framework aimed at modeling state change, spatial redistribution, and neighborhood structure within a common formalism.", "url": "https://arxiv.org/abs/2604.05880", "type": "理论+数值", "summary": "1. 该工作构建了一个耦合空间坐标与内部状态坐标的最小随机动力学模型，研究了致密群体从团簇停滞态向边界剥离迁移态的重组转变。\n2. 其核心发现是，仅通过调控内部状态扩散率及其密度依赖关系，即可在不改变位置扩散基准的条件下，驱动系统发生大规模空间重组并伴随径向密度分布与曲率分布的系统性重构。\n3. 这为在统一形式中描述发育、再生及疾病过程中普遍存在的状态变化、空间重排与邻域结构演化提供了可扩展的理论框架。", "summary_source": "deepseek", "authors": [{"name": "Yagyik Goswami"}], "featured_authors": [{"name": "Yagyik Goswami"}], "author_count": 1}, {"id": "2604.05909", "category": "cond-mat", "title": "Emergent Rotation of Passive Clusters in a Chiral Active Bath", "abstract": "We investigate the dynamics of passive particles immersed in a bath of chiral active particles, focusing on the emergence of collective rotational motion. Using numerical simulations, we show that passive particles aggregate into clusters that can exhibit persistent rotation within a well-defined regime of size ratio and active particle packing fraction. This rotational state is characterized by the coexistence of internal structural order, enhanced shape fluctuations, and a coherent net torque generated by the surrounding active bath. Outside this regime, the dynamics remain predominantly diffusive, highlighting that sustained rotation is not ubiquitous but arises from a delicate interplay between geometry, activity, and chirality. Furthermore, we demonstrate that chirality heterogeneity disrupts rotational coherence, while a uniform chiral bath promotes strongly superdiffusive angular dynamics. These results provide new insights into the role of chirality and collective interactions in shaping the emergent behavior of active-passive mixtures.", "url": "https://arxiv.org/abs/2604.05909", "type": "理论+数值", "summary": "1. 本文通过数值模拟研究了浸没于手性活性粒子浴中的被动粒子动力学，发现其在特定尺寸比和填充分数下会聚集成具有持续旋转运动的团簇。\n2. 其核心物理机制在于几何构型、活性驱动与手性间的微妙相互作用，使得活性浴能产生净扭矩，同时维持团簇内部结构有序性与增强的形状涨落。\n3. 该结果揭示了手性均匀性对维持旋转相干性的关键作用，为活性-被动混合系统中手性诱导的集体动力学研究提供了新视角。", "summary_source": "deepseek", "authors": [{"name": "Divya Kushwaha"}, {"name": "Abhra Puitandy"}, {"name": "Shradha Mishra"}], "featured_authors": [{"name": "Divya Kushwaha"}, {"name": "Abhra Puitandy"}, {"name": "Shradha Mishra"}], "author_count": 3}, {"id": "2604.05918", "category": "cond-mat", "title": "Long distance attraction between particles in a soap film", "abstract": "Millimeter-sized particles trapped at the surface of a liquid bath attract each other through the deformation of the liquid-air interface, a phenomenon known as \"the Cheerios effect\". We consider here a situation similar at first sight: the interaction between two millimeter-sized particles trapped in an horizontal soap film. In this geometry, the deformation of the film due to the weight of one particle extends over the entire system size, which induces an extremely long-ranged attraction. Combined with the low viscous friction in the film, this leads to intricate particle orbits, lasting up to ten seconds before the two particles eventually collide. By tracking the particles dynamics, we measure the force exerted by each particle on the other, and we develop a theoretical model. Because the interface deformation induced by a particle depends on its position in the soap film, the attractive force has two features that fundamentally depart from classical interaction forces. The force exerted by one particle on the other differs both in direction and magnitude from the reverse interaction, with an asymmetry reaching 150% when one particle is close to the center and the other one close to the frame. Reciprocity is recovered when both particles are close to the film center. These results are a original example of non-reciprocal effective interactions due to boundary conditions.", "url": "https://arxiv.org/abs/2604.05918", "type": "理论", "summary": "1. 该工作通过实验观测与理论建模，研究了水平肥皂膜中两个毫米级颗粒间的长程相互作用动力学。\n2. 其核心发现是，由于颗粒在膜中位置不同导致的界面变形差异，产生了方向与大小均不对称的非互易吸引力，不对称性最高可达150%。\n3. 这为边界条件诱导的非互易有效相互作用提供了明确实例，为受限软物质体系中的非平衡相互作用研究开辟了方向。", "summary_source": "deepseek", "authors": [{"name": "Youna Louyer"}, {"name": "Megan Delens"}, {"name": "Nicolas Vandewalle"}, {"name": "Benjamin Dollet"}, {"name": "Isabelle Cantat"}, {"name": "Anaïs Gauthier"}], "featured_authors": [{"name": "Youna Louyer"}, {"name": "Megan Delens"}, {"name": "Nicolas Vandewalle"}, {"name": "Benjamin Dollet"}, {"name": "Isabelle Cantat"}, {"name": "Anaïs Gauthier"}], "author_count": 6}, {"id": "2604.05925", "category": "cond-mat", "title": "Hydrodynamic Switching Fronts Polarize Deformable Particle Trains", "abstract": "We show that propagating switching fronts mediate directional state transmission and polarity selection in a passive many-body suspension. In confined trains of slipper-shaped deformable particles in Poiseuille flow, this behavior originates from directionally biased switching between neighboring particles: owing to the fore-aft asymmetry of the slipper, an upstream particle drives switching of its downstream neighbor more effectively than in the reverse direction. A local transition from an opposite-sign pair to a same-sign pair therefore launches a streamwise front that relays the inclination sign from particle to particle. A minimal coarse-grained model with local bistability and directional coupling captures front propagation and arrest. In periodic trains, the fronts coarsen into a uniformly polarized state, whereas in long open trains they arrest and leave persistent polarized domains. Our results point to local bistability and directional coupling as a route to collective polarization in passive many-body systems.", "url": "https://arxiv.org/abs/2604.05925", "type": "理论", "summary": "1. 该工作研究了泊肃叶流中受限鞋型可变形颗粒链列内，由流体动力学切换波前介导的定向状态传递与极性选择现象。\n2. 其核心物理机制源于颗粒前后不对称性导致的定向偏向切换：上游颗粒驱动下游邻居切换的效率高于反向过程，从而触发沿流向传播的波前。\n3. 这揭示了局部双稳态与定向耦合可作为被动多体系统实现集体极化的普适机制，为活性物质及微流控颗粒组装研究提供了新思路。", "summary_source": "deepseek", "authors": [{"name": "Linzheng Huang"}, {"name": "Hengdi Zhang"}, {"name": "Zaicheng Zhang"}, {"name": "Zaiyi Shen"}], "featured_authors": [{"name": "Linzheng Huang"}, {"name": "Hengdi Zhang"}, {"name": "Zaicheng Zhang"}, {"name": "Zaiyi Shen"}], "author_count": 4}, {"id": "2604.05928", "category": "cond-mat", "title": "Quantum phases in the interacting generalized Su-Schrieffer-Heeger model", "abstract": "We investigate the quantum phases of a half-filled generalized interacting Su-Schrieffer-Heeger model with intracell, nearest-neighbor, and next-nearest-neighbor intercell hoppings, together with an on-site inter-sublattice interaction. In the noninteracting limit, the model hosts one topologically trivial phase and two symmetry-protected topological (SPT) phases, distinguished under periodic boundary conditions by different winding numbers and under open boundary conditions by two-fold and four-fold entanglement-spectrum degeneracies, respectively. When interactions are introduced, these free-fermion SPT phases evolve into distinct interacting topological phases that retain characteristic signatures such as entanglement-spectrum degeneracy structures, boundary modes, and nonzero string order parameters. For strong repulsive interactions, a symmetry-breaking phase with unequal but spatially uniform sublattice densities appears between the trivial and topological regimes. For strong attractive interactions, period-2 and period-4 charge-density-wave phases emerge from particle clustering. At intermediate attractive interactions, the competition between interaction-induced localization and hopping-induced delocalization gives rise to a Luttinger liquid phase, a paired Luttinger liquid phase, and a gapless symmetry-protected topological (gSPT) phase. The gSPT phase is characterized by a gapless charge mode together with symmetry-protected current-carrying edge states. We further characterize the gapless phases and the associated quantum phase transitions through central charges and critical exponents.", "url": "https://arxiv.org/abs/2604.05928", "type": "理论", "summary": "1. 该工作研究了半填充相互作用广义Su-Schrieffer-Heeger模型中的量子相。\n2. 其卖点在于揭示了相互作用下自由费米子SPT相演化为具有无能隙电荷模和边界态的gSPT相等丰富相结构。\n3. 这为利用中心电荷和临界指数研究量子相变及无能隙相提供了明确框架。", "summary_source": "deepseek", "authors": [{"name": "Jing-Hua Niu"}, {"name": "Jia-Lin Liu"}, {"name": "Ke Wang"}, {"name": "Shan-Wen Tsai"}, {"name": "Jin Zhang"}], "featured_authors": [{"name": "Jing-Hua Niu"}, {"name": "Jia-Lin Liu"}, {"name": "Ke Wang"}, {"name": "Shan-Wen Tsai"}, {"name": "Jin Zhang"}], "author_count": 5}, {"id": "2604.05951", "category": "cond-mat", "title": "Lattice location of ion-implanted 6He in diamond", "abstract": "We report on the lattice location of the short-lived ion implanted nuclear probe 6He (t1/2=807 ms) in diamond, which was performed using the beta emission channeling method at CERN's ISOLDE facility. 6He was implanted with 30 keV into a single-crystalline artificial diamond sample kept at a temperature ranging from 30 deg C up to 800 deg C. By means of comparing the measured emission channeling patterns along different crystallographic directions with simulated yields for a variety of possible sites, we conclude that the implanted 6He occupies tetrahedral (T) interstitial sites, in agreement with theoretical predictions that T sites should be the preferred position of He in diamond. Implantation at 800 deg C resulted in a drop in the tetrahedral interstitial fraction by 20%, which we interpret as the onset of diffusion, 6He thus being able to change to lattice sites of low crystallographic symmetry, or reach the surface of the sample or escape to the bulk during its lifetime. We estimate the activation energy for interstitial migration of He to be around 1.63-2.89 eV, which agrees with theoretical predictions of 1.41 eV, 1.97 eV, 2.35 eV and 2.36 eV from the literature. Activation energies around 2 eV would mean that simple interstitial He cannot be stable in diamond on geological time scales, thus to remain inside, it should be bound to some defect in the material or exist in another form such as within inclusions of other minerals or liquids, or possibly small He bubbles.", "url": "https://arxiv.org/abs/2604.05951", "type": "理论", "summary": "1. 该工作利用CERN-ISOLDE设施的β发射沟道方法，研究了短寿命核探针⁶He在30–800°C温度范围内注入人造单晶金刚石后的晶格占位
