path integral obstructs a straightforward state-counting interpretation of the Gibbons--Hawking entropy. Building on Maldacena's proposal that specific black-hole observers can reorganize this phase, we derive a general constraint on when such ``real observers'' can succeed. By distinguishing \\emph{gravitational observers} from \\emph{topological spectators}, we show that any sector whose \\emph{infrared effective} action is metric independent at the de Sitter saddle factorizes in the path integral, $\\Ztot = \\Zgrav^{(\\text{obs})}\\Ztop$, so the imaginary phase persists regardless of the sector's information-processing capabilities. Using confining $\\SU(3)$ gauge theory and topological orders as examples, we demonstrate that an information-bearing clock is necessary but insufficient: only observers whose fluctuations share the negative modes of the conformal factor belong to the special class that can remove the de Sitter phase.", "url": "https://arxiv.org/abs/2603.18068", "type": "理论", "summary": "1. 该工作为“真实观察者”能否成功重组de Sitter路径积分中的普适虚数相位，推导出了一个普遍约束条件。\n2. 其关键在于区分引力观察者与拓扑旁观者，并证明只有当观察者的涨落共享共形因子的负模时，才能消除该相位。\n3. 这为在量子引力中精确定义“观察者”概念及其与热力学熵诠释的关联，提供了新的理论判据。", "summary_source": "deepseek", "authors": [{"name": "Ahmed Farag Ali"}], "featured_authors": [{"name": "Ahmed Farag Ali"}], "author_count": 1}, {"id": "2603.18133", "category": "hep-th", "title": "End-of-the-World Singularities: The Good, the Bad, and the Heated-up", "abstract": "We revisit codimension-one End-of-the-World curvature singularities that drive scalars to infinite distance in field-space and have appeared in the context of dynamical cobordisms. We confront them with Gubser's horizon and potential criteria and with the Maldacena--Nuñez criterion. Moduli-space flows do not admit a near-extremal horizon generalization. Still, they satisfy Gubser's potential criterion and, in representative string realizations, the Maldacena--Nuñez criterion in ten dimensions. Together with an explicit uplift of this type of solution to a consistent string theory background, this suggests that such singularities should not be discarded. For flows with non-trivial scalar potential, we argue that the fate of the singularity is tied to the infinite-distance limit probed near the singularity. The Klebanov--Tseytlin and Klebanov--Strassler solutions illustrate that a modification that obstructs or modifies the field excursion should not be understood as a UV-resolution of the original singularity. We show that EFT strings and D7-branes fail Gubser's potential criterion despite having a sensible UV completion. Motivated by this, and inspired by dynamical cobordisms, we propose a novel criterion that bounds the divergence of the Ricci scalar as the flow explores infinite distance in field-space. Our criterion can be viewed as a geometrization Gubser's one that, while capturing all examples accepted by the latter, also admits EFT strings and D7-branes. Both criteria reject the massive Type IIA strong coupling End-of-the-World singularity. Finally, we analyze black D$p$-branes reduced to codimension one as representatives of flows that admit near-extremal generalizations, and find an exponential relation between temperature and field-space distance. This suggests a finite-temperature extension of the Distance Conjecture for dynamical cobordisms.", "url": "https://arxiv.org/abs/2603.18133", "type": "理论", "summary": "1. 该研究系统评估了动力学边界背景下驱动标量场至无限远距离的共维一世界终结奇点，并检验了其与多种可接受性判据（Gubser判据、Maldacena–Nuñez判据）的相容性。\n2. 研究提出了一种新颖的几何化判据，该判据通过限制场空间无限远距离处里奇标量的发散行为，统一涵盖了Gubser判据所接受的案例，并成功纳入了具有良定义紫外完备性的EFT弦和D7膜。\n3. 通过对可构造近极端黑洞推广的流进行分析，发现了温度与场空间距离间的指数关系，这为动力学边界的距离猜想提供了有限温度下的自然延伸。", "summary_source": "deepseek", "authors": [{"name": "José Calderón-Infante"}, {"name": "Gongrui Cheng"}, {"name": "Alvaro Herráez"}, {"name": "Thomas Van Riet"}], "featured_authors": [{"name": "José Calderón-Infante"}, {"name": "Gongrui Cheng"}, {"name": "Alvaro Herráez"}, {"name": "Thomas Van Riet"}], "author_count": 4}, {"id": "2603.18138", "category": "hep-th", "title": "The Resolved Elliptic Genus and the D1-D5 CFT", "abstract": "This paper is a follow-up to the short paper arXiv:2509.19425 , greatly expanding the discussion with examples and providing derivations and justifications of results presented there. We introduce a new supersymmetry index for the D1-D5 CFT on $T^4$, which we call the resolved elliptic genus (REG). It is a one-parameter generalisation of the standard supersymmetry index, the modified elliptic genus (MEG), and arises naturally in the free symmetric orbifold description of the theory within a new formalism, based on Schur-Weyl duality, that we develop. In this formalism, the Hilbert space of the symmetric orbifold CFT is decomposed into symmetry sectors in which the structure of the states contributing to the MEG is transparent. By examining the action of the supercharge deformed by an exactly marginal operator on the relevant symmetry algebra, we propose a superselection rule governing the lifting process of BPS states, and use it to construct the REG by summing only over those symmetry sectors that can mix according to this rule. The REG exhibits detailed agreement between the CFT and supergravity below the black-hole threshold, a regime in which the MEG is essentially trivial. Above the threshold, the REG is dominated by black-hole microstates, which are now distributed amongst distinct sectors that are invisible to the MEG. We expect both the new formalism and the REG to provide useful new tools for studying the structure of black-hole microstates. In particular, we comment on their possible relevance to the fortuity program for understanding black-hole microstates within CFT.", "url": "https://arxiv.org/abs/2603.18138", "type": "理论", "summary": "1. 本工作为D1-D5共形场论引入了一个称为“分解椭圆亏格”的单参数新超对称指标，并基于舒尔-外尔对偶发展了对称轨形理论的系统形式体系。\n2. 该形式体系将希尔伯特空间按对称性扇区分解，清晰地揭示了贡献于修正椭圆亏格的态结构，并通过考察微扰超电荷对对称代数的作用，提出了支配BPS态解除简并的择定规则。\n3. 分解椭圆亏格在黑洞阈值以下实现了CFT与超引力的细致吻合，其构建方法和结果有望为研究黑洞微观态结构及理解“偶然性”方案提供新工具。", "summary_source": "deepseek", "authors": [{"name": "Marcel R. R. Hughes"}, {"name": "Masaki Shigemori"}], "featured_authors": [{"name": "Marcel R. R. Hughes"}, {"name": "Masaki Shigemori"}], "author_count": 2}, {"id": "2603.18140", "category": "hep-th", "title": "Moments in the CFT Landscape", "abstract": "We develop a novel numerical bootstrap for unitary, crossing-symmetric conformal field theories, focusing on moment observables defined as weighted averages over conformal data. Providing a global and coarse-grained probe of the operator spectrum, this framework yields numerically rigorous bounds on the operator distribution using standard semidefinite programming techniques. In the heavy correlator regime, these bounds remain robust and converge rapidly towards analytically-derived power laws. At finite external dimensions, low-lying moments capture corrections to analytic heavy limit results, while reproducing familiar bootstrap solutions such as Ising-model kinks on the boundary of moment space. Most importantly, the moment bootstrap reveals new features in previously unexplored regions of the bootstrap landscape. The lower bounds on moment variables exhibit two continuous families of kinks persisting across $2 < d < 6$, reflecting nontrivial spectral reorganizations connected to underlying operator decoupling phenomena. These results demonstrate that moment variables uncover bootstrap solutions and collective structures that are difficult to access within traditional numerical approaches.", "url": "https://arxiv.org/abs/2603.18140", "type": "理论", "summary": "1. 该工作为幺正且交叉对称的共形场论发展了一种基于矩观测量加权平均的新型数值自举方法。\n2. 其核心在于通过半定规划对算符分布给出数值严格界限，并在二维到六维间揭示了两族连续存在的拐点结构。\n3. 这为探索传统数值方法难以触及的自举解及与算符解耦相关的谱重组现象开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Li-Yuan Chiang"}, {"name": "David Poland"}, {"name": "Gordon Rogelberg"}], "featured_authors": [{"name": "Li-Yuan Chiang"}, {"name": "David Poland"}, {"name": "Gordon Rogelberg"}], "author_count": 3}, {"id": "2603.18141", "category": "hep-th", "title": "Moduli space of ${\\cal N}=4$ Super Yang-Mills from AdS/CFT", "abstract": "We study ${\\cal N}=4$ super Yang-Mills theory compactified on a circle at zero temperature, with VEVs for two scalar bilinears and three independent current sources. We show that type IIB supergravity provides a complete holographic description of this setup, admitting both supersymmetric and non-supersymmetric AdS soliton solutions, which are asymptotically AdS$_5$ and smooth in the IR. The current sources correspond in (2+1) dimensions to Q-ball charge densities for $U(1)^3\\subset SO(6)_R$, and are geometrically realized as twists along three angular directions of the $S^5$. We demonstrate that the bulk dynamics encodes the full vacuum structure of the dual field theory and explicitly reconstruct the supersymmetric moduli space.", "url": "https://arxiv.org/abs/2603.18141", "type": "理论", "summary": "1. 该工作基于AdS/CFT对应，研究了圆周紧致化下带有标量期望值与电流源的N=4超对称杨-米尔斯理论的零温全息描述。\n2. 其核心在于通过IIB型超重力中的AdS孤立子解，将(2+1)维电流源几何实现为S^5上三个角方向的扭转变换，对应R对称群的U(1)^3子群荷密度。\n3. 这一构造完整编码了对偶场论的真空结构，为显式重建超对称模空间及相关非微扰研究提供了具体实现方案。", "summary_source": "deepseek", "authors": [{"name": "Andrés Anabalón"}, {"name": "Horatiu Nastase"}, {"name": "Carlos Nunez"}, {"name": "Marcelo Oyarzo"}, {"name": "Ricardo Stuardo"}], "featured_authors": [{"name": "Andrés Anabalón"}, {"name": "Horatiu Nastase"}, {"name": "Carlos Nunez"}, {"name": "Marcelo Oyarzo"}, {"name": "Ricardo Stuardo"}], "author_count": 5}, {"id": "2603.18142", "category": "hep-th", "title": "A superspace approach to AdS$_3$ string theory", "abstract": "We carefully examine the Polyakov path integral for strings on $\\text{AdS}_3$ in superspace, both for type II and heterotic superstrings. We construct a free-field realization of the supersymmetric $\\text{SL}(2,\\mathbb{R})$ WZW model which manifestly preserves worldsheet supersymmetry and use this free-field realization to construct spectrally-flowed vertex operators describing the emission of long strings in the bulk. By working directly with the moduli space of super Riemann surfaces, we exactly compute tree-level correlation functions of long strings in the `near-boundary' limit without resorting to the standard picture-changing-operator (PCO) procedure. Finally, we argue how these correlators schematically reproduce correlation functions of the conjectured boundary CFTs, and as a result provide a novel proposal for the CFT dual for heterotic superstrings in $\\text{AdS}_3$.", "url": "https://arxiv.org/abs/2603.18142", "type": "理论", "summary": "1. 本文在超空间中系统研究了AdS3上II型及杂化超弦的Polyakov路径积分，构建了超对称SL(2,R) WZW模型的自由场实现，并以此计算了近边界极限下长弦的树级关联函数。\n2. 该方法通过显式保持世界面超对称性的自由场构造实现谱流顶点算子，并直接基于超黎曼曲面模空间进行精确计算，避免了传统的图像改变算子手续。\n3. 所得关联函数与边界共形场理论对应，为杂化超弦在AdS3中的全息对偶提供了新的具体方案，并为相关精确计算与对偶验证开辟了途径。", "summary_source": "deepseek", "authors": [{"name": "Bob Knighton"}, {"name": "Nathan McStay"}, {"name": "Vit Sriprachyakul"}], "featured_authors": [{"name": "Bob Knighton"}, {"name": "Nathan McStay"}, {"name": "Vit Sriprachyakul"}], "author_count": 3}, {"id": "2603.18147", "category": "hep-th", "title": "Branching Universes", "abstract": "We propose the idea that our Universe is a realization among different possible branches, which can be observationally tested through the modified dispersion relation of the gravitational waves. We achieve this through a framework of spatially constrained vector fields. We show that the simplest realizations of such theories in flat and cosmological spacetimes do not introduce new propagating modes, but they give rise to tensor perturbations that differ from those of standard general relativity. We further show that such theories admit stealth black hole solutions, and we recover weak gravitational potentials, thus passing the solar system experiments. Finally, we discuss the implications of such theories and propose further generalizations.", "url": "https://arxiv.org/abs/2603.18147", "type": "理论", "summary": "1. 该研究构建了一个基于空间受限矢量场的理论框架，将我们的宇宙描述为不同可能分支中的一种特定实现，并通过修正引力波的色散关系提出了可观测的检验方案。\n2. 理论在平坦和宇宙学时空中实现时不引入新的传播自由度，但导致张量扰动行为与标准广义相对论不同，且容纳隐形黑洞解并通过弱引力势与太阳系实验一致。\n3. 这为多宇宙概念的实证研究提供了具体的物理载体，并启发了对修正引力理论的进一步推广及其在宇宙学和天体物理学中的深入探索。", "summary_source": "deepseek", "authors": [{"name": "Anamaria Hell"}, {"name": "Tatsuya Daniel"}], "featured_authors": [{"name": "Anamaria Hell"}, {"name": "Tatsuya Daniel"}], "author_count": 2}, {"id": "2603.18154", "category": "hep-th", "title": "A menagerie of Schwarzians: coadjoint orbits of Virasoro and near-dS$_2$ quantum gravity", "abstract": "The Schwarzian theory, which governs the universal low-energy dynamics of near-extremal black holes and the SYK model, can be characterised as an integral over a particular coadjoint orbit of the Virasoro group. We describe and solve a complete classification of all possible generalised Schwarzian theories, defined by integrals over any Virasoro coadjoint orbit, including new classes of theories with qualitatively novel features. The classification of coadjoint orbits coincides with the moduli space of constant positive curvature two-dimensional Lorentzian geometries, and the associated Schwarzian theories govern associated wavefunctions in asymptotically near-dS$_2$ gravity (Jackiw-Teitelboim gravity in particular). The novel theories are inherently Lorentzian, defined by oscillatory path integrals weighted by $e^{iI}$ and force consideration of varying `coupling functions' (renormalised dilaton) which may not have definite sign. The definition of the theories involves an ambiguity, arising because the operator describing quadratic fluctuations at one loop fails to be essentially self-adjoint. This requires a choice of boundary condition, and also forces us to allow certain singularities in configurations and classical solutions. The choice is justified from the realisation in JT gravity, which naturally regulates these singularities. The path integral remains one-loop exact via fermionic localisation, but this requires additional input beyond the Duistermaat-Heckman theorem. This allows an exact computation of the path integral for all theories and all couplings, including new results for the original Schwarzian theory.", "url": "https://arxiv.org/abs/2603.18154", "type": "理论", "summary": "1. 该工作对作为近极值黑洞与SYK模型低能普适动力学的Schwarzian理论进行了完整分类，通过Virasoro群余伴随轨道积分定义并求解了所有可能的广义Schwarzian理论。\n2. 理论体系本质上是洛伦兹性的，其振荡型路径积分权重为e^{iI}且允许变号耦合函数，一涨落算符的非本质自伴性导致需引入边界条件与容许特定奇点。\n3. 这为近dS₂时空量子引力（特别是Jackiw-Teitelboim引力）中的波函数提供了统一描述框架，并通过费米子局域化实现了所有理论与耦合常数下路径积分的精确计算。", "summary_source": "deepseek", "authors": [{"name": "Henry Maxfield"}], "featured_authors": [{"name": "Henry Maxfield"}], "author_count": 1}, {"id": "2603.18180", "category": "hep-th", "title": "New $F^4$ invariants in five-dimensional supergravity", "abstract": "We consider four-derivative superinvariants of five-dimensional $\\mathcal N=2$ supergravity coupled to $n_v\\le 2$ vector multiplets, which we obtain from both the superconformal tensor calculus approach and dimensional reduction. For the minimal case, with no vector multiplets, it is known that there is a unique four-derivative superinvariant. However, for the case of one vector multiplet, after field redefinitions, we find that there are three independent superinvariants, one of which is a vector superinvariant that does not contain any curvatures and takes the form of a supersymmetrization of $F^4$. Similarly, for the two vector multiplet case, corresponding to the STU model, we find three gravitational superinvariants and two $F^4$-type vector superinvariants. Moreover, we find that these vector superinvariants do not affect the two- and three-charge static BPS black hole solutions. We further consider the rigid limit to $\\mathcal N=2$ super-Yang-Mills and use this to conjecture a family of vector superinvariants for five-dimensional $\\mathcal N=2$ supergravity coupled to an arbitrary number of vector multiplets.", "url": "https://arxiv.org/abs/2603.18180", "type": "理论", "summary": "1. 该工作研究了五维 N=2 超引力耦合至不多于两个矢量多重形下的四阶导数超不变式，并利用超共形张量计算与维度约化方法获得了它们。\n2. 研究发现，对于含一个矢量多重形的情形，存在一个不包含曲率、形式为 F⁴ 超对称化的矢量超不变式；对于 STU 模型对应的两个矢量多重形情形，则存在两个此类 F⁴ 型矢量超不变式，且它们不影响静态 BPS 黑洞解。\n3. 通过考虑至 N=2 超杨-米尔斯理论的刚化极限，该工作推测了耦合任意数目矢量多重形时的一类矢量超不变式族，为相关高阶导数修正的研究提供了新方向。", "summary_source": "deepseek", "authors": [{"name": "Yide Cai"}, {"name": "Sabarenath Jayaprakash"}, {"name": "James T. Liu"}, {"name": "Yi Pang"}, {"name": "Robert J. Saskowski"}], "featured_authors": [{"name": "Yide Cai"}, {"name": "Sabarenath Jayaprakash"}, {"name": "James T. Liu"}, {"name": "Yi Pang"}, {"name": "Robert J. Saskowski"}], "author_count": 5}, {"id": "2603.18208", "category": "hep-th", "title": "Quantum orientation entanglement analysis of the interpolating helicity states between the instant form dynamics and the light-front dynamics", "abstract": "The interplay between quantum orientation entanglement and Wigner rotation plays a fundamental role in understanding the behavior of spin angular momentum in quantum states. To analyze the quantum orientation entanglement of the relativistic helicity states interpolating between the Jacob-Wick helicity and the light-front helicity, we examine the relative angle between the particle's momentum direction and the spin orientation for the interpolating helicity states. For this analysis, we introduce a novel method for expanding the interpolating helicity states in terms of the Jacob-Wick helicity. The corresponding probabilistic coefficients follow the structure of the Wigner d-matrix elements, which we use for the interpretation of the quantum orientation entanglement manifested in the angular distributions of the interpolating scattering helicity amplitudes. As an explicit demonstration, we compute the interpolating helicity amplitudes for the pair production of spin-1 (vector) particles in the annihilation of two spin-0 (scalar) particles, focusing primarily on their contact interaction. In particular, we identify the critical interpolation angle that bifurcates the dynamical branches between the instant-form dynamics and the light-front dynamics and discuss the underlying orientation entanglement in the interpolating helicity amplitudes.", "url": "https://arxiv.org/abs/2603.18208", "type": "理论", "summary": "1. 该工作通过引入一种基于Jacob-Wick螺旋性展开插值螺旋性态的新方法，分析了在瞬时形式动力学与光前动力学之间插值的相对论螺旋性态的量子取向纠缠，并以标量粒子湮灭产生矢量粒子对的接触相互作用为例计算了插值螺旋性幅度。\n2. 其技术核心在于利用概率系数遵循Wigner d-矩阵结构的特性，定量解释散射幅度角分布中显现的量子取向纠缠，并识别了分叉瞬时形式与光前动力学分支的临界插值角度。\n3. 这为深入理解螺旋性态在相对论动力学框架下的纠缠行为提供了关键理论工具，对研究不同动力学形式之间的转换机制及相关散射过程中的自旋角动量演化具有明确启发意义。", "summary_source": "deepseek", "authors": [{"name": "Deepasika Dayananda"}, {"name": "Chueng-Ryong Ji"}], "featured_authors": [{"name": "Deepasika Dayananda"}, {"name": "Chueng-Ryong Ji"}], "author_count": 2}, {"id": "2603.18248", "category": "hep-th", "title": "Type IIB Supergravity Action and Holography", "abstract": "In the prototypical AdS$_5$/CFT$_4$ correspondence, the free energy of $\\mathcal{N}=4$ SU$(N)$ super Yang-Mills theory is commonly reproduced from the Euclidean on-shell action of five-dimensional gauged supergravity -- a consistent truncation of Type IIB supergravity -- rather than computed directly in ten dimensions. A longstanding obstacle to the latter is that the conventional Type IIB pseudo-action evaluated on the $AdS_5\\times S^5$ background vanishes identically, apparently precluding a first-principles holographic comparison. A recent proposal by Kurlyand and Tseytlin, based on the Pasti-Sorokin-Tonin formulation, resolves this issue for a special class of backgrounds including the $AdS_5\\times S^5$ vacuum by introducing a topological term required for consistency, yielding a non-vanishing on-shell value in agreement with holography. In this work we extend this refinement to a broader class of Type IIB backgrounds by introducing a generalized topological correction under milder conditions, encompassing AdS geometries of generic dimension and non-vanishing 2-form potentials. We test the proposal on non-trivial solutions such as the Lunin-Maldacena background and the $AdS_4$ $S$-fold solution, and find agreement with the corresponding lower-dimensional gauged supergravity on-shell actions and thereby with the expected holographic observables. Our results place direct holographic comparisons within the ten-dimensional Type IIB framework on firmer ground.", "url": "https://arxiv.org/abs/2603.18248", "type": "理论", "summary": "1. 该工作将针对AdS₅×S⁵背景的IIB型超引力作用量修正方案，推广至更广泛的IIB型背景类别。\n2. 通过在更温和条件下引入广义拓扑修正项，解决了传统赝作用量在一般AdS几何与非零2形式势背景下为零的问题，并与降维超引力结果一致。\n3. 这为在十维框架内直接进行全息对偶计算奠定了更坚实的基础，尤其对涉及复杂通量与折叠结构的背景具有重要意义。", "summary_source": "deepseek", "authors": [{"name": "Soumya Adhikari"}, {"name": "Junho Hong"}, {"name": "Chanyoung Joung"}, {"name": "Geum Lee"}], "featured_authors": [{"name": "Soumya Adhikari"}, {"name": "Junho Hong"}, {"name": "Chanyoung Joung"}, {"name": "Geum Lee"}], "author_count": 4}, {"id": "2603.18341", "category": "hep-th", "title": "Multifield dark energy: Interplay between curved field space and curved spacetime", "abstract": "Exponential quintessence models motivated by string compactifications naturally involve both a dilatonic scalar and its axionic partner evolving on a curved field space, while spatial curvature enlarges the cosmological phase space and may affect late-time dynamics. We perform a systematic analysis of the minimal two-field exponential system in a curved FLRW background including radiation and matter components, combining a complete dynamical systems classification with analytical approximations and numerical integration. In the scalar-dominated limit, non-geodesic trajectories can sustain accelerated expansion on steep potentials, and in curved universes a scaling-curvature fixed point can in principle soften the requirements for acceleration. However, we show that these mechanisms arise in distinct invariant manifolds and cannot be simultaneously realized in the presence of a background fluid: no non-geodesic scaling fixed point exists within an open region of parameter space. As a consequence, in the observationally viable thawing regime the axion does not track the background fluid and spatial curvature becomes dynamically subdominant, leading to an effectively single-field evolution. We further identify a degeneracy between curvature effects and scalar-field dynamics that limits their independent impact on late-time cosmology. Confronting the model with current cosmological background data (Planck 2018 distance priors, Pantheon+, BAO, and cosmic chronometers), we obtain an upper bound $\\lambda \\lesssim 0.75$ (95 percent CL) on the potential slope. Our results demonstrate that even in the minimal multifield setup with spatial curvature, sustained late-time acceleration requires a sufficiently flat potential, so that the tension between cosmic acceleration and quantum gravity expectations persists within this framework.", "url": "https://arxiv.org/abs/2603.18341", "type": "理论", "summary": "1. 本文系统分析了弯曲FLRW背景下包含辐射与物质成分的最小双场指数型标量系统，结合完整动力系统分类、解析近似与数值积分进行研究。\n2. 研究发现，在存在背景流体的情形下，非测地线加速机制与曲率标度固定点机制分属不同不变流形而无法同时实现，导致可观测的缓凝区域呈现有效的单场演化特征。\n3. 这表明即使考虑空间曲率的最小多场框架，持续的晚期宇宙加速仍需要足够平坦的势函数，从而该框架下宇宙加速与量子引力期望之间的张力依然存在。", "summary_source": "deepseek", "authors": [{"name": "Diego Gallego"}, {"name": "J. Bayron Orjuela-Quintana"}], "featured_authors": [{"name": "Diego Gallego"}, {"name": "J. Bayron Orjuela-Quintana"}], "author_count": 2}, {"id": "2603.18442", "category": "hep-th", "title": "Integration techniques for worldline integrals", "abstract": "The worldline formalism allows one to obtain compact integral representations combining the information of large numbers of Feynman diagrams. However, their analytic calculation leads to a non-standard integration problem for which existing mathematical algorithms are of little help. Here I will summarize the state-of-the-art of worldline integration focusing on examples from QED in vacuum and in constant external fields.", "url": "https://arxiv.org/abs/2603.18442", "type": "理论", "summary": "1. 该论文系统综述了世界线积分技术的前沿发展，世界线形式主义能够将众多费曼图的信息压缩为紧凑积分表示，但其解析计算面临传统数学算法难以应对的非标准积分问题。\n2. 其技术贡献在于全面梳理了处理这类非标准积分问题的现有方法，并通过量子电动力学在真空和恒定外场中的具体积分实例进行了详细说明。\n3. 这为后续在量子场论及其他领域应用世界线形式主义、以及开发针对非标准积分的新算法提供了重要的理论基础和实践启示。", "summary_source": "deepseek", "authors": [{"name": "Victor M. Banda Guzman"}, {"name": "James P. Edwards"}, {"name": "C. Moctezuma Mata Zamora"}, {"name": "Luis A. Rodriguez Chacon"}, {"name": "Christian Schubert"}], "featured_authors": [{"name": "Victor M. Banda Guzman"}, {"name": "James P. Edwards"}, {"name": "C. Moctezuma Mata Zamora"}, {"name": "Luis A. Rodriguez Chacon"}, {"name": "Christian Schubert"}], "author_count": 5}, {"id": "2603.18566", "category": "hep-th", "title": "Dark Matter and Strong CP Problem in Type IIA String Theory", "abstract": "We present a study of dark matter and the strong CP problem within a globally consistent framework of Type IIA string theory, compactified on a $T^6/(\\mathbb{Z}_2 \\times \\mathbb{Z}_2)$ orientifold with intersecting D6-branes (Model A). This setup naturally gives rise to a 3-generation MSSM-like spectrum with $\\mathcal{N}=1$ supersymmetry. Phenomenologically, the model predicts a multi-component dark matter scenario comprising both axions and neutralino. We also explore how to embed the four-form flux mechanism into Type IIA $T^6/(\\mathbb{Z}_2 \\times \\mathbb{Z}_2)$ orientifold string theory model to address the strong CP problem. We compute the relic abundance of these candidates and explore their observational signatures. In conclusion, our analysis provides a concrete unified, UV-complete framework that successfully addresses two of the most important problems in particle physics and cosmology.", "url": "https://arxiv.org/abs/2603.18566", "type": "理论", "summary": "1. 该论文在IIA型弦理论的全局一致框架下，基于T^6/(Z2×Z2)定向形变与相交D6膜的紧致化模型，构建了具有N=1超对称的三代MSSM类谱，并系统研究了暗物质和强CP问题。\n2. 其核心物理贡献在于将四形式流机制嵌入该弦理论模型以解决强CP问题，并预言了由轴子和中性微子构成的多组分暗物质场景，同时计算了其遗迹丰度及观测特征。\n3. 这一UV完备的统一框架为在弦理论中同时处理粒子物理与宇宙学的关键难题提供了具体实现，激发了后续对相关模型构建与实验观测的深入探索。", "summary_source": "deepseek", "authors": [{"name": "Yang Liu"}], "featured_authors": [{"name": "Yang Liu"}], "author_count": 1}, {"id": "2603.18587", "category": "hep-th", "title": "Subleading soft dressings for QED scattering states", "abstract": "We study soft emission in QED during scattering of Faddeev-Kulish dressed states. The incoming and outgoing charged particles are accompanied by coherent clouds of soft photons with energies below a characteristic infrared scale $E_d$. We focus on explicit processes that allow the dependence of the soft factors on the hard particles' momenta and total angular momenta to be displayed clearly. We argue that the dressings remove the infrared divergences in hard amplitudes order by order in perturbation theory, effectively regulating the contributions from virtual soft photons at the scale $E_d$. Essentially, the Faddeev-Kulish hard amplitudes become equivalent to the infrared-finite part of the corresponding Fock-basis amplitudes. Finally, tree-level soft-photon emission is found to be suppressed once the dressings are extended to subleading order in the soft-momentum expansion, as prescribed in recent work by Choi and Akhoury.", "url": "https://arxiv.org/abs/2603.18587", "type": "理论", "summary": "1. 该研究利用Faddeev-Kulish修饰态分析了QED散射过程中的软光子辐射，重点关注了次领头阶软动量展开下的修饰效应。\n2. 其技术关键在于证明了当修饰扩展到次领头阶时，树图级软光子发射会受到压制，这为微扰论中逐阶消除红外发散提供了具体实现方案。\n3. 这一结果明确建立了修饰态振幅与Fock基振幅红外有限部分的对等关系，为深入研究散射态角动量依赖的软因子结构奠定了理论基础。", "summary_source": "deepseek", "authors": [{"name": "Stavros Christodoulou"}, {"name": "Nicolaos Toumbas"}], "featured_authors": [{"name": "Stavros Christodoulou"}, {"name": "Nicolaos Toumbas"}], "author_count": 2}, {"id": "2603.18681", "category": "hep-th", "title": "Comments on the Emergence of 4D Topological Amplitudes in M-Theory", "abstract": "The M-theoretic Emergence Proposal claims that all of the terms in the low-energy action arise from quantum effects. After reviewing the current status of this proposal, we focus on four-dimensional compactifications with $N=2$ supersymmetry, where kinetic terms are encoded in topological string amplitudes, such as the prepotential $F_0$. Evidence for the emergence of such terms was provided recently, where in particular it was shown that the classical cubic term in $F_0$ can be obtained by integrating out the light towers of states in the M-theory limit, using a novel regularization of the infinite sum over Gopakumar/Vafa invariants. We address two issues that were left open. First, we show that the regularization can be equivalently performed in complex structure moduli space and in Kähler moduli space. Second, we extend the proposed regularization to the linear terms in the one-loop prepotential $F_1$.", "url": "https://arxiv.org/abs/2603.18681", "type": "理论", "summary": "1. 本工作解决了M理论中四维拓扑振幅涌现机制的两个遗留问题，包括证明复结构模空间与Kähler模空间正则化的等价性。\n2. 其核心创新在于将Gopakumar/Vafa不变量的无穷求和正则化方法推广至单圈预势F₁的线性项。\n3. 这为N=2超对称紧化中各类低能有效项的涌现机制提供了统一处理框架，推进了M理论涌现猜想的系统性验证。", "summary_source": "deepseek", "authors": [{"name": "Manuel Artime"}, {"name": "Ralph Blumenhagen"}, {"name": "Aleksandar Gligovic"}, {"name": "Panagiotis Leivadaros"}], "featured_authors": [{"name": "Manuel Artime"}, {"name": "Ralph Blumenhagen"}, {"name": "Aleksandar Gligovic"}, {"name": "Panagiotis Leivadaros"}], "author_count": 4}, {"id": "2603.19006", "category": "hep-th", "title": "Non-Hermitian Structure and Exceptional Points in Yang-Mills Theory from Analytic Continuation of Nc", "abstract": "We show that analytic continuation of the number of colors, Nc, naturally endows Yang-Mills theory with a non-Hermitian structure. By examining the spectrum of the dilatation operator as a function of complex Nc, we identify a network of Exceptional Points (EPs) -- non-Hermitian degeneracies where anomalous dimensions degenerate and operator eigenstates coalesce. We demonstrate that these EPs act as topological defects in complex Nc-space, generating non-Abelian geometric phases and enforcing nontrivial monodromies among gauge-invariant operators. Moreover, we establish a correspondence between the spontaneous breaking of an emergent PT symmetry of the dilatation operator and the fundamental spacetime PT symmetry of the underlying gauge theory. In the vicinity of EPs, the resulting non-Hermitian dynamics produces logarithmic scaling behavior in correlation functions, characteristic of logarithmic conformal field theories. Our results place conventional unitary Yang-Mills theory within a broader complexified parameter space possessing rich topological structure, suggesting a new interface between non-Hermitian physics and quantum field theory.", "url": "https://arxiv.org/abs/2603.19006", "type": "理论", "summary": "1. 该工作通过解析延拓颜色数Nc，在杨-米尔斯理论中揭示了其内禀的非厄米结构，并识别了伸缩算符谱在复Nc平面上的异常点网络。\n2. 这些异常点作为拓扑缺陷，产生了非阿贝尔几何相位并强制了规范不变算符间的非平凡单值性，同时建立了伸缩算符的涌现PT对称性破缺与基础时空PT对称性的对应关系。\n3. 这为将传统幺正规范理论置于更广阔的复参数空间中进行研究提供了范式，并为非厄米物理与量子场论的交叉领域开辟了新的理论界面。", "summary_source": "deepseek", "authors": [{"name": "Qingjun Jin"}, {"name": "Ke Ren"}, {"name": "Gang Yang"}, {"name": "Rui Yu"}], "featured_authors": [{"name": "Qingjun Jin"}, {"name": "Ke Ren"}, {"name": "Gang Yang"}, {"name": "Rui Yu"}], "author_count": 4}, {"id": "2603.19033", "category": "hep-th", "title": "Unfolded hypermultiplet in harmonic superspace", "abstract": "We construct an unfolded system that describes an on-shell free massless hypermultiplet and show that the standard harmonic superspace formulation of this model naturally arises from the \"vielbeinization\" of unfolded 1-forms associated to R-symmetry. Moreover, using this system as an example, we demonstrate the phenomenon of background universality of the unfolded dynamics approach: we systematically deduce formulations in harmonic, N=2, and N=1 superspaces, as well as the component formulation in Minkowski space, directly from this unfolded system. We also comment on a putative off-shell extension of the on-shell system we constructed, and show how the harmonic contribution is reflected in the universal unfolded fiber.", "url": "https://arxiv.org/abs/2603.19033", "type": "理论", "summary": "1. 该工作构造了描述自由无质量超多重态的展开系统，并展示了其与谐和超空间表述的自然联系。\n2. 其核心在于通过将展开的1-形式“标架化”，从R对称性出发自然地导出谐和超空间框架。\n3. 这为展开动力学方法的背景普适性提供了具体例证，并为该系统的离壳推广及纤维结构研究指明了方向。", "summary_source": "deepseek", "authors": [{"name": "Nikita Misuna"}], "featured_authors": [{"name": "Nikita Misuna"}], "author_count": 1}, {"id": "2603.19159", "category": "hep-th", "title": "$S^3$ partition functions and Equivariant CY$_4 $/ CY$_3$ correspondence from Quantum curves", "abstract": "We study the perturbative large-$N$ expansion of the round three-sphere partition function in a class of M2-brane theories, including flavored SYM and ABJM theories as well as more general 3d theories admitting dual $(p,q)$ 5-brane web descriptions. Using the Fermi gas formalism and quantum curve techniques, we derive the Airy-function representation of the partition function and find exact agreement with predictions based on equivariant constant maps in topological string theory proposed in [1]. In particular, we provide affirmative tests of this proposal for the toric geometries $\\mathbb{C} \\times \\mathcal{C}$ (the conifold), the cone over the Sasakian space $Q^{1,1,1}$, and $\\mathbb{C} \\times \\mathrm{SPP}$ (the suspended pinch point). Motivated by a recent conjecture in [2], we further propose a novel equivariant correspondence between distinct toric Calabi-Yau manifolds of the form $\\mathrm{CY}_4 \\leftrightarrow \\mathbb{C} \\times\\mathrm{CY}_3$, arising from relations between the corresponding quantum curves under specific constraints. This correspondence suggests an equivariant extension and points toward a geometric origin of the topological string/spectral theory (TS/ST) correspondence, while offering new insight into the structure of the holography duality.", "url": "https://arxiv.org/abs/2603.19159", "type": "理论", "summary": "1. 该工作研究了包括味SYM和ABJM理论以及更一般具有对偶(p,q)5-膜网描述的3d M2膜理论中，三球面配分函数的大N微扰展开，并基于量子曲线提出了等变Calabi-Yau四维与三维流形之间的对应关系。\n2. 其卖点在于采用费米气体形式和量子曲线技术，精确推导出配分函数的Airy函数表示，与拓扑弦理论的等变常数映射预言完全一致，并成功检验了圆锥、Q^{1,1,1}和悬挂掐点等环面几何。\n3. 这为拓扑弦/谱理论对应的等变扩展提供了有力支持，暗示了其几何起源，并对全息对偶的结构理解带来了新的启示。", "summary_source": "deepseek", "authors": [{"name": "Kiril Hristov"}, {"name": "Naotaka Kubo"}, {"name": "Yi Pang"}], "featured_authors": [{"name": "Kiril Hristov"}, {"name": "Naotaka Kubo"}, {"name": "Yi Pang"}], "author_count": 3}, {"id": "2603.19168", "category": "hep-th", "title": "Quasinormal Modes of Extremal Reissner-Nordstrom Black Holes via Seiberg-Witten Quantization", "abstract": "We study the neutral scalar perturbations of asymptotically flat extremal Reissner-Nordström black holes via the quantum geometry of $\\mathcal{N}=2$ $\\mathrm{SU(2)}$ gauge theory with $N_f=2$ flavors. The master equation, given by a double confluent Heun equation, is mapped to the quantum Seiberg-Witten curve in the Nekrasov-Shatashvili limit. We compute the quasinormal mode frequencies non-perturbatively using the quantization condition derived from the Nekrasov-Shatashvili free energy. Our analytical results accurately reproduce the numerical benchmarks for massless fields, and capture the quasi-resonance behavior of massive probes at the strict extremal limit.", "url": "https://arxiv.org/abs/2603.19168", "type": "理论", "summary": "1. 该工作借助N=2 SU(2)规范理论（具有N_f=2味道）的量子几何，研究了渐进平坦极端Reissner-Nordstrom黑洞的中性标量微扰。\n2. 其技术核心在于将主导方程——双合流Heun方程——映射到Nekrasov-Shatashvili极限下的量子Seiberg-Witten曲线，并利用源自Nekrasov-Shatashvili自由能的量子化条件非微扰计算准正规模频率。\n3. 解析结果精确重现无质量场的数值基准，且捕捉了严格极端极限下大质量探针的准共振行为，这为黑洞微扰的精确解析研究及相关规范理论对应提供了新思路。", "summary_source": "deepseek", "authors": [{"name": "Yi-Rong Wang"}, {"name": "Peng Yang"}, {"name": "Kilar Zhang"}], "featured_authors": [{"name": "Yi-Rong Wang"}, {"name": "Peng Yang"}, {"name": "Kilar Zhang"}], "author_count": 3}, {"id": "2603.19174", "category": "hep-th", "title": "Perturbative approach to the infrared gluon propagator in the maximal Abelian gauge", "abstract": "The inclusion of a mass-like term for the gluon in Yang-Mills theories quantized in the Landau gauge has proven to be an effective way of reproducing lattice results for gauge-fixed correlation functions within perturbative computations. Since those quantities are gauge dependent, it is natural to question how general this prescription is for describing the infrared behavior of gluon and Faddeev-Popov ghost propagators in different gauges. In this work, we provide a systematic investigation of this issue in the maximal Abelian gauge, which cannot be deformed into the Landau gauge and has been investigated in gauge-fixed lattice simulations. We compute the one-loop non-Abelian and diagonal gluon propagators and perform fits to lattice data in the case of $SU(2)$. Our results show that the transverse component of the non-Abelian gluon propagator as well as the diagonal gluon propagator, are in good agreement with lattice data in the infrared.", "url": "https://arxiv.org/abs/2603.19174", "type": "理论", "summary": "1. 本研究将 Yang-Mills 理论中处理红外行为的质量项微扰方法，从朗道规范系统拓展至极大阿贝尔规范，并对 SU(2) 情形的非阿贝尔与对角胶子传播子进行了单圈计算与格点数据拟合。\n2. 其核心技术价值在于，在无法连续形变至朗道规范的极大阿贝尔规范中，该方法仍能成功描述红外区域非阿贝尔胶子传播子的横向分量以及对角传播子，且与格点模拟结果吻合。\n3. 这一结果为质量变形微扰方案在不同规范中的潜在普适性提供了有力证据，为理解规范依赖的关联函数红外行为及后续研究非微扰 QCD 开辟了途径。", "summary_source": "deepseek", "authors": [{"name": "D. M. van Egmond"}, {"name": "L. C. Ferreira"}, {"name": "A. D. Pereira"}, {"name": "G. Peruzzo"}, {"name": "S. P. Sorella"}], "featured_authors": [{"name": "D. M. van Egmond"}, {"name": "L. C. Ferreira"}, {"name": "A. D. Pereira"}, {"name": "G. Peruzzo"}, {"name": "S. P. Sorella"}], "author_count": 5}, {"id": "2603.18185", "category": "math-ph", "title": "Critical coupling thresholds for tilted Kuramoto-Vicsek models with a confining potential", "abstract": "We study a Kuramoto-Vicsek model of self-propelled particles with periodic boundary conditions subject to a constant angular tilt and a confining potential, and its mean-field (Fokker-Planck) behaviour. In the absence of confinement, the uniform density is stationary and we compute the critical coupling for four normalisation variants of the interaction kernel, showing that the leading instability is always spatially homogeneous. When the confining field is present, the uniform state is no longer stationary. We construct the new steady state perturbatively and apply eigenvalue perturbation theory to derive an explicit formula for the critical coupling as a function of the field strength. The threshold increases quadratically with confinement strength, and the tilt enters through the steady-state correction despite having no effect on the threshold in the absence of confinement. We verify the prediction numerically and derive self-consistency equations for stationary states with general multichromatic potentials.", "url": "https://arxiv.org/abs/2603.18185", "type": "理论", "summary": "1. 该工作研究了受恒定倾角与约束势作用的周期边界Kuramoto-Vicsek自驱动粒子模型及其平均场行为。\n2. 主要技术亮点在于微扰构造非均匀稳态，并解析导出了临界耦合强度随约束场强的二次增长函数关系。\n3. 所发展的自洽方程框架为处理一般多色势作用下的定态问题提供了系统的理论途径。", "summary_source": "deepseek", "authors": [{"name": "Benedetta Bertoli"}, {"name": "Benjamin D. Goddard"}, {"name": "Grigorios A. Pavliotis"}], "featured_authors": [{"name": "Benedetta Bertoli"}, {"name": "Benjamin D. Goddard"}, {"name": "Grigorios A. Pavliotis"}], "author_count": 3}, {"id": "2603.18362", "category": "math-ph", "title": "A Palatini Variational Formulation of Cosserat Elasticity", "abstract": "We present a Palatini-type geometric formulation of classical Cosserat elasticity in which the coframe and rotational connection are treated as independent variational fields. In contrast to conventional metric-based approaches, this formulation makes the underlying geometric structure explicit and separates translational and rotational degrees of freedom at the level of the action. The governing equations are obtained directly as Euler--Lagrange equations and yield the Cosserat force and moment balance laws without imposing compatibility constraints a priori. It is further shown that these balances arise naturally from invariance of the action under spatial translations and rotations via Noether's first theorem, providing a transparent variational interpretation of micropolar mechanics. A metric-free linearization recovers the classical strain and wryness measures and establishes equivalence with standard tensorial formulations under appropriate constitutive assumptions. The proposed framework clarifies the role of the connection field, which remains implicit in classical theories, and provides a unified geometric setting for Cosserat continua. In addition, it establishes the foundation for subsequent extensions in which torsion and curvature represent evolving defect densities and lead to mesoscopic theories of defect mechanics.", "url": "https://arxiv.org/abs/2603.18362", "type": "理论", "summary": "1. 该工作提出了一种基于 Palatini 变分原理的经典 Cosserat 弹性几何表述，将标架和旋转联络作为独立的变分场处理。\n2. 其核心在于，该表述在作用量层面明确分离了平移与旋转自由度，并通过 Euler-Lagrange 方程直接导出力与力矩平衡定律，无需先验施加相容性约束。\n3. 该框架为后续将挠率和曲率解释为演化的缺陷密度、并发展介观缺陷力学理论奠定了清晰的几何基础。", "summary_source": "deepseek", "authors": [{"name": "Lev Steinberg"}], "featured_authors": [{"name": "Lev Steinberg"}], "author_count": 1}, {"id": "2603.18416", "category": "math-ph", "title": "On the Finsler variational nature of autoparallels in metric-affine geometry", "abstract": "In metric-affine geometry, autoparallels are generically non-variational, i.e., they are not extremals of any action integral. The existence of a parameter-invariant action principle for autoparallels is a longstanding open problem, which is equivalent to the so-called Finsler metrizability of the connection, i.e., to the fact that these autoparallels can be interpreted as Finsler geodesics. In this article, we address this problem for the class of torsion-free affine connections with vectorial nonmetricity, which includes, as notable subcases, Weyl and Schrödinger connections. For this class, we determine the necessary and sufficient conditions for the existence of a Finsler Lagrangian that metrizes the connection and depends only algebraically on it. In the cases where such a Finsler Lagrangian exists, we construct it explicitly. In particular, we show that a broad class of such connections is Finsler metrizable.", "url": "https://arxiv.org/abs/2603.18416", "type": "理论", "summary": "1. 该工作针对具有矢量型非度量性的无挠仿射联络，解决了自平行线能否作为Finsler拉格朗日量测地线这一长期未决问题。\n2. 核心进展在于严格给出了联络可被仅依赖于其自身的代数Finsler拉格朗日量测度化的充要条件，并在此条件下显式构造了该拉格朗日量。\n3. 这一结果不仅为Weyl联络等重要特例提供了明确的变分原理，也为更广泛的度量-仿射几何理论建立了可计算的新判据。", "summary_source": "deepseek", "authors": [{"name": "Lehel Csillag"}, {"name": "Nicoleta Voicu"}, {"name": "Salah Elgendi"}, {"name": "Christian Pfeifer"}], "featured_authors": [{"name": "Lehel Csillag"}, {"name": "Nicoleta Voicu"}, {"name": "Salah Elgendi"}, {"name": "Christian Pfeifer"}], "author_count": 4}, {"id": "2603.18605", "category": "math-ph", "title": "Radiation damping of the soliton internal mode in 1D quadratic Klein-Gordon equation", "abstract": "We study long-time dynamics of small even perturbations of the soliton in 1D quadratic Klein-Gordon equation. The soliton possesses both an internal mode and the unstable mode. On a codimension-one manifold of fine-tuned initial data the instability is suppressed and the internal mode decays slowly by transferring energy into the continuum. We show that this decay and the associated nonlinear frequency shift are accurately captured by a cubic resonant approximation, with the damping rate determined by a Fermi golde rule-type coefficient. This provides a quantitative description of irreversible energy transfer from the internal mode to dispersive radiation.", "url": "https://arxiv.org/abs/2603.18605", "type": "理论", "summary": "1. 该工作研究了二维二次Klein-Gordon方程中孤子的小扰动在长时间尺度下的动力学演化，揭示了其内模通过辐射阻尼衰减的过程。\n2. 核心在于通过立方共振近似精确刻画了内模能量向连续谱的不可逆转移，其阻尼率由费米黄金定则型系数决定并伴随非线性频移。\n3. 这为理解非线性波动系统中孤立子内模的能量耗散机制提供了定量框架，可推广至其他具有离散模的非线性波方程研究。", "summary_source": "deepseek", "authors": [{"name": "Piotr Bizoń"}, {"name": "Tomasz Romańczukiewicz"}], "featured_authors": [{"name": "Piotr Bizoń"}, {"name": "Tomasz Romańczukiewicz"}], "author_count": 2}, {"id": "2603.18675", "category": "math-ph", "title": "The Lee-Yang property of isotropic vector ferromagnets and lattice fields", "abstract": "The Lee-Yang property of a given spin model means that its partition function has purely imaginary zeros as a function of an external magnetic field. A similar property is also used in the theory of quantum anharmonic crystals and quantum lattice fields. A number of powerful analytic methods of the mathematical theory of such models employ this property. Its suitable generalization is used in the theory of models of isotropic $D$-dimensional spins (rotors) or $D$-component quantum lattice fields. So far, the (generalized) Lee-Yang property has been established only for two-dimensional isotropic models. In this work, we prove that isotropic spin and field models living on $\\mathds{Z}$ have this property for all even $D$.", "url": "https://arxiv.org/abs/2603.18675", "type": "理论", "summary": "1. 该研究证明了定义在一维整数格点上的各向同性自旋模型与量子晶格场模型在所有偶数维度D下均满足广义李-杨性质。\n2. 其核心突破在于通过严谨的数学证明，将此前仅适用于二维模型的李-杨零点分析框架成功拓展至更高偶维情形。\n3. 这一结果为奇数维情形的研究指明了理论障碍，并为利用解析延拓方法研究高维连续相变开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Yuri Kozitsky"}], "featured_authors": [{"name": "Yuri Kozitsky"}], "author_count": 1}, {"id": "2603.19161", "category": "math-ph", "title": "Duality of generalized Maxwell theories as an equivalence in derived geometry", "abstract": "We propose a non-perturbative description of the moduli spaces encoding p-form generalized Maxwell theories in any dimension, using derived differential geometry. Our approach synthesizes the Batalin--Vilkovisky formalism with differential cohomology. Within this framework we formulate Dirac charge quantization and show how such charge-quantized moduli spaces exhibit abelian duality between generalized Maxwell theories of different types. We also describe the compactification of generalized Maxwell theories along closed Riemannian manifolds by computing the pushforward of the underlying sheaves of cochain complexes that model differential cohomology.", "url": "https://arxiv.org/abs/2603.19161", "type": "理论", "summary": "1. 该工作利用派生微分几何，提出了任意维度p形式广义麦克斯韦理论模空间的非微扰描述框架。\n2. 其核心在于融合Batalin-Vilkovisky形式体系与微分上同调，在此框架内表述了狄拉克电荷量子化，并揭示了电荷量子化模空间展现的不同类型理论间的阿贝尔对偶性。\n3. 这为在派生几何语言下统一处理广义规范理论的非微扰性质、对偶关系及紧致化问题提供了系统性方法。", "summary_source": "deepseek", "authors": [{"name": "Chris Elliott"}, {"name": "Owen Gwilliam"}, {"name": "Ingmar Saberi"}, {"name": "Brian R. Williams"}], "featured_authors": [{"name": "Chris Elliott"}, {"name": "Owen Gwilliam"}, {"name": "Ingmar Saberi"}, {"name": "Brian R. Williams"}], "author_count": 4}, {"id": "2603.18033", "category": "quant-ph", "title": "Asymptotic Expansions for Neural Network Approximations of Quantum Channels", "abstract": "This paper establishes the Quantum Voronovskaya--Damasclin (QVD) Theorem, providing a complete asymptotic characterization of Quantum Neural Network Operators in the approximation of arbitrary quantum channels. The result extends the classical Voronovskaya theorem from scalar approximation to the non-commutative operator framework of quantum information theory. We introduce rigorous quantum analogues of Sobolev and Hölder spaces defined through Fréchet differentiability in the Liouville representation and measured using the completely bounded (diamond) norm. Within this framework, we derive an explicit asymptotic expansion of the approximation error and identify the fundamental mechanisms governing convergence. The expansion separates integer-order differential contributions, fractional corrections associated with limited regularity, and intrinsically non-commutative effects arising from operator algebra structure. We also establish a sharp remainder estimate with explicit dependence on the regularity of the channel and the dimension of the underlying Hilbert space. Several applications demonstrate the scope of the theory. These include a quantum central limit theorem describing the fluctuation regime of quantum neural network operators, an optimal interpolation method based on operator geometric means, and a convergence acceleration procedure inspired by Richardson extrapolation. The results provide a rigorous mathematical foundation for the asymptotic analysis of quantum neural network models and establish a direct connection between classical approximation theory, operator algebras, and quantum information science, with implications for quantum algorithms and quantum machine learning.", "url": "https://arxiv.org/abs/2603.18033", "type": "理论+数值", "summary": "1. 该工作建立了量子Voronovskaya-Damasclin定理，为量子神经网络算子逼近任意量子信道提供了完整的渐近误差刻画。\n2. 其核心在于通过基于完全有界范数的量子Sobolev空间框架，将逼近误差显式分解为整数阶微分、分数阶修正及源自算子代数结构的非对易效应。\n3. 这为量子算法的误差分析与加速收敛提供了严格数学基础，并建立了经典逼近论、算子代数与量子信息科学之间的直接联系。", "summary_source": "deepseek", "authors": [{"name": "Rômulo Damasclin Chaves dos Santos"}], "featured_authors": [{"name": "Rômulo Damasclin Chaves dos Santos"}], "author_count": 1}, {"id": "2603.18047", "category": "quant-ph", "title": "Some Studies On Exact Solutions Of Models In Noncommutative Spaces", "abstract": "The central theme of my thesis is to explore various simple prototype models that are exactly solvable in the framework of time dependent noncommutative spaces. By adopting the methodology provided by the Lewis Riesenfeld theory, we developed a procedure for obtaining a class of exact solutions for such model systems. We analyzed these solutions by deriving the energy expectation values analytically and representing those energy dynamics graphically. We also examined the explicit existence of a non-zero Berry geometric phase in the noncommutative framework and analyzed the role of noncommutativity in generating a non-trivial Berry phase when the model Hamiltonian and the noncommutative parameters are periodic in time. Overall, my thesis contributes to a deeper understanding of quantum theory in time dependent noncommutative backgrounds and indicates a strong possibility for developing a consistent quantum theory within such frameworks.", "url": "https://arxiv.org/abs/2603.18047", "type": "理论", "summary": "1. 该工作利用刘易斯-里森菲尔德理论，研究了时间依赖非对易空间中模型的精确可解性。\n2. 其卖点在于通过解析能量期望值和图形化分析，揭示了非对易性在时间周期性条件下生成非平庸贝里相位的机制。\n3. 这为在非对易时变框架中发展一致的量子理论提供了重要启示。", "summary_source": "deepseek", "authors": [{"name": "Manjari Dutta"}], "featured_authors": [{"name": "Manjari Dutta"}], "author_count": 1}, {"id": "2603.18052", "category": "quant-ph", "title": "Cache Hierarchy and Vectorization Analysis of Lindblad Master Equation Simulation for Near-Term Quantum Control", "abstract": "Simulation of open quantum systems via the Lindblad master equation is a computational bottleneck in near-term quantum control workflows, including optimal pulse engineering (GRAPE), trajectory-based robustness analysis, and feedback controller design. For the system sizes relevant to near-term quantum control ($d = 3$ for a single transmon with leakage, $d = 9$ for two-qubit, and $d = 27$ for three-qubit), the dominant cost per timestep is a $(d^2 \\times d^2)$ complex matrix-vector multiplication: a $9\\times9$, $81\\times81$, or $729\\times729$ dense matvec, respectively. The working set sizes (1.5 KB, 105 KB, and 8.1 MB) straddle the L1, L2, and L3 cache boundaries of modern CPUs, making this an ideal system for cache-hierarchy performance analysis. We characterize the arithmetic intensity ($\\approx 1/2$ FLOP/byte in the large-$d$ limit), construct a Roofline model for the propagation kernel, and systematically vary compiler flags and data layout to isolate the contributions of auto-vectorization, fused multiply-add, and structure-of-arrays (SoA) memory layout. We show that SoA layout combined with -O3 -march=native -ffast-math yields $2$--$4\\times$ speedup over scalar array-of-structures baselines, and that -ffast-math is essential for enabling GCC auto-vectorization of complex arithmetic. These results motivate a set of concrete recommendations for authors of quantum simulation libraries targeting near-term system sizes.", "url": "https://arxiv.org/abs/2603.18052", "type": "理论+数值", "summary": "1. 该工作针对近量子控制中开放系统模拟的Lindblad主方程计算瓶颈，系统分析了其核心矩阵-向量乘法核在CPU缓存层次中的性能特性。\n2. 通过结合结构数组内存布局与特定编译器优化标志，实现了2-4倍加速，并揭示了快速数学编译选项对复数运算自动向量化的关键作用。\n3. 这一系统级的性能分析方法为面向中等规模量子系统的模拟库开发提供了具体的架构与编译优化指导。", "summary_source": "deepseek", "authors": [{"name": "Rylan Malarchick"}], "featured_authors": [{"name": "Rylan Malarchick"}], "author_count": 1}, {"id": "2603.18060", "category": "quant-ph", "title": "Reinforcement Learning for Fast and Robust Longitudinal Qubit Readout", "abstract": "Longitudinal coupling offers a compelling pathway for quantum nondemolition (QND) readout, but pulse design is constrained by hardware limitations such as the coupling strength and the photon number required to stay within the linear regime. We develop a reinforcement learning framework to optimize the longitudinal coupling waveform under such constraints. Building upon the theoretical foundation of shortcuts to adiabaticity (STA), we parameterize an auxiliary trajectory with cubic B-splines and reconstruct the physical control. At a fixed short readout time, the optimized pulse converges to a constraint saturating flat-top protocol and yields a approximately $50\\%$ improvement in $\\mathrm{SNR}$ over an STA baseline, while exhibiting enhanced robustness to parameter drifts. Simulation results demonstrate the efficacy of reinforcement learning in optimizing longitudinal readout pulses. The optimized protocol attains substantial performance gains and yields smooth, hardware-compatible waveforms governed by an interpretable ``saturate-and-hold'' mechanism.", "url": "https://arxiv.org/abs/2603.18060", "type": "数值", "summary": "1. 本文开发了一种基于强化学习的框架，用于在硬件约束下优化纵向耦合量子比特读取的波形设计。\n2. 该方法通过B样条参数化辅助轨迹并重构物理控制，在固定读取时间内得到饱和约束的平顶协议，使信噪比较基准提升约50%，且对参数漂移更具鲁棒性。\n3. 所获得的平滑、硬件兼容的波形及其可解释的“饱和-保持”机制，为高效鲁棒的量子非破坏性读取的实际实现提供了明确路径。", "summary_source": "deepseek", "authors": [{"name": "Yiming Yu"}, {"name": "Yuan Qiu"}, {"name": "Xinyu Zhao"}, {"name": "Ye-Hong Chen"}, {"name": "Yan Xia"}], "featured_authors": [{"name": "Yiming Yu"}, {"name": "Yuan Qiu"}, {"name": "Xinyu Zhao"}, {"name": "Ye-Hong Chen"}, {"name": "Yan Xia"}], "author_count": 5}, {"id": "2603.18097", "category": "quant-ph", "title": "One Key Good, L Keys Better: List Decoding Meets Quantum Privacy Amplification", "abstract": "We introduce list privacy amplification (LPA), a relaxation of the final step of quantum key distribution (QKD) in which Alice and Bob extract a list of $L$ candidate keys from a raw string correlated with an eavesdropper Eve, with the guarantee that at least one key is perfectly secret while Eve cannot identify which. This parallels list decoding in error-correcting codes: relaxing unique decoding to list decoding increases the decoding radius; analogously, list extraction increases achievable key length beyond the standard quantum leftover hash lemma (QLHL). Within the abstract cryptography framework, we formalise LPA and prove the \\emph{Quantum List Leftover Hash Lemma} (QLLHL): an $L$-list of $\\ell$-bit keys can be extracted from an $n$-bit source with smooth min-entropy $k$ iff \\[ \\ell \\le k + \\log L - 2\\log(1/\\epsilon) - 3, \\] yielding a tight additive $\\log L$ gain over QLHL. This gain arises because the index of the secure key is chosen after hashing and hidden from Eve, effectively contributing $\\log L$ bits of entropy. Applying QLLHL to BB84-type QKD, a list size $L = 2^{\\alpha n'}$ increases the tolerable phase-error threshold from $h^{-1}(1 - h(e_b))$ to $h^{-1}(1 - h(e_b) + \\alpha)$, exceeding the standard $\\approx 11\\%$ bound for any $\\alpha > 0$. We prove tightness via a matching intercept-resend attack, establish composability with Wegman--Carter authentication, and present two constructions: a polynomial inner-product hash over $\\mathbb{F}_{2^m}$ and a Toeplitz-based variant, running in $O(nL)$ and $O(nL \\log n)$ time.", "url": "https://arxiv.org/abs/2603.18097", "type": "理论", "summary": "1. 本文提出了列表隐私放大（LPA）方案，该方案通过允许从与窃听者相关的原始字符串中提取L个候选密钥，放松了量子密钥分发（QKD）的最终步骤。\n2. 其核心贡献在于证明并形式化了量子列表剩余哈希引理（QLLHL），该定理表明提取的密钥长度相比标准QLHL可获得一个与log L相关的严格可加性增益。\n3. 该理论应用于BB84类协议时，能将可容忍的相位错误阈值提升至超过标准上限约11%，并通过匹配攻击证明了紧致性，为实际QKD系统提升密钥率和鲁棒性提供了清晰的理论路径。", "summary_source": "deepseek", "authors": [{"name": "Prateek P. Kulkarni"}], "featured_authors": [{"name": "Prateek P. Kulkarni"}], "author_count": 1}, {"id": "2603.18110", "category": "quant-ph", "title": "Improved quantum circuits for division", "abstract": "Arithmetic operations are an important component of many quantum algorithms. As such, coming up with optimized quantum circuits for these operations leads to more efficient implementations of the corresponding algorithms. In this paper, we develop new fault-tolerant quantum circuits for various integer division algorithms (both reversible and non-reversible). These circuits, when implemented in the Clifford+T gate set, achieve an up to 76.08\\% and 68.35\\% reduction in T-count and CNOT-count, respectively, compared to previous circuit constructions. Some of our circuits also improve the asymptotic T-depth from $O(n^2)$ to $O(n \\log n),$ where $n$ is the bit-length of the dividend. The qubit counts are also lower than in previous works. We achieve this by expressing the division algorithms in terms of a primitive we call COMP-N-SUB, that compares two integers and conditionally subtracts them. We show that this primitive can be implemented at a cost, in terms of both Clifford and non-Clifford gates, that is comparable to one addition. This is in contrast to performing comparison and conditional subtraction separately, whose cost would be comparable to a controlled addition plus a regular addition.", "url": "https://arxiv.org/abs/2603.18110", "type": "理论+数值", "summary": "1. 本文为多种整数除法算法设计了新型容错量子电路，显著降低了T门数量、CNOT门数量、T深度以及量子比特开销。\n2. 核心创新在于引入COMP-N-SUB原语，将比较与条件减法整合为单一模块，其门代价仅相当于一次加法，远低于分别执行两者的成本。\n3. 这一方法为优化其他量子算术运算电路提供了明确路径，有望整体提升依赖此类基础运算的量子算法的实现效率。", "summary_source": "deepseek", "authors": [{"name": "Priyanka Mukhopadhyay"}, {"name": "Alexandru Gheorghiu"}, {"name": "Hari Krovi"}], "featured_authors": [{"name": "Priyanka Mukhopadhyay"}, {"name": "Alexandru Gheorghiu"}, {"name": "Hari Krovi"}], "author_count": 3}, {"id": "2603.18181", "category": "quant-ph", "title": "Fully selective charging of a quantum battery by a purely quantum charger", "abstract": "In this paper we discuss a protocol for charging a two-level quantum battery using a bipartite charger composed of two quantum harmonic oscillators. As one of its features, it allows us to fully charge the battery and is universally optimal in the regime of a single excitation added as energy input. We also make use of a selective interaction to extend the protocol for a different class of quantum states and show that, in this case, the presence of quantum coherence can be harnessed as energetic resource to charge multiple similar batteries. Among these, we also explore symmetries of the derived effective dynamics to quickly discuss how the same protocol can be adapted to the task of \\textit{active state resetting}, a task which is particularly useful in the quantum computation area.", "url": "https://arxiv.org/abs/2603.18181", "type": "理论", "summary": "1. 该工作提出了一种利用双模量子谐振子作为纯量子充电器、对两能级量子电池实现完全选择性充电的协议。\n2. 其核心在于通过选择性相互作用，在单激发输入条件下实现普适最优充电，并利用量子相干性作为能量资源为多个同类电池充电。\n3. 这为拓展协议至主动量子态重置等量子计算任务提供了有效动力学框架与对称性分析基础。", "summary_source": "deepseek", "authors": [{"name": "Yohan Vianna"}, {"name": "Marcelo F. Santos"}], "featured_authors": [{"name": "Yohan Vianna"}, {"name": "Marcelo F. Santos"}], "author_count": 2}, {"id": "2603.18187", "category": "quant-ph", "title": "Towards spintronics via tunneling through asymmetric barriers", "abstract": "Spin transport typically relies on direct manipulation of the spin degree of freedom via magnetic fields, spin-orbit coupling, or engineered spin-dependent potentials. We show theoretically that directional spin currents can arise in a relatively simple setting - a one-dimensional interacting fermionic ring with static, spin-independent asymmetric barriers. By introducing asymmetric potential barrier geometry, spin-resolved circulating currents emerge on a closed chain even for symmetric initial configurations. The effect can be enhanced or reversed by appropriate initial state preparation and tuning the barrier asymmetry to resonant conditions.", "url": "https://arxiv.org/abs/2603.18187", "type": "理论+数值", "summary": "1. 该工作理论上证明了一维相互作用费米子环中静态、自旋无关的不对称势垒可产生定向自旋流。\n2. 其核心机制在于势垒几何结构的不对称性可打破对称性，在闭合环中诱导出与自旋相关的循环电流。\n3. 该效应揭示了无需磁场或自旋轨道耦合即可调控自旋输运的新途径，为简化自旋电子学器件设计提供了原理性启示。", "summary_source": "deepseek", "authors": [{"name": "Elvira Bilokon"}, {"name": "Valeriia Bilokon"}, {"name": "Stanislava Litvinova"}, {"name": "Denys I. Bondar"}, {"name": "Andrii Sotnikov"}], "featured_authors": [{"name": "Elvira Bilokon"}, {"name": "Valeriia Bilokon"}, {"name": "Stanislava Litvinova"}, {"name": "Denys I. Bondar"}, {"name": "Andrii Sotnikov"}], "author_count": 5}, {"id": "2603.18188", "category": "quant-ph", "title": "Dissipative Phase Transition in a Parametrically Amplified Quantum Rabi Model with Two-photon decay", "abstract": "We investigate dissipative phase transitions (DPTs) in a parametrically amplified open quantum Rabi model (QRM) with both single- and two-photon decay. In the classical oscillator limit, four composite phases emerge, arising from the possible normal or superradiant regimes across the upper and lower spin branches. A mean-field analysis reveals an ``inverted\" regime where superradiance emerges only at sufficiently low spin-boson coupling. This regime features first- and second-order DPTs separated by a tricritical point, while two-photon dissipation preserves the stability of the superradiant phase. Utilizing an adiabatic approach and the semi-classical Langevin formalism, we further study the steady-state structure beyond the mean-field level. We show that the tricriticality stems from the intrinsic nonlinearity of QRM, unveiled by the interplay of coherent and dissipative two-photon processes. The universality classes of the DPTs are identified, with the corresponding critical and finite-size scaling exponents derived and a scaling ansatz proposed to describe the critical behavior.", "url": "https://arxiv.org/abs/2603.18188", "type": "理论+数值", "summary": "1. 该工作研究了含单光子和双光子耗散的参数放大量子拉比模型中的耗散相变，揭示了四类复合相的存在及超越平均场的稳态结构。\n2. 核心发现是相干与耗散双光子过程的相互作用揭示了体系的内禀非线性，导致在足够低耦合下才出现超辐射的“反转”区域，以及由三临界点分隔的一级和二级相变。\n3. 所确定的普适类、推导的临界与有限尺寸标度指数以及提出的标度假说，为理解非线性开放量子体系的临界行为提供了定量框架。", "summary_source": "deepseek", "authors": [{"name": "Mingjian Zhu"}, {"name": "Han Pu"}], "featured_authors": [{"name": "Mingjian Zhu"}, {"name": "Han Pu"}], "author_count": 2}, {"id": "2603.18193", "category": "quant-ph", "title": "On Non-Existence of Stabilizer Absolutely Maximally Entangled States in Even Local Dimensions", "abstract": "We demonstrate that absolutely maximally entangled (AME) states consisting of $N=4k$ qudits with $k\\in\\mathbb{N}_+$, each of even local dimension, cannot be realized as graph states. This result imposes strong constraints on AME states in composite local dimensions and characterizes the limitations of graph-state constructions for highly entangled multipartite quantum systems. In particular, this study provides an independent solution of the recently discussed case of the AME state of four quhexes and clarifies its characterization within the stabilizer formalism, complementing the results of Cha [ arXiv:2603.13442 ].", "url": "https://arxiv.org/abs/2603.18193", "type": "理论", "summary": "1. 该研究证明了由$N=4k$个局部维度为偶数的qudit构成的绝对最大纠缠态无法实现为图态。\n2. 这一结果对复合局部维度下的AME态施加了强约束，揭示了图态构造在高纠缠多体量子系统中的固有局限性。\n3. 该工作独立解决了四quhex系统的AME态存在问题，并在稳定子形式体系内澄清了其性质，为多体纠缠分类提供了新见解。", "summary_source": "deepseek", "authors": [{"name": "Jakub Wójcik"}, {"name": "Owidiusz Makuta"}, {"name": "Wojciech Bruzda"}, {"name": "Remigiusz Augusiak"}], "featured_authors": [{"name": "Jakub Wójcik"}, {"name": "Owidiusz Makuta"}, {"name": "Wojciech Bruzda"}, {"name": "Remigiusz Augusiak"}], "author_count": 4}, {"id": "2603.18213", "category": "quant-ph", "title": "Preprocessing noise in finite-size quantum key distribution", "abstract": "It is known that preprocessing noise may boost quantum key distribution by expanding the range of values of tolerated noise. For BB84, adding trusted noise may allow the generation of secret keys even for qubit error rate (QBER) beyond the 11% threshold in the asymptotic regime. Here we study the effect of preprocessing noise in the finite-size regime where only a limited number of signals are exchanged between Alice and Bob. We compute tight numerical lower bounds in terms of the sandwiched Rényi entropy of order alpha, optimized via a two-step Frank-Wolfe algorithm, in the presence of a trusted flipping probability q. We find that trusted noise improves the key rate only for a finite interval of alpha, from the alpha -> 1 limit up to alpha approx 1.4. By optimizing on the value of alpha, we determine finite-size key rates for different values of the QBER, observing enhancement due to trusted noise both in asymptotic and finite-size regimes. Finally, we determine the maximum tolerable QBER as a function of the block size.", "url": "https://arxiv.org/abs/2603.18213", "type": "理论+数值", "summary": "1. 该工作在有限长量子密钥分发的框架下，系统研究了预处理噪声对密钥生成率的影响，并给出了基于夹层Rényi熵的紧致数值下界。\n2. 其核心发现是，可信噪声仅在α趋于1至约1.4的有限区间内能提升密钥率，通过优化α参数和两步Frank-Wolfe算法实现了对密钥率的精确估计。\n3. 这为实际有限长QKD系统中，依据块大小确定最大可容忍比特错误率提供了定量依据，并明确了预处理噪声的适用范围。", "summary_source": "deepseek", "authors": [{"name": "Gabriele Staffieri"}, {"name": "Giuseppe D'Ambruoso"}, {"name": "Giovanni Scala"}, {"name": "Cosmo Lupo"}], "featured_authors": [{"name": "Gabriele Staffieri"}, {"name": "Giuseppe D'Ambruoso"}, {"name": "Giovanni Scala"}, {"name": "Cosmo Lupo"}], "author_count": 4}, {"id": "2603.18217", "category": "quant-ph", "title": "Operator dynamics in k-Markov random circuits", "abstract": "We demonstrate that $k$-Markov sequences of unitary gates provide low-cost handles to manipulate the rate and structure of information spreading compared to traditional random, 0-Markov, circuits. For SWAP gates and brickwork circuits, we use graph cover time to demonstrate how $k$-Markov processes can be used to control operator transport. With SWAP gates and the set of Clifford gates that can change operator weight, we show how $k$-Markov sequences can be used to manipulate scrambling time and generate novel structures of spatial-temporal correlations across a qubit network. We show that $k$-Markov circuits constructed from PSWAP gates at fixed angle are equivalent to standard brickwork circuits with PSWAP angle drawn from non-uniform distributions generated by the $k$-Markov process. In those circuits, the time evolution of the average Hamming weight and the space-time correlation structure after equilibrium again vary significantly from the 0-Markov case, depending on the transition probabilities of the process.", "url": "https://arxiv.org/abs/2603.18217", "type": "理论", "summary": "1. 该工作系统研究了k-Markov随机电路中算符动力学与信息传播特性，并与传统0-Markov电路进行了对比。\n2. 其核心在于利用k-Markov过程实现对算符传输速率、扰乱时间及时空关联结构的可控调制。\n3. 这为在量子网络中按需设计信息扩散行为与相关结构提供了新的理论框架与调控思路。", "summary_source": "deepseek", "authors": [{"name": "Unnati Akhouri"}, {"name": "Pei-Jun Huang"}, {"name": "Elliott Rose"}, {"name": "Sarah Shandera"}], "featured_authors": [{"name": "Unnati Akhouri"}, {"name": "Pei-Jun Huang"}, {"name": "Elliott Rose"}, {"name": "Sarah Shandera"}], "author_count": 4}, {"id": "2603.18318", "category": "quant-ph", "title": "Efficient Soft-Output Guessing for Enhanced Quantum Tanner Code Decoding", "abstract": "We introduce a generalized low-density parity-check decoding framework for quantum Tanner codes utilizing soft-output guessing random additive noise decoding (SOGRAND). By soft-output decoding entire component codes, we mitigate trapping sets and cycles, resulting in improved convergence. SOGRAND, combined with ordered statistic decoding (OSD) post-processing, outperforms the standard belief propagation plus OSD baseline by up to three orders of magnitude in logical error rate, providing a way forward for scalable decoding of the emerging class of Tanner-code-based quantum codes.", "url": "https://arxiv.org/abs/2603.18318", "type": "理论", "summary": "1. 该工作为量子坦纳码引入了一种基于软输出猜测随机加性噪声解码的广义低密度奇偶校验解码框架。\n2. 其技术核心在于通过对整个分量码进行软输出解码，有效缓解了陷阱集和循环结构对译码收敛的阻碍。\n3. 该方法为基于坦纳码构造的量子纠错码实现可扩展译码提供了切实可行的技术路径。", "summary_source": "deepseek", "authors": [{"name": "Lukas Rapp"}, {"name": "Muriel Médard"}, {"name": "Eugene Tang"}, {"name": "Ken R. Duffy"}], "featured_authors": [{"name": "Lukas Rapp"}, {"name": "Muriel Médard"}, {"name": "Eugene Tang"}, {"name": "Ken R. Duffy"}], "author_count": 4}, {"id": "2603.18451", "category": "quant-ph", "title": "Inhomogeneous mass trap for dark-state polaritons in atomic media", "abstract": "The generation of a trapping potential for dark-state polaritons in a two-dimensional electromagnetically induced transparency system is theoretically studied. We show that such a trap can arise from a spatially inhomogeneous effective mass of the dark-state polariton. Because this mass inhomogeneity can be engineered by tuning the parameters of the control fields, the motion, spatial profile, and coherent behavior of bound dark-state polaritons can be tailored accordingly. Our results enable spatial controls of optical information and provide a possible route toward realizing Bose-Einstein condensation of dark-state polaritons in a trapping potential.", "url": "https://arxiv.org/abs/2603.18451", "type": "理论", "summary": "1. 该工作从理论上研究了二维电磁感应透明系统中暗态极化子的囚禁势生成。\n2. 其技术关键在于通过调控控制场参数设计空间非均匀的有效质量，从而定制束缚暗态极化子的动力学行为。\n3. 这为光学信息的空间操控及实现暗态极化子在势阱中的玻色-爱因斯坦凝聚提供了可行路径。", "summary_source": "deepseek", "authors": [{"name": "Ding-An Chen"}, {"name": "Kai-You Huang"}, {"name": "Chun-Yen Hsu"}, {"name": "Meng-Cheng Xie"}, {"name": "Ite A. Yu"}, {"name": "Wen-Te Liao"}], "featured_authors": [{"name": "Ding-An Chen"}, {"name": "Kai-You Huang"}, {"name": "Chun-Yen Hsu"}, {"name": "Meng-Cheng Xie"}, {"name": "Ite A. Yu"}, {"name": "Wen-Te Liao"}], "author_count": 6}, {"id": "2603.18457", "category": "quant-ph", "title": "Simulating Quantum Error Correction beyond Pauli Stochastic Errors", "abstract": "Quantum error correction (QEC), the lynchpin of fault-tolerant quantum computing (FTQC), is designed and validated against well-behaved Pauli stochastic error models. But in real-world deployment, QEC protocols encounter a vast array of other errors -- coherent and non-Pauli errors -- whose impacts on quantum circuits are vastly different than those of stochastic Pauli errors. The impacts of these errors on QEC and FTQC protocols have been largely unpredictable to date due to exponential classical simulation cost. Here, we show how to accurately and efficiently model the effects of coherent and non-Pauli errors on FTQC, and we study the effects of such errors on syndrome extraction for surface and bivariate bicycle codes, and on magic state cultivation. Our analysis suggests that coherent error can shift fault-tolerance thresholds, increase the space-time cost of magic state cultivation, and can increase logical error rates by an order of magnitude compared to equivalent stochastic errors. These analyses are enabled by a new technique for mapping any Markovian circuit-level error model with sufficiently small error rates onto a detector error model (DEM) for an FTQC circuit. The resulting DEM enables Monte Carlo estimation of logical error rates and noise-adapted decoding, and its parameters can be analytically related to the underlying physical noise parameters to enable approximate strong simulation.", "url": "https://arxiv.org/abs/2603.18457", "type": "理论+数值", "summary": "1. 该工作发展了一个框架，用于高效模拟相干与非泡利误差对容错量子计算的影响，并应用于表面码、双变量自行车码的校验子提取与魔术态制备。\n2. 其技术核心在于将任意马尔可夫电路级噪声模型映射至容错量子电路的探测器误差模型，从而支持逻辑错误率的蒙特卡洛估计与噪声自适应解码。\n3. 这揭示了相干误差会显著改变容错阈值、增加魔术态制备的资源开销，并为现实噪声下的量子纠错协议设计提供了关键评估工具。", "summary_source": "deepseek", "authors": [{"name": "Jordan Hines"}, {"name": "Corey Ostrove"}, {"name": "Kenneth Rudinger"}, {"name": "Stefan Seritan"}, {"name": "Kevin Young"}, {"name": "Robin Blume-Kohout"}, {"name": "Timothy Proctor"}], "featured_authors": [{"name": "Jordan Hines"}, {"name": "Corey Ostrove"}, {"name": "Kenneth Rudinger"}, {"name": "Kevin Young"}, {"name": "Robin Blume-Kohout"}, {"name": "Timothy Proctor"}], "author_count": 7}, {"id": "2603.18509", "category": "quant-ph", "title": "Gravitational Wave-Induced Scrambling Delay in SYK Wormhole Teleportation", "abstract": "Traversable wormhole teleportation in the Sachdev-Ye-Kitaev (SYK) model links quantum channel integrity to black hole interior dynamics, using teleportation fidelity to probe holographic scrambling. We subject the SYK boundary to a gravitational-wave (GW)-inspired periodic Floquet deformation, mimicking a leading-order metric-strain perturbation from the JT-gravity dictionary. We characterize the channel response via exact numerical time evolution with disorder averaging at $\\beta J = 2$. The drive produces a coherent, frequency-selective fidelity suppression, yielding four main results: (i) two amplitude regimes separated near $\\varepsilon \\sim J$ (perturbative sensing vs.\\ strong-drive); (ii) the channel acts as a low-pass filter, most sensitive at $\\omega \\lesssim \\beta^{-1}$ with monotone recovery above the thermal scale; (iii) an inspiral chirp drive delays the fidelity peak by $\\Delta t_{\\rm scr}^{(\\rm fid)} = +0.11\\, J^{-1}$, corroborated by an out-of-time-order correlator (OTOC) diagnostic ($\\Delta t_{\\rm scr}^{(\\rm OTOC)} = +0.20\\, J^{-1}$), establishing a genuine scrambling delay; and (iv) the effects persist across $N \\in \\{10, 12, 14, 16\\}$ Majorana modes, indicating no systematic finite-size suppression. These results establish that holographic teleportation channels degrade gracefully under GW-inspired boundary deformations, with direct implications for near-term quantum processor implementations of traversable wormholes.", "url": "https://arxiv.org/abs/2603.18509", "type": "理论+数值", "summary": "1. 本文研究了受引力波启发的周期Floquet形变对SYK模型中可穿越虫洞传态信道的影响。\n2. 核心发现是信道呈现低通滤波特性，并在啁啾驱动下产生了可被保真度峰值和OTOC共同验证的 ~0.1-0.2 J⁻¹ 的相干扰乱延迟。\n3. 该结果为在近期量子处理器上稳健实现全息虫洞传态协议提供了直接的理论依据与实验指导。", "summary_source": "deepseek", "authors": [{"name": "Sudhanva Joshi"}, {"name": "Sunil Kumar Mishra"}], "featured_authors": [{"name": "Sudhanva Joshi"}, {"name": "Sunil Kumar Mishra"}], "author_count": 2}, {"id": "2603.18560", "category": "quant-ph", "title": "High-threshold magic state distillation with quantum quadratic residue codes", "abstract": "We present applications of quantum quadratic residue codes in magic state distillation. This includes showing that existing codes which are known to distill magic states, like the $5$-qubit perfect code, the $7$-qubit Steane code, and the $11$-qutrit and $23$-qubit Golay codes, are equivalent to certain quantum quadratic residue codes. We also present new examples of quantum quadratic residue codes that distill qubit $T$ states and qutrit Strange states with high thresholds, and we show that there are infinitely many quantum quadratic residue codes that distill $T$ states with a non-trivial threshold. All of these codes, including the codes with the highest currently known thresholds for $T$ state and Strange state distillation, are unified under the umbrella of quantum quadratic residue codes.", "url": "https://arxiv.org/abs/2603.18560", "type": "理论", "summary": "1. 本文系统研究了量子二次剩余码在魔术态蒸馏中的应用，并将多个已知的高性能蒸馏码统一纳入该框架。\n2. 该工作不仅揭示了无限多类具有非平凡阈值的T态蒸馏码的存在性，还构造了当前已知阈值最高的T态与Strange态蒸馏实例。\n3. 这为基于代数编码理论系统设计容错量子计算所需的魔术态蒸馏协议提供了统一视角与新的探索方向。", "summary_source": "deepseek", "authors": [{"name": "Michael Zurel"}, {"name": "Santanil Jana"}, {"name": "Nadish de Silva"}], "featured_authors": [{"name": "Michael Zurel"}, {"name": "Santanil Jana"}, {"name": "Nadish de Silva"}], "author_count": 3}, {"id": "2603.18592", "category": "quant-ph", "title": "Distribution of fidelity zeros in two-band topological models", "abstract": "We investigate the distribution of fidelity zeros in two-band topological models by extending the phase transition driving parameter into the complex plane. Within the biorthogonal formulation, we unveil that fidelity zeros are related to momentum modes for which the real part of the energy gap vanishes. Guided by this relation, we analyze the Kitaev chain, the Haldane model, and the Qi-Wu-Zhang (QWZ) model. In finite-size systems the zeros form discrete lines parallel to the imaginary axis, while in the thermodynamic limit they accumulate into extended regions in the complex parameter plane. For the Kitaev and Haldane models, the accessible interval of the real part of the complexified parameter is bounded by the critical points of the corresponding topological transitions. For the QWZ model, the transitions at $u = \\pm2$ are identified in the same way, whereas the critical point at $u = 0$ is signaled by fidelity zeros crossing the real axis. These results extend the fidelity-zero framework to topological quantum phase transitions and clarify how critical information is encoded in complexified parameter space.", "url": "https://arxiv.org/abs/2603.18592", "type": "理论", "summary": "1. 该工作通过将拓扑相变驱动参数延拓至复平面，研究了双能带拓扑模型中保真度零点的分布。\n2. 核心在于揭示了保真度零点与实部能隙为零的动量模相关，并在有限尺寸与热力学极限下分别呈现离散线与扩展区域的分布特征。\n3. 这一框架将保真度零点分析扩展到拓扑量子相变，明确了临界点信息在复参数空间中的编码方式。", "summary_source": "deepseek", "authors": [{"name": "Siyan Lin"}, {"name": "Zhen-Yu Zheng"}, {"name": "Shu Chen"}], "featured_authors": [{"name": "Siyan Lin"}, {"name": "Zhen-Yu Zheng"}, {"name": "Shu Chen"}], "author_count": 3}, {"id": "2603.18665", "category": "quant-ph", "title": "Schrödinger Bridges via the Hacking of Bayesian Priors in Classical and Quantum Regimes", "abstract": "Bayes' rule is widely regarded as the canonical prescription for belief updating. We show, however, that one can arbitrarily preserve pre-specified beliefs while appearing to perform Bayesian updates via \"prior hacking\": engineering a reference prior distribution such that, for a fixed channel and evidence, the update matches a chosen target distribution. We prove that this is generically possible in both classical and quantum settings whenever Bayesian inversions are well-defined (with the Petz recovery map as the quantum analogue to Bayes' rule), and provide constructive algorithms for doing so. We further establish a duality between prior hacking and Schrödinger bridge problems (a key object in statistical physics with applications in generative modelling), yielding in the quantum setting a unique, inference-consistent selection among candidate bridges. This formally establishes the Bayes-like updating that Schrödinger bridges are performing with respect to the process as opposed to the reference prior, both in classical and quantum settings.", "url": "https://arxiv.org/abs/2603.18665", "type": "理论+数值", "summary": "1. 该工作揭示了在经典与量子体系中，通过“先验黑客”操作可任意维持预设信念，同时表面上遵循贝叶斯更新，并建立了该方法与薛定谔桥问题的对偶关系。\n2. 其技术核心在于证明了当贝叶斯逆运算良定义时，通过设计参考先验分布可使更新匹配任意目标分布，并为经典与量子情形（对应佩茨恢复映射）提供了构造算法。\n3. 这为统计物理中的薛定谔桥问题提供了明确的贝叶斯解释，确立了量子场景下推理一致的桥选择方案，对生成建模等应用具有理论基础意义。", "summary_source": "deepseek", "authors": [{"name": "Clive Cenxin Aw"}, {"name": "Peter Sidajaya"}], "featured_authors": [{"name": "Clive Cenxin Aw"}, {"name": "Peter Sidajaya"}], "author_count": 2}, {"id": "2603.18731", "category": "quant-ph", "title": "A generalized framework for quantum subspace diagonalization", "abstract": "We present a framework for computing the solution to Hamiltonian eigenproblems in a subspace defined by bit-strings sampled from a quantum computer. Hamiltonians are represented using an extended alphabet that includes projection and ladder operators, yielding a unified solution method for qubit and fermionic systems. Operators are grouped and sorted so
