<head>

  <title>arXiv 2026-03-20 · Daily ArXiv Selection</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.18040", "category": "cond-mat", "title": "Lightweight phase-field surrogate for modelling ductile-to-brittle transition through phenomenological elastoplastic coupling", "abstract": "The ductile-to-brittle transition (DBT) in body-centred cubic systems is a central design constraint for cryogenic structures. Performing parametric studies to enhance the understanding on DBT using fully coupled thermomechanical continuum DBT models is computationally expensive. Therefore, in this work, a lightweight phase-field surrogate is proposed. This surrogate approach captures key \\emph{DBT-like} trends within a standard isothermal two-field (displacement--damage) setting by prescribing temperature dependence through three phenomenological mechanisms: (i) a temperature-dependent degradation exponent $n(T)$ that sharpens stiffness loss from gradual (ductile-like, $n=2.0$ at 293\\,K) to abrupt (brittle-like, $n=3.5$ at 77\\,K), (ii) temperature-dependent yield stress and elastic modulus to modulate the balance between plastic dissipation and elastic energy storage, and (iii) an effective fracture toughness and driving-force scaling to represent reduced crack-tip shielding at cryogenic temperatures. The model is implemented in FEniCSx using small-strain $J_2$ return mapping and a staggered solution scheme. Simulations of a single-edge-notched specimen over 77--293\\,K demonstrate a systematic progression from brittle-like to ductile-like response, characterised by reduced displacement to unstable fracture, a transition from abrupt post-peak load drop to extended softening, and a shift from narrow, localised damage bands with confined plasticity to broader process zones. A sensitivity study comparing four interpolation schemes (linear, smoothstep, exponential, hybrid) shows that the qualitative transition trends are robust, with interpolation primarily affecting intermediate-temperature responses while endpoint behaviours remain unchanged.", "url": "https://arxiv.org/abs/2603.18040", "type": "理论+数值", "summary": "1. 该工作提出了一种轻量化的相场替代模型，通过在标准等温位移-损伤双场框架中引入三个唯象的温度依赖机制，来模拟体心立方材料在77–293 K温度范围内的韧脆转变行为。\n2. 模型的核心优势在于以极低计算成本再现了韧脆转变的关键趋势，包括通过温度依赖的退化指数控制刚度损失锐度、通过屈服应力与弹性模量调节塑性能耗散、以及通过有效断裂韧性表征低温下裂纹尖端屏蔽减弱效应。\n3. 该模型为深低温结构材料的参数化研究与设计优化提供了高效计算工具，其采用的唯象耦合机制可拓展至其他存在显著温度效应与损伤-塑性竞争的材料体系。", "summary_source": "deepseek", "authors": [{"name": "P G Kubendran Amos"}], "featured_authors": [{"name": "P G Kubendran Amos"}], "author_count": 1}, {"id": "2603.18125", "category": "cond-mat", "title": "Spin-Charge Groups for Fermions in Fluids and Crystals: General Structures and Physical Consequences", "abstract": "Known symmetry groups are not sufficient to handle various couplings between spin, charge and spatial degrees of freedom for fermions. To fill in this gap, we introduce the spin-charge groups (SCG) to describe the most general symmetries of fermionic systems. These groups are composed of the spin and charge operations as the `internal' symmetries, the spatial and temporal operations as `external' symmetries, couplings between them, and projective twists. After providing the general group structures of SCG, we study their potential applications in concrete physical systems, including $^3$He superfluids, charge-4e superconductors, collinear magnets with spin-fluxes, and superconductors with coexisting magnetic orders. We show that SCG can give rise to extra band degeneracies, Chern numbers and cross spin-charge responses like spin-supercurrents. Hence SCG provide a route to classify and explore new phases of matter even when strong interactions are included.", "url": "https://arxiv.org/abs/2603.18125", "type": "理论", "summary": "1. 该工作针对费米子系统中自旋、电荷与空间自由度间的耦合问题，提出了自旋电荷群（SCG）作为描述其最一般对称性的理论框架。\n2. 其核心在于构建了包含内禀对称性、外部时空对称性、两者间的耦合以及投影扭转的完整群结构，并应用于超流氦-3、电荷4e超导体等具体体系。\n3. 该框架不仅可预言额外的能带简并、陈数和交叉自旋-电荷响应，更为包含强相互作用的物质新相分类与探索提供了系统性路径。", "summary_source": "deepseek", "authors": [{"name": "Arist Zhenyuan Yang"}, {"name": "Zheng-Xin Liu"}], "featured_authors": [{"name": "Arist Zhenyuan Yang"}, {"name": "Zheng-Xin Liu"}], "author_count": 2}, {"id": "2603.18137", "category": "cond-mat", "title": "Disentangling Shear and Compression Phonons: Route to Anomalous Magnetothermal Transport", "abstract": "Magnetothermal transport in various frustrated magnets exhibits striking field-dependent anomalies that deviate from conventional magnon or phonon transport. Here we show that symmetry-constrained spin-lattice coupling naturally leads to mode-selective spin-phonon interactions that control heat transport. In the strong spin-orbit coupling limit, we derive an effective spin-phonon Hamiltonian in which phonons with different polarizations couple selectively to distinct spin operators. As a result, compression and shear phonon modes contribute to spin heat current across different magnetic-field regimes. Using a Landauer transport framework combined with exact diagonalization of spin chains coupled to a phonon bath, we show that this mechanism produces a characteristic peak-dip-peak structure in the field dependence of heat current, providing a microscopic explanation for field-induced transport anomalies in spin-orbit-coupled Mott insulators.", "url": "https://arxiv.org/abs/2603.18137", "type": "理论+数值", "summary": "1. 该工作通过构建对称性约束的自旋-晶格耦合模型，揭示了强自旋轨道耦合体系中剪切与压缩声子对磁热输运的不同贡献机制。\n2. 其核心在于推导出声子偏振态与自旋算符的选择性耦合哈密顿量，并结合朗道尔输运框架与精确对角化计算，成功重现了热电流随磁场的峰值-谷值-峰值特征结构。\n3. 这为理解自旋轨道耦合莫特绝缘体中磁场诱导的输运异常提供了微观理论基石，并为设计声子模式分辨的热控器件开辟了新思路。", "summary_source": "deepseek", "authors": [{"name": "Haoting Xu"}, {"name": "Antoine Matar"}, {"name": "Hae-Young Kee"}], "featured_authors": [{"name": "Haoting Xu"}, {"name": "Antoine Matar"}, {"name": "Hae-Young Kee"}], "author_count": 3}, {"id": "2603.18148", "category": "cond-mat", "title": "Removing nodal and support-mismatch pathologies in Variational Monte Carlo via blurred sampling", "abstract": "Variational Monte Carlo (VMC) is a powerful and fast-growing method for optimizing and evolving parameterized many-body wave functions, especially with modern neural-network quantum states. In practice, however, the stochastic estimators that form the backbone of the method can become unstable or biased due to the presence of nodes, a ubiquitous feature of quantum wave functions. In the continuum, this results in heavy-tailed estimators with potentially divergent variances, while in discrete Hilbert spaces the sampling distribution can miss parts of the support needed to form unbiased estimators. These statistical pathologies lead to unreliable optimization trajectories in stochastic reconfiguration or incorrect variational dynamics in time-dependent Variational Monte Carlo (t-VMC), and severely limit the power of the numerical simulations. We introduce blurred sampling to address these difficulties. The method has a number of rigorous properties that make it well-behaved, effective and efficient. Additionally it is a post-processing approach that can be used without modifying the underlying sampler and incurs only minimal overhead. We demonstrate its effectiveness on several representative examples where standard sampling approaches are known to fail, and apply it to large-scale problems in spin dynamics. This work establishes a broadly applicable framework for robust VMC and t-VMC calculations.", "url": "https://arxiv.org/abs/2603.18148", "type": "数值", "summary": "1. 本文针对变分蒙特卡洛（VMC）与含时变分蒙特卡洛（t-VMC）中因波函数节点与支撑失配导致的估计量不稳定与有偏问题，提出了一种名为模糊采样的后处理方法。\n2. 该方法的核心优势在于无需修改底层采样器，仅引入极小计算开销，即可有效消除方差发散、支撑缺失等统计病态，从而确保随机重整化与变分动力学模拟的可靠性。\n3. 这一框架为在大规模自旋动力学等复杂量子多体系统的稳健VMC模拟提供了通用解决方案，显著扩展了神经量子态等现代波函数优化方法的适用范围。", "summary_source": "deepseek", "authors": [{"name": "Zhou-Quan Wan"}, {"name": "Roeland Wiersema"}, {"name": "Shiwei Zhang"}], "featured_authors": [{"name": "Zhou-Quan Wan"}, {"name": "Roeland Wiersema"}, {"name": "Shiwei Zhang"}], "author_count": 3}, {"id": "2603.18159", "category": "cond-mat", "title": "Origin of Edge Currents in Chiral Active Liquids", "abstract": "Chiral active liquids exhibit unidirectional edge currents when confined to simple geometries, but the origin of this phenomenon has defied explanation. Starting from the microscopic equations of motion of a simple two-dimensional model, we find that localized edge currents emerge as a consequence of global angular momentum conservation in dense systems. From these underlying equations, we derive an Ohmic-like conductance law for the mean edge current in the dense phase, and we find it to be intensive, depending only on the density, active torque and substrate drag. For simple geometries, we find the distribution of the edge currents has a closed Gaussian form, with a variance that is intensive, depending only on temperature, density and the aspect ratio of the system. These results are validated numerically using extensive molecular dynamics simulations. These results provide a new perspective for studying the collective phenomena in active matter through the global balance of conserved quantities.", "url": "https://arxiv.org/abs/2603.18159", "type": "理论+数值", "summary": "1. 该工作从微观运动方程出发，结合分子动力学模拟，揭示了简单几何约束下手性活性液体产生单向边缘电流的微观起源。\n2. 其核心物理在于阐明了密集系统中全局角动量守恒会导致局域化的边缘流，并推导出仅依赖于密度、主动力矩和阻力的内禀类欧姆电导律。\n3. 这为通过守恒量的全局平衡来理解活性物质集体现象提供了新的理论视角和研究框架。", "summary_source": "deepseek", "authors": [{"name": "Faisal Alsallom"}, {"name": "David T. Limmer"}], "featured_authors": [{"name": "Faisal Alsallom"}, {"name": "David T. Limmer"}], "author_count": 2}, {"id": "2603.18194", "category": "cond-mat", "title": "In-plane magnetic response and Maki parameter of alternating-twist multilayers", "abstract": "We analytically study the orbital response of alternating-twist graphene systems with four and five layers to an in-plane magnetic field, using the unitary transformation introduced by Khalaf et al. (Phys. Rev. B 100, 085109 (2019)). This transformation maps an alternating-twist N-layer system onto N/2 decoupled twisted bilayer graphene (TBG) systems with distinct effective twist angles, together with a single decoupled layer for odd N, thereby generating a hierarchy of N/2 magic angles. For five layers, we find that the orbital in-plane magnetic response is negligibly small, and we expect this property to hold for all systems with an odd number of layers. For a tetralayer system, we approximately express the in-plane orbital susceptibility in terms of the corresponding TBG responses, which are large compared to the spin susceptibility and even diverge in the clean limit at charge neutrality near the magic angle. Remarkably, the in-plane magnetic response is strongly angle dependent: compared with TBG, it is about 0.01 times smaller at the first magic angle, whereas at the second it reaches about 3.6 times the value of magic angle TBG. We finally introduce the in-plane Maki parameter as the ratio between the difference in orbital susceptibility of the normal and superconducting states and the paramagnetic Pauli susceptibility. For TBG, we find values up to 2 near the magic angle. Our analysis can be extended to other response functions and suggests that the different effective magic angles in alternating-twist multilayers may host distinct superconducting phases.", "url": "https://arxiv.org/abs/2603.18194", "type": "理论", "summary": "1. 该工作解析研究了四层和五层交替扭转石墨烯体系在面内磁场中的轨道响应，利用幺正变换将体系映射为解耦的扭转双层石墨烯单元。\n2. 研究发现，奇数层体系的面内轨道磁响应可忽略，而四层体系的响应可近似表达为扭转双层石墨烯响应之和，且在特定魔角附近呈现强烈角度依赖性与发散行为。\n3. 此分析框架可扩展至其他响应函数，暗示交替扭转多层中不同的有效魔角可能承载不同的超导相，为后续实验探测提供了明确理论依据。", "summary_source": "deepseek", "authors": [{"name": "Igor Vasilevskiy"}, {"name": "Miguel Sánchez Sánchez"}, {"name": "Khadija Challaouy"}, {"name": "Dionisios Margetis"}, {"name": "Guillermo Gómez-Santos"}, {"name": "Tobias Stauber"}], "featured_authors": [{"name": "Igor Vasilevskiy"}, {"name": "Miguel Sánchez Sánchez"}, {"name": "Khadija Challaouy"}, {"name": "Dionisios Margetis"}, {"name": "Guillermo Gómez-Santos"}, {"name": "Tobias Stauber"}], "author_count": 6}, {"id": "2603.18205", "category": "cond-mat", "title": "Tackling the Sign Problem in the Doped Hubbard Model with Normalizing Flows", "abstract": "The Hubbard model at finite chemical potential is a cornerstone for understanding doped correlated systems, but simulations are severely limited by the sign problem. In the auxiliary-field formulation, the spin basis mitigates the sign problem, yet severe ergodicity issues have limited its use. We extend recent advances with normalizing flows at half-filling to finite chemical potential by introducing an annealing scheme enabling ergodic sampling. Compared to state-of-the-art hybrid Monte Carlo in the charge basis, our approach accurately reproduces exact diagonalization results while reducing statistical uncertainties by an order of magnitude, opening a new path for simulations of doped correlated systems.", "url": "https://arxiv.org/abs/2603.18205", "type": "理论+数值", "summary": "1. 该工作通过引入退火方案，将归一化流技术扩展到有限化学势下的掺杂哈伯德模型，解决了自旋基中的遍历性问题。\n2. 相比电荷基下的混合蒙特卡洛方法，该方法能精确复现精确对角化结果，并将统计不确定性降低一个数量级。\n3. 这为掺杂关联系统的数值模拟开辟了新途径，有望推动强关联电子物理的理论与计算研究。", "summary_source": "deepseek", "authors": [{"name": "Dominic Schuh"}, {"name": "Lena Funcke"}, {"name": "Janik Kreit"}, {"name": "Thomas Luu"}, {"name": "Simran Singh"}], "featured_authors": [{"name": "Dominic Schuh"}, {"name": "Lena Funcke"}, {"name": "Janik Kreit"}, {"name": "Thomas Luu"}, {"name": "Simran Singh"}], "author_count": 5}, {"id": "2603.18270", "category": "cond-mat", "title": "Synthesis, Solvent-dependent Self-Assembly and Partial Oxidation of Ultrathin Cerium Fluoride Nanoplatelets", "abstract": "Two-dimensional colloidal nanoplatelets (NPLs) with atomically defined thickness exhibit unique physical properties, yet understanding their formation mechanism and assembly remains essential for tuning their collective behavior. We report an optimized synthesis of triangular cerium-based NPLs with narrow size and shape distributions via thermal decomposition of cerium trifluoroacetate. Combining X-ray diffraction, XPS, and high-resolution STEM, we show that the expected CeF3 NPL structure undergoes partial oxidation, yielding an oxyfluoride composition CeOxFy. Beyond their composition, we investigate how these oleic acid-capped NPLs organize in solution and at interfaces. The choice of solvent governs both the solution-phase organization and the resulting superstructures formed upon evaporation at the liquid--air interface. In solvents that promote face-to-face stacking in solution, evaporation produces films organized into columnar assemblies tens of micrometers long, with the NPL planes oriented perpendicular to the interface. In contrast, solvents in which NPLs remain individually dispersed yield extended hexagonally ordered superlattices with edge-to-edge stacking spanning several micrometers, where the NPLs lie parallel to the interface in an edge-to-edge arrangement. These results highlight that solvent-mediated interactions and pre-existing organization in solution are decisive factors in determining the outcome of evaporative self-assembly of colloidal nanocrystals.", "url": "https://arxiv.org/abs/2603.18270", "type": "理论+数值", "summary": "1. 本文报道了通过三氟乙酸铈热分解优化合成三角形铈基纳米片，并系统研究了其部分氧化产物组成及溶剂依赖的自组装行为。\n2. 关键发现是纳米片实际组成为CeOxFy氧氟化物，且溶剂性质直接决定其在溶液中的预组织模式，进而主导蒸发后形成面向堆叠柱状组装体或边对边六方超晶格两种截然不同的宏观结构。\n3. 该结果明确揭示了溶剂介导的相互作用及溶液相预组织是决定胶体纳米晶体蒸发自组装结局的决定性因素，为精准调控二维纳米材料集体行为提供了普适性原理。", "summary_source": "deepseek", "authors": [{"name": "Chiara Moretti"}, {"name": "Damien Alloyeau"}, {"name": "Benjamin Aymoz Laurent Lermusiaux"}, {"name": "Rodolphe Valleix"}, {"name": "Benoit Mahler"}, {"name": "Marianne Impéror-Clerc"}, {"name": "Benjamin Abécassis"}], "featured_authors": [{"name": "Chiara Moretti"}, {"name": "Damien Alloyeau"}, {"name": "Benjamin Aymoz Laurent Lermusiaux"}, {"name": "Benoit Mahler"}, {"name": "Marianne Impéror-Clerc"}, {"name": "Benjamin Abécassis"}], "author_count": 7}, {"id": "2603.18278", "category": "cond-mat", "title": "Symmetric Mass Generation in a Bilayer Honeycomb Lattice with $\\mathrm{SU}(2)\\times\\mathrm{SU}(2)\\times\\mathrm{SU}(2)/\\mathbb{Z}_2$ Symmetry", "abstract": "Symmetric mass generation (SMG) is a mechanism for generating mass gaps in fermionic systems without breaking any symmetries or developing topological order, challenging the conventional Landau paradigm. In this Letter, we provide numerically exact evidence for SMG in (2+1) dimensions through large-scale determinant quantum Monte Carlo (DQMC) simulations of a bilayer honeycomb lattice model with $\\mathrm{SU}(2)\\times\\mathrm{SU}(2)\\times\\mathrm{SU}(2)/\\mathbb{Z}_2$ symmetry. We observe the simultaneous opening of single-particle and bosonic gaps at a critical coupling $J_c \\approx 2.6$ with correlation length exponent $\\nu = 1.14(2)$, while an exhaustive search over all 19 symmetry-inequivalent fermion bilinear order parameters confirms the absence of any symmetry breaking. We estimate the fermion anomalous dimension to be $\\eta_\\psi = 0.071(1)$, which deviates significantly from the large-$N$ prediction ($\\eta_\\psi \\approx 0.595$) and variational Monte Carlo estimates ($\\eta_\\psi \\approx 0.62$), pointing to a distinct universality class. By contrasting with a related $\\mathrm{Spin}(5)\\times\\mathrm{U}(1)/\\mathbb{Z}_2$ model that develops an intermediate excitonic phase, we demonstrate the crucial role of pure non-Abelian symmetry in prohibiting bilinear condensates and enforcing the direct SMG transition.", "url": "https://arxiv.org/abs/2603.18278", "type": "理论+数值", "summary": "1. 该工作通过大规模行列式量子蒙特卡洛模拟，在具有特定对称性的双层蜂窝晶格模型中，为(2+1)维对称质量生成提供了数值精确的证据。\n2. 核心发现是在临界耦合处同时打开单粒子与玻色能隙且未检测到任何对称性破缺，并测得显著偏离大N预言的费米子反常维度，标志着一个新的普适类。\n3. 通过对比揭示纯非阿贝尔对称性在禁止双线性凝聚与直接SMG转变中的关键作用，为超越朗道范式的量子临界现象研究提供了明确范例。", "summary_source": "deepseek", "authors": [{"name": "Cheng-Hao He"}, {"name": "Yi-Zhuang You"}, {"name": "Xiao Yan Xu"}], "featured_authors": [{"name": "Cheng-Hao He"}, {"name": "Yi-Zhuang You"}, {"name": "Xiao Yan Xu"}], "author_count": 3}, {"id": "2603.18285", "category": "cond-mat", "title": "Continuous symmetry analysis and systematic identification of candidate order parameters for interacting fermion models", "abstract": "Symmetry plays a central role in modern physics, from classifying quantum states to characterizing phases of matter through spontaneous symmetry breaking. In interacting fermionic systems with multiple internal degrees of freedom, however, determining the full continuous symmetry group and classifying possible order parameters remain challenging. In this work, we present a systematic framework for analyzing continuous symmetries and identifying candidate order parameters in such systems. By mapping the Hamiltonian to a Majorana representation, we obtain the generators of continuous symmetries from the Lie algebra of operators that commute with the Hamiltonian. We then identify the structure of this Lie algebra using the theory of semisimple Lie algebras. Building on representation theory, we further develop a systematic method for exhaustively enumerating candidate order parameters. By decomposing the exterior-power representations induced by the symmetry algebra on the Majorana space and incorporating discrete lattice symmetries, we classify these order parameters according to the symmetries they break. (Abridged. Please see the PDF manuscript for the complete abstract and specific model applications.)", "url": "https://arxiv.org/abs/2603.18285", "type": "理论", "summary": "1. 该工作发展了一种基于李代数的系统框架，用以分析多自由度相互作用费米子模型的连续对称性，并穷举候选序参量。\n2. 其方法核心在于将哈密顿量映射到马约拉纳算符表示，利用半单李代数理论识别对称性生成元，并通过对称性代数在格拉斯曼空间诱导的外幂表示分解来分类序参量。\n3. 这一框架为系统探索特定晶格模型中的新颖量子相及其相变，以及指导相关量子模拟平台的实验探测提供了理论基础。", "summary_source": "deepseek", "authors": [{"name": "Cheng-Hao He"}, {"name": "Yi-Zhuang You"}, {"name": "Xiao Yan Xu"}], "featured_authors": [{"name": "Cheng-Hao He"}, {"name": "Yi-Zhuang You"}, {"name": "Xiao Yan Xu"}], "author_count": 3}, {"id": "2603.18286", "category": "cond-mat", "title": "Anderson transition in disordered Hatano-Nelson systems", "abstract": "We illuminate the fundamental mechanism responsible for the transition between the non-Hermitian skin effect and defect-induced Anderson localization in the bulk via the study of Lyapunov exponents. We obtain a proof that the change of the topological invariant associated with an eigenvalue coincides with the eigenvector crossover from non-Hermitian skin effect to Anderson localization, establishing a universal criterion for localization behavior.", "url": "https://arxiv.org/abs/2603.18286", "type": "理论", "summary": "1. 该工作通过李亚普诺夫指数研究，阐明了无序哈塔诺-尼尔森体系中体态非厄米趋肤效应与缺陷诱导安德森局域化相变的基本机制。\n2. 严格证明了拓扑不变量随能量的变化与特征向量从非厄米趋肤效应到安德森局域化的交叉行为同步发生，确立了局域化行为的普适判据。\n3. 这一拓扑-局域化对应关系为理解非厄米系统中无序与拓扑的相互作用提供了新范式，可推广至更广泛的非厄米物相研究。", "summary_source": "deepseek", "authors": [{"name": "Silvio Barandun"}], "featured_authors": [{"name": "Silvio Barandun"}], "author_count": 1}, {"id": "2603.18316", "category": "cond-mat", "title": "From Atomistic Models to Machine Learning: Predictive Design of Nanocarbons under Extreme Conditions", "abstract": "The formation of technologically valuable nanocarbon structures under extreme conditions, such as those produced during high-explosive detonations, remains poorly understood but holds significant potential for the development of controlled synthesis pathways. While detonation shockwaves provide the HPHT environment required for nanodiamond formation, subsequent cooling and decompression dictate whether the diamond phase is preserved or transformed into other nanocarbon structures. Here, we employ GPU-accelerated ReaxFF simulations to investigate the graphitization and structural remodeling of detonation nanodiamond under nonlinear quench and pressure-release conditions. We further investigate how the initial nanodiamond morphology influences the resulting transformation products. Evolution of nanostructure, allotrope, carbon hybridization, and ring statistics are tracked. Rapid cooling combined with slow decompression optimizes cubic diamond retention, whereas slow cooling with rapid pressure release promotes surface-to-core graphitization, producing concentric sp2 layers and hollowed inner shells. Octahedral nanodiamonds evolve into carbon nano-onions, initially forming bucky diamonds that progressively transform into full sp2 structures, while hexagonal prisms preferentially form parallel-stacked graphite layers resembling carbon dots. Lonsdaleite emerges as an interfacial phase, suggesting potential reversibility in the shock-induced graphite-to-diamond transformation pathway transformation route. To extend predictive capabilities, we trained MLP regressors on over 10^5 node-hours of simulations. The model reliably predicts the number of graphitized layers from T-P trajectories with R^2 exceeding 0.90. Collectively, morphological control combined with optimized quench-decompression conditions promote the selective synthesis of nanocarbon allotropes.", "url": "https://arxiv.org/abs/2603.18316", "type": "理论+数值", "summary": "1. 本研究结合GPU加速的ReaxFF反应力场模拟与机器学习势函数回归器，系统研究了极端条件下爆轰纳米金刚石在不同淬火-减压路径中的结构演化与相变产物。\n2. 揭示了非线性热力学路径与初始纳米颗粒形貌的协同效应：快速冷却结合慢速减压利于保留立方金刚石，而慢速冷却结合快速卸压导致由表及里的石墨化；八面体颗粒易形成碳纳米洋葱，六角柱体则倾向于生成类碳点的平行堆叠石墨层。\n3. 所构建的机器学习模型能够根据温度-压力轨迹高精度预测石墨化层数，这为通过主动控制淬火动力学与初始形貌来实现特定纳米碳同素异形体的定向合成提供了定量设计框架。", "summary_source": "deepseek", "authors": [{"name": "Xiaoli Yan"}, {"name": "Millicent A. Firestone"}, {"name": "Murat Keceli"}, {"name": "Santanu Chaudhuri"}, {"name": "Eliu Huerta"}], "featured_authors": [{"name": "Xiaoli Yan"}, {"name": "Millicent A. Firestone"}, {"name": "Murat Keceli"}, {"name": "Santanu Chaudhuri"}, {"name": "Eliu Huerta"}], "author_count": 5}, {"id": "2603.18317", "category": "cond-mat", "title": "Asymmetric Energy Landscapes Control Diffusion in Glasses", "abstract": "While diffusion in crystalline solids is quantitatively understood through defect-mediated atomic hops, no comparable quantitative framework exists for glasses. In these systems, the origin of large diffusion activation energies remains puzzling, despite local rearrangements involving low barriers. Using molecular dynamics simulations of metallic glasses, we decompose diffusion into random-walk and correlation contributions and find that back-and-forth correlated motion, not local rearrangement barriers, dominates the activation energy, resolving how low-barrier rearrangements yield large macroscopic activation energies. These correlations arise from asymmetry between forward and reverse barriers, a generic feature of disordered energy landscapes. We find that the correlation-driven mechanism is active beyond metallic glass alloys, including SiO2 and a single-component Lennard-Jones glass. The latter demonstrates that the correlation originates from structural disorder rather than chemical complexity. The framework also explains accelerated surface diffusion, where reduced activation energies arise primarily from weaker correlations rather than changes in local rearrangement barriers. Our results establish a direct, quantitative link between atomic-scale dynamics and macroscopic transport, providing a predictive basis for kinetics in disordered materials.", "url": "https://arxiv.org/abs/2603.18317", "type": "理论+数值", "summary": "1. 该研究通过分子动力学模拟，将金属玻璃、SiO2及单组分Lennard-Jones玻璃等非晶材料中的扩散分解为随机行走与关联贡献，系统探究了扩散活化能的微观起源。\n2. 其物理卖点在于揭示了扩散活化能主要由前向与反向势垒不对称性引发的关联运动主导，而非局域重排势垒，这一机制源于结构无序的普适能量景观。\n3. 这为建立原子尺度动力学与宏观输运性质的定量关联提供了预测框架，可解释表面扩散加速等现象，并对无序材料动力学研究具有广泛启发。", "summary_source": "deepseek", "authors": [{"name": "Ajay Annamareddy"}, {"name": "Bu Wang"}, {"name": "Paul M. Voyles"}, {"name": "Izabela Szlufarska"}, {"name": "Dane Morgan"}], "featured_authors": [{"name": "Ajay Annamareddy"}, {"name": "Bu Wang"}, {"name": "Paul M. Voyles"}, {"name": "Izabela Szlufarska"}, {"name": "Dane Morgan"}], "author_count": 5}, {"id": "2603.18445", "category": "cond-mat", "title": "Spatially Indirect Exciton Condensation in Two-Dimensional Strongly Correlated Semimetals", "abstract": "Identifying materials hosting an excitonic insulator ground state has been one of the major pursuits in condensed matter physics in recent years. Promising candidates in transition metal chalcogenide compounds (TMC), including $1T-\\mathrm{TiSe_2}$, $\\mathrm{Ta_2Pd_3Te_5}$, and $\\mathrm{Ta_2NiSe_5}$, share a crucial common characteristic: their low-energy physics is governed by electrons in $d-$ orbitals subject to strong on-site Coulomb interactions. In this work, we investigate spatially indirect exciton condensation in two-dimensional semimetals on triangular lattice. Using a combination of dynamical mean-field theory and the determinant quantum Monte Carlo method, we study two- and three-orbital Hubbard models incorporating strong on-site ($U$) and inter-orbital interactions ($V$). Our results demonstrate that on-site Hubbard $U$ can strongly suppress the condensation temperature $T_c$, an effect that is particularly pronounced at higher electron-hole pair densities. This behavior contrasts sharply with the case without on-site $U$, where $T_c$ grows with pair density at fixed $V$. Moreover, we uncover competition among multiple electron-hole pairing channels in the three-orbital model, which also acts to suppress $T_c$ of exciton condensation. An orbital-selective electron-hole pairing state is identified. These findings may help explain the large discrepancy between strong binding-energy and relative low transition temperature for indirect excitons in TMCs materials, offering important insights for understanding and engineering exciton condensation in materials with strongly correlated $d-$ shell electrons.", "url": "https://arxiv.org/abs/2603.18445", "type": "理论+数值", "summary": "1. 本工作采用动力学平均场理论与行列式量子蒙特卡洛方法，系统研究了二维三角晶格强关联半金属中两轨道及三轨道哈伯德模型的空间间接激子凝聚。\n2. 关键发现是，在位哈伯德U强烈抑制凝聚温度Tc（尤其在高对密度下），且三轨道模型中多配对通道竞争进一步压低Tc，并识别出轨道选择性电子-空穴配对态。\n3. 这些结果有望解释过渡金属硫族化物材料中间接激子强结合能与低转变温度间的显著差异，为强关联d电子系统中激子凝聚的设计与理解提供了机制性启示。", "summary_source": "deepseek", "authors": [{"name": "Yao Zeng"}, {"name": "Shi-Cong Mo"}, {"name": "Wéi Wú"}], "featured_authors": [{"name": "Yao Zeng"}, {"name": "Shi-Cong Mo"}, {"name": "Wéi Wú"}], "author_count": 3}, {"id": "2603.18486", "category": "cond-mat", "title": "Phase Transitions in a Modified Ising Spin Glass Model: A Tensor-Network-based Sampling Approach", "abstract": "Phase transitions in a modified Nishimori model, including the model considered by Kitatani, on a two-dimensional square lattice are investigated using a tensor-network-based sampling scheme. In this model, generating bond configurations is computationally demanding because of the correlated random interactions. The employed sampling method enables hierarchical and independent sampling of both bonds and spins. This approach allows high-precision calculations for system sizes up to $L=256$. The results provide clear numerical evidence that the spin-glass and ferromagnetic transitions are separated on the Nishimori line, supporting the existence of an intermediate Mattis-like spin-glass phase. This finding is consistent with the reentrant transition numerically observed in the two-dimensional Edwards-Anderson (EA) model. Furthermore, critical exponents estimated via finite-size-scaling analysis indicate that the universality class of the transitions differs from that of the standard independent and identically distributed EA model.", "url": "https://arxiv.org/abs/2603.18486", "type": "理论+数值", "summary": "1. 本研究采用基于张量网络的抽样方案，探究了二维正方格子上改进型西岛模型（包括北谷模型）的相变行为。\n2. 其技术核心在于实现了对关联随机相互作用键与自旋的分层独立抽样，从而在高达L=256的系统尺寸上完成了高精度计算。\n3. 所得临界指数表明该相变的普适类不同于标准独立同分布爱德华兹-安德森模型，这为理解更广泛自旋玻璃系统的普适性分类提供了新视角。", "summary_source": "deepseek", "authors": [{"name": "Takumi Oshima"}, {"name": "Yamato Arai"}, {"name": "Koji Hukushima"}], "featured_authors": [{"name": "Takumi Oshima"}, {"name": "Yamato Arai"}, {"name": "Koji Hukushima"}], "author_count": 3}, {"id": "2603.18515", "category": "cond-mat", "title": "Stationary $1/f^α$ noise in discrete models of the Kardar-Parisi-Zhang class", "abstract": "In discrete models describing growing rough interfaces of the Kardar-Parisi-Zhang universality class, we examine height fluctuations at a fixed site as a function of time in the monolayer unit. For small systems, we show that it is possible to reach the stationary state. We compute the two-time autocorrelation and power spectra independently. The correlation function remains non-exponential and vanishes after a correlation time that diverges with system size. As a result, the power spectra display a lower cutoff that maintains constant power. In the nontrivial frequency regime, we observe $1/f^{\\alpha}$-type scaling with the spectral exponent 5/3. Finite-size scaling reveals that the temporal correlation function follows a dynamic scaling. Our findings, supported by scaling-theoretical arguments, establish that the fluctuations are wide-sense stationary, implying applicability of the Wiener-Khinchin theorem.", "url": "https://arxiv.org/abs/2603.18515", "type": "理论+数值", "summary": "1. 本研究在描述 Kardar-Parisi-Zhang 普适类粗糙界面生长的离散模型中，通过考察单层单元内固定点高度随时间涨落，实现了小系统的平稳态并独立计算了双时间自相关函数与功率谱。\n2. 核心物理卖点在于关联函数保持非指数形式且关联时间随系统尺寸发散，导致功率谱在非平凡频率区间呈现指数为 5/3 的 1/f^α 型标度，同时涨落满足广义平稳性，从而确立了维纳-辛钦定理的适用性。\n3. 这些发现基于标度理论论证，为 KPZ 类系统的动力学标度行为提供了有限尺寸标度证据，并为研究类似随机过程中的平稳噪声特性提供了新理论基准。", "summary_source": "deepseek", "authors": [{"name": "Rahul Chhimpa"}, {"name": "Avinash Chand Yadav"}], "featured_authors": [{"name": "Rahul Chhimpa"}, {"name": "Avinash Chand Yadav"}], "author_count": 2}, {"id": "2603.18522", "category": "cond-mat", "title": "Quasiparticle dynamics and hydrodynamics of 1d hard rod gas on diffusion scale", "abstract": "We investigate the stochastic dynamics of a quasiparticle within a gas of hard rods, focusing on the evolution of its mean, variance, and autocorrelation for two choices of initial states: (i) one with long-range (LR) correlations and (ii) the other without it. We derive analytical results for the phase space density correlations in the former case to complement the known results for the latter case. These results enable us to obtain expressions for the mean, variance, and autocorrelation of a quasiparticle, which are applicable to both initial states. The LR correlations introduce a diffusive-scale correction to the mean Euler generalized hydrodynamic (GHD) equations, modifying the standard local equilibrium form, and our findings reveal that the form of the correction term depends on the LR correlations present in the initial state.", "url": "https://arxiv.org/abs/2603.18522", "type": "理论", "summary": "1. 该工作研究了一维硬杆气体中准粒子的随机动力学，通过分析两种初始状态（有无长程关联）下其均值、方差与自相关的演化，补充并统一了相关解析结果。\n2. 核心发现是长程关联会在扩散尺度上修正平均欧拉广义流体动力学方程，使其偏离标准局域平衡形式，且修正项的具体形式依赖于初始关联结构。\n3. 这为理解非平衡系统中初始长程关联对输运过程的持久影响提供了定量框架，并可推广至其他可积模型的多体动力学研究。", "summary_source": "deepseek", "authors": [{"name": "Anupam Kundu"}], "featured_authors": [{"name": "Anupam Kundu"}], "author_count": 1}, {"id": "2603.18618", "category": "cond-mat", "title": "Non-equilibrium (thermo)dynamics of colloids under mobile piston compression", "abstract": "We investigate the non-equilibrium compression of a confined hard-sphere colloidal fluid driven by a mobile boundary within dynamical density functional theory. The system consists of a fluid confined between two parallel walls, one acting as an overdamped piston subjected to a sudden increase in external pressure. The piston motion is controlled by a mobility parameter $K$, which sets the relative timescale between mechanical driving and diffusive relaxation. By varying $K$ over several orders of magnitude, we identify a crossover from quasi-static compression to a diffusion-limited strongly driven regime. For small $K$, the system evolves close to equilibrium and the total injected work approaches the equilibrium free-energy difference. For large $K$, the piston rapidly adjusts and the dynamics becomes governed by diffusive relaxation, leading to saturation in the piston trajectory, pressure--position relation, particle currents, and center-of-mass velocity. In this regime, the injected work and entropy production are bounded, reflecting constraints imposed by diffusive transport. The maximum injected power scales linearly with $K$, while the entropy-production peak exhibits a crossover from quadratic growth to saturation, with peak times displaying $1/K$ scaling. The entropy change of the thermal bath interpolates between a reversible limit and a strongly driven dissipative regime. Finally, the evolution of configurational entropy and external potential energy reveals a dynamical decoupling between confinement and structural relaxation, including transient non-monotonic behavior. These results provide a quantitative thermodynamic characterization of boundary-driven compression.", "url": "https://arxiv.org/abs/2603.18618", "type": "理论+数值", "summary": "1. 该工作基于动态密度泛函理论，研究了由可移动边界驱动的受限硬球胶体流体的非平衡压缩过程。\n2. 研究揭示了由活塞迁移率K控制的、从准静态压缩到扩散受限强驱动机制的交叉行为，阐明了注入功与熵产生在两种极限下的标度律与饱和特性。\n3. 这为边界驱动受限系统的非平衡热力学提供了定量框架，并为理解强驱动下约束与结构弛豫的动态解耦指明了方向。", "summary_source": "deepseek", "authors": [{"name": "Arturo Moncho-Jordá"}, {"name": "José López-Molina"}, {"name": "Joachim Dzubiella"}], "featured_authors": [{"name": "Arturo Moncho-Jordá"}, {"name": "José López-Molina"}, {"name": "Joachim Dzubiella"}], "author_count": 3}, {"id": "2603.18650", "category": "cond-mat", "title": "DeePAW: A universal machine learning model for orbital-free ab initio calculations", "abstract": "Developing universal machine learning models for ab initio calculations is the frontier of materials cutting edge research in the new era of artificial intelligence. Here, we present the Deep Augment Way model (DeePAW) that is a universal machine learning (ML) model for orbital-free (OF) ab initio calculations, based on the density functional theory (DFT). DeePAW is currently the best OFDFT ML model according to the three criterions, 1) covering the largest number of elements, 2) having the widest application capability to diverse crystal structures, and 3) achieving the highest prediction accuracy without further fine-tuning. These scientific merits and innovations of DeePAW are stemmed from the novel SE(3)-equivariant double massage passing neuron networks. Besides predicting electron density distributions, DeePAW predicts formation energies of crystals as well and therefore paves an efficient avenue for multiscale materials modeling beyond conventional electronic structure calculation methods.", "url": "https://arxiv.org/abs/2603.18650", "type": "理论+数值", "summary": "1. 该研究提出了一种用于轨道自由从头计算的通用机器学习模型 DeePAW，其基于密度泛函理论框架并覆盖多种元素与晶体结构。\n2. 模型的核心优势在于采用新颖的 SE(3) 等变双消息传递神经网络，在无需微调的情况下实现了当前最高的预测精度与最广的应用范围。\n3. 该方法不仅能预测电子密度分布，还可计算晶体形成能，为超越传统电子结构计算的多尺度材料模拟开辟了高效路径。", "summary_source": "deepseek", "authors": [{"name": "Tianhao Su"}, {"name": "Shunbo Hu"}, {"name": "Yue Wu"}, {"name": "Runhai Oyang"}, {"name": "Xitao Wang"}, {"name": "Musen Li"}, {"name": "Jeffrey Reimers"}, {"name": "Tong-Yi Zhang"}], "featured_authors": [{"name": "Tianhao Su"}, {"name": "Shunbo Hu"}, {"name": "Yue Wu"}, {"name": "Musen Li"}, {"name": "Jeffrey Reimers"}, {"name": "Tong-Yi Zhang"}], "author_count": 8}, {"id": "2603.18664", "category": "cond-mat", "title": "The influence of nonradiative relaxation on laser induced white emission properties in Cr:YAG nanopowders", "abstract": "Laser Induced White Emission (LIWE) is the subject of research worldwide. Since its discovery, the understanding of this phenomenon has progressed successfully enough to reach industrial applications. However, a lack of understanding of the nature of this phenomenon limits its potential. This article is devoted to the study of the influence of nonradiative relaxation processes on the properties of laser induced white emission in Cr:YAG nanopowders. The concentration series of Cr:YAG nanopowders was synthetized by Pechini method. The microstructure, optical and LIWE properties were studied. The influence of chromium concentration on the number of photons involved in LIWE process (N parameter) is shown. The increase of N parameter is associated with an increase in the probability of non-radiative recombination processes with an increase of chromium concentration. A multiphoton ionization model is proposed to describe LIWE phenomenon.", "url": "https://arxiv.org/abs/2603.18664", "type": "理论", "summary": "1. 本工作通过合成不同铬浓度的YAG纳米粉末，系统研究了非辐射弛豫过程对激光诱导白光发射特性的影响。\n2. 关键发现是铬浓度的增加提升了非辐射复合概率，导致参与白光发射过程的光子数增加，并据此提出了多光子电离理论模型。\n3. 该模型为厘清白光发射的微观机制提供了新框架，对优化相关荧光材料与光电器件设计具有明确指导意义。", "summary_source": "deepseek", "authors": [{"name": "M. Chaika"}, {"name": "R. Tomala"}, {"name": "O. Bezkrovnyi"}, {"name": "W. Strek"}], "featured_authors": [{"name": "M. Chaika"}, {"name": "R. Tomala"}, {"name": "O. Bezkrovnyi"}, {"name": "W. Strek"}], "author_count": 4}, {"id": "2603.18673", "category": "cond-mat", "title": "Spectroscopic properties of Cr,Yb:YAG nanocrystals under intense NIR radiation", "abstract": "Laser induced white emission (LIWE) was thoroughly studied in recent decades. However, despite the progress in understanding of this phenomenon, the mechanism behind LIWE remains unclear. The present paper focuses on the influence of Yb content on the LIWE properties of Cr,Yb:YAG nanocrystals. Microstructure and optical properties of the samples were characterized and the influence of the concentration of Yb3+ ions on the spectroscopic properties of Cr,Yb:YAG and energy transfer processes between Cr3+ and Yb3+ ions was revealed. Multiphoton ionization theory was used to explain the findings of the paper.", "url": "https://arxiv.org/abs/2603.18673", "type": "理论", "summary": "1. 该工作系统表征了Cr,Yb:YAG纳米晶体的微观结构与光学性质，重点研究了在强近红外辐射下Yb3+离子含量对激光诱导白光发射性能及光谱行为的影响。\n2. 其物理卖点在于运用多光子电离理论，揭示了Yb3+浓度如何调控Cr3+到Yb3+的能量转移过程，从而解释光谱特性变化与白光发射机制。\n3. 这为阐明激光诱导白光发射的微观物理起源提供了关键见解，并对设计基于稀土离子能量转移的可控光电材料及后续光物理研究具有指导意义。", "summary_source": "deepseek", "authors": [{"name": "M. Chaika"}, {"name": "R. Tomala"}, {"name": "O. Bezkrovnyi"}, {"name": "W. Strek"}], "featured_authors": [{"name": "M. Chaika"}, {"name": "R. Tomala"}, {"name": "O. Bezkrovnyi"}, {"name": "W. Strek"}], "author_count": 4}, {"id": "2603.18684", "category": "cond-mat", "title": "Weak Localization and Magnetoconductance in Percolative Superconducting Aluminum Films", "abstract": "In order to investigate the crossover from the homogeneous behavior to inhomogeneous (percolative) one, the temperature $T$ and magnetic field H dependence of the sheet resistance $R_\\square$ have been measured for two-dimensional granular aluminum films. Fitting the theory to data of magnetoconductance near $T_C$ with use of the diffusion constant $D(T)$ as a fitting parameter, we have obtained the anomalous $T$-dependent diffusion constant $D$. From the analysis of $D(T)$, the electron diffusion index $\\theta$, a certain critical exponent in percolation theory, has been obtained. In the relation $R_\\square-\\theta$, the value of $\\theta$ varies abruptly near $1.5k\\omega$. This behavior suggesting the above mentioned crossover is similar to our previous results determined from the temperature dependence of the upper critical field. For percolative films in $H = 5\\mathrm{T}$, we have found the strong $R_\\square$ dependence of the prefactor $\\alpha_T$ in the expression$\\sigma=[\\alpha_T e^2/(2\\pi^2\\hbar)]\\ln T+\\sigma_0$. The relation $\\alpha_T\\propto1/R_\\square$ can be explained qualitatively by a model of scaling law for percolation.", "url": "https://arxiv.org/abs/2603.18684", "type": "理论", "summary": "1. 该工作系统测量了二维颗粒铝薄膜的薄层电阻随温度与磁场的响应，以探究从均匀到渗透行为的交叉现象。\n2. 通过将理论拟合到近Tc的磁导数据并以扩散常数为参量，获得了反常的温度依赖扩散常数，进而提取渗透临界指数θ，并发现渗透薄膜中系数αT与薄层电阻的反比关系。\n3. 此交叉行为与先前基于上临界场温度依赖的结果一致，为渗透系统中的弱局域化和磁导现象提供了基于标度律模型的定性解释与实验验证。", "summary_source": "deepseek", "authors": [{"name": "Kazumasa Yamada"}, {"name": "Bunjyu Shinozaki"}, {"name": "Takashi Kawaguti"}], "featured_authors": [{"name": "Kazumasa Yamada"}, {"name": "Bunjyu Shinozaki"}, {"name": "Takashi Kawaguti"}], "author_count": 3}, {"id": "2603.18721", "category": "cond-mat", "title": "Thermal relaxation asymmetry persists under inertial effects", "abstract": "We algebraically prove the asymmetry in thermal relaxation in phase space in the entire range from overdamped dynamics to underdamped dynamics. We show that for the same setup as for overdamped dynamics, even in the more general case of phase-space relaxation, i.e., underdamped dynamics, far-from-equilibrium heating is faster than cooling. Upon isolating the relevant relaxational contribution to the entropy production, we find that the asymmetry persist for underdamped dynamics that are linearly driven out of equilibrium. The coupling of positions and velocities emerging in this generalization further underscores, in a striking manner, the intricate dynamics of such thermal relaxation processes that do not pass through local equilibria. Investigating the overdamped limit, our generalized approach reveals, interestingly, that an excess free energy contribution from the velocity degrees of freedom does not trivially vanish in the overdamped limit, but is instead affected by the precise interpretation of temperature quenches in overdamped systems.", "url": "https://arxiv.org/abs/2603.18721", "type": "理论", "summary": "1. 该工作通过代数方法证明了从过阻尼到欠阻尼的整个动力学范围内，相空间中热弛豫过程的不对称性始终存在。\n2. 其核心发现表明，即使在更一般的相空间弛豫（欠阻尼动力学）情形下，远离平衡的加热过程仍快于冷却过程，且速度自由度对过剩自由能的贡献在过阻尼极限下并不平凡消失。\n3. 这一结果深化了对非平衡弛豫动力学中位置与速度耦合机制的理解，并为欠阻尼与过阻尼系统中温度猝灭过程的精确热力学描述提供了重要理论依据。", "summary_source": "deepseek", "authors": [{"name": "Cai Dieball"}, {"name": "Aljaž Godec"}], "featured_authors": [{"name": "Cai Dieball"}, {"name": "Aljaž Godec"}], "author_count": 2}, {"id": "2603.18725", "category": "cond-mat", "title": "A first-principles linear response theory for open quantum systems and its application to Orbach and direct magnetic relaxation in Ln-based coordination polymers", "abstract": "Single-Molecule Magnets (SMMs) exhibit slow magnetic relaxation as a result of axial magnetic anisotropy inhibiting spin-phonon transitions. In order to establish a direct link between physical observables and the microscopic theory of magnetic relaxation, we here develop and numerically implement a first-principles linear-response theory for open quantum systems that provides access to the complex a.c. magnetic susceptibility in the presence of an oscillating a.c. magnetic field. Once combined with density functional theory and multiconfigurational electronic structure simulations, this formalism is applied in a fully first-principles fashion to three cyanido-bridged Ln/Y-based coordination polymers with general formula {Ln$^{III}_x$ Y$^{III}_{1-x}$ [Co(CN)$_6$]}, where Ln = Yb (1), Tb (2), and Dy (3). The method is able to reproduce the low-temperature direct relaxation process and its field dependence, as well as the high-temperature Orbach relaxation regime for all the investigated compounds. These results demonstrate the feasibility of ab initio simulations of magnetic this http URL in lanthanide-based SMMs and support the potential of further development of ab initio open quantum systems methods towards the completion of a magnetization dynamics theory.", "url": "https://arxiv.org/abs/2603.18725", "type": "理论+数值", "summary": "1. 该工作发展并数值实现了开放量子系统的第一性原理线性响应理论，用于计算交流磁场下的复磁化率，并将其应用于三种氰桥镧系/钇基配合物{ Ln_x Y_{1-x}[Co(CN)_6] } (Ln = Yb, Tb, Dy) 中的磁弛豫研究。\n2. 该方法结合密度泛函理论与多组态电子结构模拟，首次以完全第一性原理方式复现了所有化合物的低温直接弛豫及其场依赖性与高温奥尔巴赫弛豫区。\n3. 这证实了在镧基单分子磁体中开展从头算磁弛豫模拟的可行性，为完善磁化动力学理论及进一步发展 ab initio 开放量子系统方法提供了明确方向。", "summary_source": "deepseek", "authors": [{"name": "Mikolaj Żychowicz"}, {"name": "Jakub J. Zakrzewski"}, {"name": "Szymon Chorazy"}, {"name": "Alessandro Lunghi"}], "featured_authors": [{"name": "Mikolaj Żychowicz"}, {"name": "Jakub J. Zakrzewski"}, {"name": "Szymon Chorazy"}, {"name": "Alessandro Lunghi"}], "author_count": 4}, {"id": "2603.18726", "category": "cond-mat", "title": "Geometric blockade in a quantum dot coupled to two-dimensional and three dimensional electron gases", "abstract": "We fabricated a quantum dot coupled laterally to a two-dimensional electron gas and vertically to a three-dimensional electron gas in order to investigate the eigenstate dependence of tunneling rate to these gases. We observed a bias-dependent ``geometric\" current blockade. By tunneling via the asymmetric couplings, population inversion is induced and a dark metastable triplet state is revealed. The metastable state stops the current transport process, suppresses the current and asymmetrically widens the Coulomb diamond. By analyzing the current as a function of source-drain and gate voltage and the magnetic field, we concluded that this effect is due to the geometric shape of the electronic states in the dot and the current is limited by the tunneling rate due to the eigenstates, that is, artificial $\\sigma$-coupling and $\\pi$-coupling.", "url": "https://arxiv.org/abs/2603.18726", "type": "理论", "summary": "1. 该工作制备了横向耦合二维电子气、纵向耦合三维电子气的量子点，观测到偏压依赖的“几何”电流阻塞现象。\n2. 通过非对称耦合隧道效应诱导粒子数反转，揭示了暗亚稳三重态的产生，该态通过阻断输运过程压制电流并不对称展宽库仑菱形。\n3. 研究明确了电子态几何形状决定的σ/π型本征态耦合对隧穿速率的调制作用，为基于波函数工程调控量子点输运提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "K. Yamada"}, {"name": "M. Stopa"}, {"name": "T. Hatano"}, {"name": "T. Yamaguchi"}, {"name": "T. Ota"}, {"name": "Y. Tokura"}, {"name": "S. Tarucha"}], "featured_authors": [{"name": "K. Yamada"}, {"name": "M. Stopa"}, {"name": "T. Hatano"}, {"name": "T. Ota"}, {"name": "Y. Tokura"}, {"name": "S. Tarucha"}], "author_count": 7}, {"id": "2603.18816", "category": "cond-mat", "title": "Extreme value statistics and some applications in statistical physics", "abstract": "These notes are based on lectures delivered by G. Schehr at the XVIth School on Fundamental Problems in Statistical Physics (FPSP), held in Oropa (Italy) from 30 June to 11 July 2025. After a brief introduction to extreme value statistics (EVS) for independent and identically distributed (IID) random variables, we discuss several paradigmatic examples of strongly correlated systems where classical extreme value theory no longer applies. In particular, we focus on time series generated by random walks and Brownian motion, as well as on eigenvalue statistics in random matrix theory. Emphasis is placed on applications of EVS to fundamental problems in statistical physics and disordered systems, including the Random Energy Model, stochastic search problems, as well as fluctuating interfaces, and directed polymers in random media within the Kardar-Parisi-Zhang universality class.", "url": "https://arxiv.org/abs/2603.18816", "type": "理论", "summary": "1. 本综述系统介绍了极值统计理论及其在统计物理多个关键领域的应用，涵盖从独立同分布系统到强关联系统。\n2. 其主要技术贡献在于将极值统计推广至随机行走、布朗运动及随机矩阵本征值等强关联体系，突破了经典理论的适用范围。\n3. 这为研究无序系统、随机搜索问题及KPZ普适类中的涨落界面与有向聚合物等基础物理问题提供了有力的分析框架。", "summary_source": "deepseek", "authors": [{"name": "Marcin Piotr Pruszczyk"}, {"name": "Gregory Schehr"}], "featured_authors": [{"name": "Marcin Piotr Pruszczyk"}, {"name": "Gregory Schehr"}], "author_count": 2}, {"id": "2603.18823", "category": "cond-mat", "title": "Longitudinal Nonreciprocal Charge Transport with Time Reversal Symmetry", "abstract": "Longitudinal nonreciprocal charge transport is widely believed to require time-reversal symmetry breaking, either in magnetic materials or through external magnetic fields. Here, we show that longitudinal nonreciprocity can arise even in nonmagnetic conductors without magnetic fields through disorder-induced asymmetric scattering. Using a semiclassical Boltzmann framework, we develop a general theory in which skew-scattering and side-jump processes generate a nonlinear longitudinal current that remains finite even in time-reversal-symmetric systems. A systematic symmetry analysis identifies 42 point groups that permit this extrinsic mechanism. As a concrete realization, we demonstrate that Bernal-stacked bilayer graphene exhibits a large and gate-tunable longitudinal nonreciprocal response with a sizable nonreciprocity factor near its Lifshitz transition. These results establish disorder-driven asymmetric scattering as a general mechanism for bulk longitudinal nonreciprocal charge transport in crystalline conductors.", "url": "https://arxiv.org/abs/2603.18823", "type": "理论", "summary": "1. 该工作通过半经典玻尔兹曼理论，建立了无序诱导散射在时间反演对称晶体中产生纵向非互易电荷输运的一般理论，并以Bernal堆叠双层石墨烯为例实现了可栅压调控的大响应。\n2. 其物理核心在于揭示了无需打破时间反演对称的外在机制——斜散射与侧跳过程可产生净的非线性纵向电流，该机制被系统对称性分析证明在42个点群中允许存在。\n3. 这为在广泛非磁性晶体材料中探索由无序驱动的本征非互易输运效应提供了新途径，尤其适用于存在Lifshitz转变的体系。", "summary_source": "deepseek", "authors": [{"name": "Harsh Varshney"}, {"name": "Amit Agarwal"}], "featured_authors": [{"name": "Harsh Varshney"}, {"name": "Amit Agarwal"}], "author_count": 2}, {"id": "2603.18824", "category": "cond-mat", "title": "Elastocapillary lifting and encapsulation of water by a triangular elastic film under gravity", "abstract": "We investigate the encapsulation of water by a thin elastic film as a minimal model of elastocapillary self-folding with fluid transport. An equilateral triangular polydimethylsiloxane film is lifted quasi-statically from a water surface, while its side length and thickness are systematically varied. Depending on these parameters, the film exhibits three distinct morphologies: folding, recoiling, and liquid encapsulation. We show that the observed morphology is selected by the competition between surface energy, gravitational energy of the liquid, and bending energy of the film. In particular, encapsulation occurs in a narrow parameter region corresponding to the intersection of the elastocapillary, elastogravity, and capillary length scales. This result provides a simple physical criterion for liquid encapsulation by elastic films, based on the balance of bending, capillary, and gravitational energies.", "url": "https://arxiv.org/abs/2603.18824", "type": "理论", "summary": "1. 该工作通过实验研究了等边三角形弹性薄膜从水面准静态提升时包裹液体的过程，系统改变薄膜边长与厚度参数。\n2. 其关键物理机制在于表面能、液体重力势能与薄膜弯曲能之间的竞争决定了折叠、回缩或包裹三种不同形态的选择。\n3. 这为基于弯曲能、毛细能与重力能平衡的弹性薄膜液体包裹设计提供了明确的物理判据与几何参数指导。", "summary_source": "deepseek", "authors": [{"name": "Kyoko Shibata"}, {"name": "Hana Kanda"}, {"name": "Yoshimi Tanaka"}, {"name": "Yutaka Sumino"}], "featured_authors": [{"name": "Kyoko Shibata"}, {"name": "Hana Kanda"}, {"name": "Yoshimi Tanaka"}, {"name": "Yutaka Sumino"}], "author_count": 4}, {"id": "2603.18843", "category": "cond-mat", "title": "Fine-grained topological structures hidden in Fermi sea", "abstract": "The geometry of Fermi sea hosts a unique form of quantum topology that governs the conductance quantization of metal and is characterized by the Euler characteristic $\\chi_F$, offering a new perspective in the study of topological quantum matter. Here, we discover that characterizing Fermi sea topology solely by $\\chi_F$ is insufficient: Fermi seas with identical $\\chi_F$ can exhibit fundamentally different fine-grained topological structures that cannot be connected without a Lifshitz transition. To encode this hidden structure, we introduce a structural resolution factor that captures the fine-grained Fermi sea topologies beyond $\\chi_F$. Considering the attractive Hubbard interaction of electrons on Fermi surfaces, we further demonstrate that the resulting topological superconducting phases can inherit the fine-grained Fermi sea topology of their normal filled bands, with differences in these structures giving rise to anomalous gapless boundary states at the interface between two metal-superconductor heterojunctions. This work opens an avenue for understanding the topological richness of Fermi sea.", "url": "https://arxiv.org/abs/2603.18843", "type": "理论", "summary": "1. 该工作揭示了仅用欧拉特征数χ_F不足以刻画费米海的拓扑结构，发现了具有相同χ_F但存在精细拓扑差异的费米海，并引入了结构分辨率因子来编码这种隐藏拓扑。\n2. 通过引入的费米海精细拓扑分类框架，证明了在吸引哈伯德相互作用下，拓扑超导相能够继承正常填充能带的精细拓扑结构。\n3. 不同精细拓扑结构在金属-超导体异质结界面处诱导出反常无能隙边界态，为理解费米海的拓扑丰富性及其在拓扑量子物质研究中的影响开辟了新途径。", "summary_source": "deepseek", "authors": [{"name": "Wei Jia"}], "featured_authors": [{"name": "Wei Jia"}], "author_count": 1}, {"id": "2603.18854", "category": "cond-mat", "title": "Boltzmann-Bloch Equation Approach to the Theory of the Optical Inter- and Intraband Response in Noble Metals", "abstract": "In this paper we introduce momentum-resolved metal Boltzmann-Bloch equations (MBBE) for the combined description of electronic intra- and interband processes in noble metals. This microscopic framework incorporates a full treatment of many-body electron-electron and electron-phonon interactions, relevant for relaxation and dephasing processes after optical excitation. For the example of gold, we calculate the linear optical response for near-infrared and visible energies. This provides insight into the interplay of microscopic processes hidden in phenomenological Drude-Lorentz models. The complex geometry of the Fermi surface is treated by an anisotropic electronic dispersion model, which is necessary to explain the temperature dependent spectrum over the whole frequency range of intra- and interband transitions.", "url": "https://arxiv.org/abs/2603.18854", "type": "理论+数值", "summary": "1. 本文为贵金属引入了动量分辨的金属玻尔兹曼-布洛赫方程，以统一描述光激发后的电子带内与带间过程，并以金为例计算了红外至可见光波段的线性光学响应。\n2. 其微观框架完整包含了多体电子-电子及电子-声子相互作用，并采用各向异性电子色散模型处理费米面的复杂几何结构，从而能够解释跨越整个频段的温度依赖光谱。\n3. 这一方法揭示了唯象Drude-Lorentz模型所隐含的微观过程相互竞争机制，为从第一性原理计算真实材料的超快光学响应提供了系统理论工具。", "summary_source": "deepseek", "authors": [{"name": "Robert Lemke"}, {"name": "Matthias Rössle"}, {"name": "Holger Lange"}, {"name": "Andreas Knorr"}, {"name": "Jonas Grumm"}], "featured_authors": [{"name": "Robert Lemke"}, {"name": "Matthias Rössle"}, {"name": "Holger Lange"}, {"name": "Andreas Knorr"}, {"name": "Jonas Grumm"}], "author_count": 5}, {"id": "2603.18876", "category": "cond-mat", "title": "Bridging Crystal Structure and Material Properties via Bond-Centric Descriptors", "abstract": "Although chemical bonding is the fundamental mechanistic bridge connecting atomic structure to macroscopic material properties, current data-driven materials science largely treats it as an implicit \"black box\". Existing machine learning (ML) models rely predominantly on geometric coordinates, forcing them to implicitly relearn complex quantum mechanics from scratch. This lack of intermediate physical features limits model interpretability and generalizability, particularly when training data is scarce. To solve this problem, we introduce MattKeyBond, a bond-centric materials database that explicitly maps the local electronic landscape and bonding interactions of materials. Building on this, we propose Bonding Attractivity (BA), a novel element-specific descriptor that quantifies the intrinsic capability of atoms to form covalent networks. By providing pre-calculated, energy-dimensional bonding descriptors, MattKeyBond transforms the implicit \"black box\" into physically interpretable features. This strategy relieves ML models from the burden of deducing physical laws from pure geometry, enabling accurate predictions even with limited data and seamlessly integrating electronic structure theory into modern AI workflows.", "url": "https://arxiv.org/abs/2603.18876", "type": "理论+数值", "summary": "1. 该工作提出了键中心材料数据库 MattKeyBond 及元素特异性描述符 Bonding Attractivity (BA)，以建立从原子结构到宏观性质的显式物理桥梁。\n2. 其核心在于提供了预先计算的、具有能量量纲的键合描述符，将局域电子景观显式映射为可解释特征，从而免除机器学习模型从纯几何数据重新推导物理规律的重负。\n3. 这为在数据稀缺条件下实现准确的材料性能预测，以及将电子结构理论无缝融入现代人工智能工作流程提供了新范式。", "summary_source": "deepseek", "authors": [{"name": "Jian-Feng Zhang"}, {"name": "Ze-Feng Gao"}, {"name": "Xiao-Qi Han"}, {"name": "Bo Zhan"}, {"name": "Dingshun Lv"}, {"name": "Miao Gao"}, {"name": "Kai Liu"}, {"name": "Xinguo Ren"}, {"name": "Zhong-Yi Lu"}, {"name": "Tao Xiang"}], "featured_authors": [{"name": "Jian-Feng Zhang"}, {"name": "Ze-Feng Gao"}, {"name": "Xiao-Qi Han"}, {"name": "Xinguo Ren"}, {"name": "Zhong-Yi Lu"}, {"name": "Tao Xiang"}], "author_count": 10}, {"id": "2603.18880", "category": "cond-mat", "title": "Vortex Retention Mediated Turbulent Transitions in Self-Gravitating Bosonic and Axionic Condensates", "abstract": "We investigate turbulent spin-down dynamics in self-gravitating Bose-Einstein condensates, comparing purely bosonic and axionic (higher-order interacting) systems. Through simulations of the Gross-Pitaevskii-Poisson system, we study condensates pinned to a crust potential undergoing rapid rotation slowdown. We find that axionic condensates exhibit more uniform density profiles and smaller sizes compared to their bosonic counterparts for similar interaction strengths, which facilitates earlier vortex entry. The sudden spin-down triggers vortex depinning and a turbulent cascade. For comparable sizes, both systems exhibit a short-lived Kolmogorov energy cascade ($k^{-5/3}$ scaling) followed by a transition to Vinen turbulence ($k^{-1}$ scaling). Crucially, their responses diverge with increasing interaction strength (and thus condensate size): the axionic system increasingly deviates from Kolmogorov scaling because of enhanced vortex retention, a trend quantitatively confirmed by analyzing the vortex fraction and its dependence on the final rotation frequency. Spectral analysis reveals that the growth of incompressible energy is primarily driven by quantum pressure during vortex detachment, rather than by compressible flows. The compressible spectrum shows thermalization ($k$ scaling). Our results demonstrate how distinct nonlinearities govern vortex dynamics and turbulent dissipation in self-gravitating quantum fluids.", "url": "https://arxiv.org/abs/2603.18880", "type": "理论+数值", "summary": "1. 本文通过模拟Gross-Pitaevskii-Poisson系统，研究了快速旋转减速下自引力玻色与轴子凝聚体的湍流自旋下降动力学。\n2. 其核心发现是，轴子凝聚体因更强的涡旋滞留效应而显著偏离Kolmogorov能谱标度，该趋势由涡旋份额对终态转速的依赖定量证实。\n3. 这揭示了不同非线性相互作用对自引力量子流体中涡旋动力学与湍流耗散路径的调控机制，为相关天体物理凝聚体模型提供了关键依据。", "summary_source": "deepseek", "authors": [{"name": "Anirudh Sivakumar"}, {"name": "Sanjay Shukla"}, {"name": "Rahul Pandit"}, {"name": "Pankaj Kumar Mishra"}, {"name": "Paulsamy Muruganandam"}], "featured_authors": [{"name": "Anirudh Sivakumar"}, {"name": "Sanjay Shukla"}, {"name": "Rahul Pandit"}, {"name": "Pankaj Kumar Mishra"}, {"name": "Paulsamy Muruganandam"}], "author_count": 5}, {"id": "2603.18909", "category": "cond-mat", "title": "Avalanches in the Random Organization Model with long-range interactions", "abstract": "Oscillatory sheared suspensions, when observed stroboscopically, exhibit a reversible-irreversible transition as a function of the strain amplitude, which is a kind of absorbing phase transition. So far studies of this transition focused on global quantities, e.g. quantifying the irreversibility on one side of the transition or the time to reach a reversible state on the other side. Here, motivated by the kin depinning transition, we focus on the intermittent dynamics near the transition. We perform simulations of a modified Random Organization Model (ROM), a minimal particle model which we recently adapted to take into account the generic presence of long-range interactions mediated by the fluid, taking the power-law-decay exponent $\\alpha$ as an additional control parameter of the model. We show that at the absorbing phase transition, this model displays power-law-distributed avalanches. We characterize the avalanche statistics in terms of avalanche size, duration and number of particles involved, and we determine the associated exponents. By varying the exponent $\\alpha$, the fractal dimension of avalanches crosses space dimension $d$, inducing a qualitative change of the spatial structure of avalanches, from compact avalanches when interactions have a short range, to sparse avalanches when interactions are long-ranged. Finally, we characterize the clusters within the avalanches, which we also find power-law distributed.", "url": "https://arxiv.org/abs/2603.18909", "type": "理论+数值", "summary": "1. 本文通过模拟引入长程相互作用的修正随机组织模型，研究了在吸附相变点附近产生的雪崩动力学及其统计特性。\n2. 核心发现是雪崩的空间分形维度随相互作用力程指数α变化，并在跨越空间维度d时发生从紧凑到稀疏的定性转变，同时测量了雪崩尺寸、持续时间等多重临界指数。\n3. 这为理解长程相互作用如何改变非平衡吸附相变的临界涨落结构，及其与动力学脱钉转变等普适类的关系提供了定量框架。", "summary_source": "deepseek", "authors": [{"name": "T. Jocteur"}, {"name": "K. Martens"}, {"name": "R. Mari"}, {"name": "E. Bertin"}], "featured_authors": [{"name": "T. Jocteur"}, {"name": "K. Martens"}, {"name": "R. Mari"}, {"name": "E. Bertin"}], "author_count": 4}, {"id": "2603.18982", "category": "cond-mat", "title": "Photoemission Signatures of Photoinduced Carriers and Excitons in One-Dimensional Mott Insulators", "abstract": "We theoretically study photoemission spectra for photodoped one-dimensional Mott insulators that can host excitons, and show that their spectral characteristics differ qualitatively from those of photodoped semiconductors. In conventional semiconductors, photoemission spectra are well understood; free charge carriers generate spectral weight near the bottom of the conduction band, while the formation of excitons leads to replica features of the valence band appearing inside the band gap. In one-dimensional Mott insulators, on the other hand, strong correlations give rise to fractionalized elementary excitations-spinons, holons, and doublons-which fundamentally modify the photoemission response. We find that when photodoped carriers, i.e., doublons and holons, remain unbound, the photoemission spectrum directly reflects the dispersion of spinons, i.e., magnetic elementary excitations. In contrast, when a doublon and a holon form an excitonic bound state, replica structures of the lower Hubbard band emerge inside the Mott gap, carrying contributions from both spinon and holon excitations. Importantly, the distribution of the in-gap signal depends sensitively on the degree of doublon-holon binding. The origin of these spectral features is clarified through a combination of exact diagonalization and the slave-particle approach. These results indicate that photoemission from photoinduced carriers and excitons in strongly correlated electron systems can provide information on magnetic properties and carrier-binding properties.", "url": "https://arxiv.org/abs/2603.18982", "type": "理论+数值", "summary": "1. 该工作理论研究了光掺杂一维莫特绝缘体中可承载激子的光电子能谱，揭示了其与光掺杂半导体截然不同的谱学特征。\n2. 关键在于强关联导致的分数化元激发（自旋子、空穴子、双激子）从根本上改变了光发射响应：未结合载流子反映自旋子色散，而激子束缚态则在莫特隙内产生下哈伯带复制结构。\n3. 这为利用光诱导载流子与激子的光电子能谱探测强关联体系的磁性特征和载流子束缚性质提供了新途径。", "summary_source": "deepseek", "authors": [{"name": "Taiga Nakamoto"}, {"name": "Yuta Murakami"}, {"name": "Naoto Tsuji"}], "featured_authors": [{"name": "Taiga Nakamoto"}, {"name": "Yuta Murakami"}, {"name": "Naoto Tsuji"}], "author_count": 3}, {"id": "2603.18989", "category": "cond-mat", "title": "Magnetic properties of a buckled honeycomb lattice antiferromagnet", "abstract": "The intriguing interplay between competing degrees of freedom in frustrated magnets can lead to non-trivial magnetic phenomena with exotic low-energy excitations that are highly relevant for addressing some of the fundamental questions in quantum condensed matter as well as potential technological applications. Herein, we report the synthesis and thermodynamic results on a frustrated magnet Co3ZnNb2O9. The Co2+ moments constitute buckled AB-type honeycomb layers in the ab-plane. The temperature-dependent magnetic susceptibility shows a sharp anomaly at 14 K, indicating the onset of long-range magnetic ordering. The Curie-Weiss fit of the magnetic susceptibility above 100 K, yields a Curie-Weiss temperature of -70 K, suggesting strong antiferromagnetic (AFM) interactions between the Co2+ spins and an effective magnetic moment of 5.54 muB, indicating the presence of unquenched orbital angular momentum. A field-induced spin-flop-like metamagnetic transition below the ordering temperature is characterized by a critical magnetic field of 1.2 T. The specific heat shows a lambda-type anomaly at 14 K, confirming the presence of long-range magnetic ordering, due to finite interlayer interaction. Interestingly, our study of the magnetocaloric effect near the transition temperature revealed an entropy change of 2.81 J/kg.K, which is ascribed to competing interactions, underlying anisotropy, and reduced net magnetization lead to relatively small isothermal entropy changes that suggest that frustrated honeycomb magnets are promising contenders for field-induced exotic phases and magnetocaloric response.", "url": "https://arxiv.org/abs/2603.18989", "type": "理论", "summary": "1. 该工作合成了具有褶皱蜂巢晶格结构的阻挫磁体Co3ZnNb2O9，并系统表征了其热力学性质。\n2. 研究揭示了强反铁磁相互作用、未淬灭轨道角动量与各向异性共同导致的场诱导自旋倾倒型变磁转变。\n3. 这为利用阻挫蜂巢磁体中的竞争相互作用探索场诱导奇异量子相及磁热效应材料提供了明确途径。", "summary_source": "deepseek", "authors": [{"name": "A. Yadav"}, {"name": "U. Jena"}, {"name": "A. Pradhan"}, {"name": "Satish K."}, {"name": "P. Khuntia"}], "featured_authors": [{"name": "A. Yadav"}, {"name": "U. Jena"}, {"name": "A. Pradhan"}, {"name": "Satish K."}, {"name": "P. Khuntia"}], "author_count": 5}, {"id": "2603.18998", "category": "cond-mat", "title": "Computation of thermal entropy for the doped Hubbard Model", "abstract": "We develop a highly efficient framework for computing the thermal entropy in the doped Fermi-Hubbard model within the grand-canonical ensemble. The framework comprises four calculation schemes that express the entropy as path integrals in the parameter space of temperature, interaction strength, and chemical potential. The integrands involve only fundamental observables, including the total energy, fermion density, and double occupancy, which are readily accessible in a wide range of theoretical and numerical methods. We further derive useful Maxwell relations connecting the entropy to other quantities, and present practical formulas for directly evaluating the grand potential. As an application, we compute the entropy of the doped Hubbard model in two and three dimensions, using the numerically unbiased auxiliary-field quantum Monte Carlo method. The test results show excellent agreement across the different schemes and quantitatively verify the Maxwell relations, confirming the reliability of the framework. In two dimensions, we further benchmark our entropy results in physically relevant parameter regimes against diagrammatic Monte Carlo calculations and observe excellent quantitative consistency between the two approaches. By providing an efficient and broadly applicable route for entropy evaluation, our work facilitates the thermodynamic characterization of complex correlated states in the doped Hubbard model.", "url": "https://arxiv.org/abs/2603.18998", "type": "理论+数值", "summary": "1. 该工作为掺杂哈伯德模型的热熵计算开发了一个高效框架，在巨正则系综下通过四个方案将熵表达为温度、相互作用强度和化学势参数空间的路径积分。\n2. 其技术优势在于积分核仅涉及总能量、费米子密度和双占据等基本可观测量，并推导了连接熵与其他量的麦克斯韦关系及巨势直接计算公式，通过无偏辅助场量子蒙特卡罗方法在二维和三维模型中验证了一致性与可靠性。\n3. 在二维物理相关参数区域与图解蒙特卡罗结果的定量吻合进一步证实了该框架的普适性，这为复杂关联态的热力学表征提供了高效且广泛适用的途径，促进了掺杂哈伯德模型的后续研究。", "summary_source": "deepseek", "authors": [{"name": "Yu-Feng Song"}, {"name": "Youjin Deng"}, {"name": "Yuan-Yao He"}], "featured_authors": [{"name": "Yu-Feng Song"}, {"name": "Youjin Deng"}, {"name": "Yuan-Yao He"}], "author_count": 3}, {"id": "2603.19107", "category": "cond-mat", "title": "Ferroelectric $p$-wave magnets", "abstract": "Couplings between ferroelectric and magnetic orders offer promising routes toward low-dissipation electronics. However, such couplings are notably rare, largely due to the poor compatibility between insulating band structures and ferromagnetism. Here, we study a different strategy: we identify previously overlooked time-reversal-symmetric $p$- and $f$-wave spin-polarized insulating electronic states in ferroelectrics with noncollinear magnetic sublattices. We show that combining spin and magnetic group theory enables a systematic classification of the origin of polar symmetry breaking. We distinguish crystallographic, exchange-, or spin-orbit-driven mechanisms. Furthermore, we identify more than 50 candidate materials. Using first-principles calculations, we demonstrate a pristine, time-reversal-symmetric $p$-wave spin-polarized electronic structure in the well-known multiferroic $\\mathrm{GdMn_2O_5}$. We further show that its $p$-wave order can be switched electrically, opening alternative paths toward spintronic and multiferroic functionalities in this class of materials.", "url": "https://arxiv.org/abs/2603.19107", "type": "理论+数值", "summary": "1. 本文在具有非共线磁性亚晶格铁电体中识别出先前被忽视的时间反演对称p波与f波自旋极化绝缘电子态，并系统分类了极性对称破缺的晶体学、交换或自旋轨道耦合起源。\n2. 其技术核心在于结合自旋与磁群论建立了系统分类框架，并通过第一性原理计算在GdMn₂O₅中证实了本征p波自旋极化能带结构的电控切换能力。\n3. 这为50余种候选材料体系开辟了实现低耗散自旋电子学与多铁性功能的新物理路径。", "summary_source": "deepseek", "authors": [{"name": "Jan Priessnitz"}, {"name": "Anna Birk Hellenes"}, {"name": "Riccardo Comin"}, {"name": "Libor Šmejkal"}], "featured_authors": [{"name": "Jan Priessnitz"}, {"name": "Anna Birk Hellenes"}, {"name": "Riccardo Comin"}, {"name": "Libor Šmejkal"}], "author_count": 4}, {"id": "2603.19189", "category": "cond-mat", "title": "Matrix Product States for Modulated Symmetries: SPT, LSM, and Beyond", "abstract": "Matrix product states (MPS) provide a powerful framework for characterizing one-dimensional symmetry-protected topological (SPT) phases of matter and for formulating Lieb-Schultz-Mattis (LSM)-type constraints. Here we generalize the MPS formalism to translationally invariant systems with general modulated symmetries. We show that the standard symmetry \"push-through\" condition for conventional global symmetry must be revised to account for symmetry modulation, and we derive the appropriate generalized condition. Using this generalized push-through structure, we classify one-dimensional SPT phases with modulated symmetries and formulate LSM-type constraints within the same MPS-based framework.", "url": "https://arxiv.org/abs/2603.19189", "type": "理论", "summary": "1. 该工作将矩阵乘积态框架推广至具有一般调制对称性的一维平移不变系统。\n2. 其核心在于针对调制对称性修正了标准推过条件，并推导出相应的广义推过结构。\n3. 这为在统一框架下分类调制对称性保护拓扑相和构建Lieb-Schultz-Mattis型约束提供了基础。", "summary_source": "deepseek", "authors": [{"name": "Amogh Anakru"}, {"name": "Sarvesh Srinivasan"}, {"name": "Linhao Li"}, {"name": "Zhen Bi"}], "featured_authors": [{"name": "Amogh Anakru"}, {"name": "Sarvesh Srinivasan"}, {"name": "Linhao Li"}, {"name": "Zhen Bi"}], "author_count": 4}, {"id": "2603.18068", "category": "hep-th", "title": "When do real observers resolve de Sitter's imaginary problem?", "abstract": "The universal phase $\\rev{\\ii}^{D+2}$ of the Euclidean de Sitter
