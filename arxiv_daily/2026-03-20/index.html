that only non-zero terms are evaluated and a minimal number of subspace lookup operations are performed. Bit-strings are expressed using bit-sets to reduce memory consumption and allow for evaluating operators with no intrinsic limitation on the number of qubits. Subspaces defined over bit-sets are stored in a hash map format that allows for efficient indexing and lookup operations. Our method can be used to directly construct sparse matrix representations or obtain matrix-free solutions. Users are free to utilize these in their eigensolver of choice. We show the benefits of our framework by computing the ground-state solution to examples from condensed matter physics and quantum chemistry with less memory and runtime compared to existing techniques, in some cases by an order of magnitude or more. This work provides a flexible interface for performant quantum-classical eigensolutions for candidate quantum advantage applications.", "url": "https://arxiv.org/abs/2603.18731", "type": "理论+数值", "summary": "1. 该工作提出了一个基于量子计算机采样比特字符串定义子空间的哈密顿量本征问题求解统一框架。\n2. 其技术核心在于采用扩展算符字母表、比特集合表示与哈希映射存储，显著降低了内存消耗与计算开销。\n3. 这为在展现量子优势的候选应用中实现高性能量子-经典混合本征求解提供了灵活且高效的接口。", "summary_source": "deepseek", "authors": [{"name": "Paul D. Nation"}, {"name": "Abdullah Ash Saki"}, {"name": "Hwajung Kang"}], "featured_authors": [{"name": "Paul D. Nation"}, {"name": "Abdullah Ash Saki"}, {"name": "Hwajung Kang"}], "author_count": 3}, {"id": "2603.18919", "category": "quant-ph", "title": "Quantum and classical approaches to the optimization of highway platooning: the two-vehicle matching problem", "abstract": "Aerodynamic drag reduction on highways through vehicle platooning is a well-known concept, but it has not yet seen systematic uptake, arguably because of significant technological and legislative obstacles. As a low-tech entry point to real multi-vehicle platooning, \"Windbreaking-as-a-Service\" (WaaS) was introduced recently. Here we use a QUBO formulation to study classical metaheuristics such as simulated annealing and tabu search, together with emerging quantum heuristics including quantum annealing and variants of the Quantum Approximate Optimization Algorithm (QAOA). These heuristic solvers do not guarantee optimality, but they traverse the same higher-order landscape using polynomial memory. They can also be parallelized aggressively, and efficient classical post-processing can be used in hybrid workflows to return only valid schedules. This paper therefore positions QUBO as a common language that allows heterogeneous classical, quantum, and hybrid solvers to address the optimization of highway platooning.", "url": "https://arxiv.org/abs/2603.18919", "type": "数值", "summary": "1. 该工作将高速公路车辆编队优化中的两车匹配问题形式化为QUBO（二次无约束二进制优化）模型，并系统比较了经典元启发式算法（如模拟退火、禁忌搜索）与量子启发式算法（如量子退火、量子近似优化算法变体）的求解性能。\n2. 其技术优势在于QUBO框架作为共同语言，使得异构的经典、量子及混合求解器能以多项式内存遍历相同高阶优化景观，支持高度并行化，并通过高效经典后处理在混合工作流中确保解的有效性。\n3. 这为量子-经典混合计算在现实世界复杂优化问题（如智能交通系统）中的应用提供了新范式，并为其他工程领域的优化挑战启示了基于混合求解器的可扩展路径。", "summary_source": "deepseek", "authors": [{"name": "Chinonso Onah"}, {"name": "Agneev Guin"}, {"name": "Carsten Othmer"}, {"name": "J. A. Montañez-Barrera"}, {"name": "Kristel Michielsen"}], "featured_authors": [{"name": "Chinonso Onah"}, {"name": "Agneev Guin"}, {"name": "Carsten Othmer"}, {"name": "J. A. Montañez-Barrera"}, {"name": "Kristel Michielsen"}], "author_count": 5}, {"id": "2603.18946", "category": "quant-ph", "title": "Dependence of Lindbladian spectral statistics on the integrability of no-jump Hamiltonians and the recycling terms", "abstract": "Spectral statistics probe integrability versus chaos and have recently been extended to Markovian open quantum systems described by Lindbladians, whose quantum-trajectory unraveling decomposes the evolution into no-jump dynamics generated by an effective non-Hermitian Hamiltonian and recycling jumps. In this work, we perform spectrum-statistics diagnostics for Lindbladians and their effective non-Hermitian Hamiltonians. We show that recycling processes, symmetry constraints, and the Liouville-space structure crucially shape the spectral correlations. In particular, we identify a family of spectrally separable Lindbladians whose spectra exhibit robust Poisson statistics, despite the effective non-Hermitian Hamiltonian varying from regular to chaotic. Our work establishes a unified spectral-statistics characterization for Lindbladians and their associated effective non-Hermitian Hamiltonians, deepening our understanding of integrable and chaotic spectral properties in open many-body systems.", "url": "https://arxiv.org/abs/2603.18946", "type": "理论", "summary": "1. 该工作对林布拉德算符及其有效非厄米哈密顿量进行了谱统计诊断。\n2. 研究揭示了回收跳变过程、对称性约束与刘维尔空间结构如何关键性地塑造谱关联，并发现了一类谱可分离的林布拉德算符，其谱呈现鲁棒的泊松统计。\n3. 这为开放量子多体系统中可积与混沌谱特性的统一描述奠定了基础，并激励了对更广泛非平衡体系谱统计的后续探索。", "summary_source": "deepseek", "authors": [{"name": "Dingzu Wang"}, {"name": "Hao Zhu"}, {"name": "Guo-Feng Zhang"}, {"name": "Dario Poletti"}], "featured_authors": [{"name": "Dingzu Wang"}, {"name": "Hao Zhu"}, {"name": "Guo-Feng Zhang"}, {"name": "Dario Poletti"}], "author_count": 4}, {"id": "2603.19010", "category": "quant-ph", "title": "Multiparameter quantum estimation and Stirling Engine Performance in a Gravitational Cat State System", "abstract": "We investigate the multiparameter quantum estimation and quantum thermodynamics properties of a gravitational cat state (gravcat) system composed of two interacting massive particles confined in double-well potentials. The system is described by an effective Hamiltonian involving the energy splitting parameter $\\omega$ and the gravitational coupling strength $\\gamma$, while the interaction with a thermal environment is modeled through a Gibbs thermal state. Within the framework of quantum parameter estimation theory, we employ the quantum Fisher information matrix (QFIM) to analyze the precision limits for estimating the three fundamental parameters of the model, namely the gravitational coupling $\\gamma$, the energy splitting $\\omega$, and the temperature $T$. Utilizing the symmetric logarithmic derivative (SLD) formalism within the QFIM framework, we derive the analytical expressions of the estimation bounds and evaluate the corresponding minimal variances associated with the quantum Cramér-Rao bound. Both simultaneous and individual estimation strategies are investigated, and their performances are compared in different parameter regimes. Our results reveal the existence of optimal estimation regions where the precision is significantly enhanced and show that the relative efficiency of the estimation schemes strongly depends on the interaction strength, the energy gap, and the thermal environment. In addition, the thermodynamic behavior of the system is analyzed within the framework of a quantum Stirling cycle. The internal energy, entropy, heat exchanges, and work production are examined, allowing us to evaluate the efficiency of the gravcat-based quantum heat engine. The obtained results highlight the interplay between quantum metrology and quantum thermodynamics.", "url": "https://arxiv.org/abs/2603.19010", "type": "理论+数值", "summary": "1. 该工作研究了双阱中两个相互作用大质量粒子构成的引力猫态系统的多参数量子估计与量子热力学性质。\n2. 通过量子费希尔信息矩阵和对称对数导数，推导了引力耦合强度、能级劈裂和温度三个参数估计的解析精度极限，并分析了基于量子斯特林循环的热机效率。\n3. 结果表明量子计量精度与热力学性能存在深刻关联，这为利用量子增强传感优化微观热机等交叉研究提供了新思路。", "summary_source": "deepseek", "authors": [{"name": "Omar Bachain"}, {"name": "Mohamed Amazioug"}, {"name": "Rachid Ahl Laamara"}], "featured_authors": [{"name": "Omar Bachain"}, {"name": "Mohamed Amazioug"}, {"name": "Rachid Ahl Laamara"}], "author_count": 3}, {"id": "2603.19024", "category": "quant-ph", "title": "Exact Law of Quantum Reversibility under Gaussian Pure Loss", "abstract": "Classical reverse diffusion is generated by changing the drift at fixed noise. We show that the quantum version of this principle obeys an exact law with a sharp phase boundary. For Gaussian pure-loss dynamics -- the canonical model of continuous-variable decoherence in optical attenuation channels, squeezed-light interferometric sensing, and superconducting bosonic architectures -- complete positivity, the requirement that the dynamics remain physical even for systems entangled with an ancilla, creates an exact phase boundary at which the minimum reverse cost vanishes, fixes the reverse-noise budget on both sides, and makes pure nonclassical targets dynamically singular. The minimum reverse cost vanishes exactly at a critical squeezing-to-thermal ratio and is strictly positive away from it, with a sharp asymmetry: below the boundary, standard reverse prescriptions such as the fixed-diffusion Bayes reverse remain feasible at mild cost; above it, these prescriptions become infeasible, the covariance-aligned generator remains CP-feasible and uniquely optimal, and the cost can be severe. The optimal reverse noise is locked to the state's own fluctuation geometry and simultaneously minimizes the geometric, metrological, and thermodynamic price of reversal. For multimode trajectories, the exact cost is additive in a canonical set of mode-resolved data, and a globally continuous protocol attains this optimum on every mixed-state interval. If a pure nonclassical endpoint is included, the same pointwise law holds for every $t>0$, but the optimum diverges as $2/t$: exact reversal of a pure quantum state is dynamically unattainable. These results establish an exact law of quantum reversibility in the canonical pure-loss setting and provide a sharp benchmark for broader theories of quantum reverse diffusion.", "url": "https://arxiv.org/abs/2603.19024", "type": "理论+数值", "summary": "1. 该工作建立了高斯纯损耗信道中量子时间反演扩散的精确定律，揭示了完全正性要求所决定的严格相边界。\n2. 关键发现为最小反演代价在临界挤压-热比处精确消失，且最优反演噪声被锁定在态本身的涨落几何中，同时最小化几何、计量与热力学代价。\n3. 这为连续变量量子操控提供了精确基准，并证明纯非经典态的反演在动力学上不可实现，为更广泛的量子反演扩散理论确立了严格判据。", "summary_source": "deepseek", "authors": [{"name": "Ammar Fayad"}], "featured_authors": [{"name": "Ammar Fayad"}], "author_count": 1}, {"id": "2603.19062", "category": "quant-ph", "title": "Fair Decoder Baselines and Rigorous Finite-Size Scaling for Bivariate Bicycle Codes on the Quantum Erasure Channel", "abstract": "Fair threshold estimation for bivariate bicycle (BB) codes on the quantum erasure channel runs into two recurring problems: decoder-baseline unfairness and the conflation of finite-size pseudo-thresholds with true asymptotic thresholds. We run both uninformed and \\emph{erasure-aware} minimum-weight perfect matching (MWPM) surface code baselines alongside BP-OSD decoding of BB codes. With standard depolarizing-weight MWPM and no erasure information, performance matches random guessing on the erasure channel in our tested regime -- so prior work that compares against this baseline is really comparing decoders, not codes. Using 200{,}000 shots per point and bootstrap confidence intervals, we sweep five BB code sizes from $N=144$ to $N=1296$. Pseudo-thresholds (WER = 0.10) run from $p^* = 0.370$ to $0.471$; finite-size scaling (FSS) gives an asymptotic threshold $p^*_\\infty \\approx 0.488$, within 2.4\\% of the zero-rate limit and without maximum-likelihood decoding. On the fair baseline, BB at $N=1296$ has a modest edge in threshold over the surface code at twice the qubit count, and a 12$\\times$ lower normalized overhead -- the latter is where the practical advantage sits. All runs are reproducible from recorded seeds and package versions.", "url": "https://arxiv.org/abs/2603.19062", "type": "数值", "summary": "1. 该研究通过引入公平的解码器基线及严格的有限尺寸标度分析，系统比较了量子擦除信道中双变量自行车码与曲面码的性能。\n2. 核心在于采用擦除信息感知的最小权重完美匹配基线，并结合自助法置信区间，揭示BB码在归一化开销上相比曲面码具有12倍优势的实际效率。\n3. 这为量子纠错码的阈值评估建立了可复现的公平比较框架，并为低开销量子存储方案的设计提供了明确基准。", "summary_source": "deepseek", "authors": [{"name": "Tushar Pandey"}], "featured_authors": [{"name": "Tushar Pandey"}], "author_count": 1}, {"id": "2603.19081", "category": "quant-ph", "title": "Utility-scale quantum computational chemistry", "abstract": "Chemistry and materials science are widely regarded as potential killer application fields for quantum hardware. While the dream of unlocking unprecedented simulation capabilities remains compelling, quantum algorithm development must adapt to the evolving constraints of the emerging quantum hardware in order to accomplish any advantage for the computational chemistry practice. At the same time, the continuous advancement of classical wavefunction-theory methods narrows the window for a broad quantum advantage. Here, we explore potential benefits of quantum computation from the broader perspective of utility-scale applications. We argue that quantum algorithms need not only enable accurate calculations for a few challenging, that is strongly correlated, molecular structures, that might be hard to describe with traditional methods. Instead, they must also support the practical integration of quantum-accelerated computations into high-throughput pipelines for routine calculations on arbitrary molecules, ultimately delivering a tangible value to society.", "url": "https://arxiv.org/abs/2603.19081", "type": "理论+数值", "summary": "1. 该工作从实用规模应用视角探讨量子计算在计算化学领域的潜在效益。\n2. 其核心论点是量子算法需支持量子加速计算与高通量自动化流程的集成，而非仅处理少数强关联体系。\n3. 这为量子算法开发指明了面向实际应用价值、超越单纯精度比较的研究方向。", "summary_source": "deepseek", "authors": [{"name": "Davide Castaldo"}, {"name": "Markus Reiher"}], "featured_authors": [{"name": "Davide Castaldo"}, {"name": "Markus Reiher"}], "author_count": 2}, {"id": "2603.19089", "category": "quant-ph", "title": "Practical Quantum Broadcasting", "abstract": "Incorporating sample efficiency, by requiring the number of states consumed by broadcasting does not exceed that of a naive prepare-and-distribute strategy, gives rise to the no practical quantum broadcasting theorem. To navigate this limitation, we introduce approximate and probabilistic virtual broadcasting and derive analytic expressions for their optimal sample complexity overheads. Allowing deviations at the receivers restores sample efficiency even in the 1-to-2 approximate setting, whereas probabilistic protocols obey a stronger no-go theorem that excludes all sample efficient 1-to-2 implementations for arbitrary dimension and success probability. Rather counterintuitive, this obstruction does not persist at larger receiver numbers: for qubit systems, practical 1-to-6 virtual broadcasting becomes attainable. These results elevate sample complexity from a technical constraint to a defining operational principle, opening an unexplored route to the efficient distribution of quantum information.", "url": "https://arxiv.org/abs/2603.19089", "type": "理论", "summary": "1. 该论文通过引入近似与概率性虚拟广播方案，应对了样本效率限制下的实用量子广播不可行性，并推导了最优样本复杂度开销的解析表达式。\n2. 其物理亮点在于，近似广播中接收端容差可恢复1对2情形的样本效率，而概率性协议对所有维度和成功概率均排除样本高效的1对2实现，但量子比特系统在1对6时能达成实用广播。\n3. 这使样本复杂度从技术约束上升为定义性操作原则，为量子信息的高效分布式处理开辟了未探索的研究路径。", "summary_source": "deepseek", "authors": [{"name": "Ximing Wang"}, {"name": "Yunlong Xiao"}], "featured_authors": [{"name": "Ximing Wang"}, {"name": "Yunlong Xiao"}], "author_count": 2}, {"id": "2603.19105", "category": "quant-ph", "title": "Entanglement assisted communication complexity measured by distinguishability", "abstract": "We investigate the quantum advantage that can arise in typical two-party communication scenarios, where the sender and the receiver are allowed to share prior correlations. Focusing on communication tasks constrained by the distinguishability of the sender's inputs, we demonstrate that entanglement-assisted communication, both classical and quantum, can outperform classical communication supplemented with shared randomness. We begin by developing a general framework for communication tasks with pre-shared correlations. We identify certain communication tasks that exhibit an advantage under entanglement assistance compared to classical communication. Through these results, we establish a connection between quantum communication and entanglement-assisted classical communication, and also show an equivalence between entanglement-assisted classical communication and entanglement-assisted quantum communication. We then consider the simplest scenarios in which the receiver has no input and demonstrate that entanglement-assisted strategies still offer advantages over both classical communication and quantum communication without prior entanglement. Finally, by constructing a class of communication tasks, we show that a non-maximally entangled state can, in some cases, be more useful than a maximally entangled state as a pre-shared resource.", "url": "https://arxiv.org/abs/2603.19105", "type": "理论", "summary": "1. 该论文研究了在基于可区分性的通信任务中，纠缠辅助通信相比经典通信的性能优势。\n2. 其卖点在于构建了预共享相关性的一般框架，证明纠缠辅助策略的优越性并发现非最大纠缠态有时更有效。\n3. 这为量子通信复杂性理论提供了新联系，并启发对纠缠资源在通信协议中优化利用的进一步研究。", "summary_source": "deepseek", "authors": [{"name": "Satyaki Manna"}, {"name": "Ankush Pandit"}, {"name": "Debashis Saha"}], "featured_authors": [{"name": "Satyaki Manna"}, {"name": "Ankush Pandit"}, {"name": "Debashis Saha"}], "author_count": 3}, {"id": "2603.19110", "category": "quant-ph", "title": "Post-Quantum Cryptography from Quantum Stabilizer Decoding", "abstract": "Post-quantum cryptography currently rests on a small number of hardness assumptions, posing significant risks should any one of them be compromised. This vulnerability motivates the search for new and cryptographically versatile assumptions that make a convincing case for quantum hardness. In this work, we argue that decoding random quantum stabilizer codes -- a quantum analog of the well-studied LPN problem -- is an excellent candidate. This task occupies a unique middle ground: it is inherently native to quantum computation, yet admits an equivalent formulation with purely classical input and output, as recently shown by Khesin et al. (STOC '26). We prove that the average-case hardness of quantum stabilizer decoding implies the core primitives of classical Cryptomania, including public-key encryption (PKE) and oblivious transfer (OT), as well as one-way functions. Our constructions are moreover practical: our PKE scheme achieves essentially the same efficiency as state-of-the-art LPN-based PKE, and our OT is round-optimal. We also provide substantial evidence that stabilizer decoding does not reduce to LPN, suggesting that the former problem constitutes a genuinely new post-quantum assumption. Our primary technical contributions are twofold. First, we give a reduction from random quantum stabilizer decoding to an average-case problem closely resembling LPN, but which is equipped with additional symplectic algebraic structure. While this structure is essential to the quantum nature of the problem, it raises significant barriers to cryptographic security reductions. Second, we develop a new suit of scrambling techniques for such structured linear spaces, and use them to produce rigorous security proofs for all of our constructions.", "url": "https://arxiv.org/abs/2603.19110", "type": "理论", "summary": "1. 该工作提出了基于随机量子稳定子解码问题硬度假设的后量子密码学新基础，并以此构造了公钥加密（PKE）、茫然传输（OT）和单向函数等核心密码原语。\n2. 其核心贡献在于，通过将量子解码问题约化为一个具有辛代数结构的平均情况难题，并开发了一套针对此类结构化线性空间的置乱技术，从而克服了构造安全归约的关键障碍。\n3. 这为后量子密码学提供了一个本质上源于量子计算、且可能独立于经典LPN问题的新硬度假设，拓宽了构建密码方案的基石，并激发了对其量子与经典复杂性的进一步研究。", "summary_source": "deepseek", "authors": [{"name": "Jonathan Z. Lu"}, {"name": "Alexander Poremba"}, {"name": "Yihui Quek"}, {"name": "Akshar Ramkumar"}], "featured_authors": [{"name": "Jonathan Z. Lu"}, {"name": "Alexander Poremba"}, {"name": "Yihui Quek"}, {"name": "Akshar Ramkumar"}], "author_count": 4}, {"id": "2603.19126", "category": "quant-ph", "title": "Low-weight quantum syndrome errors in belief propagation decoding", "abstract": "We describe an empirical approach to identify low-weight combinations of columns of the decoding matrices of a quantum circuit-level noise model, for which belief-propagation (BP) algorithms converge possibly very slowly. Focusing on the logical-idle syndrome cycle of the low-density parity check gross code, we identify criteria providing a characterization of the Tanner subgraph of such low-weight error syndromes. We analyze the dynamics of iterations when BP is used to decode weight-four and weight-five errors, finding statistics akin to exponential activation in the presence of noise or escape from chaotic phase-space domains. We study how BP convergence improves when adding to the decoding matrix relevant combinations of fault columns, and show that the suggested decoder amendment can result in the reduction of both logical errors and decoding time.", "url": "https://arxiv.org/abs/2603.19126", "type": "理论+数值", "summary": "1. 该工作针对量子线路级噪声模型的译码矩阵，提出了一种经验性方法来识别导致置信传播算法收敛缓慢的低权重列组合。\n2. 研究通过分析低密度奇偶校验格码逻辑空闲周期中的权重四与权重五错误，揭示了置信传播迭代中类似噪声激活或混沌相空间逃逸的动力学统计特征。\n3. 通过向译码矩阵添加关键故障列组合，所提出的译码器改进方案可同时降低逻辑错误率与译码时间，为实用化量子纠错提供了明确优化路径。", "summary_source": "deepseek", "authors": [{"name": "Haggai Landa"}], "featured_authors": [{"name": "Haggai Landa"}], "author_count": 1}, {"id": "2603.19130", "category": "quant-ph", "title": "Quantum block encoding for semiseparable matrices", "abstract": "Quantum block encoding (QBE) is a crucial step in the development of most quantum algorithms, as it provides an embedding of a given matrix into a suitable larger unitary matrix. Historically, the development of efficient techniques for QBE has mostly focused on sparse matrices; less effort has been devoted to data-sparse (e.g., rank-structured) matrices. In this work we examine a particular case of rank structure, namely, one-pair semiseparable matrices. We present a new block encoding approach that relies on a suitable factorization of the given matrix as the product of triangular and diagonal factors. To encode the matrix, the algorithm needs $2\\log(N)+7$ ancillary qubits. This process takes polylogarithmic time and has an error of $\\mathcal{O}(N^2)$, where $N$ is the matrix size.", "url": "https://arxiv.org/abs/2603.19130", "type": "数值", "summary": "1. 该工作针对一类具有半可分结构的矩阵，提出了一种基于三角与对角因子分解的量子块编码新方法。\n2. 其技术关键在于仅需 2log(N)+7 个辅助量子比特即可实现编码，算法时间多对数，误差为 O(N²)。\n3. 这为数据稀疏型（如秩结构）矩阵的高效量子块编码提供了新思路，有望拓展量子算法在非稀疏问题中的应用。", "summary_source": "deepseek", "authors": [{"name": "Giacomo Antonioli"}, {"name": "Paola Boito"}, {"name": "Gianna M. Del Corso"}, {"name": "Margherita Porcelli"}], "featured_authors": [{"name": "Giacomo Antonioli"}, {"name": "Paola Boito"}, {"name": "Gianna M. Del Corso"}, {"name": "Margherita Porcelli"}], "author_count": 4}, {"id": "2603.19177", "category": "quant-ph", "title": "Quantum Structures as Generative Scores: Partition Logic, Generative Logic, and Aesthetic Form", "abstract": "We connect partition logic with Generative Logic by translating finite partition logics into Prolog-based Simple Generative Logic Grammars. As a proof of concept, we use the five-atom V-logic L_{12} to generate a modular visual artifact, the \\emph{Quantum Square}. The approach separates logical structure from its visual, textual, or sonic realization. This makes partition logic useful both as a generative design resource and as a tool for communicating complementarity.", "url": "https://arxiv.org/abs/2603.19177", "type": "理论", "summary": "1. 本研究通过将有限划分逻辑翻译为基于Prolog的简单生成逻辑语法，建立了划分逻辑与生成逻辑的联系，并以五原子V逻辑L_{12}生成了模块化视觉制品‘量子方块’作为概念验证。\n2. 其技术核心在于实现了逻辑结构与其视觉、文本或声音实现形式的解耦，从而拓展了划分逻辑在生成设计以及量子互补性传达中的双重应用潜力。\n3. 这为开发逻辑驱动的量子结构生成模型、探索互补性在信息可视化与跨学科表达中的角色，以及推动量子物理与计算艺术的交叉研究提供了新方法论启示。", "summary_source": "deepseek", "authors": [{"name": "Christian Jendreiko"}, {"name": "Karl Svozil"}], "featured_authors": [{"name": "Christian Jendreiko"}, {"name": "Karl Svozil"}], "author_count": 2}, {"id": "2603.19210", "category": "quant-ph", "title": "The commutant of fermionic Gaussian unitaries", "abstract": "In this work, we characterize the $t$-th order commutants of fermionic Gaussian unitaries and of their particle-preserving subgroup acting on $n$ fermionic modes. These commutants govern Haar averages over the corresponding groups and therefore play a central role in fermionic randomized protocols, invariant theory, and resource quantification. Using Howe dualities, we show that the particle-preserving commutant is generated by generalized copy-hopping operators, while that for general Gaussian commutant is generated by generalized quadratic Majorana bilinears together with parity. We then derive closed formulas for the dimensions of both commutants as functions of $t$ and $n$, and develop constructive Gelfand--Tsetlin procedures to obtain explicit orthonormal bases, with detailed low-$t$ examples. Our framework also clarifies the structure of replicated fermionic states and connects naturally to measures of fermionic correlations, generalized Plücker-type constraints, and the stabilizer entropy of fermionic Gaussian states. These results provide a unified algebraic description of higher-order invariants for fermionic Gaussian dynamics.", "url": "https://arxiv.org/abs/2603.19210", "type": "理论", "summary": "1. 该工作系统刻画了作用于n个费米子模式上的费米子高斯幺正算符及其粒子数守恒子群的t阶交换子代数。\n2. 其核心在于利用Howe对偶性，揭示了粒子数守恒情形的交换子由广义复制-跳跃算符生成，而一般高斯情形的交换子由广义二次马约拉纳双线性型及宇称算符生成。\n3. 这为费米子随机化协议、不变理论及相关关联度量提供了统一的代数框架，并为构造显式正交基建立了可计算的Gelfand–Tsetlin方法。", "summary_source": "deepseek", "authors": [{"name": "Paolo Braccia"}, {"name": "N. L. Diaz"}, {"name": "Martin Larocca"}, {"name": "M. Cerezo"}, {"name": "Diego García-Martín"}], "featured_authors": [{"name": "Paolo Braccia"}, {"name": "N. L. Diaz"}, {"name": "Martin Larocca"}, {"name": "M. Cerezo"}, {"name": "Diego García-Martín"}], "author_count": 5}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>${paper.summary_source === "deepseek" ? "DeepSeek three-sentence PRL summary" : (paper.summary_source === "local-fallback" ? "Local three-sentence fallback" : (paper.summary_source === "translation" ? "Chinese abstract translation" : "Chinese placeholder fallback"))}</span><a href="${safeUrl}" target="_blank" rel="noreferrer">Open arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
